body:
  text: 徐孝穆集箋注卷一陳徐陵撰吳江吳兆宜注賦鴛鴦賦飛飛兮海濱去去兮迎春炎皇之季女漢張良傳注師古曰赤松子仙人號也神農時為雨師服水土教神農能入火自燒至昆山上常止西王母石室隨風雨上下炎帝少女追之亦得仙去織素之佳人古詩新人工織縑故人工織素織縑日一匹織素五丈餘將縑來比素新人不如故未若宋王之小史含情而死列異傳宋康王埋韓馮夫妻宿夕文梓生有鴛鴦雌雄各一恆栖樹上晨夕交頸憶少婦之生離恨新婚之無子玉臺新詠漢建安中焦仲卿妻劉氏為仲卿母所遣其家逼嫁沒水仲卿亦縊人哀之為詩云中有雙飛鳥自名為鴛鴦既交頸於千年亦相隨於萬里山雞映水那自得異苑山雞愛其毛羽映水則舞孤鸞照鏡不成雙范泰鸞鳥詩序昔罽賓王結罝峻卵之山獲一鸞鳥王甚愛之三年不鳴其夫人曰嘗聞鳥見其類而後鳴何不照鏡以映之鸞覩影悲鳴而絶天下真成長合會無勝比翼兩鴛鴦觀其哢吭浮沈左思蜀都賦哢吭清渠輕軀瀺灂張衡南都賦汰瀺灂兮船容裔拂荇戲而波散排荷翻而水落特訝鴛鴦鳥長情真可念許處勝人多何時肯相厭聞道鴛鴦一鳥名教人如有逐春情不見臨邛卓家女祇為琴中作許聲玉臺新詠琴歌序相如遊臨邛富人卓王孫有女文君新寡竊於壁間窺之相如鼓琴歌以挑之其歌曰何緣交頸為鴛鴦胡頡頏兮共翺翔樂府驄馬驅白馬號龍駒晉陸雲傳閔鴻見而竒之曰此兒若非龍駒定是鳯雛雕鞍名鏤衢三輔決録平陵公孫奮富聞京師梁冀知奮儉吝以鏤衢鞍遺奮從貸五千萬諸兄二千石徐樹榖曰後漢循吏傳秦彭字伯平扶風茂陵人也六世祖襲為潁川太守與羣從同時為二千石者五人故三輔號曰萬石秦氏小婦字羅敷古樂府秦氏有好女自言名羅敷倚端輕掃史一作吏未詳漢高五王傳魏勃少時欲求見齊相曹參家貧無以自通乃常獨早掃齊相舍人門外舍人怪之以為物而伺之得勃於是舍人見勃曹參因以為舍人言之悼惠王拜為內史召募擊休屠漢霍去病傳上曰票騎將軍收休屠王祭天金人塞外多風雪城中絶詔書空憶長楸下曹植名都篇走馬長楸間連蹀復連􅘠文君白頭吟今日十酒會明旦溝水頭蹀躞御溝上溝水東西流按􅘠音鋪馬蹀迹也中婦織流黃玉臺新詠古樂府相逢行曰大婦織羅綺中婦織流黃小婦無所作挾瑟上高堂落花還一作飛井上春機當户前帶衫行幛口覓釧枕檀一作入檀邊數鑷疑作躡經無亂魏志舊綾機五十綜者五十躡六十綜者六十躡扶風馬鈞患其喪功費日皆易以十二躡新螿緯易牽古今注莎雞一名催織一名絡緯催織謂鳴聲如急織絡緯謂其聲如紡績也蜘蛛夜伴織張協雜詩蜘蛛網四屋百舌曉驚眠易緯通卦百舌者反舌鳥也能反覆其舌隨百鳥之音封用黎陽土東觀漢記鄧訓故吏知訓好青泥封書從黎陽步推鹿車過易陽載青泥一襆遺訓書因計吏船揚雄答劉歆書天下上計孝廉及內郡衛卒會者雄常把三寸弱翰齎油素四尺以問其異語欲知夫壻處古樂府東方千餘騎夫壻居上頭今督水衡錢漢書本始二年春以水衡錢為平陵徙民起第宅注應劭曰水衡與少府皆天子私藏出自薊北門行樂府遺聲都邑三十四曲有出自薊北門行鮑昭出自薊北門行注薊故燕國薊北聊長望黃昏心獨愁屈原離騷曰黃昏以為期燕山對古剎代郡隱一作倚城樓屢戰橋恆斷長冰塹不流天雲如地陳漢月帶胡秋漬土泥函谷顧有孝曰後漢隗囂傳王元曰元請以一丸泥為大王東封函谷關挼繩縛涼州朱鶴齡曰漢西域傳烏秅國其西則有縣度縣度者石山也溪谷不通以繩索相引而度云平生燕頷相會自得封侯後漢班超傳相者指曰生燕頷虎頸飛而食肉此萬里侯相也後以西域五十餘國悉皆納質封定逺侯隴頭水崔豹古今注橫吹胡樂也張騫入西域傳其法唯得摩訶兜勒一曲李延年因造新聲二十八解魏晉以來不存見用黃鵠隴頭折楊柳等十曲别塗聳千仞離川懸百丈攢荆夏不通積雪冬難上枝交隴底暗漢地理志隴西郡注應劭曰有隴坻在其西也石礙波前響回首咸陽中三輔黃圖秦孝公始都咸陽咸陽在九嵕山渭水北山水俱在南故名咸陽唯言夢時往折楊柳嫋嫋河堤樹漢溝洫志哀平初平當使領河堤張衡西京賦周以金堤樹以柳杞依依魏主營徐炯曰魏文帝集栁賦序云昔建安五年上與袁紹戰於官渡時余始植斯柳自彼迄今十有五載矣感物傷懷乃作斯賦江陵有舊曲洛下作新聲未詳按晉書謝安石能為洛下書生詠妾對長楊苑三輔黃圖長楊榭在長楊宫秋冬較獵其下天子登此以觀君登高柳城後漢靈帝紀護烏桓校尉出高柳春還應共見蕩子太無情枚乘雜詩昔為倡家女今為蕩子婦關山月二首樂府解題關山月傷别離也關山三五月張尚瑗曰禮記月三五而盈三五而闕客子憶秦川思婦高樓上當窗應未眠星旗映疏勒晉書左旗九星在河鼓兩旁右旗亦如之河鼓居中後漢耿恭傳恭以疏勒城旁有澗水可固乃引兵據之雲陳上祁連漢書注師古曰天山即祁連山也胸奴謂天為祁連戰氣今如此從軍復幾年月出柳城東微雲掩復通蒼茫縈白暈漢書高帝七年月暈圍參軍七重是歲高皇帝為冒頓所圍七日乃解蕭瑟帶長風羌兵燒上郡胡騎獵雲中漢五行志文帝後六年胸奴天入上郡雲中烽火通長安將軍擁節起戰士夜鳴弓洛陽道二首玉臺新詠梁簡文帝元帝樂府題皆有洛陽道緑柳三春暗紅塵百戲多後漢安帝紀延平元年罷魚龍曼延百戲東門向金馬張瑩漢南記馬援奏曰武帝時善相馬者鑄作銅馬法獻之有詔立馬於魯班門外則更名曰金馬門南陌接銅駝洛陽記兩銅駝在宫之南街東西相向高尺洛陽人謂之銅駝街華軒翼葆吹江淹詩許史乘華軒説文軒曲輈轓車也蜀志先主少時戲言吾必當乘此羽葆蓋車飛蓋響鳴珂通俗文馬勒飾曰珂本草珂貝類皮黃黑而骨白可為馬飾生南海曹植公宴詩清夜遊西園飛蓋相追隨潘郎車欲滿無奈擲花何晉書潘嶽字安仁為河陽令美姿儀少常挾彈出洛陽道婦人遇之者皆連手縈繞投之以果滿車而歸洛陽馳道上漢賈山傳秦為馳道於天下道廣五十步三丈而樹厚築其外隱以金椎樹以青松三輔黃圖蔡雍曰馳道天子所行道也春日起塵埃濯龍望如霧後漢馬皇后紀太后詔曰前過濯龍門上見外家問起居者車如流水馬如遊龍河橋渡似雷晉書杜預以孟津渡險請建河橋於富平津聞珂知馬蹀見上傍幰見甍開儀制令諸車一品青油纁通幰朱裏朱絲絡網三品以上青通幰朱裏五品以上青偏幰碧裏六品以下皆不得用幰謝惠連雪賦注甍屋棟也相看不得語密意眼中來長安道玉臺新詠庾肩吾有賦得橫吹曲長安道輦道乘雙闕三輔黃圖武帝作建章宫宫在未央宫西長安城外帝於未央宫營造日廣以城中為小乃於宫西跨城池作飛閣通建章宫構輦道以上下古歌云長安城西有雙闕豪雄被五都尹文子魏王得玉召玉工相之工曰此無價以當之五城之都僅可一觀橫橋象天漢三輔黃圖秦始皇兼天下都咸陽渭水貫都以象天漢橫橋南渡以法牽牛法駕應坤圖疑作輿三輔黃圖鹵薄天子出車駕次第謂之鹵簿有大駕有法駕有小駕大駕則公卿奉引大將軍參乘太僕御屬車八十一乘作三行尚書御史乘之備千乘萬騎出長安郊祠天於甘泉備之百官有其儀注名曰甘泉鹵簿法駕京兆尹奉引侍中參乘奉車郎御屬車三十六乘北郊明堂則省副車小車祠宗廟用之繫辭坤為大輿韓康賣良藥後漢逸民傳韓康字伯休嘗采藥名山賣於長安市口不二價董偃鬻明珠漢東方朔傳董偃與母以賣珠為事偃年十三隨母出入主家喧喧擁車騎非但執金吾後漢百官志執金吾一人中二千石注胡廣曰衛尉巡行宫中則金吾徼於外相為表裏以擒姦討猾梅花落鮑昭吳均江總樂府題皆有梅花落對户一株梅新花落故栽燕拾還蓮井風俗通殿堂象東井形刻作荷菱荷菱水物也所以厭火風吹上鏡臺魏武雜物疏鏡臺出魏宫中有純銀參帶鏡臺一純銀七子貴人公主鏡臺四倡家怨一作愁思妾樓上獨裴回啼看竹葉錦龍輔女紅餘志桓豁女字女幼製緑錦衣帶作竹葉樣遠視之無二故無瑕詩云帶葉新裁竹簪花巧製蘭女幼庾宣婦也又梁簡文帝冬曉詩惟牽竹葉帶簪一作篸義同罷未能裁紫騮馬樂府鼓角橫吹十五曲有紫騮馬玉鐙繡纒鬃齊武帝諸子傳廬陵王子卿作銀鐙金薄裹箭腳按鐙音凳馬鞍踏鐙鬃音叢馬鬣也金鞍錦覆幪徐樹敏曰初學記宋劉義恭啓賜臣供御金梁橋鞍制作精巧按幪音蠓覆蓋也風驚塵未起揚雄羽獵賦林叢為之生塵草淺埓猶空晉書王濟常買地為馬埒角弓連一作穿兩兔詩騂騂角弓珠彈落雙鴻吕氏春秋以隋侯之珠彈千仞之雀世必笑之日斜馳逐罷連翩還上東劉生劉生殊倜儻漢禮樂志志俶儻精權竒任俠遍京華漢遊俠傳郭解父任俠解為俠益甚戚里驚鳴築漢書高祖召石奮姊為美人徙其家長安中戚里又上擊築自歌曰大風起兮雲飛揚威加海內兮歸故鄉安得猛士兮守四方平陽吹怨笳未詳按馬融長笛賦序融獨臥郿縣平陽塢中有洛客舍逆旅吹笛俗儒排左氏漢儒林傳劉歆白左氏春秋可立哀帝納之以問諸儒皆不對歆於是數見丞相孔光為言左氏以求助光卒不肯後漢賈逵傳侍中劉歆欲立左氏不先暴論大義而輕移太常恃其義長詆挫諸儒諸儒內懷不服相與排之新室忌漢家漢元后傳王諫欲諂莽上書言皇天廢去漢而命立新室太皇太后不宜稱尊號當隨漢廢以奉天命高才被擯壓自古共憐嗟烏棲曲二首樂録烏棲曲者鳥獸二十一曲之一也卓女紅妝期此夜見鴛鴦賦胡姬酤酒誰論價吳兆宫曰辛延年羽林郎詩胡姬年十五春日獨當壚風流荀令好兒郎偏能傳粉復熏香世説劉季和嘗言荀令君至人家坐處嘗三日香見襄陽記繡帳羅帷隱燈燭一夜千年猶不足惟憎無賴汝南雞天河未落猶爭啼後漢百官志注蔡質漢儀衛士甲乙徼相傳甲夜軍傳乙夜相傳盡五更衛士傳言五更未明三刻後雞鳴衛士踵丞郎趨嚴上臺不畜宫中雞汝南出雞鳴衛士候朱雀門外當傳雞鳴於宫中雜曲徐樹聲曰陳后妃傳後主自居臨春閣張貴妃居結綺閣龔孔二貴嬪居望仙閣並復道交相往來以宫人有文學者袁大捨等為女學士後主每引賓客對貴妃等遊宴則使諸貴人及女學士與狎客共賦新詩采其尤豔麗者以為曲調選宫女有容色者歌之其曲有玉樹後庭花臨春樂等大抵所歸皆美張貴妃孔貴嬪之容色傾城得意巳無儔洞房連閣未消愁漢李延年歌傾城復傾國佳人難再得後漢梁冀傳堂寢皆有陰陽奧室連房洞户宫中本造鴛鴦殿飛燕外傳帝居鴛鴦殿便房省帝簿嬺上簿嬺因進言飛燕有女弟合德美容體性純粹可信不與飛燕比為誰新起鳯皇樓三輔黃圖楊震關輔古語云長安民俗謂鳯皇闕為貞女樓緑黛紅顔兩相發千嬌百念情無歇舞衫回袖勝春風歌扇當窗似秋月碧玉宫伎自翩妍樂府有情人碧玉歌一云劉碧玉宋汝南王妾絳樹新聲最可憐魏文帝集答繁欽書今之妙舞莫巧於絳樹張星舊在天河上天官書注星經云栁星張周之分野三河也從來張姓本連天諾臯記天翁姓張名堅字刺渴漁陽人漢張放傳放取皇后弟平恩侯許嘉女上為放供張賜甲第充以乘輿服飾號為天子取婦皇后嫁女大官私官並供其第兩宫使者冠蓋不絶二八年時不憂度宋玉招魂二八齊容起鄭舞些旁邊得寵誰相妒立春厯日自當新晉禮志太史每歲上年厯立春讀五時令服各隨其方色帝御座尚書已下就席讀訖賜酒一巵正月春幡底須故續漢書立春之日夜滆未盡五刻京都百宫皆衣青立春幡施土牛耕人於門外流蘇錦帳挂香囊織成羅幌隱燈光晉摰虞決疑要注天子帳流蘇為飾古詩紅羅復斗帳四角垂香囊只應私將琥珀枕吳兆騫曰宋武帝紀寧州嘗獻琥珀枕光色甚麗價盈百金冥冥來上珊瑚牀本草珊瑚似玉紅潤生海底盤石上一歲黃三歲赤海人先作鐵網沈水底貫中而生絞網出之失時不取則腐長相思二首樂府怨思二十五曲其一曰長相思長相思望歸難傳聞奉詔戍臯蘭漢霍去病傳鏖臯蘭下師古曰臯蘭山名龍城逺漢書將軍衛青出上谷至龍城鴈門寒山海經鴈門山者鴈飛出於其間愁來瘦轉劇衣帶自然寬枚乘雜詩相去日已逺衣帶日已緩念君今不見誰為抱腰看玉臺新詠惠帝時童謠曰鄴中女子莫千妖前至三月抱胡腰長相思好春節夢裏恆啼悲不泄帳中起窗前髻栁絮飛還聚本草經栁花一名絮遊絲斷復結沈約詩遊絲映空轉欲見洛陽花董嬌嬈詩洛陽城東路桃李生路旁花花自相對葉葉自相當如君隴頭雪詩同汪詹事登宫城南樓元良屬上德率土被中孚書一人元良萬邦以貞老子上德不德詩率土之濱莫非王臣中孚見周易漢幄朝無怠東觀漢記時明帝年十二在幄後周門夕復趨文王世子文王之為世子朝于王季日三雞初鳴而衣服至于寢門外問內豎之御者曰今日安否何如內豎曰安文王乃喜及日中又至亦如之及莫又至亦如之桓經既受業後漢書孝明皇帝光武第四子十九年立為皇太子師事博士桓榮學尚書賀拜且尊儒晉書賀循世為儒宗除太子太傅命皇太子親往拜之壯志諧風雅高文會斗樞西京雜記揚子雲曰廊廟之下朝廷之中高文典册用相如鏗鏘叶舞蹈照爛等琨瑜河水慙雄伯漳川仰大巫吳書張綋見陳琳作武軍賦歎之琳答曰僕在河北少文人易為雄伯故使僕有此談今足下子布在彼所謂小巫見大巫神氣殫矣鮑魚寧入俎賈誼書文王使太公望傳太子發嗜鮑魚公不與曰鮑魚不登俎豈有非禮而可養太子哉釣鱉匪充廚晉潘尼集鱉賦序皇太子遊於玄囿遂命釣魚有得鱉而獻之者令侍臣賦之叔譽恆詞屈汲冢周書晉平公使叔譽聘于周見晉太子與之言五稱而三窮防年疑作嚴豈濫誅後漢馬援傳援謂司馬吕种曰國家諸子並壯而舊防未立則多通賓客則大獄起矣後帝收捕諸王賓客更相牽引死者以千數种亦豫其禍走筆戲書應令此日乍殷勤繁欽定情詩何以致殷勤相嫌不如春今宵花燭淚非是夜迎人何遜看新婚詩何如花燭夜輕扇掩紅妝舞席秋來卷歌筵無數塵曾經新代故那惡故迎新片月窺花簟南史王摛傳尚書令王儉嘗集才學之士總校虛實類物𨽻之謂之𨽻事唯廬江何憲為勝乃賞以五花簟白團扇輕寒入錦巾吳任臣曰魏武帝紀注傅子曰漢末王公多委王服以幅巾為雅是以袁紹崔豹之徒雖為將帥皆著縑巾魏太祖以天下凶荒資財匱乏擬古皮辨裁縑帛以為帢合於易簡隨時之義以色别其貴賤于今施行可謂軍容非國容也秋來應瘦盡偏自著腰身春情風光今旦動雪色故年殘薄夜迎新節當壚却晚寒竒一作故香分細霧一作篆石炭搗輕紈竹葉裁衣帶見樂府梅花奠酒盤未詳按四時寶鏡立春日春餅生菜號春盤年芳袖裏出春色黛中安欲知迷下蔡宋玉登徒子好色賦嫣然一笑惑陽城下蔡先將過上蘭三輔黃圖上林苑有上蘭宫奉和詠舞玉臺新詠梁簡文帝詠舞詩戚里多妖麗重聘滅秦余逐節工新舞嬌態似凌虛納花承褶概垂翠逐當舒扇開衫影亂巾度履行疏徒勞交甫憶自有專城居十五屬平陽因來入建章主家能教舞漢衛皇后傳后字子夫子夫為平陽主謳者既飲謳者進帝獨説子夫主因奏子夫送入宮城中巧畫妝後漢馬廖傳長安語曰城中好高髻四方高一尺城中好廣眉四方且半額城中好大袖四方全匹帛低鬟向綺席漢郊祀志注師古曰漢舊儀云祭天用六綵綺席六重用玉几玉飾器凡七十女樂即禮樂志所云使童男童女俱歌也舉袖拂花黃燭送空回一作窗邊影衫傳篋裏香當繇好留客故作舞衣長景差大招長袖拂面善留客只和簡文帝賽漢高帝廟原注聲偶作徐摛詩彚作庾肩吾並誤尚瑗曰梁簡文帝集漢高帝賽神詩玉車犬朝行動闔閭旦應開白雲蒼梧上丹鳯咸陽來日正江無影城斜漢屢回瞻流知地脈望嶺匹天台欲袪九愁恨聊舉十千杯山宫類牛首三輔黃圖牛首池在上林苑中西頭漢寢若龍川漢地理志南海郡龍川縣注裴氏廣州記本博羅縣之東鄉也有龍穿地而出即穴流泉因以為號玉碗無秋酎張載酒賦中山夏啓醇酎秋發金燈滅夜煙後漢李尤有金羊燈銘丹帷迫靈嶽未詳紺席下羣仙徐樹屏曰漢舊儀皇帝自行羣臣從齋皆百日紫壇帳幄高皇帝配天居堂下西南紺幄紺席堂虛沛築響叉低戚舞妍陳鋭曰西京雜記高帝戚夫人善鼓瑟擊築帝常擁夫人倚瑟而絃歌畢每泣下流漣夫人善為翹袖折腰之舞歌出塞入塞望歸之曲聲入雲霄何殊后廟裏子建作華篇魏曹植集漢高帝贊屯雲斬蛇靈母告祥朱旗既抗九野披攘禽嬰克羽掃滅英雄承機帝世著功武湯山齋桃源驚往客晉陶潛集有桃花源記詳與宗室書鶴嶠斷來賓會稽記射的山南有白鶴山此鶴為仙人取箭漢太尉鄭𢎞嘗采薪得一箭頃有神人至問何所欲𢎞曰嘗患若耶溪載薪為難願旦南風暮北風後果然復有風雲處蕭條無俗人山寒微有雪石路本無塵竹徑蒙籠巧茅齋結構新燒香披道記後漢襄楷傳注南陽張津為交州刺史常著絳袙頭鼓琴焚香讀邪俗道書云以助化懸鏡厭山神抱朴子道士以明鏡九寸懸於背老魅不敢近砌水何年溜簷桐幾度春雲霞一巳絶寧辨漢將秦詠柑藝文