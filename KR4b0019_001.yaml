水殿香山花臨舞席水影照歌牀闕表勸進梁元帝表梁書大寶二年五月湘東王繹命王僧辨等東擊侯景十月太宗崩侯景僭位其明年二月王僧辨平侯景奉表勸進答曰淮海長鯨雖云授首襄陽短狐未全革面太平玉燭爾乃議之五月司空南平王恪等復勸進湘東王猶不受八月兼散騎常侍聘魏使徐陵於鄴奉表勸進九月四方征鎮王公卿士復勸稱尊號猶謙讓未許表三上乃從之十一月丙子即皇帝位於江陵詔改太清六年為承聖元年臣聞封唐有聖還承帝嚳之家帝王世紀帝嚳崩摯於兄弟最長得登帝位封異母弟放勳為唐侯後政微弱而唐侯德盛乃造唐而致禪居代維賢終纂高皇之祚漢書諸吕既誅諸大臣謀曰代王高帝子最長仁孝寬厚乃迎立之無為稱於革舄漢書東方朔曰孝文皇帝身衣弋綈之衣履革舄至治表於垂衣繫辭黃帝堯舜垂衣裳而天下治而撥亂反正非間前古漢高帝紀羣臣曰帝撥亂世反之正至如金行重作晉五行志董養曰白者金色國之行也中興書有晉金行奄君四海源出東莞晉書元帝父琅邪恭玉覲祖琅邪武王仙武帝踐祚封東莞郡王炎運猶興漢高帝贊漢承堯運協于火德枝分南頓後漢光武紀南頓令欽生光武豈得掩顯姓於軒轅帝王世紀黃帝二十四子得姓者十四人皇甫謐曰黃帝居軒轅之邱故因以為名又以為號非才子於顓頊在傳顓頊氏有不才子天下之人謂之檮杌莫不因時多難左傳司馬侯曰或多難以固其國俱繼神宗者也書大禹謨正月朔旦受命于神宗伏惟陛下出震等於勛華鳴謙同於旦奭握圖一作褒秉鉞春秋合誠圖黃帝遊玄扈洛水上鳳皇銜圖置帝前帝再拜受圖書王左杖黃鉞右秉白旄以麾胡渭生曰孝經援神契舜龍顔重瞳大口手握褒宋均注手中有褒字將在御天易時乘六龍以御天玉勝珠衡春秋命厯序神農戴玉理宋均曰玉理玉英玉勝也孝經援神契伏羲天日山準日角而連珠衡注衡中有骨表如連珠象玉衡星漢書音義眉上曰衡子徐樹本曰海録碎事顔淵山庭日角曽珠衡犀角先彰元后書元后作民父母神祗所命非惟大室之祥左傳楚共王無冢適曰當璧而拜者神所立也乃與巴姬密埋璧於大室之庭使五人齊而長入拜平王弱抱而入再拜皆壓紐圖牒斯歸何止堯門之瑞班固典引應圖合牒窮祥極瑞漢書李倢仔居鈞弋宫生昭帝任身十四月乃生上曰昔聞堯十四月而生今鈞弋亦然乃命其所生門曰堯母門南史元帝諱繹武帝第七子也帝夢眇目僧執香爐稱託生王宫及生帝舉室中非常香有紫胞之異封湘東王鎮江陵任臣曰梁書元帝背生黑子巫媪見曰此大貴兆當不可言若夫大孝聖人之心中庸君子之德見中庸固以作訓生民貽風多士一日二日研覽萬幾允文允武包羅羣藝見書擬兹三大老子故道大天大地大王亦大域中有四大而王居其一焉賓是四門舜典賓于四門厯試諸難書序虞舜側微堯聞之聰明將使嗣位厯試諸難作舜典咸熙庶績見書斯無間而稱也論語禹吾無間然矣南史纍遷鎮西將軍都督荆州刺史機務煩多軍書羽檄文章詔誥點毫便就殆不遊手自無妄為象繫辭無妄災也鍾禍上京梟獍虔劉晉書崔懿之謂靳準曰汝心如梟獍必為國患左傳吕相絶秦曰虔劉我邊垂宗社蕩墜銅頭鐵額興暴皇年魚龍河圖黃帝攝政有蚩尤兄弟八十一人並獸身人語銅頭鐵額威震天下封豨修蛇行災中國左傳申包胥曰吳為封豖長蛇以薦食上國靈星所宅漢郊祀志三星為泰乙鏠旗命曰靈旗為兵禱太史奉以指所伐國下武其興詩下武維周望紫極而行號爾雅北極謂之北辰春秋合誠圖北辰其星五在紫微中進渭生曰漢書李尋曰紫宫極樞通位帝紀劉琨勸表莫不叩心絶氣行號巷哭瞻丹陵而殞慟帝王世紀堯母慶都孕十四月而生堯于丹陵南史東魏高歡卒侯景與高澄不協奉表以河南十三州降梁遂據夀陽作亂攻陷臺城家冤將報天賜黃鳥之旗墨子天錫武王黃鳥之旗國害宜誅神奉玄狐之籙黃帝出軍決帝伐蚩尤乃睡夢西王母遣道人被玄狐之裘以符授之南史王僧辨討侯景次於天雷軍人杜稜夢雷池君周何二神乘朱航陳甲仗稱下討侯景剋李軼於河津後漢書馮異為孟津將軍軍河上以拒朱鮪李軼等初軼與光武首結謀約及更始立反共陷伯升欲降不自安乃與異通書光武故宣露之鮪怒殺軼征陶謙於海岱魏志曹操父嵩避難在琅邪操迎之嵩輜重百餘兩陶謙別將守陰平掩襲嵩於華費間殺之操引兵擊謙攻拔十餘城皆屠之南史武帝為景所制憂憤成疾口苦索蜜不得再曰荷荷遂崩又立簡文帝尋使彭俊進上囊而弒之滕公擁樹雄氣方嚴漢書夏侯嬰為滕令奉車故號滕公項羽大破漢軍漢王不利馳去見孝惠魯元載之漢王急馬罷虜在後常蹳兩兒棄之嬰常收載行面雍樹馳卒得脫張繡交兵風神彌勇魏志張繡與曹操戰殺操長子昂操中流矢敗走南史世子方等討河東王譽軍敗死之忠誠貫於日月渭生曰戰國䇿唐雎曰専諸之刺王僚也彗星襲月聶政之刺韓傀也白虹貫日此皆有志之士懷怒未發休祲見於天孝義感於冰霜冰霜用王祥鄒衍事如雷如霆見詩非貔非虎牧誓尚桓桓如虎如貔前驅效命詩為王前驅元惡斯殲胤征殲厥渠魁既挂膽於西州世説薑維死時見剖膽大如斗方燃臍於東市後漢書董卓築塢於郿號萬歲塢及誅暴尸於市守吏為大炷置臍中燃之光明達曙蚩尤三冢寧謂嚴誅雲笈七籤軒轅本紀所殺蚩尤身首異處帝閔之令葬其首冢於夀張其肩膂冢在山陽其髀冢在巨鹿王莽千剸非云明罰漢王莽傳莽在漸臺商人杜吳殺莽校尉公賓就斬首軍人分裂莽身支節肌骨臠分之傳首詣宛陳沂震曰禮記公侯有罪則殲剸青羌赤狄英雄記董卓説校尉賈龍擊劉焉焉出青羌與戰通鑑注青羌羌之一種漢書晉文公攘戎狄居西河圁洛之間號曰赤翟白翟同畀豺狼詩投畀豺虎胡服夷言趙世家武靈王胡服騎射左傳衛侯輒歸效夷言咸為京觀左傳楚子曰古者明王伐不敬取其鯨鯢而封之於是乎有京觀南史王僧辨入據建康侯景奔吳羊侃子鵾殺景送尸建康傳首江陵暴尸於市民爭食之并骨皆盡邦畿濟濟還見隆平宗祀愔愔方承多福詩邦畿千里又濟濟多士班固東都賦即土之中有周成隆平之治焉孝經宗祀文王於明堂以配上帝束晢補亡詩愔愔我王紹文之緒善曰左傳祈招之愔愔杜預曰愔愔安和貌詩綏以多福自氤氲混沌之世驪連栗陸之君繫辭天地絪緼萬物化生三皇本紀自人皇以後有五龍氏燧人氏大庭氏柏皇氏中央氏卷須氏栗陸氏驪連氏赫胥氏尊盧氏混沌氏昊英氏有巢氏朱襄氏葛天氏陰康氏無懷氏蓋三皇巳來有天下者之號卦起龍圖三皇本紀宓犧氏有龍瑞以龍紀官號曰龍師始畫八卦文因鳥迹晉衛恆書勢黃帝之史沮誦蒼頡眺彼鳥迹始作書契雲師火帝非無戰陳之風三皇本紀炎帝神農氏以火德王故曰炎帝以火名官五帝本紀黃帝軒轅氏修德振兵以與炎帝戰于阪泉之野三戰然後得其志官名皆以雲命為雲師堯誓湯征咸用干戈之道大禹謨禹乃會羣后誓于師曰濟濟有衆咸聽朕命仲虺之誥東征西夷怨南征北狄怨星躔東井時破崤潼漢書漢元年冬十月五星聚于東井東井秦之分野沛公至霸上秦王子嬰素車白馬係頸以組奉皇帝璽降於軹道傍雷震南陽初平尋邑後漢光武紀世祖奔二公陳二公兵走北殺司徒王尋昆陽城中兵亦鼓譟而出會大風雷雨二公大衆遂潰未有援三靈之已墜文選注三靈天地人也救四海之羣飛揚雄劇秦美新海水羣飛注喻大亂也赫赫明明龔行天罰見書如當今之盛者也於是卿雲似蓋晨映姚鄉吕氏春秋虞舜卿雲歌曰卿雲爛兮糾縵縵兮日月光華旦復旦兮孔安國曰瞽叟妻握登見大虹感而生舜於姚墟故姓姚甘露如珠朝垂原寢後漢書明帝永平中甘露降於原陵按光武葬於原陵芝房感德咸出銅池漢書武帝作芝房之歌又宣帝時金芝九莖産於函德殿銅池中蓂莢伺晨無勞銀箭帝王世紀堯時有草夾階而生隨月生死以占日月之數名曰蓂莢尸子使雞伺晨陸陲新漏刻銘云每旦晨興屬傳漏之音聽雞人之響又金徒抱箭南史天寶二年十月辛丑朔紫雲如蓋臨江陵城重以東漸玄菟漢武帝紀朝鮮斬其王右渠降以其地為樂浪臨屯玄菟真番郡西踰白狼晉地理志高雲以并州刺史領白狼高柳生風後漢郡國志代郡十一城一名高栁扶桑銜日十洲記扶桑在碧海中樹長數千里一千餘圍於張尚玠曰淮南子日拂扶桑莫不編名屬國歸貢鴻臚後漢百官志承秦有典屬國别主四方夷狄朝貢侍子成帝省并於大鴻臚荒服來賓國語蠻夷要服戎狄荒服遐邇同慶南史大寶二年九月己亥盤盤國獻馴象其文昭武穆左傳富辰曰管蔡郕霍魯衛毛聃郜雍曹滕畢原酆郇文之昭也邗晉應韓武之穆也跗萼也如彼詩常棣之華鄂不韚韚箋承華者曰鄂跗鄂足也地平天成書地平天成功業也如此久應旁求掌故漢舊儀太常博士弟子試射䇿中乙科補掌故司馬相如封禪文宜命掌故悉奏其儀而覽焉咨詢天官周禮天官冢宰斟酌繁昌魏志文帝受禪為壇於繁陽黃初元年改潁陰之繁陽亭為繁昌縣經營高邑後漢光武紀命有司設壇場於鄗南千秋亭即皇帝位因改鄗曰高邑宗王啓霸非勞武德之侯魏志明帝紀帝諱睿年十五封武德侯黃初七年立為皇太子丁巳即皇帝位清蹕無虞何事長安之邸中華古今注秦制出警入蹕後漢安帝紀帝父清河孝王慶殤帝崩太后與兄車騎將軍鄧隲定䇿拜帝為長安侯即皇帝位揚龍旗以饗帝魯頌龍旗承祀御鳯扆以承天周禮掌次職王太旅上帝則張氊案設皇邸鄭司農曰皇羽覆上邸後板也玄謂後板屏風與染羽象鳯皇羽色以為之疏言後板者謂為大方板於坐後畫為斧文言屏風者據漢法混之厯數在躬大禹謨帝曰天之厯數在汝躬疇咨為讓堯典帝曰疇咨若時登庸去月二十日兼散騎常侍柳暉等至鄴齊神武帝紀神武以孝武既西恐逼崤陜洛陽復在河外接近梁境如向晉陽形勢不能相接乃議遷鄴伏承聖旨謙沖為而不宰老子生而不有為而不宰是謂玄德或云洛陽未復杜氏通典魏文帝受禪後修洛陽宫室權都許昌宫殿狹小元日於城南立氊殿青帷以為門設樂饗食後遷洛陽依漢舊事函谷無泥見樂府旋駕金陵初學記江寧縣楚之金陵邑也吳晉宋齊梁陳六代都之方膺天眷南史十一月丙子帝即位於江陵下詔將還建康胡僧佑等諌止之愚謂大庭少昊非有定居左傳注杜預曰大庭氏古國名在魯城內帝王世紀少昊帝名摯降居江水邑於窮桑以登帝位都曲阜號金天氏漢祖殷宗皆無恆宅漢高帝紀帝西都洛陽戍卒婁敬説上都關中張良勸上是曰車駕西都長安殷本紀盤庚之時殷已都河北盤庚渡河南居西亳復居成湯之故居乃五遷無定處登封岱嶽且署明堂漢武帝紀上登封泰山降坐明堂方陳鍔曰孝經援神契明堂者天子布政之宫上員下八窗四闥在國之陽兆寬曰大戴禮明堂凡有九室一室而有四户八牖總三十六户七十二牖以茅蓋屋巡狩荆州時行司隸後漢竇武傳桓帝巡狩南陽以武府掾胡騰為護駕從事騰上言臣請以荆州刺史比司隸校尉臣自同都官從事帝從之自是肅然莫敢妄有干欲何必西瞻虎踞乃建王宫蜀志諸葛亮曰鍾山龍盤石城虎踞南望牛頭方稱天闕一統志牛頭山在應天府一名牛首山有二峯東西相對晉元帝初作宫殿王導指雙峯曰此天闕也故又名天闕山抑又聞之玄圭既錫禹貢禹錫玄圭蒼玉無陳周禮大宗伯之職蒼玉禮天黃琮禮地乃棫朴之愆期詩芃芃棫朴非包茅之不貢左傳管仲對楚曰爾貢苞茅不入寡人是征雲和之瑟久廢甘泉孫竹之管無聞方澤周禮大司樂孤竹之管雲和之琴瑟雲門之舞冬日至于地上之圜丘奏之則天神皆降孫竹之管空桑之琴瑟咸池之舞夏日至于澤中之方丘奏之則地示皆出漢郊祀志武帝作甘泉宫中為臺室畫天地泰乙諸鬼神置祭具以致天神豈不懼歟伏願陛下因百姓之心振萬邦之命賈逵國語注振救也豈可逡巡固讓公羊傳齊侯逡巡而謝知樹敏曰漢外戚傳耿育疏太伯見厯適逡循固讓方求石戶之農皇甫謐高士傳石戶之農與舜為友舜以天下讓之石戶夫負妻戴攜子入海高謝為君左思魏都賦高謝萬邦徒引箕山之客高士傳許由字武仲聞堯致天下而讓焉乃遁於潁水之陽箕山之下未知上德之不德惟見聖人之不仁老子上德不德是以有德又聖人不仁以百姓為芻狗率土翹瞻詩率土之濱廣雅翹舉也蒼生何望書益稷帝光天之下至於海隅蒼生昔蘇季張儀違鄉負俗尚復招三方以事趙請六國以尊秦史記蘇秦傳秦字季子東周洛陽人為從約長并相六國北報趙王行過雒陽車騎輜重擬於王者秦喟然歎曰使吾有雒陽負郭田二頃豈能佩六國相印乎張儀傳儀魏人也入秦惠王以為客卿與謀伐諸侯漢書武帝詔士或有負俗之纍會稽典録范蠡字少伯越之上將軍也本是楚宛三戶人佯狂倜儻負俗李斯上秦王書惠王用張儀之計散六國之從使之西面事秦況臣等顯奉皇華詩皇皇者華遣使臣之詩也親承朝命圭璋特達聘義以圭璋聘重禮也通聘河陽曹植送應氏詩置酒此河陽晉地理志河內郡領河陽縣貂珥雍容漢官云秦置散騎又置中常侍漢因之皆銀璫附蟬為文貂尾為飾謂之貂璫尋盟漳水左傳會於葵邱尋盟且修好也魏都賦北臨漳滏加牢貶館左傳士鞅來聘加四牢焉為十一牢隨世汙隆禮記道隆則從而隆道汙則從而汙瞻望鄉關誠均休戚盧諶詩義等休戚但輕生不造謝朓詩輕生諒昭灑詩遭家不造命與時乖忝一介之行人同三危之遠擯左傳晉行人子員對鄭曰不使一介行李告於寡君禹貢三危既宅注三危在雍州之西南境即舜竄三苗之地山有三峯高嵸甚危故名三危本傳太清三年兼通直散騎常侍使魏陵纍求復命終拘留不遣承間內殿事絶耿弇之恩後漢書蕭王幸溫明殿耿弇請間曰王郎雖破天下兵革乃始耳聖公敗必不久王曰卿勿妄言我告斬卿弇曰大王哀厚弇如父子故敢披赤心耳封奏邊城私等劉琨之哭晉書劉琨段匹磾相與歃血同盟翼戴晉室遣右司馬溫嶠奉表詣建康勸進不勝區區之至謹拜表以聞讓五兵尚書表本傳天嘉四年遷五兵尚書領大著作臣聞仲尼大聖猶云書不盡言見繫辭士衡高才尚稱文不逮意語見文賦臣比衰疴自積思緒茫然頻託朋遊為裁章表雖復陳琳健筆未盡愚懷魏文帝書孔璋章表殊健孫惠詞人頗加繁飾晉書孫惠好學有才識以書干東海王越為記室參軍所以高天緬邈陸機擬古詩緬邈若飛沈弗降昭回詩倬彼雲漢昭回于天瞻拜絲綸更增憂憊臣雖不敏弱冠登朝伊昔承華初學記太子之門曰承華豫遊多士晚逢興運爰濫寵私爾時四郊多壘見禮記七雄分爭正義王赧卒後天下無主三十五年七雄並爭至秦始皇立天下一統國家制度日不暇給班固兩都賦序大漢初定日不暇給趙公論受命之宜隨邑奏升壇之禮未詳而參聞祕計弗解單于之兵漢陳平傳高帝至平城為胸奴所圍七日不得食用平奇計使單于閼氏解圍以得聞其計祕世莫得聞飛箭馳書未動聊城之將魯仲連傳田單攻聊城歲餘不下魯連乃為書約之箭以射城中燕將自殺不期枚乘老叟忽降時恩漢枚乘傳武帝以安車蒲輪徴乘馮唐暮年見申明主漢書武帝求賢良舉馮唐時年九十餘不能為官擢宰京邑朝坐棘林周禮朝士掌建邦外朝之法左九棘孤卿大夫位焉右九棘公侯伯子男位焉面三槐三公位焉遂致洛陽無雨東觀漢記永初二年三月京師旱至五月和熹鄧太后幸洛陽省獄舉寃未還宫澍雨大降非比長安多盜漢張敞傳以敞守京兆時長安市偷盜尤多百賈苦之上問敞故以為可禁其宜屏錮用置嚴科猶處名僚久為叨竊但著書天祿雖如劉向漢劉向傳向嘗校書天祿閣夜有老人以青藜火照之曰太乙之精聞卯金之子好學故下觀朔望登朝轉同王隱未詳案漢張禹傳禹領尚書代王商為丞相封安昌侯罷就第以列侯朝朔望位特進其於朽劣尚可從容司會文昌邈然非據周禮天官司會之職鄭玄曰會大計也司會主天下之大計計言之長若今之尚書矣樹聲曰荀綽晉百官表注尚書為文昌天府讓散騎常侍表本傳天嘉六年除散騎常侍臣聞五十知命宗師之格言見論語六百辭滿通賢之高槩薑宸英曰漢兩龔傳邴漢兄子曼容為官不肯過六百石輒自免去其名過出於漢昔墨子諸生褰裳救楚淮南子楚將攻宋墨子聞之自魯趨而往一日一夜足重繭而不休息裂裳裏之至郢見楚王魯連隱士高論却秦魯仲連傳仲連難新垣衍以秦為帝秦軍為却況乎謬蒙知已戰國䇿士為知巳死女為恱已容寧無感激洪私過誤置以通班司憲文昌見上遂諧常伯晉職官志侍中於周為常伯之任今者昆吾小器諦視不見玄黃未詳鈞天並奏靜聽能聞鐘鼓趙世家簡子病二日而寤曰我之帝所甚樂與百神遊於鈞天廣樂九奏萬舞雖神農分藥補三皇本紀神農以赭鞭鞭草木始嘗百草始有百藥岐伯提針司馬相如賦詔岐伯使尚方張揖曰岐伯者黃帝太醫屬使主方藥也冥衆因緣難可匡救陛下嗣臨寶厯光闡大猷屬意銓衡留情槱棫詩芃芃棫朴薪之槱之燕臺裝玉儻不精真闞子宋愚人得燕石以為大寶藏以華篋十重緹巾十襲客見掩口盧胡而笑齊客吹竽諒宜澄簡韓子齊宣王使人吹竽必三百人南郭處士請為王吹竽宣王悅之廪食以數百人南郊奉乘當求鄭默之才晉鄭默傳默為散騎常侍武帝出祀南郊詔使默參乘西省文辭應用羅含之學晉羅含傳含纍遷散騎常侍侍中少嘗晝臥夢鳥入口藻思日新謝尚稱為湘中之琅玕讓左僕射初表本傳大建元年除尚書右僕射二年遷左僕射陵抗表推周𢎞正王勱等固辭纍日陵乃奉詔臣聞七十之歲揚雄擬經漢書揚雄以經莫大於易故作太玄六十之年平津對䇿漢書公孫𢎞對䇿金馬門後為丞相封平津侯若斯強壯無歎耆老臣勵當作勱詳碑則胄華軒冕才允卿相出納流譽舜典帝曰龍命汝作納言夙夜出納朕命惟允朝野共瞻臣𢎞正南史周𢎞正字思行至江陵王僧辨飛騎迎之相見歡甚即日啓元帝授黃門侍郎直中書省俄遷左戶尚書加散騎常侍太平元年授侍中領國子祭酒遷太常卿都官尚書陳宣帝即位遷特進領國子祭酒國老儒宗左傳季孫謂仲尼曰子為國老教樹本曰後漢書樓望授不倦世稱儒宗情尚虛簡玄風勝業獨王當年臣鍾當作種南史張種字士苖永從孫也種少恬靜居處雅正傍無造請景平初司徒王僧辨以狀奏請為中從事陳武帝受禪為太常卿厯位左户尚書侍中中書令金紫光祿大夫氣懷沈密文史優裕漢書東方朔曰臣朔年十二學書三冬文史足用東南貴秀朝廷親賢並見壯猷詩方叔元老克壯其猷皆宜左執若漢武好少則微臣巳老漢書顔駟龎眉皓髮為郎武帝問之對曰陛下好少臣巳老若周文愛老則有此羣才齊世家吕尚年老以漁釣干西伯伏願天明更謀梓匠求其妙選稱是能官讓右僕射初表本傳大建元年除尚書右僕射加以言尋盟好仍屬亂離先零盜其牛馬漢蘇武傳武字子卿單于幽武置大窖中絶不與飲食武臥齧雪與氊毛并咽之至海上仗漢節牧羊後丁零盜武牛羊武復窮厄烏孫竊其印綬漢常惠傳惠從吏卒十餘人隨昆彌還未至烏孫烏孫人盜惠印綬節子卿茹雪叔向為凶未詳雖復東歸備罹此厄昔李廣遺恨不值漢初漢李廣傳文帝曰惜廣不逢時令當高祖世萬戶侯豈足道哉寧戚自悲不逢堯禪吕氏春秋寧戚飯牛歌南山矸白石爛生不逢堯與舜禪臣隨望聖運實在權輿爾雅權輿始也時參決勝之籌漢書高帝曰運籌帷幄之中決勝千里之外吾不如子房頗奏發兵之讖後漢光武紀同舍生強華奉赤伏符至曰劉秀發兵捕不道當塗錫命非無董昭之誠魏志董昭傳昭與列侯諸將議以丞相宜進爵國公九錫備物以彰殊勳典午禪文蜀志譙周常書版示文王曰典午忽兮典午者謂司馬也魏書云陳留王咸熙二年二月詔羣公卿士具儀設壇於南郊使使者奉皇帝璽綬册禪位於晉嗣王如漢魏故事不降張華之實為王儀同致仕表尺波歸海恆歎不居陸機長歌行尺波豈徒旋注喻年命流行曽無止息也爝火為薪猶悲假續高士傳堯舜致天下而讓許由曰十日並出而爝火不息其光不亦難乎況復星回日薄通人有乞告之言劉協新論天回日轉其謝如矢顧湄曰古樂府白日薄西山鐘鳴漏盡前史有夜行之誡魏志田豫答司馬宣王曰年過七十而居位譬猶鐘鳴漏盡而夜行不休也五陵鼎族家傳軒冕班固西都賦注高惠景武昭帝五陵在北士人多宅於此四姓卿侯榮由恩澤後漢明帝紀四姓小子侯注尚書以上為甲姓九卿方伯為乙姓散騎常侍大中大夫為丙姓吏部正員郎為丁姓虛名靡實世官非才書官以世年力方強不能辭退今三元肇慶玉燭寶典正月一日為元日亦云三元六吕司春得奉萬夀之杯漢兒寬傳武帝東封泰山還登明堂倪寬上夀曰臣寬奉觴再拜上千萬歲夀預參百辟之禮便釋朝衣謹遵初服同孔光之杖載遊戶庭漢孔光傳光稱疾辭位太后詔曰太師光聖人之後賜太師靈夀杖入省中用杖廣德之車方懸私館漢書薛廣德為御史大夫免賜安車駟馬歸沛沛以為榮懸其安車示子孫為始興王讓琅邪二郡太守表隋書南海郡曲江縣注舊置始興郡東海郡朐山縣注舊曰朐置琅邪郡之炯曰南史文帝諸子傳始興王伯茂字鬱文帝第二子也初武帝兄始興昭烈王道談仕梁為東宫直閣將軍侯景之亂援臺中流矢卒紹泰二年贈南兖州刺史封義興郡公諡曰昭烈武帝受禪重贈太傅改封始興郡王道談生文帝及宣帝宣帝以梁承聖未遷於長安至是武帝遙以宣帝襲封始興嗣玉以奉昭烈王祀武帝崩文帝入纂帝位時宣帝在周未還文帝以本宗乏饗徙封宣帝為安成王封伯茂為始興王以奉昭烈王祀甫離懷袖班倢妤怨歌行出入君懷袖裁脫綺紈漢書班伯在綺襦紈袴之間注貴戚子弟服適荷隆私使膺圭組執玉不趨摳衣未勝曲禮執玉不趨又兩手摳衣去齊尺論語執圭鞠躬如也如不勝自甘泉通火漢書文帝時胸奴使騎兵入燒回中宫烽火及甘泉宫細柳屯兵漢書周亞夫軍細柳注長安有細柳聚旁帶戎臣頗同疆埸左傳疆埸無主則啓戎心言瞻漢草乃曰中州未詳按漢書胡中草白昭君冢草獨青遙望胡桑已成邊郡曹植豔歌出自薊北門遙望胡地桑誠復居藩體國應思馬駿之功晉書扶風王駿鎮關中善撫御有威恩論地惟親宜慕曹彰之勇魏志任城王彰少善射御膂力過人手格猛獸太祖持彰鬚曰黃鬚兒竟天竒也移檄為護軍長史王質移文南史王質傳質字子貞梁世以武帝甥封甲口亭侯陳宣帝輔政為司徒左長史北史附庸傳後梁蕭巋嗣位之五年陳湘州刺史華皎巴州刺史戴僧朔並來附皎送其子玄響為質於巋仍請兵伐陳巋上言其狀武帝詔衛公直督荆州總管權景宣大將軍元定等赴之巋亦遣其柱國王操率水軍二萬會皎於巴陵既而與陳將吳明徹等戰於沌口直軍不利元定遂沒巋大將軍李廣等亦為陳人所虜長沙巴陵並陷於陳初華皎戴僧朔從衛公直與陳人戰率其麾下數百人歸於巋巋以皎為司空封江夏郡公比金風已徑玉露方團宜及窮秋幸踰高塞當使孤旌不反隻騎無還公羊傳秦伯將襲鄭晉人與薑戎要之殽而擊之匹馬隻輪無反者非止湯羅帝王世紀湯出見羅者命解其三面而置其一面漢南諸侯聞之咸曰湯澤及禽獸歸者三十六國豈知堯德堯典克明峻德其承比年民墊書下民昏墊仍歲藴隆詩旱既太甚藴隆蟲蟲粒粟貴於隨珠説苑墨子謂滑釐曰今凶年有欲與子隨侯之珠者又欲與子一鍾粟者子將何擇滑釐曰粟可取也分糜乏於齊鼎封氏見聞録青州南城佛寺有二大鑊大者容四十石小者容三十石舊傳寺即孟嘗居宅鑊即用以待食客者後毁為兵器且氐羌旅拒後漢馬援傳援曰黠羌欲旅拒巳跨伊瀍漢書三川注河洛伊也隋書豫州河南郡河南縣注有瀍水胡羯憑陵後漢吳漢傳居上黨武鄉羯室因號羯胡左傳馮陵我城郭方踰汾潞隋書冀州文城郡注東魏置南汾州後周改為汾州上黨郡注後周置潞州刺虎之勢時期卞生陳軫傳卞莊子欲刺虎館豎子曰此兩虎方且食牛食甘必爭爭則鬬鬬則大者傷小者死從而刺之莊子果有雙虎之功拾蚌之機彌驗蘇子戰國䇿趙且伐燕蘇代謂惠王曰今者來過川蚌方出曝而鷸啄之兩不相舍漁者得而并禽之但國家體兹明信左傳茍有明信有同皎日詩王風謂豫不信有如皎日豈惟風雨之旦猶救匹夫宵夢之言無欺幽壤未詳按列士傳羊角哀與左伯桃為友俱往仕楚至梁山逢雪糧盡度不兩全遂并糧與哀至楚楚用為上卿後收葬伯桃伯桃墓逼荆將軍陵而伯桃告云吾日夜被荆將軍伐之哀乃加兵未勝云我向地下看之遂自刎死琴操其思革子對楚王曰臣友三人石文子叔愆子竊慕大王高義欲俱來謁至於嶔巖之間逢飄風暴雨衣寒糧乏度不能俱活二子不以臣為不肖推糧與臣二子遂凍飢而死賊華皎近以臨蕃有譴作牧無童疑作勳既懼檻車之徴魏鄧艾傳詔書檻車徴艾便憂齊斧之戮魏文帝紀注令曰方將整以齊斧遂乃治兵楚夢漢司馬相如傳楚有七澤其小者為雲夢方九百里竊載干戈樂記倒載干戈傍引西戎禹貢西戎即敘共謀東夏左傳聞君將靖東夏偽周遣其衛國公宇文直等總統獯獫為其羽翼漢張良傳上曰羽翼巳成難動矣醜徒濟岸來攻郢城逆豎浮舟同趣夏浦本傳周武帝遣柱國長湖公元定攻圍郢州梁明帝授任蠻奴巴陵內史潘智虔嶽陽太守章昭裕桂陽太守曹宣湘東太守錢明並𨽻於皎又長沙太守曹慶等本𨽻皎下因為之用王師艤棹素在中流羣帥爭驅應時殲蕩左傳門官殲焉注杜預曰殲盡也本傳慮皎先發乃前遣明徹率衆三萬乘金翅直趣郢州又遣撫軍大將軍淳于量率衆五萬乘大艦繼之羌胡寶馬史記李斯上書曰中廏之寶馬臣得賜之縱橫七澤之中見上荆楚樓船彌滿三江之上漢武帝紀路博德等皆將罪人江淮以南樓船十萬人山海經注江湘沅水皆會巴陵洞庭陂號三江口俘禽所獲水陸無遺華皎擢自芻微本傳皎起自下吏叨居藩翰情慙犬馬罔顧恩靈翻執干戈自圖家國聞諸間諜左傳晉人獲秦諜注諜間也今謂之細作具彼鄰謀乃授冬官周禮冬官大司空之職以佐王富邦國即為鄉導魏志太祖北征烏丸令田疇將其衆為鄉導雖傷仁義之俗非敢有私期和與國之情猶冀無失移齊文南史淳于量傳華皎構逆以量為征南大將軍西討大都督總率大艦自郢州樊浦拒之皎平并降周將長湖公元定等詳前移獲去月二十日移承邊寇平殄同懷慶悅眷言鄰睦深副情佇夫天網之大老子天罔恢恢疏而不漏固無微而不禽神武之師魏王粲詩所從神且武安得久勞師本無征而不克至如戎王傾其部落漢胸奴傳秦昭王時宣太后詐而殺義渠戎王於甘泉遂起兵伐滅義渠逆豎道其鄉關非厥英圖殆難戡戮況復洞庭遐曠兵食殷阜西窮版屋北罄氊廬詩在其版屋漢書胸奴法漢使不去節不以墨黥其面不得入穹廬聲冠苻姚勢兼聰勒苻秦姚後秦聰漢勒後趙俱東晉僭國見晉書庸蜀寶馬彌山不窮巴漢樓船陵波無際曹植洛神賦凌波微步木華海賦萬里無際詳前移我之元戎上將協力同心承稟朝謨致行明罰為風為火殪彼蒙衝吳志周瑜傳與曹公遇於赤壁黃蓋取戰艦數十艘實以薪草灌膏油其中同時發火時風甚猛悉延燒岸上營落軍遂敗退如霆如雷語見詩擊其舟艦羌兵楚賊赴水沈沙棄甲則兩岸同奔橫尸則千里相枕江川盡滿譬睢水之無流漢高帝紀羽敗漢兵睢水上水為之不流原隰窮胡等陰山之長哭漢胸奴傳郎中侯應曰冒頓單于依陰山治兵器後武帝奪其地胸奴過者未嘗不哭於是黑山叛邑見與王僧辨書諸城洞開陸機漢高祖功臣頌胡馬洞開白石連羣未詳後漢段熲傳雜種羌屯聚白石注白石山今蘭州東鋭曰北史鄧至者白水羌也世為羌豪因地名號自稱鄧至投戈請命揚雄解嘲解甲投戈長沙鵩鳥靡復為妖漢書賈誼為長沙王傳三年有鵩鳥飛入誼舍止於坐隅鵩不祥鳥也湘川石燕自然還儛湘中記零陵有石燕遇雨則飛止還為石克翦無算縲禽不資欲計軍俘終難巧厯莊子巧厯不能得所獲龍駒驥子百千其羣更開苜蓿之園述異記張騫苜蓿園今在洛中苜蓿本胡中菜也騫於西戎得之方廣騊駼之廏漢百官公卿表注漢舊儀云天子六廏未央承華騊駼騎馬輅軨大廏也馬皆萬匹於是衛霍甘陳虬髭瞋目衛衛青霍霍去病陳陳湯甘甘延夀見漢書晉桓溫傳劉琰稱溫曰溫鬚如蝟毛磔蜀志張飛據水斷橋瞋目橫矛曰身是張翼德也可來共決死敵心馳隴路志飲河源乘勝長驅未知所限豈如桓溫不武棄彼關中晉書桓溫入關王猛被褐詣之捫蝨而談當世之務旁若無人且曰公不逺數千里深入敵境今長安咫尺而不度灞水百姓未知公心所以不至初溫指秦麥以為糧既而秦人悉芟麥清野以待之溫軍乏食徙關中三十餘户而歸殷浩無能長兹羌賊晉書殷浩連年北伐師徒屢敗糧械都盡桓溫因朝野之怨上疏請廢之朝廷不得已免浩為庶人徙之信安浩既廢黜雖愁怨不形辭色常書空作咄咄怪事四字方且西踰酒郡抵我境而置邊亭東略鹽池為齊朝而反侵地史記大宛傳燉煌置酒泉都尉西至鹽水往往有亭漢地理志酒泉郡注武帝太初元年開應劭曰其水若酒故曰酒泉也又河東郡安邑縣注鹽池在西南此政亦翦妖氛未窮巢窟便聞慶捷愧佩良深檄周文南史吳明徹傳太建九年詔明徹北征軍至吕梁周徐州總管梁士彥率衆拒戰主上恭膺寶厯嗣奉瑤圖既稟聖人之材兼富神武之略乂安兆庶共靖戎華用戢干戈詩載戢干戈永銷鋒鏑後漢陳龜年傳疏曰守塞候望懸命鋒鏑況復追惟在楚無忘玉帛之言軫念過曹猶感盤飱之惠左傳晉公子重耳及曹僖負羈乃饋盤飱置璧焉公子受飱反璧及楚楚子饗之曰公子若反晉國則何以報不穀對曰子女玉帛則君有之其何以報君陳宣帝諸子傳始興王叔陵魏克江陵宣帝遷關右宣帝之還以後主及叔陵為質天嘉三年隨後主還朝梁承聖中生於江陵年馳玉節之使周禮掌節守邦國用玉節者炯曰公羊傳陳乞謂陽生曰吾不立子所以生子者也走矣與之玉節而走之歲降銀車之恩未詳庶使懷音微悟知感而反其藏匿招我叛臣謂華皎等也詳前移翊從瀟湘空竭關隴荆梁左右漢沔東西隋書荆州沔陽郡沔陽縣注梁置沔陽營陽州城三郡籲地呼天後漢張奐傳寃則呼天窮則叩心望佇哀救夫一人掩泣猶愴滿堂説苑聖人於天下也譬猶滿堂飲酒有一人向隅而泣則一堂之人皆不樂百姓為心彌切宸扆老子聖人無常心以百姓為心大都督吳明徹台司上將德茂勳高威著荆湘本傳宣帝詔授明徹都督湘州刺史仍與征南大將軍淳于量等討平華皎化聞庸蜀本傳文帝詔以明徹為江州刺史隋書梁州隆山郡隆山縣注舊曰犍為置江州叱吒而平宿豫吹噓而定夀陽漢韓信傳項王喑啞叱吒千人皆廢隋書徐州下邳郡宿豫縣注舊置宿豫郡後漢鄭泰傳孔公緒噓枯吹生隋書揚州淮南郡領夀春縣按夀陽晉郡名治夀春縣樹屏曰後漢皇甫嵩傳閻忠曰指撝足以振風雲叱吒可以興雷電陳宣帝紀太建五年三月以開府儀同三司吳明徹都督征討諸軍事略地北邊冬十月吳明徹克夀陽城斬王琳傳首建業本傳齊遣王琳拒守也七年進攻彭城軍至吕梁又大破齊軍八年進位司空席卷江淮無淹弦望李陵與蘇武詩安知非日月弦望自有時啓安成王讓録尚書表後啓梁宗室傳安成康王秀字彥達文帝第七子也仕齊為太子舍人天監元年封安成郡王六年為江州刺史尋遷荆州刺史加都督魏縣瓠城人反殺豫州刺史司馬懷悅引司州刺史馬仙琕仙琕籤荆州求應援衆咸謂宜侍臺報秀即遣兵赴之十三年為郢州刺史加都督郢州夏口嘗為戰地多暴露骸骨秀於黃鶴樓下祭而埋之時司州叛蠻田魯生魯賢超秀據蒙籠來降武帝以魯生為北司州刺史魯賢北豫州刺史超秀定州刺史為北境扞蔽而魯生超秀互相讒毀有去就心秀撫喻懷納各得其用當時賴之遷雍州刺史在路薨喪至都贈司空諡曰康隋書揚州廬陵郡安復縣注舊置安成郡臣聞間平就國乃盛漢之常儀後漢光武十王傳東平王蒼建武十七年進爵蒼自以至親輔政意不自安上疏歸職永平五年乃許還國章帝八王傳河間孝王開以永元三年封延平元年就國奉遵法度吏人敬之郕霍無官實宗周之明典左傳五叔無官豈尚年哉何則皇季之重非待厯階王爵之隆自高羣辟況臣戢翼要荒吳越春秋扶同曰鷙鳥將搏必卑飛戢翼詳勸進表亟離寒暑見詩進慙趙勝能定楚從趙平原君傳毛遂謂楚王之左右曰取雞狗馬之血來毛遂奉銅盤而跪進之楚王曰王當歃血而定從次者吾君次者遂遂定從於殿上毛遂左手持盤血而右手招十九人曰公相與歃此血於堂下公等録録所謂因人成事者也退匪齊文馳免秦厄史記齊田文自秦逃歸王悔追之關法雞鳴乃出客時尚早追者將至客有善為雞鳴者野雞皆應之乃脫固以內切皇心外貽家恥甘輸重餌降禮單于漢賈誼傳試以臣為屬國之官以主胸奴請必係單于之頸而制其命真德秀曰新書以主胸奴下陳三表五餌而史削之列城十五如請和璧趙藺相如傳秦王欲以十五城易趙王和氏璧藺相如奉璧見秦王秦王無意償趙城相如因紿璧却立倚柱曰臣觀大王無意償趙城故臣復取璧大王必欲急臣臣頭與璧俱碎於柱矣因持璧睨柱秦王恐破璧乃謝相如市鄉三十聊同寶劒越絶書越王句踐有寶劒五其一曰純鉤客有直之者有市之鄉二駿馬千匹千户之都二武夫力而獲諸原微臣還而反諸敵曕言馬駿著隴右之功見讓表追念曹彰克烏桓之冦魏志代郡烏丸反彰乘勝逐北至於桑乾前王子弟若此勳庸偏其反而見論語豈可勝愧謝敕賚燭盤賞答齊國移文啓昔班彪草移後漢班彪傳竇融曰所上章奏皆從事班彪所為阮瑀裁書魏文帝書元瑜書記翩翩致足樂也按瑀字元瑜馳譽當年遂無加賞非常大賚始自今恩雖賈逵之頌神雀東觀漢記永安中神爵集京師帝敕蘭臺給筆札令賈逵作神爵頌拜為郎竇攸之對鼮鼠竇氏家傳世祖與百僚大會靈臺得鼠身如豹文焚之光澤世祖問羣臣莫知惟攸對曰名鼮鼠見爾雅賜帛百匹漢臣射覆之言漢書上嘗使諸數家射覆東方朔連中輒賜帛魏士投壺之賦魏略邯鄲淳作投壺賦千餘言文帝賜帛千匹方其寵錫獨有光前官燭斯燃更慙良吏謝承後漢書巴祗為揚州刺史與客坐暗中不燃官燭霄光可學乃會耆年説苑師曠曰老而學者如秉燭之光臣職居南史左傳南史氏聞太史盡死執簡以往身典東觀後漢和帝紀永元十三年春帝幸東觀覽書林閲篇籍博選術藝之士以充其官謹述私榮傳之方䇿謝敕賜祀三皇五帝餘饌啓竊以甘泉之殿舊禮羲軒漢郊祀志武帝作甘泉宫畫天地泰一諸鬼神而置祭具甘泉更置前殿宣帝即位立黃帝天神帝原水凡四祠於膚施成帝時匡衡奏罷之又公孫卿言黃帝接萬靈明庭明庭者甘泉也長樂之宫本圖堯舜漢官儀帝祖母稱長信宫帝母稱長樂宫皇后稱長秋宫嘗樹屏曰藝文類聚陳思王畫贊序昔明德馬皇后帝從觀畫前見陶唐之像后指帝曰嗟乎羣臣百僚恨不得為君如是帝顧而笑自東京晚世曠代無聞西漢盛儀復暏今日金壺流十旬之氣韻書九醖十旬酒名玉案備千品之羞楚漢春秋淮陰侯曰漢王賜臣玉案之食昔絳羅為薦既延王母漢武故事帝齋於尋真臺設紫羅薦夜二更後西王母至紫蓋為壇允招太乙漢郊祀志武帝時亳人繆忌奏祀泰一方曰天神貴者泰一泰一祝宰則衣紫及繡成帝時丞相衡言甘泉泰畤紫壇八觚宣通象八方又紫壇有文章采鏤黼黻之飾及玉女樂同斯爽號理致衆星臣以餘年豫聞清祀如陪瑤席沈約集賽蔣山廟文楊玉桴布瑤席遂飲瓊漿真誥明星玉女者居華山服玉漿謝兒報坐事付治中啓夫拾金樵路高士所羞吳越春秋延陵季子出遊於齊見道傍遺金有披裘采薪者季子呼薪者取彼地金薪者曰吾當夏五月而薪豈取金者哉整冠李下君子斯慎古詩君子防未然不處嫌疑問瓜田不納履李下不整冠兒報不能謹潔敢觸嚴網右趾鐵繫事允法科漢食貨志敢私鑄鐵器鬻鹽者􅎂左趾韋昭曰􅎂以鐵為之著左趾以代刖也左校論輸實繇恩宥後漢皇甫規傳規以餘寇不絶論輸左校漢官儀左校署屬將作大匠老臣過庭之訓見論語多謝古賢折笄之杖國語范文子曰有秦客廋辭於朝大夫莫之能對也吾三知焉武子擊之以杖折其委笄有愧前達謝賚麕啓臣昨既陪羽獵仍宴上林固謝長卿之文彌慙子雲之賦漢書司馬相如字長卿有上林賦揚雄字子雲有羽獵賦預割鮮禽已同鹽浦司馬相如子虛賦騖於鹽浦割鮮染輪頻蒙大臠更異梁王晉書梁孝王彤謂王銓曰我從兄為尚書令不能啖大臠銓曰大臠為誰曰盧播詰旦歸來猶為飽飫虞衡所獻復降今恩周禮冬官山虞林衡川衡澤虞掌山林川澤之政令賜細君以為歡漢東方朔傳朔曰拔劒割肉一何壯也割之不多又何廉也歸遺細君抑何仁也非屠門而大嚼桓談新論關東鄙語曰知肉味美則過屠門而大嚼謝東宫賚蛤蜊啓船俗嚴戈漢南粵傳注粵人於水中負人船又有蛟龍之害故置戈於船下漁人資設詩魚網之設于彼海童左思吳都賦海童於是宴語注海童海神也冒兹水豹望樓闕之氣得波潮之下漢書海傍蜃氣象樓臺謝賚蛤啓鴻化生蛤雀入猶新月令季秋之月爵入大水為蛤才變秋成已聞冬獻徐孝穆集箋注卷一
