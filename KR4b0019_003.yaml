body:
  text: 徐孝穆集箋注巻三陳徐陵撰吳江吳兆宜註書在北齊與梁太尉王僧辯書太清六年六月五日孤子徐陵頓首昔者雲師火帝非無戰陣之風堯誓湯征咸用干戈之道至於揺山蕩海驅電乗雷殲厥兇渠無虧皇極若夏鍾夷羿周厄犬戎漢委珠囊秦亡寶鏡然則皆聞之矣未有膺龍圖以建國御鳯邸以承家二后欽明三靈交泰而天崩地坼妖寇横行者也自古銅頭鐵額興暴皇年見勸進表及為貞陽侯書檮杌窮竒流災中國左傳顓頊氏有不才子天下之人謂之檮杌少昊氏有不才子天下之人謂之窮竒王彌石勒吞噬關河晉書東萊王彌家世二千石彌有勇畧善騎射青州人謂之飛豹後為羣盜降劉聰為石勒所殺又劉淵以石勒為護漢將軍平晉王衆至十餘萬集衣冠人物别為君子營後據襄國為後趙緑林青犢之羣黑山白馬之衆較彼兵荒無聞前史八王故事曾未混淆九州春秋非云禍亂見為貞陽侯書我皇受命中興光宅天下泰寧瑣𤨏安敢執鞭史記晏子傳贊余雖為之執鞭所忻慕焉按泰寧晉明帝年號建武棲棲何期扶轂揚雄羽獵賦桓文曾不足使扶轂按建武晉元帝年號抑又聞之陶唐既作天歸鳥喙之臣春秋元命苞曰堯為天子季秋下旬夢白帝子遺以鳥喙子其母曰扶始升高丘丘有雲如虎感巳而生臯陶淮南子云臯陶鳥喙豐畢將興特挺鷹揚之佐詩維師尚父時維鷹揚涼彼武王肆伐大商㑹朝清明明公量苞金鉉易鼎黄耳金鉉神表玉璜見為貞陽侯書儷兖當作補衮欽才詩衮職有闕惟仲山甫補之平階佇德揚雄長楊賦是以玉衡正而泰階平也固巳留連管樂見為貞陽侯書惆悵風雲濡足維時新序今為濡足之故不救人溺可乎投竿斯在見與宗室書去歲兇徒不逞言次巴丘鼓聲聞一柱之臺博物志南荆賦江陵有臺甚大而惟一柱衆木皆拱之烽火照三休之殿藝文類聚賈子曰翟王使使者之楚楚王欲誇之享客章華之臺三休乃至其上公則懸麾羽扇語林亮與司馬懿克日交戰懿使偵之孔明葛巾羽扇指麾三軍從容自若懿歎曰諸葛君可謂名士矣猶對投壺後漢書祭遵為將軍耿士皆用儒術對酒設樂必雅歌投壺戎羯咸奔鯨鯢俱翦見勸進表樓船萬軸還繫昆明三輔黄圖武帝作昆明池學水戰法胡馬千羣皆輸長樂漢百官志長樂廐丞一人於是乎夏首西浮見為貞陽侯書雲行電邁彭波東匯禹貢東匯澤為彭蠡谷静山空見與陳司空書扼鵲尾而據王畿綱目質實池州府銅陵縣有鵲頭山今廬江西岸有鵲尾渚登牛頭而埽天闕漸臺偽帥仍傳首於帝京郿塢元兇咸刳腸於軍市青羌赤狄同畀豺狼胡服夷言咸為京觀見勸進表公園陵盡拜忠貫長沙吳志孫堅為長沙太守舉兵討董卓乃前入至洛陽修諸陵平塞卓所發掘神主咸安勲踰高密後漢書鄧禹南至長安率諸將齋戒擇吉日修禮謁祠高廟收十一帝神主遣使奉詣洛陽因循行園陵為置吏士奉守焉重以秦宮既獲漢張良傳沛公入秦宮殿帷帳狗馬重寶婦女以千數欲留居之魯殿猶存晉王延夀魯靈光殿賦序靈光巋然獨存闢緑草於應門沈約詩應門照緑苔開青槐於武庫未詳長安五陵之族鄠杜七遷之民班固西都賦南望杜霸北眺五陵注宣帝杜陵文帝霸陵高惠景武昭帝五陵在北士人多宅於此又三遷七遷充奉陵邑注七遷為編徒居七陵充供奉也又鄠杜濵其足注扶風有鄠縣杜陽縣襁負而歸論語則四方之民襁負其子而至矣都廛斯滿見與楊僕射書鬻脂藏脯遊騎擊鐘貨殖傳翁伯以販脂而傾縣邑濁氏以胃脯而連騎張里以馬醫而擊鐘故市新城飛甍華屋漢地理志河南郡有故市縣曹參傳東取咸陽更名曰新城顧非䂥曰戰國策蘇秦説趙王於華屋之下吳祥曰何晏景福殿賦高甍崔嵬注甍屋櫩也東莞舊宅人識桑榆南頓荒田家分禾黍見勸進表豈以鄉名穀熟括地志宋州榖熟縣西南三十五里南亳故城即南亳湯都也邑號禾興而已哉吳志孫權立子和為太子大赦改禾興為嘉興若夫卦起龍文書因鳥跡見勸進表劬勞王室大拯生民自開闢以來未之有也雖十六才子明允篤誠左傳高陽氏有才子八人齊聖廣淵明允篤誠天下之民謂之八愷高辛氏有才子八人忠肅共懿宣慈惠和天下之民謂之八元此十六族也世濟其美不隕其名八百諸侯專心同德書武王伐紂不期而㑹孟津八百諸侯又子有亂臣十人同心同德中宗佐命俱畫丹青光武功臣皆懸星象棧道水閣田單之奉霸齊綰璽將兵周勃之扶强漢見為貞陽侯書壤蟲之比黄鵠淮南子盧敖視若士曰吾比夫子猶黄鵠與壤蟲也轍鮒之仰河宗莊子外物篇莊子貸粟於監河侯侯曰以金貸汝周曰昔見轍中涸鮒曰無升斗之水以活我乎周曰待我決西江水以活汝鮒曰如君言不如早索我於枯魚之肆也未足云也孤子階縁多幸叨簉皇華鄉國屯危公私憔迫邳彤之切長亂心胷後漢書王郎所置信都王捕繫彤父弟及妻子使為手書呼彤曰降者封爵不降族滅彤涕泣報曰事君者不得顧家㑹更始所遣將攻拔信都郎兵敗走彤家屬得免徐庶之祈終無開允見與楊僕射書既而屏居空館潘岳寡婦賦歸空館而自憐多厯歲時釁犯幽祇躬當勦滅何圖釁咎災極蒼旻號慕煩冤肝腸屠殞酷痛柰何無狀柰何維桑與梓翻若天涯古詩各在天一涯杖柏栽松悠然長絶明明日月號叫無聞詩或不知叫號茫茫宇宙容身何所漢鄒陽傳申徒狄徐衍不容身於世窮劇柰何自忝膺嘉聘仍屬亂離上下年尊偏嬰此酷昔人迎門請盜恒懷廢寢之憂後漢書趙咨少孤有孝行躬率子孫耕農為養盜嘗夜徃劫之咨恐母驚懼乃先至門迎盜因請為設食謝曰老母八十疾病須養居貧朝夕無儲乞少置衣糧妻子物一無所請盜皆慙歎奔出當輓輿櫬猶有危途之懼後漢亷范傳范京兆杜陵人父遭喪亂客死於蜀漢范遂流寓西州西州平歸鄉里西迎父喪載船觸石破沒范抱持棺柩遂俱沈溺衆傷其義鉤求得之況乎逆寇崩騰京師播越興居動止長隔山河朝夕饘􅓞誰經心眼内則婦事舅姑如事父母饘􅓞酒醴芼羮菽麥蕡稻黍粱秫唯所欲程糜不繼師覺授孝子傳程曾年七歲喪母哀號哭泣不異成人祖母憐之嚼肉食之覺有味便吐去原粟何資論語原思為之宰與之粟九百瞻望風雲朝夕鳴咽固乃游魂已謝後漢謝夷吾傳遊魂假息無所施刑非復全生餘息空留非為全死同冰魚之不絶汲冢周書時訓解立春之五日魚上冰吳樹臣曰易通卦驗大雪魚負冰似蟄蟲之猶蘇月令孟春東風解凍墊蟲始振良可哀也良可哀也本傳侯景寇京師陵父摛先在圍城之内陵不奉家信便蔬食布衣居若憂恤自東都紹漢南亳興殷見勸進表修好徵兵左傳凡君即位卿出竝聘踐修舊好要結外援好事鄰國以衛社稷又王以戎難告齊徴諸侯而戍周彌留星琯韓宣范武方駕連鑣見左傳蘇秦張儀朱輪華轂蘇秦傳燕文侯資蘇秦車馬金帛以至趙張儀傳蘇秦乃言趙王發金幣車馬使人微隨張儀所欲用為取給儀遂得以見秦惠王而孤子三危是擯四罪同科孟子四罪而天下咸服詳勸進表聽别馬而長號杖歸旍而永慟王稽反命既無託乗之恩見與楊僕射書椒舉相逢誰為班荆之位左傳伍舉奔鄭將遂奔晉聲子將如晉遇之於鄭郊班荆相與食而言復故昔人違齊處魯時降徵求亡晉奔齊猶䝉招請左傳鮑叔帥師來言曰子糾親也請君討之管召讎也請受而甘心焉管仲請囚鮑叔受之及堂阜而税之曰管夷吾治於高傒使相可也公從之又隨㑹在秦乃使魏夀餘偽以魏叛者以誘士㑹執其帑於晉使夜逸請自歸於秦秦伯許之履士㑹之足於朝既濟魏人譟而還問管寧於遼左魏管寧傳寧字幼安北海朱虛人聞公孫度令行於海外遂至遼東文帝即位徵寧遂將家屬浮海還郡追王朗於浙東魏王朗傳朗為㑹稽太守孫策渡江畧地朗自以身為漢吏宜保城邑遂舉兵與策戰敗績朗乃詣策太祖表徵之朗自曲阿展轉江海積年乃至拜諌議大夫參司空軍事竝物譽時賢卿門公族懸須應務湥挾情祈斯豈庸賤之儔邪非餘生之敢望也但預在輶軒見與楊僕射書誠為過誤珪璋特達通聘河陽貂珥雍容尋盟漳水見勸進表差有黄門啟封非無青紙詔書晉山簡表臣父濤奉先帝手澤青紙詔郡將州司後漢皇甫規傳坐觀郡將巳數十年矣注郡將郡守也郊迎負弩漢書霍去病為票騎將軍擊匈奴道出河東河東太守郊迎負弩矢先驅鄉亭里候西京賦注秦法十里一亭周禮夏官有候人飾館陳兵左傳鄭穆公使視客館則東載厲兵秣馬矣豈是復介而奔齊左傳公孫歸父欲去三桓以張公室與公謀而聘於晉人去之冬公薨季文子使臧宣叔逐東門氏子家還及笙壇帷復命於介既復命袒括髮即位哭三踊而出遂奔齊寧當竊妻而逃晉左傳共王即位將為陽橋之役使屈巫聘於齊且告師期巫臣盡室以行申叔跪從其父將適郢遇之曰異哉夫子有三軍之懼而又有桑中之喜宜將竊妻以逃者也及鄭使介反幣而以夏姬行將奔齊齊師新敗曰吾不處不勝之國遂奔晉已焉哉羌難得其言也漢之谷吉捐軀者幾人漢書谷吉永之父也元帝時為衛司馬使送郅支單于侍子為郅支所殺楚之申胥埋魂者何地左傳申包胥如秦乞師立依於庭牆而哭七日秦哀公為之賦無衣九頓首而坐秦師乃出孤子何所歎焉但頓伏苫廬見與宗室書徒延光晷謂光隂日晷夫以啁噍燕雀躑躅鳴號禮記三年問今是大鳥獸則失喪其羣匹越月踰時焉則必反巡過其故鄉翔囘焉鳴號焉蹢躅焉踟蹰焉然後乃能去之小者至於燕雀猶有啁噍之頃焉然後乃能去之含識懷靈未有其痛且夫曾耕雨雪猶尚悲歌琴操曾子耕泰山下雨雪不得歸思父母作梁山操蘇使幽囚無馳哽噎見讓右僕射初表趙紹熹曰本傳陵不奉家信便布衣疏食曾耕句言己之思親蘇使句言已之奉使公履忠𢎞孝冠冕搢紳化感煙雲量標海岳行糜仲月王政無塞月令仲秋之月養衰老授几杖行糜粥飲食分穀高年仁風斯逺漢文帝紀有司請八十巳上月賜米肉酒九十已上加帛絮長吏閲視丞若尉致固以衣纓仰訓黎庶投懷今日憔惶彌布洪澤雖復孤骸不返方為漠北之塵營魄知歸終結江南之草左傳魏武子有嬖妾武子卒顆嫁之及輔氏之役顆見老人結草以亢杜回囘躓而顛故獲之夜夢之曰余而所嫁婦人之父也爾用先人之治命余是以報詳與楊僕射書孤子徐陵頓首與王吳郡僧智書南史王僧辯傳僧辯既亡弟僧智得就任約約敗走僧智肥不能行又遇害孤子徐陵頓首昔林宗道主時人多慕德之賓後漢書郭泰字林宗遊於洛陽始見河南尹李膺膺大竒之由是名震京師後歸鄉里衣冠諸儒送至河上車數千兩林宗惟與李膺同舟而濟衆賓望之以為神仙無忌雄豪天下盡希風之客信陵君傳魏公子無忌為人仁而下士士無賢不肖皆謙而禮交之士以此方數千里爭徃歸之致食客三千人況復王家沈黙晉書王昶為人謹厚名其兄子曰黙曰沈戒之曰欲爾曹顧名思義不敢違也謝氏混𤣥晉書謝混字叔源少有才名𤣥字幼度少穎悟與從兄朗俱為叔父安所器重名貴公門譽華卿子漢項籍傳楚懐王召宋義為上將軍號卿子冠軍而秦峰阻夐浙水悠長諮訴無因但用窮結比青葽已戒淮南子注青女青腰玉女主霜雪也白露方漙詩零露漙兮體中何如願聞康勝鄧仲華服衮之年後漢書鄧禹字仲華光武拜為前將軍持節中分麾下精兵二萬人遣西入關及即位於鄗使使者持節拜禹為大司徒封酇侯食邑萬户禹時年二十四後定封高密侯荀令則擁旄之日晉荀羡傳羡字令則除兆中郎將徐州刺史監徐兖二州揚州之晉陵諸軍事假節時年二十八中興方伯未有如羡之少者也徒云早達未可同功今日相方豈不高視魏曹植與楊德祖書足下高視於上京竊承富春頃歲多難薦臻邑閈皆空黔黎將盡御史舊榻零落不存郡國志消山下有夫山祠山北湖隂又有消御史廟孤石聳出似婦人豔妝而坐太傅齋室荒茫無處後漢循吏傳桓帝好黄老道悉毁諸房祠惟特詔密縣存故太傅卓茂廟自神麾所届襁負斯歸新屋方華故田斯墾府吏閒坐長使誦經謝承後漢書張霸為㑹稽太守甚有名稱其餘有素行者皆見擢用郡中爭勵志節誦習者以千數道路但聞誦書聲督郵無事惟慮吹笛馬融長笛賦序融性好音律能鼔琴吹笛為督郵無留事獨卧郿縣平陽塢中有洛客舍逆旅吹笛融去京師踰年暫聞甚悲而樂之作長笛賦東包海水俱承幕府之威班固集奏記東平王蒼曰幕府新開廣延羣俊西洎江沱同仰惟良之化漢書宣帝曰與我共理者其惟良二千石乎政差邊疑作趙張何其神也漢趙廣漢等傳贊自孝武置左馮翊右扶風京兆尹而吏民為之語曰前有趙張後有三王孤子無心靦冒茍郄光隂風疾彌留見與宗室書示有餘息恩將公聘窮擯虜庭博望侯極迹於黄河漢張騫傳漢使窮河源其山多玉石采來天子按古圖書名河所出山為昆侖云按騫封博望侯栘中監流滯於滄海漢昭帝紀栘廐中監蘇武前使匈奴留單于庭十九歲乃還奉使全節以武為典屬國蘇林曰栘音移廐名也自斯以後惟有庸賤本應埋魂趙魏析骨幽并鮑照蕪城賦莫不埋魂幽石委骨窮塵豈意餘年復反鄉國仰屬伊公在亳渭老師周旌賁丘園見易采拾衡巷遂以哀駘不棄莊子哀公問仲尼曰衛有惡人焉曰哀駘也甕盎無遺莊子甕盎大癭還顧庸虚未應偕此竊承君侯過被以光輝屢有吹嘘之言見檄周文頻䝉薦延之澤故得周行紫閣陸雲喜霽賦㬬六龍於紫閣升降丹墀左思魏都賦丹墀臨猋注天子庭以丹塗地故曰丹墀㸃汚清朝豈不荒媿雖復華隂砥柱帶地窮湥禹貢導河積石至于龍門南至于華隂東至于砥柱嵩高維岳極天為重詩嵩高維岳峻極于天未可以方斯盛典譬此洪恩年迫桑榆淮南子日西垂景在於樹端謂之桑榆豈期酬報政以川波非逺對奉無因夜夢子長之遊漢書司馬遷字子長二十而南遊江淮上㑹稽揬禹穴閫九疑浮於沅湘北渉汶泗講業齊魯之都觀孔子之遺風鄉射鄒嶧戹困鄱薛彭城過梁楚以歸朝覽希道之疏未詳按南史謝莊字希逸製木方丈圖山川土地各有分理離之則州郡殊别合之則宇内為一道逸字畫相近或致誤耳浮雲西北徒懷魏帝之文魏文帝雜詩西北有浮雲亭亭如車蓋行雨東南思假飛山之便吳越春秋范蠡作城訖怪山自至怪山者琅邪東武海中山也一夕自來百姓怪之故曰怪山窮誠已結荒係逾湥方事祁寒君牙冬祁寒小民亦惟曰怨咨願加珍納謹扶力白書迷乏不次孤子徐陵頓首荅李顒之書近謬枉清音無申窮眷忽辱來告文製兼美君山西盛族素挺風流河北辭林本所嗟賞子桓虚座寧不敬期吳志魏文帝諱丕字子桓嘗為虞翻設虚座伯喈倒屣固以相屬後漢書蔡邕才學顯著貴重朝廷常車騎填巷賓客盈坐聞王粲在門倒屣迎之曰此王公孫也有異才吾不如也吾家書籍文章盡當與之一日復其草土思􅗓衣裾後漢趙岐傳注岐與友書曰馬季長雖有名當世而不持士節三輔高士未嘗以衣裾􅗓其門也披素清顔但覺形穢世説衛玠俊爽有風姿王濟輒歎曰珠玉在前覺我形穢公輔之量不負高名晉石苞傳市長趙元儒歎苞當至公輔王佐之才信表天骨後漢王允傳郭林宗竒之曰王生一日千里王佐才也孺子之榻雖其可懸後漢徐穉傳穉字孺子陳蕃為豫章太守在郡不接賓客惟穉來特設一榻去則懸之仲舉之車彌軫恒眷見與宗室春孤子昔縁素乏叨簉皇華今日形容無關天壤殘光炯炯慮在昏明餘息緜緜待盡鐘漏見為王儀同表安可以樹揚名士游處盛賓吳志襄欽與太子登游處來喻泰高如為善謔文豔質寡何似上林漢書序傳文豔用寡子虚烏有寓言湥麗北風終始華而不實將同桂樹漢五行志成帝時歌謡云桂樹華不實黄雀巢其顛故為人所羡今為人所憐但忘年之款昔有張裵未詳後漢書禰衡始弱冠孔融年四十與為忘年交鄰國之交非無嬰札左傳吳公子札聘於齊悦晏平仲儻哀駘可悦甕盎非疑見與王僧智書方願投衿庶比傾蓋家語孔子之郯遇程子於途傾蓋而語終曰甚相親頃陳湯之疾歲月增湥羊祜之疴秋冬彌劇見與宗室書且年光遒盡觸目崩心扶力含毫諸不申具孤子徐陵頓首為陳武帝作相時與北齊廣陵城主書齊書辛術字懷哲武定八年除東南道行臺尚書遷東徐州刺史為淮南經畧及王僧辯破侯景術招攜安撫城鎮相繼款附前後二十餘州於是移鎮廣陵籍甚英風漢陸賈傳賈遊漢廷公卿間名聲籍甚常懷眷屬封疆有限寤寐增勞辱此月九日告湥慰情佇方秋尚熱體中何如戎帳艱辛無乃為弊吾以庸薄謬膺台鉉既荷先帝拔擢之恩兼䝉今主責成之寄政以皇齊大德世紹和風方藉威靈庶平讎恥提攜小國願預藩臣南史梁貞陽侯明傳陳霸先襲殺僧辯復奉晉安王仍請稱臣於齊永為蕃國還詔哀矜許垂容納奉敕須質便遣入朝部下諸將哀吾誠節一兒一弟無所遺恡南史南康愍王曇朗武帝母弟忠壯王休先之子也紹泰二年齊兵次逼建業因請和求武帝子姪為質乃遣曇朗質於齊齊背約遣蕭軌等隨徐嗣徽渡江武帝大破之虜蕭軌東方老等誅之齊人亦害曇朗於晉陽立志立義無負上天但故丞相諸子及湛海珍等竝依敕㫖馳遣渡江主上又遣吏部尚書王通鴻臚卿謝岐等南史本傳岐㑹稽山隂人陳武帝引參機密為兼尚書右丞至和州與司馬行臺共為盟誓南史貞陽侯明傳齊遣行臺司馬㳟及梁人盟於厯陽而蕭軌等決信敗亡陳武帝紀齊兵至秣陵故城帝率宗室王侯及朝臣於大司馬門外白虎闕下刑牲告天以齊人背約發言慷慨涕泗交流士卒觀者益奮齊文宣帝紀天保六年十一月梁秦州刺史徐嗣徽南豫州刺史任約等襲據石頭城竝以州内附壬辰大都督蕭軌帥衆至江遣都督柳達摩等度江鎮石頭巳亥柳達摩為霸先所攻遂以石頭降七年三月丁酉大都督蕭軌等帥衆濟江六月乙卯蕭軌等與梁師戰於鍾山西遇霖雨失利軌及都督李希光王敬寳東方老軍司馬裵英起竝汲士卒還者十二三茍相陵易鬱從東道馳至北郊陳武帝紀齊軍至𤣥武湖西北莫府山南將據北郊壇既通宮闈無容静黙兩兩相對俱有損傷彼聞人馬因此奔散且置兵之地溝澗且多退兵之時投赴相積陳武帝紀壬子夜大雨平地水丈餘齊軍晝夜坐立泥中而臺中及潮溝北水退路燥官軍每得番易近遣張都來此具是行人所見但廣陵建業纔隔一江戰場去岸不盈五里軍人退散理反家鄉縁岸村人復有舟檝且蘆牌荻筏竟浦浮江陳武帝紀齊軍士得竄至江者縛筏以濟中江而溺流尸至京口者彌岸千百為羣前後相繼吾又勒兵按甲漢書雋不疑傳右將軍勒兵闕下以備非常韓信傳廣武君對曰方今為將軍計莫如按甲休兵不聽討捕若無恐懼竝應安逺假使在此不可更生至彼而殂差非吾過如其枉理必是興軍見伐於有道之人加兵於無罪之國若彼王師如此又是違盟后土皇天山川社稷察其怨語寧容相祐辱告承上黨殿下及匹婁領軍齊書婁叡字佛仁代郡平城人也齊受禪得除領軍將軍武成至河陽遣總偏師赴懸瓠叡在豫境留停百餘日專行非法詔免官應來江右師出無名此是何義小之事大差無違理彼之陵我自是乖言𤣥天所伐匹馬無違翻見怨尤一何非理若彼鬼神有知寧可斯背鬼神無知何用盟歃漢外戚傳班使伃對曰使鬼神有知不受不臣之愬如其無知愬之何益去歲柳達摩等石頭天井連月亢陽三子纔降陳武帝紀齊安州刺史翟子崇淮州刺史柳達摩楚州刺史劉士榮率衆赴任約入石頭又梁敬帝紀翟子崇等降竝放還北連冬大雪黄袍盡沒吳其炳曰陳武帝紀柳達摩等被圍謂其衆曰頃在北童謡云石頭𢷬兩襠𢷬青復𢷬黄侯景服青巳𢷬於此今吾徒衣黄豈謡言驗邪白帳皆浮未詳按後漢西域傳帳者猶中國之户數也既因之以泥塗兼加之以疾疫蕭裵既退雪霧便除從爾以來稍成災旱定知衣冠之國禮樂相承博物志君子國人衣冠帶劒好禮讓故為君子國天道不言不容都滅長江渺渺巨浪湯湯如鬬艦舟師詎有湥利近梁山之戰即是前車蕪湖之役可為明鏡通鑑梁敬帝太平元年齊遣蕭軌等與任約徐嗣徽合兵十萬侵梁出柵口向梁山陳霸先帳内盪主黄叢逆撃破之齊師退保蕪湖霸先遣沈泰等就侯安都共據梁山以禦之昔晉侯不能乗鄭馬左傳乗小駟鄭入也慶鄭曰古者大事必乗其産生其水土而知其人心弗聽戰於韓原晉戎馬旋濘而止趙將不能用楚兵史記亷頗一為楚將無功曰我思用趙人一非水土難為騁力揚州卑濕漢地理志江南卑濕丈夫多夭厥土塗泥禹貢揚州厥土惟塗泥如遇秋霖楚辭皇天滛溢而秋霖兮后上何時兮得乾杳同江漢假令蚩尤重出見勸進表白起還生史記白起者郿人也善用兵事秦昭王控代馬而陵波後漢班超傳疏曰代馬依風躡胡靴而湔水終難逞効詎有成功六州勇士漢書金城隴西天水安定北地上郡為六郡雖有百萬十姓豪傑徒勞千億不能為患斷可知矣昔我平世天下乂安人不識於干戈時無聞於桴鼔見與楊僕射書故得兇人侯景濟我横江梁武帝紀太清二年冬十月巳酉侯景自横江濟采石天步中危實由忘戰漢主父偃傳引司馬法曰國雖大好戰必亡天下雖平忘戰必危自亂離巳乆人解用兵女子無媿於韓彭韓韓信彭彭越也見漢書兒童不殊於衛霍見移齊文吳鉤甚利吳越春秋闔閭命於國中作金鉤吳作鉤者殺其二子以血釁之遂成二鉤獻於闔閭鉤師向鉤而呼二子之名吳鴻扈稽我在於此聲絶於口兩鉤俱飛著父之胷吳王乃賞百金蜀甲殊輕槊動風霜未詳弩穿金石韓詩外傳楚熊渠子夜行見寢石似伏獸射之飲羽渠子見其誠心金石為之開而沉於人乎高樓大艦槩日凌雲謂樓艦之高也詳玉臺新詠序叱咤而起風雷吹嘘如倒山岳見檄周文侯車騎陳武帝紀二年以車騎將軍開府儀同三司侯填為司空國家重將分陜上流近隔以邊塵時虧表疏王途既泰貢賦相望尋令子弟侍奉京邑蕭太保龍驤於賁海梁敬帝紀紹泰元年以太尉蕭循為太保詳與酋豪書王儀同虎視於洞庭梁敬帝紀紹泰元年以鎮南將軍王琳為車騎將軍儀同三司本傳琳為元帝舉哀屯兵長沙傳檄諸方為進趣之計時長沙蕃王蕭韶及上㳺諸將推琳主盟若望高峰便當投袂左傳楚子投袂而起何則凡諸將帥各護家鄉非直吾人獨憂宗社日者頻辱司馬行臺及諸公有告裵行臺當今方邵此諸賢莫非英傑其餘軍士悉是驍雄庸蜀氐羌之兵蜀志晉策命曰乃考保據庸蜀商頌自彼氐羌烏桓白虜之騎鳥桓後漢外國名詳移齊文以此衆戰誰能禦之何為比吾倍薄相懸何惡諸君身名俱滅來告以細柳之軍踰於灞上漢書周亞夫為將軍次細柳劉禮為將軍次霸上徐悍為將軍次棘門文帝勞軍至其營曰嗟乎此真將軍矣向者霸上棘門如兒戲耳吾恐今之趙括不及亷頗也史記亷頗者趙之良將也頗將攻秦秦之間言曰秦之所惡獨畏馬服君趙奢之子趙括為將耳趙王因以括為將代亷頗秦軍射殺趙括括軍敗近張舍人至始奉嚴敕朝廷遣劉叔經仍徃啟聞願達丹誠用停王赫詩王赫斯怒伏計天慈理當懸照此身日月所鑒天地所明豈敢虚言欺妄宸極足下既未知始末容有疑怪大軍多士希惠矜𢎞量非此失時騰表疏幸停師旅已存盟信庶其小國永申藩禮天心無爽邇遐一同投筆慷慨不復多白為陳武帝作相時與嶺南酋豪書夫否終斯㤗屯極則亨若日月之回環猶隂陽之報復近者數鍾九厄漢書陽九戹四千五百歲為一元一元之中九陽戹五隂戹四陽為旱隂為水王室中微聖主欽明還承寶運即是高祖武皇帝之孫世祖元皇帝之子重光累聖𦙍國承家天下生民孰不歸德賊勃南史蕭勃梁武帝從弟景之子也不涯疏戚希纂帝圖信是奸兇階玆禍亂自王宮再淪於醜逆虜馬四飲於江沱具九錫文社稷阽危鑾輿幽辱勃身居列岳自御強兵高視趦趄見為貞陽侯書坐觀成敗既而天維重綴國歩還康翻畫凶圖更謀神鼎且其兵馬之任資於長昆南史吳平侯景傳景子勵勸勔勃勵為廣州刺史歲中數獻方物軍國所須相繼不絶武帝歎曰朝廷便是更有廣州大寳初勃鎮嶺南為廣州刺史方牧之權由於承聖南史太寳初廣州刺史元景仲謀應侯景西江督護陳霸先攻景仲迎勃為刺史時湘東王繹在荆州承制授勃鎮嶺南為廣州刺史操兄戈而斬姪藉國寵而弑君不忠不義莫斯為甚比春初便遣大都督歐陽頠墌城主傅泰等兇徒數十遂到臨川南史梁敬帝初即位加勃司徒紹泰中為太尉尋進為太保太平二年太保廣州刺史蕭勃舉兵反詔平西將軍周文育平南將軍侯安都等南討又勃度嶺出南康以歐陽頠為前軍都督周文育破禽之吾奉承朝算指畫戎畧樊滕耿賈樊樊噲滕膝公夏侯嬰高祖功臣耿耿弇賈賈復光武功臣戮力爭驅天地靈祗見與宗室書水陸開道獲傅泰不勞於一箭禽歐陽無待於尺兵偽黨皆俘連城盡拔所獲軍資不可稱算去月十六日德州刺史陳法武等願憤回戈仍梟凶豎一夫挺劒傳首上京萬里澄清後漢范滂傳登車攬轡慨然有澄清天下之志人神慶躍南史三月甲寅德州刺史陳法武前衡州刺史譚逺於始興攻殺蕭勃彼豪門著姓典牧方州拘隔天朝亟離寒暑公私憤歎豈可為懷今王道平夷理增歡忭朱明戒節爾雅夏曰朱明比復何如軍士平安境内清謐吾以庸薄叨秉國鈞詩秉國之鈞恒務牽纏諸有勞弊自天數云否朝禍洊臻東夏崩騰西京蕩覆身惟許國任在勤王宣力皇家靡有寧歲一還京師保持鴻業四驅夷狄奪得江左具九錫文始則杜龕元惡張彪不㳟據有泰稽連蹤巨震隨機討掩觸刃平夷南史杜龕據吳興以叛龕僧辯壻也霸先表自東討仍還都命周文郁進討龕龕以城降誅之梁敬帝紀太平元年春正月巳亥東揚州刺史張彪圍臨海太守王懷振于剡岩二月庚戌遣周文育陳蒨襲㑹稽討彪敗走丙辰若邪村人斬張彪傳首建業叛臣任約徐嗣徽等屢引齊虜前年末既踐京師江畔邊城皆為戎戌賴貔貅騁力見為貞陽侯書衛霍同心見移齊文殲厥胡夷不日清殄南史陳武帝東討杜龕留侯安都杜稜宿衛臺省軍至義興泰州刺史徐嗣徽乗虚奄至闕下侯安都出戰嗣徽等退據石頭帝以嗣徽寇逼巻甲還都命周文郁進討杜龕齊又遣兵萬人於胡墅度米粟三萬石馬千匹入石頭帝乃遣侯安都領水軍夜襲胡墅燒齊船周鐵武率舟師斷齊運輸帝領鐵騎自西明門襲之齊人大潰去年將夏傾國大來鐵騎八千許匹甲士二十餘萬胡塵飛於北闕虜鼓震於南宫躬率褊裨聊與挑戰虜便土崩瓦解投險赴坑大小皆禽鯨鯢盡戮見勸進表三江之上禹貢揚州三江既入塞水無流千里之間伏尸相枕生獲大都督蕭軌裵英起東方老李希光王敬寳等南史二年三月齊遣水軍儀同蕭軌庫狄伏連堯難宗東方老侍中裵英起東廣州刺史獨孤辟惡洛州刺史李希光并任約徐嗣徽王僧愔等衆十萬出柵口向梁山五月齊兵至秣陵故城游騎至臺都下震駭帝潛以精卒三千配沈泰度江襲齊行臺趙彦深於瓜歩獲其舟粟又遣錢明領水軍出江乗邀撃齊人糧運盡獲之齊人大餒帝因命衆軍蓐食攻之齊軍大潰執嗣徽及其弟嗣宗斬之以徇虜蕭軌東方老王敬寳李希光襄英起王僧智等將帥四十六人其軍士得竄至江者縛筏以濟中江而溺流尸至京者彌岸惟任約王僧愔獲免虜中驍將唯此數人屢破關西之兵頻取淮右之地一朝俘斬無復孑遺詩周餘黎民靡有孑遺逺邇敬欣華夷怖慴如聞彼虜稍是危亡尋命熊羆欲就征討方可以雷行趙魏電埽幽并後漢呉漢傳贊電埽羣孽混一車書勢在朝暮而侯瑱跋扈江州後漢梁冀傳帝曰此跋扈將軍也公私阻絶即平北賊仍事南征肉袒面縳左傳楚子圍鄭鄭伯肉袒牽羊以迎又殖綽郭最皆衿甲面縛坐於中軍之鼓下歸首闕庭即為申聞優其禮秩臺儀不貶位遇兼常南史侯瑱鎮豫章甚强又以本事王僧辯未肯入朝後余孝頃與瑱相拒瑱留軍人妻子於豫章令從弟奫知後事悉衆以攻孝頃奫部下侯方兒叛攻奫虜瑱軍府伎妾金玉歸於武帝瑱既失根本以武帝有大量必能容已乃詣闕請罪武帝復其爵位今所禽歐陽頠傅泰等莫不𢎞宥政爾授其兵馬處以榮禄坦然遊狎無介懷抱年號武平建武永平後漢年號詳侯安都碑國即清晏君之聞此寧不欣躍但昔縁王事遊踐貴鄉日想山川依然舊識陳武帝紀蕭暎為廣州陳武帝為中直兵參軍隨之鎮明年為交州司馬與刺史楊㬓討平李賁除江西都䕶高要太守督七郡諸軍事吾既沗荷朝私位逾台衮身持帝王之柄手握天下之圖後漢朱穆傳劉陶等訟穆曰中官近習竊持國柄手握王爵口含天憲詳與楊僕射書故鄉如此誠為衣繡故人不見還同宵錦漢書上謂朱買臣曰富貴不歸故鄉如衣繡夜行又項羽懷思東歸曰富貴不歸故鄉如衣錦夜行天涯藐藐見與王僧辯書地角悠悠言面無由但以情企今者王猷帝載化被無垠傅毅舞賦游心無垠注垠際也浮海窮山罔不咸格投竿負鼎見與宗室及王太尉書馳歩蒼龍後漢百官志北宫門蒼龍司馬主東門注洛陽宫門名為蒼龍闕門崖穴邱園後漢和帝紀詔曰昭巖穴披幽隱遣詣公車朕將悉聽焉詳為貞陽侯書爭趨金馬漢東方朔傳上使待詔金馬門君之才具見為貞陽侯書信美登朝如戀本鄉不能遊宦門中子弟望遣來儀當為申聞各處榮禄深加持保念嗣音郵今遣某甲等使彼指此不多為陳武帝與周宰相書昔有天地便立帝王革昊惟農未詳按史記三皇本紀太皡庖犧氏風姓女媧氏亦風姓代宓犧立號曰女希氏女媧氏没神農氏作神農氏姜姓遷虞斯夏竹書紀年舜在位十有四年於是八風循通慶雲叢聚遷虞而事夏莫不三靈所佑見勸進表五運相推漢律厯志土生金故為金徳金生水故為水徳水生木故為木徳木生火故為火徳火生土故為土徳梁徳不造固天攸棄雖復東漢之末區宇沸騰西晉之亡生民蕩覆見為貞陽侯書未足以方其禍亂譬彼䖍劉者也吾謬以庸薄屬當興運自昔登庸清諸百越徐聞浪泊靡不征行宋州郡志越州合浦太守領徐聞令後漢馬援傳南撃交阯軍至浪泊上銀洞珠官所在清乂益州記銀水在綿州晉書地理志合浦郡領珠官縣自還麾南極伐逆東都宣力驅馳亟淹寒暑六延梁社十翦疆寇具九錫文黄帝與蚩尤七十戰帝王世紀黄帝討蚩尤凡七十二戰魏祖在軍中三十年魏氏春秋夏侯惇謂王曰殿下即戎三十餘年功徳著於黎庶方厥劬勞未為勤苦加以百神所感明靈應期見勸進表萬里徂征虯龍表瑞陳武帝紀帝進軍頓西昌有龍見水濱高五丈五采鮮曜於是中軍勇鋭上將横行承此休符遂興王業梁氏以天禄斯改期運永終欽若唐風推其鼎命吾驚惶三讓拜手陳辭盈廷公卿稽顙敦偪眷言潁水徒抱素心逸士傳堯之讓許由也由以告巢父巢父曰汝何不隱汝形藏汝光非吾友也乃撃其膺而下之許由悵然不自得乃過清冷之水洗其耳拭其目曰嚮者聞言負吾友遂去終身不相見許樹臣曰九域志潁昌府有由臺巢父臺尚想汾陽無因高蹈莊子堯見四子藐姑射之山汾水之陽窅然喪其天下偎以庸薄遂膺天寵去月乙亥升禮大壇言念遷桐但有慙媿昔賓門之始境外無交郊特牲人臣無外交不敢貳君也雖遣行人未申嘉好今上天有命光膺寶厯永與周室方同斷金我運維新宜修朝聘今遣侍中都官尚書周𢎞正銜使長安故指有白為陳主與周冢宰宇文䕶論邊境事書周書䕶字薩保大祖兄邵惠公顥之少子封晉國公文帝曰吾形容若此必不濟諸子幼天下事以屬汝䕶涕泣奉命孝閔踐阼拜大冢宰國有三慶民有四安所謂通和是由鄰睦况周陳欵好一紀於兹懷抱相期百世方逺灌瓜之美乆敕邊吏賈誼新書梁大夫宋就為邊縣令與楚鄰界兩亭皆種瓜楚亭瓜惡就令人竊為楚亭灌瓜楚王悦梁之隂讓也謝以重幣拾橡之尤想應無忽東觀漢記李恂餉遺無所受居新安關下拾橡實為食梁氏以漸水東為安湘小郡宜立巴州隋書荆州巴陵郡注梁置巴州多厯年所此於荆部本包分界近得刺史符元舉啟稱蕭巋北史周附庸傳巋字仁逺詧之第三子也忽遣杜元茂神僧訓等將率人馬踰潰渉澌便置城隍易城復于隍謀為侵軼左傳彼徒我車懼其侵軼我也適荷鄰徳合州見還不容今眷仍縱蕭氏元舉累移論及翻相河漢劉峻辨命論聖人之言河漢而不測更徃研問便騁鋒鏑見檄周文彼軍人恃勇遂致俘禽聞此紛紜甚以驚歎其商奄餘孽周本紀成王既遷殷遺民東伐淮夷踐奄遷其君薄姑才力甚微為暴邊城良憑大國但情均忌器漢賈誼傳諺曰欲投鼠而忌器不可加兵便敕軍司以禮相放且前歲所立疆城本以南平等五郡輸薦貴朝北史附庸傳蕭詧大定四年詧遣其大將軍王操畧取王琳之長沙武陵南平等郡宋書荆州南平内史呉南郡治江南至如安湘既屬巴郡幸承鄰惠無候渉言故下漸東惟如澧北政是標其大桶屬荆州之界耳漢高帝紀築甬道屬河注恐敵抄輜重故築垣牆如街巷周附庸傳江陵平周文命詧主梁嗣居江陵城東資以江陵一州之地其襄陽所統盡入於周又詧子巋天保五年長沙巴陵並䧟於陳彼此方申分好義絶規圖所貴惟和所重惟信夫以南平等郡地曠民豐雲夢之田楚王為寶見移文呉當勁蜀晉拒彊秦資彼山川並為州鎮朕若棄其仁義務廣封域寧容延歲並貢周朝今者和親已固山岳而方謀尺寸之土用益蒹葭之地哉幸非竊疾國䇿墨子見楚王曰今有人於此舎其文軒鄰有敝輿而欲竊之舎其錦繡鄰有短褐而欲竊之舎其粱肉鄰有糟糠而欲竊之王曰必為有竊疾矣相見鑒容江陵小宼既爾䖍劉前至之言或相誣罔一二因使人宇文平口具其懷耿耿故此相白為陳主答周主論和親書使人使持節車騎大將軍儀同三司大都督治司城使主杜子暉中軍山遂伯使副鮑宏等至北史杜杲字子暉京兆杜陵人也明帝初為修城郡守初陳文帝弟安成王頊為質於梁及江陵平頊隨例遷長安陳人請之至是帝欲歸之命杲使焉又鮑宏字潤身東海剡人也仕梁元帝遷通直散騎常侍郎江陵平歸於周明帝甚禮之累遷遂伯下大夫與杜子暉聘陳謀伐齊省告具懷夫聖君明辟司御兆民則天法地佇育黔首故張旜以徃拭玉而來見與楊僕射書同在蒼生恢宏文武雖毁戈鑄㦸未擬上皇龍魚河圖云蚩尢造五兵仗刀㦸大弩散馬休牛載懷偃伯司馬法古者武軍三年不興則凱樂凱歌偃伯靈臺答人之勞告不興也非期與睦忽爽和風奚用殲師左傳宋師敗績公傷股門官殲焉信由天討追尋曩好歎想兼懐言覿今書甫承家難知以冡宰執政擅同淵藪書武成商王受為天下逋逃主萃淵藪令尹當朝妄專征伐無君之謫俾墜其師左傳晉士爕㑹楚公子罷許偃盟曰有渝此盟明神殛之俾墜其師無充胙國無將之誅已從司寇公羊傳君親毋將將而誅焉刑名既肅國歩還康希篤親鄰敬聞衷欵若二境交歡俱饗多福八荒期乂良副所懷今遣具位某甲等使不復多述在吏部尚書答諸求官人書自古有吏部尚書者品藻人倫簡其才能尋其門胄逐其少多量其官爵但古來數千年非無明時也非無明主也自有才用雖美階級不通門户雖高官資殊屈若斯人者其例甚多請問諸君此是何義夫一千錢一斛米之多少猶關相禄况復皇朝官爵理係𤣥天内典謂之為業外書稱之為命五行有驛馬之言六甲有官鬼之説必令驛馬時發官鬼克身所望階榮便當果遂如其不爾決是難諧豈可改尚書作官鬼驅老僕為驛馬邪若見問尚書何不分判用與不用許與不許僕答云君非屈滯豈可相期決言應果若今驛馬差爽便是乖信此關君命僕何以相答邪若朝散之流行止之屬門户相似人才不殊選家斟酌無能為爾若陟大位清官悉由𤣥命夫人君賓用並是前縁故宋文帝云人豈無運命每有好官缺輙憶羊𤣥保南史羊𤣥保太山南城人文帝以𤣥保亷素寡欲頻授名郡嘗曰人仕宦非惟須才亦須運命毎有好官缺我未嘗不先憶羊𤣥保梁武帝云世間人言有目色我特不目色范悌自此而論豈非前業且世諺云圖官在亂世覔富在荒年梁孝元帝承侯景之㓙荒王太尉接荆州之禍敗爾時喪亂無復典章故使官方窮此紛雜自紹泰太平及永定中聖朝草創爾時州州自帝郡郡稱王魏志注令曰設使國家無有孤不知當幾人稱帝幾人稱王天下干戈尚無條序兼以府庫空虚賞賜懸乏白銀之寳難得漢食貨志武帝時有司奏言古者金有三等黄金為上白金為中赤金為下乃造銀錫白金孟康曰白金銀也黄紙之版易營南史張興世傳朝廷遣吏部尚書褚彦回就赭圻行選是役也皆先戰授位檄版不供由是有黄紙札假以官榮代於錢絹義在撫綏無計多少又有非舊非勲非地非才託節將而求官因時人以買位賣官既賤皆為清顯故員外常侍路上比肩諮議參軍市中無數四軍五校車載斗量三國志呉趙咨曰如臣之比車載斗量豈是朝章應其如此今衣冠禮樂日富年華主上體成王之風太傅𢎞周公之徳陳宣帝紀帝諱頊始興昭烈王第二子也光大二年進位太傅西羗北狄畏我王威時既清矣時既平矣何可猶作亂世意而覔非分之官邪凡人所以稱屈滯者身已不無寸能官又不及父祖既是明時可以於邑所見諸君多踰本分猶言太屈未喻高懷若問梁朝朱領軍等並為卿相南史朱异字彦和呉郡錢塘人太清二年為中領軍此不踰其本分邪此天子所用非關選序舊章秦有車府令趙高直為丞相秦始皇本紀二世皇帝元年以車府趙高為郎中令三年冬為丞相漢有高廟令田千秋亦為丞相漢書車千秋傳千秋本姓田氏為高寢郎上急變訟太子寃數日為丞相千秋年老朝見得乗小車入宫殿中故號車丞相此復可為例邪僕七十之歲朝思夕計並願與諸賢為真善知識湼槃經佛言具足梵行乃名善知識曾無嫌隙差可周旋非欲令君作此怨訴但既沗衡流應須粉墨庶其允當無負朝寄耳去年疾患亦餘氣息不能相答通作此書所望諸賢深明鄙意徐君白同前此篇陳書本自古吏部尚書者品藻人倫簡其才能尋其門胄逐其大小量其官爵梁元帝承侯景之㓙荒王太尉接荆州之禍敗爾時喪亂無復典章故使官方窮此紛雜永定之時聖朝草創干戈未息亦無條序府庫空虚賞賜懸乏白銀難得黄札易營權以官階代於錢絹義存撫接無計多少致令員外常侍路上比肩諮議參軍市中無數豈是朝章應其如此今衣冠禮樂日富年華何可猶作舊意非理望也所見諸君多踰本分猶言太屈未喻高懷若問梁朝朱領軍异亦為卿相此不踰其本分邪此是天子所拔非闗選序梁武帝云世間人言有目色我特不目色范悌宋文帝亦云人世豈無運命毎有好官缺輙憶羊𤣥保此則清階顯職不由選也秦有車府令趙高直至丞相漢有高廟令田千秋亦為丞相此復可為例邪既沗衡流應須粉墨所望諸賢深明鄙意答周處士書南史周𢎞讓始仕不得志隱於句容之茅山頻徵不出晚仕侯景為中書侍郎獲譏於代辱去年三月二十七日告仰披華翰甚慰翹結承歸來天目呉興記天目山極高峻嶺上有泉水甚美東南有瀑布下注數畆元和地志天目有兩峰峰頂各一池左右相對為天之左右目故名道書云第三十四洞天得肆閒居禮記孔子閒居差有弄玉之俱仙列仙傳簫史教弄玉吹簫作鳯聲鳯皇來止其屋秦穆公為作鳯臺一旦皆隨鳯飛去非無孟光之同隱後漢逸民傳梁鴻妻孟光曰妾有隱居之服乃更為椎髻著布衣操作而前優游俯仰極素女之經文抱樸子黄帝論導養而質𤣥素二女升降盈虚盡軒皇之圖藝漢藝文志道家者流黄帝四經四篇黄帝銘六篇黄帝君臣十篇雜黄帝五十八篇雖復考槃在阿不為獨宿見詩詎勞金液神仙傳藥之上者有九轉還丹太乙金液唯飲玉泉比夫煮石紛紜終年不爛神仙傳白石生常煑白石為糧燒丹辛苦至老方成及其得道𡨕真莊子至道之精窈窈𡨕𡨕又有真人而後有真知何勞逸之相懸也又承有方生亦在天目理當仰禀明師總斯祕要豈如張陵弟子自墜高巖列仙傳雲臺山絶崖有桃樹大如臂張陵曰得桃實者告以要道弟子無敢視者趙升從上自擲正中桃樹得桃滿懷而至孫泰門人競投滄海南史沈約傳錢塘人杜炅通靈有道術炅死門徒孫奉泰弟子恩傳其業隆安三年恩於㑹稽作亂宋武帝紀孫恩自敗後懼見獲乃投水死於臨海何其樂乎聖朝虚心版築尚想邱園見為貞陽侯書若彼能赴嘉招潘岳詩弱冠添嘉招便當謹申高命但其人徃歲亦望至京師觀此風神確乎難拔見易故以忘懷爵禄詎持犧牲之談左傳賓孟適郊見雄雞自斷其尾問之侍者曰自憚其犧也遽歸告王且曰雞其憚為人用乎人異於是犧者實用人人犧實難已犧何害高視公卿獨騁蜡蛵之訓未詳按莊子人食芻豢糜鹿食薦螂蛆甘帯天下味知正味注帯小螳螂蛆喜食其眼所恐有道三辟公車十徴後漢方術傳董扶字茂安廣漢綿竹人也前後宰府十辟公車三徴再舉賢良方正有道皆稱疾不就若斯者終當不屈此既然矣請復詳言昔楚國兩龔同時紆組漢書龔勝龔舎皆楚人也二人相友並著名節故世謂之楚兩龔俱為光禄大夫謝病歸鄉里郡二千石長吏初到官皆至其家如師弟子之禮漢陰一老相攜抱甕莊子子貢過漢隂一丈夫方為圃畦鑿隊而入井抱甕而出子貢曰有機於此日侵百畦圃者笑曰夫有機事必有機心吾差不為也兄之幽貞若其鑿坏負石莊子湯伐桀克之以讓務光光曰無道之世不踐其土况尊我乎乃負石而自投瀘水顔闔不受魯聘鑿坏而遯方同形影玉臺新詠楊方合歡詩譬如形追軀又亦如影追身結綬彈冠漢書蕭育與朱博為友著聞當世徃者有王陽貢禹故長安語口蕭朱結綬王貢彈冠言其相薦逹也無容楚越况乎糞土䕫龍左傳臧紇唁衛侯退而告人曰衛侯其不得入矣其言糞土也羶臊名器周禮注犬腥羊羶左傳仲尼曰惟名與器不可以假人已所不欲非應及人忽承來音良以多感何則潁陽巢父不曾令薦許由見為陳武帝書商洛園公未聞求徴綺季漢書張良傳注四人謂園公綺里季夏黄公甪里先生所謂商山四皓也斯所未喻高懷而躊躇於矛楯也莊子楚人有賣矛及楯者見人來買矛即謂之曰此矛無何不徹見人來買楯則又謂之曰此楯無何能徹者買人曰還將爾矛刺爾楯若何唯遲山阿近信更惠芳音如或誠言謹便聞奏第夙勞比劇不復多呈徐君白與章司空昭達書君白日聖朝受命天下廓清所餘殘兇惟有歐紇南史歐陽紇字奉聖頠子頗有幹畧襲父官爵在廣州十餘年威惠著於百姓宣帝頗疑之太建元年徴為左衛將軍遂舉兵反詔儀同章昭逹討禽之南通交管北據衡疑兄弟叔姪盤阻川洞南史頠合門顯貴威振南土百越之賮不供王府萬里之民不由國家明公受脤嚴冬左傳劉子曰祀有執膰戎有受脤持兵杪歲王制冢宰制國用必於歲之杪開冰踐露􅡒火宵行便届全淮乃其神速未騁三畧非勞六竒李康運命論張良得黄石之符受三畧之説注上中下三計漢書陳平六出竒計薄交旗鼓仍平醜類自太清之末永定以來所闢疆界不過郡邑今兹赴㨗二十餘州若較此功庸方兹英力漢之馬援不能為擬廣州記馬援討平交阯於嶠南立銅柱以表漢之極界呉之歩騭故是相懸呉志歩隲為交州刺史威聲大震南土之賓由此始况孫處宗之叛徒正槌盪主耳陳廢帝紀慈訓太后令曰盪主孫泰等潛相連結大有交通公私慶快可得而言且僕一子屯窮妖徒所制五嶺遐夐漢張耳傳南有五嶺之戍注大庾始安臨賀桂陽揭陽也存亡不測懸懷飲淚破膽復全䝉荷英恩保其身命餘年仰戴何力能勝今遣主帥某馳徃稱慶徐君呈重答朝臣書南史劉師知傳武帝崩六日成服朝臣共議大行皇帝靈坐俠御人衣服吉㓙之制博士沈文阿議宜服吉師知議服衰絰中書舎人蔡景厯江徳藻謝岐等同師知議時以二議不同乃啟取左丞徐陵决斷陵同博士議謝岐議必備衰絰陵答書云云文阿猶執所見衆議不能决乃具録二議奏聞上從師知議老病屬纊不能多説喪大記屬纊俟氣絶古人爭議多成怨府左傳叔孫昭子曰吾不為怨府傅𤣥見尤於晉代晉書傅𤣥為司𨽻校尉毎有奏劾或值日暮捧白簡整簪帶竦踊不寐坐而待旦王商取䧟於漢朝漢書上素重商知張匡言多險制曰勿治謹自三緘家語孔子觀周入后稷之廟有金人焉三緘其口而銘其背敬同高命若萬一不死猶得展言庶與羣賢更申揚𣙜薦陸瓊書南史陸瓊雲公子也字伯玉素有令名為陳文帝所賞以文學累遷尚書又遷新安王文學掌東宫管記及宣帝為司徒妙簡僚佐吏部尚書徐陵薦瓊於宣帝乃除司徒左西掾新安王文學陸瓊見識優敏文史足用見讓左僕射表進居郎署歲月過淹左西掾缺允膺兹選階次小踰其屈滯已積報尹義尚書别離二國見與楊僕射書雲雨十年顔延之詩朋好雨雲乖心想河陽言銅爵而無逺魏志太祖於鄴作銅雀臺神遊漳水與金鳯而俱蜚幽明録鄴城鳯陽門五層安金鳯皇二頭於其上一頭飛入漳河清浪見在水底一頭今猶存北使還辱去冬十月十一日告忽同言叙循環巧製欣慰良深河朔年芳後漢郡國志朔方郡大城故屬西河雖當晼晩屈原九辨白日晼晩其將入兮白溝浼浼水經注督亢水又南謂之白溝水春流已清紫陌依依水經注鄴縣趙建武十一年造紫陌浮橋於水上長楊稍合體中何如豈無鄉思弟三秦世胄漢高祖紀注應劭曰章邯為雍王司馬欣為塞王董翳為翟王分王秦地故曰三秦六輔良家漢兒寛傳寛表奏開六輔渠文武兼能志懷開逺谷永之筆漢游俠傳谷子雲之筆札無慙古人盖延之功後漢盖延傳延與呉漢同歸光武號建功侯高視前彦而淹留趙魏亟厯寒暄企望鄉關理多悲切聖朝欽明纂厯大拯生民戮巨海之奔鯨殲中原之封豕見勸進表晉君之説長安逺於日邊劉昭㓜童傳晉明帝諱紹元帝太子也帝問長安如何日逺答曰不聞人從日邊來只聞人從長安來明日集羣臣宴會復以此問又以為日近元帝動容問何故異昨日之言答曰舉頭見日不見長安揚雄有言交州在於天際揚雄交州箴交州荒裔水與天際則輸琛王府詩來獻其琛屈膝閶門西京賦注閶闔天門也川洞酋豪彊梁溟海古逸詩金人銘强梁者不得其死神兵一指率土咸康詩率土之濱莫非王臣方當偃覇於靈臺見論和親書韜戈於武庫漢魏相傳霍光曰武庫精兵所聚故以丞相子為武庫令變大風於五禮舜典修五禮詳與楊僕射書驅蒸民於昌辰詩天生蒸民物色英聲捜揚俊傑投竿負鼎見與宗室及王太尉書馳歩蒼龍巖穴邱園爭趨金馬見為貞陽侯及與酋豪書而弟留河北義等周邵懷此殊才實可傷嗟吾崦嵫既暮屈原離騷望崦嵫而勿廹注崦嵫日所入之山也容鬢皤然易賁如皤如風氣彌留砭藥無補追惟疇昔檀弓夫子曰予疇昔之夜共備行人室家安危賓禮升降懸壺代哭喪大記君喪狄人出壺司馬乃官代哭大夫官代哭不懸壺士代哭不以官俱厯春冬移館於箕見與楊僕射書同兹辛苦鳴蜩抱樹亟見藏冰月令仲夏之月蟬始鳴爾雅方言蟬楚謂之蜩左傳古者日在北陸而藏冰西陸朝覿而出之歸雁銜蘆多經寒食淮南子雁銜蘆而翔似備弋繳月令孟春之月鴻雁來風呉挺曰荆楚歲時記去冬節一百五日即有疾甚雨謂之寒食靖言念此如何可忘握翫來書彌其承臉夫以擁腫之木得免因於不才莊子惠子曰吾有大樹人謂之樗其本擁腫又人間世篇匠石見櫟社樹曰是不材之木也無所可用故能若是之壽觳觫之牛自保由其無用見孟子以余鄙陋未友龔生見與楊僕射書惟歎吾賢不同蘧瑗耳論語蘧伯玉使人於孔子若推溝拯溺見孟子毎切皇衷逸翮飄鱗見優機檻所以降尺一之書後漢陳蕃傳漢以尺一版寫詔書馳輶軒之使見與楊僕射書心期與國必遂還途寧謂親鄰更成難請言尋雅告所及縲囚左傳知罃對楚子曰兩釋纍囚以成其好便訪鴻臚後漢百官志大鴻臚掌諸侯及四方歸義蠻夷幸無淹使聞諸司寇或有邊俘前歲中流是維同惡左傳韓宣子曰同惡相求如市賈焉燕禽望闕戰國䇿於是乃摩燕鳥集闕見説趙王於華屋之下冀馬臨江左傳司馬侯曰冀之北土馬之所生裁頓雲羅自投天網見移齊文京觀之冡宜彰武功見勸進表周醜疑作首之門方申明罰左傳齊襄公之六年鄋瞞伐齊齊管成父獲其弟榮如埋其首於周首之門而聖朝好生惡殺収雷寢電兵車所獲雖同長萬之來左傳宋公謂南宫長萬曰今子魯囚也恩澤從容無異荀罃之禮左傳荀罃在楚楚子厚其禮而歸之方之於弟况擬非倫伊昔梁朝共奉嘉聘張兹大帛儀禮使者載旜帥以受命於朝周官司常通帛為旃處彼高閎左傳高其閈閎以無憂客使庭奏歌鐘左傳鄭人賂晉侯歌鐘二肆晉侯以樂之半賜魏絳魏絳於是乎始有金石之樂座延僑肸晉叔向名肸鄭子産名僑賓客之叙方於阼階王制主人就東階客就西階客若降等則就主人之階主人固辭然後客復就西階田獵之禽同於君膳王制天子諸侯無事則歲三田一為乾豆二為賓客三為充君之庖正以鄉關阻亂致爾拘留家國隆平義應旋反况復韓宣屢至宰孔頻還翻爾遲回豈云鄰睦弟遂鍾儀之操見與楊僕射書對此皇華高厚之詩左傳齊高厚之詩不類一何非類關徐亷樂之況未詳三戰七禽之言魯仲連遺燕將書曹子以一劍之任刼桓公於壇位之上三戰之所失一朝而反之徐文炳曰晉漢春秋諸葛亮征孟獲七縱七禽此日借子之矛攻子之室見答周處士書彼之使客猶尚不還此於齊都豪門貴戚周行匪例事義相懸豈與大弟同年而語吾本自凡流以復衰老稍近東岱不奢魏劉楨詩常恐遊岱宗不復見故人撃壤之年惟欣堯俗高士傳瓖父者堯時人年五十而撃壤於道中若邪之復長保安卧時思之原注若邪至此闕誤不棄沗亞宗卿非復侵官天扆左傳賈季使續鞫居殺陽處父書曰晉殺其大夫侵官也但當今芃芃在詠濟濟盈朝詩芃芃棫樸又濟濟多士才冠卿雲司馬長卿揚子雲也見漢書智同荀郭荀彧郭淮也見魏志文辭富於江海高論薄於雲霄趨走丹墀之門見與王僧智書侍奉清規之内弟來欵言至欲附所聞聨類非宜更其多惑若疑作蘧使良有原闕二字猶希贈鯉之書古詩呼兒烹鯉魚中有尺素書郵驛方通復行蜚鶬之信魏文帝詩飛鶬晨鳴聲可憐執筆澘然不知何向附尹義尚書漳濱江涘眇若天涯去雁歸鴻雲飛難寄瞻言鄉國泣珠淚而盈懷寤寐徳音仰烟霞而疾首既而署徃寒來愁雲滿塞河氷自結非由漢后之軍草露恒嚴寧假公超之術霜飄虎渠詎知朔野之寒雪覆龍岑徒憶清江之暖眷言疇昔邈矣遐哉係仰清顔願常豐勝雍容廊廟時宣匡奉之風偃息康莊無廢怡神之道義尚望國窮魂繁憂積歲雖其未殞豈曰生平日者謬沗後車陪遊上國曾觀禮樂見季子之知音經奉侍言嗟鄭僑之博物如軍書愈疾之製碑文絶妙之詞猶貴紙於鄴中尚傳聲於許下逮乎百六之年仍離再三之酷吉㓙禮數綿厯歲時嘗膽茹辛備同艱險毎冀穹蒼有感大國矜憫以禮言歸馭驛俱反何期毳毛湮淪墜灑漳濱之水逸翮摩霄輕拂蓬萊之頂信知有幸無幸見生死之殊倫才與不才驗沉浮之異趣昔秦歸趙璧不得連城晉失楚材直亡其寶自國祚中絶行李不通等避世於桃源同流寓於仙嶺每瞻牛候馬想金陵之聖人今覩皇華知有熊之建國賓堯仕舜猶是八才緯武經文方儔四貴幸甚幸甚昔楊朱岐路悲始末之長離蘇武河梁歎平生之永别雖復音塵可嗣終隔風雲夢想時通無因覯止依依望楚寸陰有待百年將半輕生若是命也如何今車書同軌行李相繼猥荷文移通賜論及輶軒既以復命義尚未被哀矜竊以晉楚釋囚共成親好今乃拘彼求此不亦難乎夫以匹夫投分猶須坦蕩况兩國二君那宜細計彼若才如亷樂猶恐不習禁兵茍非其人留之何益然三戰三敗卒成强伯之功七縱七擒終仗天威之力由此言之彼如此耳徐元直西蜀之謀士關雲長劉氏之驍將須歸即遣知叛弗追今之與古何其異趣且二國協和長江共有如首如尾可以同歸或貳或猜豈名唇齒是以隔河分歃君子知其不終衷甲尋盟春秋貶其行詐伏承聖上欽明英賢佐輔方知解網之氣用表無偏之化若彼之俘虜猶且䝉歸此之南冠何辭不遣如其茍相猜貳信不由衷雖篤親鄰義尚何罪不任辛酸之念輕陳萬一之情伏願仁人少存疇昔承間之便希復開言昔張子餘年誠稱呉王之賜微躬邁影實仰含𢎞之澤載筆漣洏罔知所述與李那書北史李昶傳昶小名那幼觧屬文有聲洛下周文令入太學保定初以近侍清要盛選國華乃以昶及安昌公元則中都公陸逞臨淄公唐瑾等並為納言父志字鴻道爾朱之亂奔江左昶以父在江南身寓闗右自少及終不飲酒聽樂時論以此稱焉附那答書繁霜應管能響豐山之鐘𤣥雲觸目又動流泉之奏矧伊物候且或𡨕符况乃衿期相㤀道術楚齊風馬吴會浮雲行李無因音塵不嗣殷御正銜命來歸嘉言累札江南橘柚薊北桑柘隂慘陽舒行止多福足下泰山竹箭浙水明珠海内風流江南獨步扶風計吏議折祥禽平陵李亷辨詶文約况復麗藻星鋪雕文錦縟風雲景物義盡縁情經綸憲章辭殚表奏乆以京師紙貴天下家藏調移齊右之音韻改河西之俗豈直揚雲藻翰獨留千金嗣宗文雅惟傳好事僕世傳經術才謝劉歆家有賜書學匪班嗣弱年有意頻愛雕蟲歲月三餘無忘肄業户牖之間時安筆硯顰眉難巧學步非工恒經牧孺之談屢被陳思之誚羞逄仲子類君山之鼓琴屢見子将同本初之車服不謂殷侯虚談成價遂同布鼓輕響雷門燕石空雕終慙比徳楚翬雖拂實媿棲桐豈若邯鄲舉袖惟聞變曲協律飛塵必應不顧是以日南寳貝遥望歸秦合浦文犀更希還漢芳春行獻嚶其鳴矣懸豫章之牀置長安之驛厚築墻垣思逢鄭僑之聘工歌周頌佇奏延陵之樂書繒有復道意無伸李那頓首籍甚清徽見為陳武帝書常懷虚眷山川緬邈見讓表河渭像於經星見樂府顧望風流長安逺於朝日見報尹義尚書青葽戒節見與王僧智書白露為霜見詩君子惟宜福履多豫雍容廊廟文士傳張衡拜侍中恒居帷幄從容風議拾遺左右獻納便繁漢官儀侍中周官也便繁左右與帝升降卒思近對拾遺補闕百僚之中莫宻於兹留使催書晉孫惠傳惠毎造書檄東海王越或驛馬催之應命立成皆有文采駐馬成檄學林桓温北征鮮卑喚袁宏倚馬前作露布文手不輟筆車騎將軍賓客盈座未詳丞相長史曕對有勞蜀志張裔字君嗣丞相亮出駐漢中裔領留府長史書與所親曰晝夜不得寧息人自敬丞相長史男子張君嗣附之疲倦欲死脱惠箋繒慰其翹想吾棲遲茂陵之下西京雜記司馬相如素有消渴疾漢書司馬相如卒於茂陵卧病漳水之濱見與宗室書廹以崦嵫見報尹義尚書難為砭藥平生壯意竊愛篇章忽覿高文見同汪詹事載懷勞佇此後殷儀同至止呉尚采曰周武帝紀保定元年六月遣銜正殷不害使於陳王人授館國語襄公至陳膳宰不致餼司馬不授館用阻班荆見與王僧辯書常在公筵敬析名作獲殷公所借陪駕終南入重陽閣詩周明帝紀武成二年三月重陽閣成及荆州大乗寺隋書荆州南郡注舊置荆州宜陽石像碑四首鏗鏘並奏能驚趙鞅之魂樂記子夏曰非聽其鏗鏘而已也詳讓表輝煥相華時瞬安豐之眼漢竇融傳融封安豐侯竇氏一公兩侯三公主四二千石皆相與並時自祖及孫官府邸第相望京邑山澤晻靄曹植王粲誄榮耀當世芳風晻靄松竹參差若見三嵕之峰郭璞注三嵕山在聞喜依然四皓之廟張禮遊咸南記圭峰紫閣在終南山四皓祠之西甘泉鹵簿盡在清文扶風輦路悉陳華簡漢地理志右扶風領縣二十一起宫者有八縣詳樂府昔魏武虚帳陸機弔魏武帝文遺令倢伃妓人皆著銅雀臺於臺堂上施八尺牀張繐帳朝晡上脯糒之屬月朝十五輙向悵作伎汝等時時登銅雀臺望吾西陵墓田韓王故臺晉孫楚韓王臺賦序酸棗寺門外夾道左右有兩故臺訪諸故老云韓王聽政觀也自古文人皆為詞賦未有登兹舊閣歎此幽宫標句清新發言哀斷豈止悲聞帝瑟漢郊祀志泰帝使素女鼓五十絃瑟悲帝禁不止故破其瑟為二十五絃泣望羊碑晉羊祜傳祜好遊峴山襄陽人建碑立廟於其地歲時祭祀望其碑者無不流涕因謂之墮淚碑一詠歌梁之言劉向别録魯人虞公發聲清哀拂動梁塵便掩盈懷之淚左傳聲伯夢渉洹或與已瓊瑰食之泣而為瓊瑰盈其懷至如披文相質意致縱横才壯風雲義深淵海方今二乗斯悟寳性論何等為六種人一大乗二中乗三小乗四信佛五信法六信僧同免化城法華經法華導師多諸方便於險道中化作一城是時疲極之衆前入大城生已度想生安穏想六道知歸法苑珠林問曰云何名六趣依毗曇論云趣者名到亦名為道謂彼善惡業因道能運到其生趣處故名為道亦可依所造之業趣彼生處故名為趣皆踰火宅法華經長者以牛車羊車鹿車立門外引諸子出離火宅華嚴經火宅衆苦所燒也宜陽之作特㑹幽衿所覩黄絹之辭㑹稽曲録上虞長度尚使魏朗作曹娥碑文成未出又試使邯鄲淳為之操筆而成無所㸃定朗嗟嘆不暇遂毁其草其後蔡邕題八字曰黄絹㓜婦外孫韲臼彌懷白雲之頌穆天子傳帝宴西王母於瑶池之上西王母為天子歌曰白雲在天山陵自出道里悠逺山川間之將子無死尚復能來但恨耆闍逺岳法華經耆闍窟山中山形如鷲佛常居此中故號鷲嶺檀特高峰佛説太子須大拏經葉波國温陂王語太子汝出國去徙汝著檀特山開士羅浮法苑珠林西晉沙門釋道開燉煌人石虎時來月氐石氏將末與弟子來建業入南浮羅遂卒山舎袁彦伯興寧中登山禮其枯骸也康公懸溜未詳按法苑珠林齊始豐赤城山有釋慧明姓康康居人祖世避地東呉止赤城山石室竟陵文宣王敬以師禮建武末卒於山中不獲銘兹雅頌耀彼幽巖循環省覽用忘饑渴握之不置恒如趙璧藺相如傳相如奉璧奏秦王秦王大喜傳以示美人及左右翫之不足同於玉枕拾遺記漢誅梁冀得一玉虎頭枕頷下篆云帝辛之枕與妲已同枕之京師長者後漢馬援傳謂姊子曹訓曰王氏廢姓也子石當屏居自守而反遊京師長者其敗必也好事才人漢王襃傳益州刺史王襄使襃作中和樂職宣布詩選好事者令依鹿鳴之聲習而歌之爭造蓬門請觀高製軒車滿路如看太學之碑漢蔡邕傳邕正定六經文字自書册於碑使工鐫刻立於太學門外觀視及摹寫者車乗日千餘兩填塞街巷街巷相填無異華隂之市高士傳張楷隱華山學者從之成市但豐城兩劍尚不俱來晉書雷煥為豐城令武帝時斗牛間有紫氣張華問煥答曰寶劍之精耳當在豫章豐城煥至掘獄果得劍二一以送華一以自佩華得劍曰乃干將也莫邪可復至乎然神物終當合耳華誅劍失所在煥子葉擕劍過延平津忽躍入水但見二龍蹯深曲韓子雙環必希皆見見與楊僕射書莫以好龍無别鋭曰莊子葉公子高好龍宫室雕文盡以龍於是天龍聞而下之窺頭於牖拖尾於堂葉公見之棄而退走失其魂魄五色無主木鴈可嗤韓子墨子為木鳶三年而成蜚一日而敗兩呉丹鳯曰南史王彧傳詔答曰張單雙災木鴈失載望瓊瑶詩報之以瓊瑶因乏行李左傳燭之武曰行李之徃來共其乏困金風已勁玊質宜調書不盡言但聞爻繫徐陵頓首與顧記室書未詳按顧越傳越字允南吳郡鹽官人也陳天嘉中詔侍東宫讀除東中郎鄱陽王府諮議參軍甚見優禮又按陳宗室傳鄱陽王伯山字静之文帝第三子也天嘉元年封鄱陽郡王六年為縁江都督北平将軍南徐州刺史伯山性寛厚美風儀於諸王最長吾伏事天朝本非舊𨽻殿下殊恩逺垂薦拔故常戰戰慄慄甘心痛謹庶其愚老無負明據近者既居臺轄唯務奉公去年正月十五日尚書官大朝元凱既集丞郎肅然忽有陳慶之兒陳暄者㡌簪釘額絛布裹頭虜袍通踝胡靴至膝直來郎座徧相排抱或坐或立且歌且詠吾即呼舎吏責列不答而走反為憾恚妄相陷辱至六月初遂作盲書便見誣謗南史陳暄傳陳太康中徐陵為吏部尚書精簡人物搢紳之士皆嚮慕焉暄以玉㡌簪插髻紅絲布裹頭袍拂踝靴至膝不陳爵里直上陵坐陵不之識命吏持下暄徐歩而出舉止自若竟無怍容作書謗陵陵甚病之聖朝明鑒悉知虚罔唯云吾取徐樞為臺郎南司檢問了不窮推承訓劾為信言致成墮免此事寃枉天下所無吾市徐樞宅為錢四萬任人市估文劵厯然不䝉申理見枉虚巧二者樞是故少府卿鱗南史作驎之子鱗殞身侯景之役又為西臺所贈兖州左衛官位甚高未知其子何沗郎署其炳曰南史陸驗徐驎並呉郡呉人兩人遞為少府丞大市令朱异其邑子也尤與之昵世人謂之三蠧驎素為邵陵王綸所憾太清三年為綸所殺魏晉之前如為乆逺宋齊以降其例甚多如徐愛南史作爰阮佃夫之子可不得郎官邪紀文南史作交卿公向璡皆為列棘豈冗雜曹郎乎南史阮佃夫㑹稽諸暨人宋明帝世權亞人主元徽三年遷黄門侍郎領右衛將軍明年改領驍騎將軍遷南豫州刺史厯陽太守猶管内任五年賜死又紀僧真子交卿甚有解用徐爰南琅邪開陽人本名瑗後改三者樞入身梁朝解褐岳陽王小府墨曹南史曲江公詧昭明太子第四子封岳陽郡王隋書荆州巴陵郡湘陰縣注梁置岳陽郡承聖時為故敬帝晉安王諷席文墨具存陜西官爵乃多浮濫更補臺郎不為勝擢未知何忽推宅貨官四者徐領軍節度自啟樞為郎敕付選序吾既不啟據又不為選職所可相關止是得中侯相聞為呈啟而巳以此見罪一何寃濫吾昔在承華見答王太尉書是弟所悉行年六十無復儕儔非意餘生忽此誣謗堯有驚於讒説舜典帝曰龍朕堲讒説殄行震驚朕師命汝作納言孔將惑於拾塵吕氏春秋顔回對曰向者埃煤入甑中棄食不祥因攫而飯之雖復聖主機明不能悉照殿下徳髙兩獻漢孝景十三王傳河間獻王徳修學好古實事求是呉皖曰後漢光武十王傳沛獻王輔矜嚴有法度好經書作五經論時號之曰沛王通論在國謹節始終如一稱為賢王風美二南詩序周南召南正始之道王化之基億兆歸心衣冠有託乆願通啟披訴聖明伏見軍戎多務所以不敢祈冐弟與吾遊眷亟回星紀故人如此寧不矜歎邪侍言有便云何且為啟聞一䝉神鑒照其枉直方殁幽泉無恨灰壤伏覲謁帝承明魏曹植贈白馬王彪詩謁帝承明廬緒言多次服矜遺老曲賜湔濯則殿下前時安澤匪復偏私遂吳良延薦之恩後漢書呉良傳東平王蒼辟良署為西曹上書薦良拜為議郎無王丹所舉之謬王丹傳客有薦士於丹者因辟舉之後所舉者䧟罪丹坐以免吾得方辭武騎漢書司馬相如事孝景帝為武騎常侍永附梁賓漢書景帝拜枚乗為𢎞農都尉乗不樂郡吏以病去官復遊梁雖媿家丞庶呈秋實魏志邢顒為平原侯植家丞顒防以禮由是不合庶子劉楨諫曰君侯采庶子之春華忘家丞之秋實縁弟深眷故此敬憑干謁非宜益懷悚慨徐陵白答族人梁東海太守長孺書原注其人梁末入北齊中云賢從君政佐佑興基此必南人而為齊謀主者按徐之才丹陽人也隨豫章王綜入魏武平四年自散騎常侍轉祕書監之才解天文兼圖讖之學知午年必有革易因高徳政啟之文宣聞而大悦帝登阼後彌見親密惜齊書北史本傳之才俱無表字可攷姑存之恩當作息報南史本傳陵長子儉一名報按集中有謝兒報坐事付治中啟近歲奉使來歸辱彼河清年中告行齊書河清世祖武成皇帝諱湛年號也并惠以明鏡亟離寒暑雖復時陳梁鶴日照孫鸞未詳按列女傳梁寡婦高行者梁王聘之乃懸鏡割鼻梁王高其行號曰梁高行神異傳昔有夫婦將别破鏡人執半以為信忽與人通鏡化鵲飛後人因鑄鏡為鵲安背上也北堂書鈔孫承鏡賦序余昔於呉市得鏡晞日暎水清朗明瑩言慰相思反增離眷劉傅二常侍還陳書傅縡傳縡字宜事北地靈州人也世祖召為縣騎安成王中記室尋以本官兼通直散騎侍郎使齊又承書札銀鉤甚麗晉索靖草書狀婉若銀鉤玉疏依然開封伸紙破愁為笑劉琨答盧諶書舉觴對膝破涕為笑素秋方届梁元帝纂要秋亦曰素秋溽暑稍闌月令季夏之月土潤溽暑體中何如善保元吉藂臺之璧盧諶覽古詩趙氏有和璧漢地理志叢臺在邯鄲趙武靈王築少海之珠山海經無臯之山南望㓜海注即少海也何必鄉里所在為貴卿託身大國既已積年彼朝英彦理相欽挹方當交辟三命見答周處士書清宦兩宫漢竇嬰傳有如兩宫奭將軍則妻子無類矣何乃濶然遲有問也吾七十之歲崦嵫已廹見報尹義尚書朽老之疾隨年而甚徒懷北邙之切張協登北邙山賦墳隴㟪疊未遂東都之期博物志公卿送夏侯嬰葬至東都門外馬不行接地悲鳴得石椁銘云佳城鬱鬱三千年見白日吁嗟滕公居此室乃葬之牽役承閒但有衰頓賢從君政佐佑興基中舎諶殿中並休宜自别有書問來告訪吾文章吾身歸來鄉國亟徙炎涼沈約詩寒署遞炎涼牽課疲朽不無辭製而應物隨時未曾編録既承今告輙復捜檢行人相繼别簡知音但既乏新聲全同古樂正恐多慙於協律致睡於文侯耳漢外戚傳孝武李夫人本以倡進初夫人兄延年性知音善歌舞武帝愛之毎為新聲變曲聞者莫不感動平陽主因言延年有女弟上乃召見之實妙麗善舞由是得幸以延年為協律都尉樂記魏文侯問於子夏曰吾端冕而聽古樂則唯恐卧燕南趙北後漢書公孫瓚時謡言曰燕南陲趙北際中央不合大如礪唯有此中可避世地角天涯言接末由但以潛欷善敬徳中郎並北境之良選皇華之上求若可輶軒見與楊僕射書别當委白君問諫仁山深法師罷道書竊聞出家閒曠猶若虚空在俗籠樊比於牢獄湼槃經在家廹迮猶如牢獄煩惱因之而生出家寛廓猶如虚空一切善法因之增長非但經有明文亦自世間共見瞥聞法師覆彼舟航文殊問經住家者是煩惱大海出家者是大舟航趣返緇衣之務此為目下之英竒非乆長之深計何以知然從苦入樂未知樂中之樂從樂入苦方知苦中之苦見湼槃經弟子素與法師雖無曩舊相知已來亦復不疎夫良藥必自無甘忠諫者沃乎逆耳漢淮南王傳嚴正上書曰毒藥苦口利病忠言逆耳利行倚見其僻是以不忍不言且三十年中造莫大之業如何一旦舎已成之功深為可惜敬度高懷未解深意將非惟帳之䇿欲集留侯漢張良傳良曰始臣起下邳與上㑹留臣願封留詳與楊僕射書形類卧龍擬求葛氏蜀志徐庶謂先主曰諸葛孔明卧龍也將軍豈願見之乎黄石兵法寧可再逢漢張良傳良嘗聞從容歩遊下邳圯上有一父老衣褐至良所直墮其履圯下良因跪進因授一編書曰讀是則為王者師孺子見我濟北穀城山下黄石即我已三顧草廬無由兩遇諸葛亮表三顧臣於草廬之中封爵五等惟見不逄書列爵惟五中閤外門難朱易白世説竺法師在簡文坐劉尹問道人何以遊朱門答曰君自見其朱門貧道如遊蓬户漢吾丘壽王傳或由窮巷起白屋鳴笳鳯管非有或聞魏文帝與呉質書從者鳴笳以啟路詳答周處士書儛女歌姬空勞反翫左傳晏子曰撞鐘舞女覔之者等若牛毛得之者譬猶麟角抱樸子學若牛毛得如麟角以此之外何所窺窬見與王僧辯書法師今若退轉寳女經佛告寳女吾徃古世堅固勸助而不退轉未必有一稱心交失現前十種大利何者佛法不簡細流李斯上秦皇書河海不擇細流入者則尊歸依則貴上生經若有歸依彌勒菩薩當知是人得不退轉上不朝天子下不讓諸侯獨翫世間無為自在其利一也身無執作之勞口餐香積之飯維摩經上方有國佛號香積如來以一鉢盛香飯恒飽衆生心不妻妾之務身飾芻摩之衣未詳按法苑珠林衣中有四者一糞埽衣二毳衣三衲衣四三衣朝無踐境之憂夕不千里之苦俯仰優游寧不樂哉其利二也躬無任重居必方域白璧朱門韓詩外傳楚襄王遣使者持黄金千斤白璧百雙聘莊子為相理然致敬夜琴晝瑟自是娛懷曉筆暮詩論情頓足其利三也假使棘生王路晉藝術傳佛圖澄天竺人也本姓帛氏少學道妙通𤣥術石季龍傾心事澄季龍太享羣臣於太武前殿澄吟曰殿乎殿乎棘子成林將壞人衣季龍令發殿石下視之有棘生焉冉閔小字棘奴明年季龍死遂大亂橋化長溝未詳巷吏門兒何因仰喚寸絹不輸官庫升米不進公倉庫部倉司豈須求及其利四也門前擾擾鮑昭詩擾擾遊宦子我且安眠巷裏云云李陵答蘇武書而執事者云云余無驚色家休小大之調門停强弱之丁入出隨心徃還自在其利五也出家無當之僧猶勝在俗之士假使心存殺戮手無斷命之愆密裏通情決勝灼然矯俗如斯煩垢萬倍勝於白衣四分律沙門以世俗法教白衣一入愛河法苑珠林登常樂之高山出愛河之深際永沈無出其利六也聽鐘聲而致敬増一阿含經鳴鐘偈福尋香馥以生心朝覩尊儀法苑珠林云起千尺之尊儀暮披寶軸刹那之善逐此而生仁王經一念有九十刹那一一刹那中復有九百生滅水滴微功漸盈大器法苑珠林寶積云世尊告言譬如有人析一毛為一分以一分於大海中取一滴水喻彌陀佛刹莊嚴彼大海水喻普見佛刹莊嚴復過於是未知因縁果報善惡皎然就此而言其利難陳矣假使達相白衣猶有埃塵之務縱令遥寄彈指維摩經度百千劫猶如彈指逺近低頭形去心留身移意徃閒有者得如此貧苦者永無因近在目前不言可見其利七也山間樹下故自難期報恩奉盆經一切聖衆或山間禪定或得四道果或樹下經行或得六神通枕石漱流實為希有晉書孫楚曰當欲枕石潄流猶斯之類不可思議如此者難逢一心人悕遇法師未能不學交習聽勝之因一旦退心於理邀矣其利八也開織成之帙見過去之因摛琉璃之巻驗當來之果賢愚經時佛姨母摩訶波闍波提佛已出家手自紡織預作一端金色之㲲奉上如來佛令持此徃奉衆僧注㲲織成大衣也阿育王傳王作八萬四千金銀瑠璃玻瓈篋盛佛舍利齊竟陵王子良付士淨住子淨行法門云藉如此之勝因獲若斯之妙果衆香偈轉不住心退無因果按佛經佛有過去當來之號識因識果不以為愆知福知報何由作罪上無舟檝交見沒溺之悲下失浮囊則有沈身之患大悲經佛告阿難有大商主在海中間其船卒壞或有得船版者或有浮者有命終者我於爾時作彼商主在大海中用以浮囊安隱而度其利九也曠濟羣品為天人之師景徳傳燈録周昭王二十八年釋迦佛生刹利王家放大智光明照十方世界湧金蓮花自然捧䨇足分手指天地作師子吼聲年十九欲出家號天人師水陸空行皆所尊貴言必闍黎和尚釋氏要覽梵語云阿闍黎即唐云軌範也書輒致敬和尚逺近嗟詠貴賤顒仰法師今必退轉立成可驗纔脱袈裟起世經剃除鬚髮著袈裟衣逢人輒稱汝我始解偏袒法苑珠林律中但有三衣通肩被腹如見長老乃偏袒之姓名便亦可呼平交者故自不論下劣者亦恐不讓薄言稱已榻席懸異從來小得自在瑜伽論王過有十二不得自在便以君為提封漢刑法志提封萬井若不屈膝歛手自達無因俯仰承迎未閑合度如此專專何由可與其利十也畧言十事空失此機其間湥道寧容具述仰度仁者心居魔境為魔所迷意附邪途受邪易性假使睂如細柳何足關懷頰似桃花詎能長乆梁元帝詩柳葉生睂上又三月桃花含面脂同衾分枕猶有長信之悲漢書趙氏子弟驕妒倢伃恐乆見危求供養太后長信宫坐卧忘時不免秋胡之怨列女傳魯秋胡潔婦者秋胡子之妻納之五日去宦於陳五年乃歸未至其家見路傍有美婦人以金與之歸至家母呼婦至乃向采桑者也婦自投河而死洛川神女尚復不惑東阿曹植洛神賦注植入朝帝以甄后遺枕付之歸途感而入夢因作感甄賦後改曰洛神按植封東阿王世上班姬即班倢伃何關君事夫心者面焉左傳子産曰人心之不同如其而焉若論繾綣左傳臧昭伯載書繾綣從公無通外内則共氣共心一遇纒綿則連宵厭起法師未通返照安悟賣花大藏一覧悉達多太子妃邪律輸陀羅即是宿命賣花女也未得他心那知彼意嗚呼桂樹戰國策蘇秦對楚王曰楚國食貴於玉薪貴於桂遂為豆火所焚法苑珠林乾薪萬束豆火能焚可惜明珠乃受淤泥埋沒翻譯名義集摩尼或云踰摩正云末尼即珠之總名也此云離垢此寳光淨不為垢穢所染弟子今日横諮必為法師所哂世上白衣可訾何限遺教經白衣受欲非行道人無法自制嗔猶可恕且一人退道而不安危推此而言實成難解譬如瓦礫盈路人所不驚片子黄金萬夫息步正言法師入道之功已備染俗之法未加何異金搏赤銅銀換鉛錫可悲可惜猶可優量能忍難忍方知其最願棄俗事務息塵勞正念相應行志兩全薄加詳慮更可思惟悔之在前無勞後恨如弟子算逺即十數年中決知惻惻近即三五歲内空唱如何萬恨萬悲寧知逺及自誤自錯永棄一生乃知斷弦可續遺教經漢武帝時西海國有獻膠五兩者弓弦斷以口濡香膠續之以射終日不斷因名曰續弦膠情去難留或若火裏生花可稱希有齊蕭子良集經所謂火中生蓮花此實為希有迷人知返去道不遥幸速推排急登正路法師非是無智遂為愚者所迷類似阿難更為魔之所繞摩鄧女經阿難隨水邊行見一女人在水邊擔水而阿難從女乞水女即與水女歸告母我得阿難乃可嫁我母不得者我不嫁也猶須承三寶之力齊蕭子良集照周等覺謂之佛寳禮無非法謂之法寳至德常和謂之僧寶此乃體一義三同性三寶制彼窮兇豎般若之幢佛書有般若波羅蜜多心經按梵語般若此云智惠吳秬臣曰龍樹菩薩傳并付法藏傳建立法幢摧伏異道也天魔自款因果經菩薩將成道時魔王恐諸衆生皆歸空我境界令三女供給以亂定意菩薩不納三女忽然咸變陋形若此言者當即便冀棄芻蕘若不㑹高懷幸停湥怪耳與智顗書陵和南法苑珠林和南者出要律儀翻為㳟敬善見論翻為度我二義俱通昨預沈儀同法席餐奉甘露無畏之吼衆咸歸伏然正法炬朗諸未悟自慶餘年得逢妙説尋事諮展此不申心謹和南又陵和南仰注之心難可敷具拔公至䝉三月二十日㫖用慰積歲傾心麥冷體中何如願一日康勝山中春夏無餘障惱耳遲復存㫖弟子二三年來溘然老至眼耳聾闇心氣昏塞故非復在人兼去歲第六兒夭喪痛苦成疾由未除愈適今月中又有哀故頻歲如此窮慮轉湥自念餘生無復能幾無由禮接係仰何言敬重􅀈公今還白書不次弟子徐陵和南又陵和南放生星聞公家極相隨喜事是抜公口具謹不多諮惟遲拔公廷出數百里水全其命根如此功德算數無盡隨喜無量此不委諮弟子徐陵和南五願上智者禪師書陵和南弟子思出樊籠無由羽化既善根微弱冀願力莊嚴一願臨終正念成就二願不更地獄三途婆娑論罪人為獄卒阿傍之所拘刺不得自在故名地獄法句經身死神去輪轉三塗自生自死苦惱無量三願即還人中不高不下處託生勝天王經佛自説云八十種好者五十八章下不高不下隨衆生樂四願童真出家如法奉戒道宣律師感應記清淨梵行修童真業五願不墮流俗之僧憑此誓心以策西暮今書丹款仰乞證明陵和南補玉臺新詠童謡云洛中女子莫千妖前至三月抱胡腰論邊境事書京㫄易傳有父母兄弟妻子官鬼尊爻舊唐書呂才傳禄命書犯勾絞六害背驛馬三刑當此生者並無官爵荅諸求官人書徐孝穆集箋注巻三
