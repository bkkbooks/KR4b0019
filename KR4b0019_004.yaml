body:
  text: 徐孝穆集箋注卷四陳徐陵撰吳江吳兆宜注序王臺新詠序晉陸機塘上行發藻玉臺下注玉臺以喻婦人之身凌雲概日由余之所未窺海録碎事凌雲臺魏文帝黃初三年築又燕昭王好神仙仙人甘宙與王登握日之臺史記秦本記戎王使由余麥聘穆公示以宫室引之登三休之臺顧樵曰周書宣帝既滅北齊詔曰偽齊或穿池運石為山學海或層臺纍構概日凌雲萬户千門張衡之所曽賦張衡西京賦閈庭詭異門千户萬周王璧臺之上穆天子傳盛姬盛柏之子也天子賜之上姬之長是曰盛門天子乃為之臺是曰重璧之臺漢帝金屋之中漢武故事帝為膠東王年數歲長公主問曰兒欲得婦否曰欲得指阿嬌好否帝曰若得阿嬌當作金屋貯之玉樹以珊瑚作枝珠簾以玳瑁為柙漢武故事上起神屋前庭植玉樹以珊瑚為枝碧玉為葉花子青赤以珠玉為之空其中如小鈴鎗鎗有聲又以白珠為簾玳瑁柙之其中有麗人焉其人也五陵豪族見為王儀同表充選掖庭後漢皇后紀綸漢法常因八月算民遣中大夫與掖庭丞及相工於洛陽鄉中閲視良家童女年十三以上二十以下姿色端麗合法相者載還後宫四姓良家北史魏文帝宏雅重門族以范陽盧敏清河崔宗伯榮陽鄭羲太原王瓊四姓衣冠所推咸納其女以充後宫四樵曰後漢書明帝時外戚樊氏郭氏殷氏馬氏是為姓小侯非列侯故曰小侯馳名永巷史記范雎傳雎見昭王佯為不知永巷而入其中正義曰永巷宫中獄名也宫中有長巷故名焉後改名掖庭亦有潁川新市晉書明穆庾皇后潁川鄢陵人后美姿儀後漢書光烈陰皇后南陽新野人帝常歎曰娶妻當得陰麗華按新市未詳河間觀津三輔黃圖列仙傳曰鉤弋夫人姓趙氏河間人右手鉤卷姿色佳麗武帝反其手得玉鉤而手展漢外戚傳孝文竇皇后家在清河親早卒葬觀津師古曰觀津清河之縣也本號嬌娥未詳按左思嬌女詩左家有嬌女皎皎頗白晢曽名巧笑中華古今注殷巧笑魏文帝宫人始作紫粉拂面楚王宫內無不推其細腰後漢馬廖傳楚王好細腰宫中多餓死魏國佳人俱言訝其纖手詩魏風摻摻女手可以縫裳閲詩敦禮非直東鄰之自媒宋玉登徒子好色賦臣東家之子嫣然一笑惑陽城迷下蔡然此女登牆窺臣三年至今未許也樵曰司馬相如美人賦臣之東鄰有一女子雲髮豐豔蛾眉皓齒欲留臣而共止登垣而望臣三年於兹矣臣棄而不許婉約風流無異西施之被教越絶書美人宫周五百九十步土城者陸門二水門一今北壇利里邱土城句踐所習教美女西施鄭旦宫臺也女出於苧蘿山弟兄協律自小學歌見答長孺書少長河陽由來能舞漢五行志成帝為微行出逰常與富平侯張放俱稱富平侯家人過河陽主作樂見舞者趙飛燕而幸之琵琶新曲無待石崇晉石崇王明君辭序昔公主嫁烏孫令琵琶馬上作樂以慰其道路之思其送明君亦爾也其造新曲多哀怨之聲故序之箜篌雜引非因曹植漢書塞南越禱祠太乙后土使樂人侯調作坎侯樂府有曹植箜篌引傳鼓瑟於楊家漢楊惲傳惲報孫會宗書曰家本秦也能為秦聲婦趙女也雅善鼓瑟得吹簫於秦女列仙傳簫史者秦穆公時人善吹簫能致孔雀白寉穆公女弄玉好之公乃妻焉共隨鳳去至若寵聞長樂陳后知而不平漢武故事建章長樂宫皆輦道相屬懸棟飛閣不由徑路平樹穀曰漢書衛子夫為平陽主謳者帝祓霸上還過陽主既飲謳者進帝獨恱子夫帝起更衣子夫侍尚衣軒中得幸還坐歡甚主因奏子夫送入宫陳皇后聞子夫得幸幾死者數焉後遂立為皇后畫出天仙閼氏覽而遙妬桓談新論陳平為髙帝解平城之圍言漢有好麗美女為道其容貌天下無有今困急已馳便歸迎取欲進與單于單于見此人必大好愛之愛之則閼氏日以逺疏不如及其未到令漢得脫去去亦不持女來矣閼氏婦女有妒媔之性必憎惡而事去之且如東鄰巧笑來侍寢於更衣注見上西子微顰將橫陳於甲帳莊子師金曰西施病心而矉其里之醜人見而美之歸亦捧心而矉其里之富人見之堅閉門而不出貧人見之挈妻子而去之走司馬相如好色賦花容自獻玉體橫陳漢武故事以琉璃珠玉明月夜光雜錯天下珍寶為甲帳其次為乙帳甲以居神乙以自御陪遊馺娑騁纖腰於結風關中記建章宫中有馺娑殿拾遺記每輕風至飛燕殆欲隨風入水帝以翠纓結飛燕之裾樹榖曰傅毅舞賦序激楚結風陽阿之舞長樂鴛鴦奏新聲於度曲見雜曲妝鳴蟬之薄鬢中華古今注魏文帝宫人絶所愛者有莫瓊樹始制為蟬鬢望之縹眇如蟬翼故曰蟬鬢照墮馬之垂鬟後漢梁冀傳冀妻孫壽色美而善為妖態作愁眉啼妝墮馬髻折腰步齲齒笑以為媚惑反插金鈿龍輔女紅餘志魏文帝陳巧笑挽髻别無首飾惟用圓頂金簪一隻插之文帝目曰玄雲黯靄兮金星出吳筠詩蓮花銜青雀寶粟鈿金蟲橫抽寶樹後漢輿服志皇后步搖以黃金為山題貫白珠為桂枝相繆一爵九華南都石黛梁書天監中詔宫中作白妝青黛眉樵曰留青日記廣東始興縣溪中出石墨婦女取以畫眉名畫眉石最發雙蛾古今注魏宫人好畫長眉令作蛾眉驚鶴髻北地燕脂古今注紂以紅藍花汁凝作燕脂以燕國所生故曰燕脂塗之作桃花妝偏開兩靨曹植洛神賦靨輔承權注靨笑靨權頰也亦有嶺上仙童分丸魏帝顔修內傳橋順二子曰璋曰瑞師事仙人盧子基於隆慮山棲霞谷服飛龍藥一丸千年不飢故魏文帝詩曰西山一何髙髙髙殊無極上有兩仙童不飢亦不食與我一丸藥光耀有五色服藥兩三日身輕生羽翼腰中寶鳳授厯軒轅漢律厯志黃帝使泠綸取竹嶰谷制十二筒以聽鳳之鳴其雄鳴為六雌鳴亦六以比黃鍾之宫圖樵曰漢書注鳳鳥氏為厯正軒轅黃帝受河作甲子歲記甲寅日記甲子金星與婺女爭華麝月共嫦娥競爽顧野王詩妝罷金星出晉杜預曰婺女為已嫁之女織女為處女梁簡文帝詩約黃能效月裁金巧作星張正見豔歌行裁金作小靨散麝起微黃酉陽雜俎近代妝尚靨如射月曰黃星靨靨鈿之名蓋自孫吳鄧夫人也王充論衡羿請不死藥於西王母羿妻嫦娥竊以奔月府樵曰史記婺女四星天少也主布帛裁製嫁娶驚鸞冶袖時飄韓掾之香北堂書鈔𡊮宏賦云舞回鸞以紆袖世説韓壽美姿容賈充辟以為掾充女於青瑣中見壽恱之與之通充見女盛自拂拭又聞夀有異香之氣是外國所貢一著人衣厯月不歇充疑夀與女通取左右婢考問之婢以狀言充祕之以女妻夀飛燕長裾宜結陳王之佩西京雜記趙飛燕立為皇后其弟合德上遺織成裾陳思王植洛神賦願誠素之先達兮解玉佩以要之雖非圖畫入甘泉而不分漢外戚傳李夫人少而早卒武帝憐閔焉圖畫其形於甘泉宫言異神仙戲陽臺而無别宋玉髙唐賦昔者先王嘗遊髙唐怠而晝寢夢見一婦人曰妾巫山之女也為髙唐之客聞君逰髙唐願薦枕席王因幸之去而辭曰妾在巫山之陽髙邱之岨旦為朝雲暮為行雨朝朝暮暮陽臺之下真可謂傾國傾城見雜曲無對無雙者也古詩為焦仲卿作作精妙世無雙加以天情開朗逸思雕華妙解文章尤工詩賦琉璃硯匣終日隨身陸機書在平原常案行曹公器物書刀五枚琉璃筆一枝翡翠筆牀無時離手藝文類聚傅玄曰漢末一筆之匣綴以隨珠文以翡翠樹萱録南朝呼筆管為牀清文滿篋非惟芍藥之花傅統妻芍藥花頌曄曄芍藥植此前庭晨潤甘露晝晞陽靈梁武帝宛轉歌欲題芍藥詩不成新製連篇寧止蒲萄之樹未詳九日登髙時有緣情之作萬年公主非無誄德之辭魏文帝與鍾繇九日送菊書九為陽數而日月並應俗嘉其名以為宜於長久故以享宴髙會陸機文賦詩緣情而綺靡晉書武帝左貴嬪諱芬思之妹也少好學善綴文名亞於思常作菊花頌曰英英麗質稟氣靈和春茂翠葉秋耀金華及帝女萬年公主薨帝痛悼不已詔芬為誄其佳麗也如彼其才情也如此既而椒房宛轉漢官儀皇后所居殿曰椒房以椒和泥塗壁故名溫暖而香辟除惡氣又取蕃實之義柘館陰岑漢書班婕妤賦痛陽祿與柘館兮仍襁褓而離災煙曰三輔黃圖柘觀在上林苑絳鶴晨嚴江總集為陳六宫謝表鶴籥展啓銅蠡一作鋪晝靜未詳按孟子以追蠡漢趙岐注追鐘鈕也鈕磨齒處深矣蠡欲絶之貌也三星未夕不事懷衾詩嘒彼小星三五在東又抱衾與裯五日猶賒誰能理曲初學記漢律吏五日得一下沐言休息以洗沐也樹屏曰枚乘雜詩當户理清曲樵曰詩五日為期優遊少託古逸詩孔子去魯歌曰蓋優哉遊哉聊以卒歲寂寞多間漢揚雄傳京師為之語曰惟寂莫自投閣厭長樂之疏鐘見謝敕賜啓室樵曰三輔黃圖鐘在長樂中勞中宫之緩箭見與楊僕射書輕身無力怯南陽之搗衣庾仲雍荆州記秭歸縣有屈原宅女須廟搗衣石猶存樹屏曰古詩閨中有一婦搗衣寄逺人生長深宫笑扶風之織錦藏榮緒晉書竇滔妻蘇氏善屬文苻堅時滔為秦州刺史被徙流沙蘇氏思之織錦為回文詩寄滔循環宛轉以讀之辭甚悽惋雖復投壺玉女神異經東王公與玉女投壺梟而脫誤不接者天為之笑開口流光今電是也為歡盡於百驍西京雜記郭舍人善投壺以竹為矢激矢令還一百餘反謂之為驍爭博齊姬未詳按晉胡貴嬪傳貴嬪諱芳奮之女也武帝嘗與樗蒱爭矢遂傷上指帝怒曰此固將種也心賞窮於六箸鮑宏傅塞經各投六箸行六棊故用博陸用十二棊六棊白六棊黑所擲骰謂之瓊瓊有五彩色故謂之五塞不樹聲曰國策蘇秦説秦王曰臨淄甚富而實其民無鬭雞走狗六博闒鞠説文六博局戲也六箸十二棊烏胄所作無怡神於暇景惟屬意於新詩可得代彼萱蘇微蠲愁疾魏王朗與魏太子書萱草忘憂睪蘇釋勞無以加也但往世名篇當今巧製分諸麟閣三輔黃圖麒麟閣在未央宫左漢蕭何建以藏祕書散在鴻都後漢蔡雍傳雍對曰鴻都篇賦之文可且消息樵曰後漢書元和元年置鴻都門學不藉篇章無由披覽於是然脂暝寫魏志劉馥傳夜然脂照城外樹提伽經庶人然脂諸侯然蜜天子然漆弄墨晨書撰録豔歌凡為十卷曾無參於雅頌亦靡濫於風人涇渭之間若斯而已三秦記涇水出开頭山至髙陵縣而入渭與渭水合流三百里清濁不相雜於是麗以金箱北史齊衡陽王鈞嘗手自細書五經置巾箱中裝之寶軸隨牛𢎞集請開獻書表劉裕平姚收其圖籍五經子史才四千卷皆赤軸青紙文字古拙三臺妙迹龍伸蠖屈之書漢官儀尚書為中臺謁者為外臺御史為憲臺謂之三臺繫辭尺蠖之屈以求伸也龍蛇之蟄以存身也煙曰宣和書譜皇象字休明廣陵人官至侍中工八分篆草世以書聖稱以比龍蠖蟄啓伸槃腹行五色花箋河北膠東之紙鄴中記石虎詔書以五色紙著鳯凰口中令銜之飛下端門桓玄偽事詔平準作青赤縹緑桃花紙使極精令連作之髙樓紅粉古詩盈盈樓上女皎皎當窗牖娥娥紅粉妝纖纖出素手仍定魯魚之文抱朴子書字之訛有寫魯為魚寫帝為虎辟惡生香魚豢典略藝臺香辟紙魚蠧故藏書臺稱藝臺聊防羽陵之蠧穆天子傳仲秋甲戌天子東遊次雀梁因蠧書於羽陵靈飛六甲髙擅玉函漢武內傳帝受西王母真形六甲靈飛十二事帝盛以黃金几封以白玉函鴻烈仙方長推丹枕博物志劉德治淮南王獄得枕中鴻寶祕書及子向咸而竒之信黃白之術可成謂神仙之道可致按鴻烈解今淮南子是至如青牛帳裏録異傳武都郡立大特祠是大梓牛神也今俗畫青牛障是餘曲未終朱鳥窗前博物志王母降於九華殿王母索七桃以五枚與帝母食二枚時東方朔竊從殿南廂朱鳥牖下窺母母謂帝曰此窺牖小兒常三來盜我桃新妝已竟方當開兹縹帙後漢楊厚傳厚祖父春誡子統曰吾綈帙中有先祖所傳祕記為漢家用爾其修之晉中經簿盛書用皂縹囊布裏書函中皆有香囊散此滔繩劉向别録孫子書以殺青簡編以縹絲繩永對玩於書帷漢董仲舒傳孝景時為博士下帷講誦長循環於纖手豈如鄧學春秋儒者之功難習未詳按後漢書明德馬皇后好讀春秋竇傳黃老金丹之術不成漢書竇皇后景帝母也好黃帝老子之言帝及諸竇不得不讀老子皆遵其術晉灼曰道家言治丹砂令變化可鑄為黃金固勝西蜀豪家託情窮於魯殿尚瑗曰蜀志劉琰為車騎將軍車服飲食號為侈靡侍婢數十能為聲樂悉教誦讀魯靈光殿賦東儲甲觀流詠止於洞簫漢成帝紀元帝在太子宫生甲觀畫堂為世嫡皇孫後樹本曰漢王褒傳元帝為太子嘉褒所為洞簫頌令宫貴人左右皆誦讀之孌彼諸姬詩孌彼諸姬聊與之謀聊同棄日晉陶潛戒子書見賢思齊不宜忽略以棄日也猗與彤管詩靜女其孌貽我彤管麗以香奩碑司空徐州刺史侯安都德政碑巖巖天柱大矣周山之峯見與陳司空書桓桓地軸壯哉崑崙之阜博物志崑崙山北地轉下三千六百里有八玄幽都方三十萬里地下有四柱四柱廣十萬里地有二千六百軸犬牙相舉三光懸而不墜見勸進表九土鎮以無疆張衡思玄賦思九土之殊風承乾合德之君則天體元之后所以並咨四鎮舜典帝曰咨四嶽咸建吾臣見論語業配蒼祇爾雅春為蒼天楊泉物理論地者其神曰祇功成宇縣兆宫曰謝朓詩霸功興宇縣至於流名雅頌著美風詩年代悠然寂寥無紀其能繼兹歌詠者司空侯使君乎自文昭武穆見勸進表胙土開家左傳衆仲曰胙之土而命之氏易開國承家濮水盛其衣簪榮波分其緒秩衛康叔世家周公旦以成王命封康叔為衛君居河淇間故殷墟夷王命衛為侯嗣君五年更貶號曰君獨有濮陽朝於魏魏世家安邑近秦於是徙治大梁無忌謂魏王曰決滎澤水灌大梁大梁必亡仁義之道夷門美於大梁信陵君傳魏有隱士曰侯嬴為大梁夷門監者公子欲厚遺之不肯受曰臣修身潔行數十年決不以監門困故而受公子財儒雅之風司徒重於強漢後漢侯霸傳霸明習故事收録遺文每春下寬大之詔奉四時之令皆霸所建也建武中為大司徒自通人許劭託命於江湖後漢書許劭有髙名好核論鄉黨人物每月輒更其品題故汝南俗有月旦評焉或勸之仕對曰方今小人道長王室將亂我欲避地淮海以全老幼乃南到廣陵徐州刺史陶謙禮之甚厚劭不自安復投揚州刺史劉繇及孫䇿平吳劭與繇南奔豫章而卒髙士袁忠寄身於交越後漢書袁忠閎弟也初平中為沛相及天下大亂棄官客會稽上虞後孫䇿破會稽忠復浮海南投交址俱違建安之難後漢書獻帝興平二年三月李傕脅帝幸其營焚宫室郭汜攻李傕矢及御前明年正月改元建安獨處衡山之陽盛𢎞之荆州記衡山者五嶽之南嶽也至於軒轅乃以灊霍之山為其副焉本傳安都宇成師始興曲江人也為郡著姓祖天資秀傑世載雄豪卓富擬於公侯史記貨殖傳秦破趙遷卓氏之蜀即鐵山鼓鑄運籌算賈滇蜀民田池射獵之樂擬於人君班佃必於旌鼓漢書班一避地於樓煩致馬牛羊數千羣以財雄邊出入弋獵旌旗鼓吹年百餘歲以壽終父光祿大夫南史本傳父捍少仕州郡以忠謹稱安都貴為光祿大夫始興內史邑里開通德之門後漢鄭玄傳國相孔融深敬於玄告髙密縣為玄廣開門衢令容髙車號通德門州鄉無抗禮之客漢竇嬰傳每朝議太事列侯莫敢與抗禮自茫茫禹迹左傳虞人之針曰芒芒禹迹畫為九州赫赫宗周見詩家滅驪戎國亡夷羿見與王僧辨書我髙祖武皇帝迎河圖於浪泊見為陳武帝書括地象於炎州楚辭嘉南州之炎德按括地志書名也傳鍔曰河圖括地象緯書名也見後漢曹褒南興涿鹿之師北問共工之罪五帝本紀黃帝與蚩尤戰於涿鹿之野遂禽殺蚩尤又舜流共工於幽陵以變北狄天生宰輔堯年致白虎之祥帝王世紀扶始以季秋下旬夢白帝遺馬祖而升邱見白虎其上有感已而生臯陶於曲阜神賜英賢殷帝感蒼龍之傑天官書東宫蒼龍有尾箕星莊子傅説得之以相武丁奄有天下乘東維騎箕尾而比於列星公亦觀時佇聖嘯吒風雲跪開黃石之書見諫罷道書髙詠玄池之野穆天子傳天子西征至於玄池天子三日休於玄池之上乃奏廣樂而歸是曰樂池沈吟梁甫自比管仲之才見與王僧辨書惆悵莘郊久負伊生之歎見與宗室書南史安都工隸書能鼓琴涉獵書傳為五言詩頗清靡自強敵侵華羣蠻縱軼後臯桂部之地陳書武帝紀髙州刺史李遷仕據大臯又大寶元年帝發始興次大庾嶺大破路養軍四戰五達之郊燕世家樂間曰趙四戰之國其民習兵不可攻詳與宗室書郡境賢豪將謀禦難長者僉論推公主盟義士雄民星羅霧集張協賦棊布星羅揚雄封事霧集雨散公既膺五聘殷本紀伊尹處士湯使人聘迎之五反然後肯往方啓六韜小學紺珠文武龍虎豹犬為六韜率是驍徒仍開嶺嶠南史本傳從武帝攻蔡路養破李遷仕克平侯景並力戰有功封富川縣子自大討瀟湘晉漢春秋氐池縣大栁谷口有蒼石立水中其文曰大討曹楚地記巴陵瀟湘之淵在九江之間今嶽州巴陵縣即楚之巴陵漢之下雋也南史陳武帝受禪王琳立梁永嘉王蕭莊於郢州同兹樊酈樊噲酈商也見漢書下軍違命左傳晉侯伐秦荀偃令曰雞鳴而駕塞井夷竈唯余馬首是瞻欒黶曰晉國之命未有是也余馬首欲東乃歸下軍從之乃命大還晉人謂之遷延之役上策不宣漢英布傳薛公對曰布反不足怪也使布出於上計山東非漢之有也出於中計勝負之數未可知也出於下計陛下安枕而卧矣敗我王師受拘徑盜大陳格於文祖咸秩具神見書率土依風羣靈稟朔公亦忠為令德左傳君子曰忠為令德天纂之謀吳帳斯開漢袁盎傳吳王濞反盎使吳見守從史飲醉西南陬卒乃以刀決帳道從醉卒直出衛門無擁左傳吳人藩衛侯之舍雖復季孫還魯左傳昭公十三年晉人執季孫韓宣子使叔魚歸季孫平子先歸惠伯待禮隨武濟河見與王僧辨書國慶民安相儔匪若即授使持節開府儀同三司丹陽尹通考凡前代帝王所都皆曰尹注南朝曰丹陽尹昔光武不尤於馮異穆公深禮於孟明終報王官之師遂舉咸陽之地後漢書馮異收散卒設伏與赤眉戰大敗之於崤底降璽書勞異曰始雖垂翅回溪終能奮翼澠池可謂失之東隅收之桑榆赤眉降異威行關中左傳秦伯伐晉濟河焚舟取王官及郊遂自茅津濟封殽尸而還遂霸西戎用孟明也斯乃聖主之宏略而名臣之逺圖者焉本傳安都與周文育西討王琳文育亦自豫章至時兩將俱行不相統攝因部下交爭稍不平王琳至弇口安都乃悉衆往沌口以禦之合戰安都等敗與周文育徐敬成並為琳囚總以一長繅繫之置於𦪙下令宦者王子晉掌視之安都等許賂子晉乃還都自劾詔並赦之復其官爵尋為丹陽尹後王琳入齊安都討琳餘黨所向皆下皇帝以陶唐啓國致玉版於河宗帝王世紀堯帥諸侯羣臣沈璧於洛河受圖書穆天子傳天子授河宗璧河宗伯天受璧西向沈璧於河再拜稽首顓頊承家佐金天於江水帝王世紀少昊金天氏降居江水顓頊生十年而佐少昊二十而登帝位經綸草昧定鼎之業居多左傳王孫滿曰成王定鼎於郟鄏締構權輿斷鼇之功相半見與楊僕射書樹聲曰陳文帝紀武帝之討王僧辨也先召帝與謀時僧辨壻杜龕據吳興武帝密令帝還長城立柵備之龕遣將杜泰掩至帝部分益明及武帝遣周文育討龕帝遣將軍劉澄蔣元舉攻下龕周文育侯安都敗於沌口武帝詔帝入總軍政尋命率兵城南皖固以英聲馳於海外信義感於寰中主器攸歸繫辭主器者莫若長子當璧斯在見勸進表公於是抗表長信漢霍光傳衛太子孫號皇曽孫在民間咸稱述焉光與丞相敞等上奏皇太后詔曰可是為孝宣皇帝詳謝賚賜啓清宫未央漢文帝紀使太僕嬰東牟侯興居先清宫奉天子法駕迎代邸皇帝即日夕入未央宫從億兆以歸心引公卿而定䇿馳輕軒於軨轕見與王太尉書奉侍駕於中都七廟之基於焉永固書七世之廟可以觀德萬邦之本由此克寧書民惟邦本本固邦寧本傳太后以衡陽王故未肯下令安都按劍上殿曰太后出璽叉手解文帝髮推就喪次仍别奉中旨迎衡陽獻王昌中流而殺之乃復進公司空南徐州刺史於是鎮之以清靜漢曹參傳載其清靜民以寧一安之以惠和後漢左雄傳疏曰守相長吏惠和有顯效者可就增秩勿使移徙非父母喪不得去官望杏敦耕月令杏花生種百榖瞻蒲勸穡吕氏春秋冬至五旬七日菖始生菖者草之先者也於是始耕室歌千耦詩十千維耦家喜萬鍾見孟子陌上成陰樂府題有陌上桑桑中可詠詩期我乎桑中春鶊始囀説文黃鸝倉庚也鳴即蠶生必具籠筐晉儀禮志皇后親蠶公主及諸命婦皆步搖衣青各載筐鉤從蠶秋蟀載吟月令注引俚諺蜻蛉鳴衣裘成蟋蟀鳴懶婦驚競鳴機杼或肅拜靈祀晏子齊大旱公召羣臣問以祠靈山躬曕舞雩周官司巫若國大旱則率巫而舞雩去駕擁於風塵還旌阻於飄沐京坻歲積非勞楚堰之泉詩如坻如京一統志芍陂在鳳陽府即安豐塘也乃楚相孫叔敖所築倉廩年豐無用秦渠之水漢溝洫志韓欲疲秦使鄭國説秦令鑿涇水秦覺之國曰臣為韓延數歲之命為秦建萬世之功遂成之名鄭國渠雖復東過小縣夏雨逐其輕輪後漢書百里嵩為徐州刺史境內旱嵩行部車所經甘雨輒降南渡滄江秋濤弭其張蓋枚乘七發將以八月之望觀濤乎廣陵之曲江江湧而濤起其始起也洪淋淋焉若白鷺之下翔其少進也浩浩溰溰如素車白馬惟蓋之張固不得同年而語矣若夫聽采民訟昏曉必通召引軒櫺躬親辨決立受符於前案未詳按漢酷吏傳左馮翊缺上欲徵嚴延年符已發為其名酷復止無留諾於後曹北堂書鈔魏孟康為𢎞農太守事無留諾曹樹榖曰漢蕭育傳育為茂陵令扶風召詣後以職事對育曰蕭育杜陵男子何詣曹也接務髙城之中非異甘棠之下燕世家召公巡行鄉邑有棠樹決獄政事其下欣欣美俗濟濟都塵以賈琮郭賀之風後漢書冀州刺史賈琮舊制傳車驂駕垂赤帷裳琮曰刺史當廣視逺聽糾察美惡豈可垂帷裳以自蔽乎命御者搴之郡縣聞風震悚又荆州刺史郭賀多異政明帝賜以三公冕旒敕行部去襜帷露冕使百姓見其容服行建武永平之化范蔚宗明帝紀論後之言事者莫不先建武永平之政於是州民散騎常侍王瑒等南史王瑒字子瑛梁元帝時位太子中庶子陳武帝入輔以為司徒左長史拜表宫闕請揚兹美化樹彼髙碑民欲天從語見書允膺絲誥銘曰鬱鬱三象茫茫九州見上綿天滲漉司馬相如封禪文滋液滲漉浹地虔劉赫矣髙祖爰清國讐元勳佐命力牧封侯帝王世紀黃帝得風后於海隅登以為相得力牧於大澤進以為將本傳武帝謀襲王僧辨惟與安都定計徐嗣徽任約等引齊冦至安都屢破之以功進爵為侯亦既旋歸拜家有暉宫亭蠡浦舊翅髙飛本傳復其官爵出為南豫州刺史攻王琳將曹慶常愛衆安都自宫亭湖出松門躡愛衆後破之餘衆悉平也炯曰荆州記宫亭湖即彭蠡澤謂之彭澤湖一名匯澤電卷徑寇風行國威吳張紘傳注引吳書曰紘述䇿平定三郡風行草偃文身被髮穀梁傳吳祝髮文身作貢來綏我皇纂武攀號東序顧命東序西嚮謁渭同周齊世家西伯將出獵卜之曰所獲非龍非彲非熊非羆所獲霸王之輔果遇太公於渭之陽迎門惟吕顧命成王崩俾爰齊侯吕伋以二干戈虎賁百人逆子釗於南門之外本傳還軍至南皖而武帝崩安都隨文帝還朝乃與羣臣議翼奉文帝流矢為暴天官書項羽拔巨鹿枉矢西流欃槍斯舉爾雅彗星為欃槍惵惵蒼黎老子聖人在上天下惵惵為天下渾其心注惵惵常恐懼也危危刀俎見與楊僕射書自我徂征妖氛克平爰驅犬彘實翦長鯨見勸進表北震巢浦南俘灌城侯瑱傳以瑱為都督侯安都等並𨽻焉王琳引合肥漅湖之衆舳艫相次而下合戰琳軍少却本傳劉異擁據東陽安都躬自接戰為流矢所中血流至踝乘輿麾軍屬夏潦水漲安都引船入堰棲艦與異城等異奔晉安虜其妻子振旅而歸仍還本鎮吏人表請立碑詔許之青羌卷介赤狄回兵見勸進表蹈舞難喻歌謡靡宣班固東都賦下舞上歌蹈德詠仁曰我黎庶俱祈上玄揚雄草泉賦惟漢十世將郊上玄山移兩越見與王僧智書海變三田見與楊僕射書公為上相復倍斯年廣州刺史歐陽頠德政碑弱水導其洪源軒臺表其增殖山海經昆侖之邱有弱水之川環之又西王母之山有軒轅臺懿哉少府師儲皇於二京漢儒林傳歐陽生字和伯千乘人也至曽孫髙子陽為博士髙孫地餘長賓以太子中庶子授太子後為博士論石渠元帝即位地餘侍中貴幸至少府地理志千乘郡屬青州盛矣司徒傳儒宗於九世後漢歐陽歙傳歙字正思樂安千乘人也自歐陽生傳伏生尚書至歙八世皆為博士學為儒宗世祖即位為河南尹建武六年拜揚州牧八年徵為大司徒廣陵雍雍族擅江右未詳渤海赫赫名重洛陽晉書歐陽建字堅石世為冀方右族擅名北州時人為之語曰渤海赫赫歐陽堅石厯山陽令尚書郎馮翊太守若夫嶽鎮龍蟠周官荆山之鎮山曰衡山詳勸進表星懸鶉火左傳咮為鶉火注鶉火南方栁星也衡山誕其髙德湘水降其清輝千仭孤標晉書裴頠曰和嶠森森如千丈松萬頃無度後漢郭泰傳泰曰叔度汪汪若千萬頃波澄之不清混之不濁年當小學曲禮人生十年曰幼學志冠成童內則成童舞象因孝為心欲仁成體本傳頠字靖世長沙臨湘人也為郡豪族少質直有思理以言行著於嶺表屯騎府君早棄榮祿易簀之日檀弓曽子寢疾病元起易簀幾將毀終禮記毀不滅性不以死傷生也不杖之言喪服小記庶子不以杖即位深非通制遺資巨萬富擬倚頓漢貨殖傳倚頓用富盬鹽起與王者埒裁變槐榆並賑宗戚南茨大麓舜典納於大麓注麓山足也北眺清湘得性於橘洲之間寰宇記橘洲在長沙縣西南四里江中時有大水洲渚皆沒此洲獨存湘中記諺曰昭潭無底橘洲浮披書於杏壇之上莊子漁父篇孔子遊乎淄帷之林休坐乎杏壇之上弟子讀書孔子絃歌鼓琴三冬文史見讓左僕射表五經縱橫見與宗室書頻致嘉招確乎難拔本傳父喪哀毀甚至家産纍積悉讓諸兄廬於麓山寺傍專精習業博通經史既而帝啓黃樞神亡赤伏見讓表天地崩霣川冡沸騰詩百川沸騰山冡崒崩羣悍酋豪更為禍亂朝披羽檄漢書髙祖曰吾以羽檄召天下夜照爟烽晉天文志軒轅西四星曰爟爟者烽火之神也浴鐵蔽於山原晉建武故事王敦死祕不發喪賊皆重鎧浴鐵摐金駭於樓堞司馬相如子虗賦摐金鼓吹鳴籟公疲兵屢出獨據胡牀曹瞞傳操與馬超戰超等掩至操恚猶坐胡牀未起勍賊重圍尚憑書几九州春秋孔融為北海太守為袁談所攻流矢雨集融憑几安坐揚灰既散論衡楊璇為零陵太守時桂陽賊起璇乃置馬車數十乘以囊盛石灰於車上乃會戰從風揚灰向賊遂大破之駕棒將軍抱朴子吳遣將軍討山賊賊中有善禁者每交戰官軍刀刃皆不得拔將軍乃多作徑木白棓擊之禁不得行因而克賊咸克凶渠以保衡服本傳梁左衛將軍蘭欽少與頠善故頠常隨欽征討南征夷獠禽陳文育所獲不可勝計大獻銅鼓纍代所無頠預其功時湘衡界五十餘洞不賔敇衡州刺史韋粲討之粲委頠為都督悉皆平殄常以二主蒙塵見答王太尉書三光掩曜班固典引經緯乾坤出入三光注三光日月星也出入逾於嘗膽吳越春秋越王念復吳仇愁心苦志懸膽於户出入嘗之殷憂獨其撫心漢酷吏傳大將軍光因舉手自撫心曰使我至今病悸不治第宅深符去病漢霍去病傳上為治第令視之對曰胸奴不滅無以家為也志梟羣醜彌同越石晉書劉琨字越石與親故書曰吾枕戈待旦志梟逆虜自禹圭既錫見勸進表堯玉已傳帝王世紀堯賜舜以昭華之玉物變謳謡風移笙管商周之際孤竹尚其哀歌伯夷傳武王已平殷亂天下宗周伯夷叔齊義不食周粟隱於首陽山采薇而食之及餓且死作歌曹劉之間蘇子猶其狂哭魏蘇則傳則字文思扶風武功人也則及臨淄侯植聞魏氏代漢皆發服悲哭本傳侯景構逆粲自解還都征景以頠監衡州及陳武帝入援都頠乃深自結託遷頠為始興內史元帝承制以始興郡為東衡州以頠為刺史況番禺連帥實謂宗枝迷我天機目窺梁鼎以公威名本重逼統前軍乾數難違剝象終悔髙祖永言惟舊彌念奇功即訓皇家深𢎞朝紀檻車才至見移文輿櫬已焚左傳許男面縛銜璧大夫衰絰士輿櫬楚子問諸逢伯對曰昔武王克商微子啓如是武王親釋其縛受其璧而祓之焚其櫬禮而命之使復其所祝史妖於夷吾左傳晉侯改葬共太子秋狐突適下國遇太子太子使登僕而告之曰夷吾無禮余得請於帝矣將以晉畀秦秦將祀余對曰臣聞之神不歆非類民不祀非族君祀毋乃殄乎且民何罪失刑乏祀君其圖之君曰諾吾將復請七日新城西偏將有巫者而見我焉許之遂不見及期而往告之曰帝許我罰有罪矣敝於韓壇場延於井伯左傳晉執虞公及井伯以媵秦穆姬本傳蕭勃在廣州頠委質於勃及勃度嶺出南康以頠為前軍都督周文育破禽之送於武帝釋而禮之綢繆安樂造次訏謀爰珥豐貂允光金蟪漢官云秦置散騎又置中常侍漢因之皆銀璫附蟬為文貂尾為飾謂之貂璫殤帝改施金璫但八桂之上山海經桂林有八樹在番禺東蠻夷不賓九疑之陽山海經南方蒼梧之邱蒼梧之川其中有九疑山在長沙零陵界兵凶歲積以公昔在衡臯深留夙愛仁恩可以懷猛獸後漢童恢傳恢琅邪姑幕人少仕州郡為吏民常為虎害乃捕二虎恢咒虎曰若殺人者當垂頭伏罪自知非者當號呼稱寃一虎低頭閉目即時殺之一虎視恢鳴吼即時解釋吏人為之歌頌威名可以懼啼兒南史劉胡傳胡為越騎校尉蠻畏之小兒啼語云胡來即止乃授持節散騎常侍本傳不載衡州刺史本傳蕭勃死後嶺南亂頠有聲南土且與武帝有舊乃授南安將軍衡州刺史封始興縣侯我皇帝從唐侯以胤國見勸進表屈啓筮而承家漢文帝紀髙后崩大臣遂使人迎代王代王卜之占曰大橫庚庚余為天王夏啓以光一恭寶祚開定江沔三改璇衡苞羅湘峽昔中宗屈申於處仲晉書王敦字處仲元帝永昌元年三月敦據石頭擁兵不朝帝遣使謂敦曰公若不忘本朝於此息兵則天下尚可共安如其不然朕當歸琅邪以避賢路按元帝廟號中宗髙祖遺恨於平城見玉臺新詠序漢武承基方通沙塞漢衛青傳大將軍青凡七出擊胸奴晉明紹運裁平姑孰晉書明帝太寧元年四月敦謀篡位自武昌移鎮姑孰二年六月加司徒王導大都督揚州刺史督諸軍討敦敦復反秋七月至江寧帝親征破之敦死衆潰方其盛業綽有光前踐祚之初進公位征南將軍本傳文帝即位進號廣州刺史又都督東衡州本傳作交廣等隋書揚州南海郡始興縣注齊曰正階梁改名焉又置安逺郡置東衡州二十本書作十九州諸軍事宜公乃務是民天漢書酈食其曰民以食為天敦其分地火耕水耨貨殖傳楚越之地地廣人稀飯稻羮魚或火耕而水耨彌亘原野盜賊皆偃工賈競臻鬻米商鹽盈衢滿肆新垣既築外户無扄禮運故外户而不閉脂脯豪家鐘鼎為樂見與王僧辨書揚袪灑汗振雨流風蘇秦傳臨災之塗舉袂成幕揮汗成雨市有千金之租漢髙五王傳主父偃言齊臨災十萬户市租千金田多萬箱之詠詩乃求萬斯箱僧釋慧羡等來朝絳闕備啓丹誠乞於大路康莊式刋豐琰庶樊卿寶鼎復述台司之功後漢竇憲傳南單于於漠北遺憲古鼎其旁銘名仲山甫鼎潛夫論仲山甫姓樊字穆仲封於南陽羊叟髙碑更紀征南之德晉書加羊祜征南大將軍詳與李那書於是跪開黃素揚雄答劉歆書天下上計孝亷及內郡街卒會者常把三寸弱翰筆賫黃素三尺以問其異語爰登紫泥西京雜記漢以武都紫泥為璽室鑒此誠祈皆如所奏乃詔庸臣為其銘曰赫赫宗陳桓桓鼎臣千乘建學五典攸因書慎徽五典五典克從盛德斯逺公門日新崇髙維嶽貺甫生申詩維嶽降神生甫及申去衡移廣遷征自鎮攸攸銅略疑作界見與章司空書藐藐金鄰左思吳都賦金鄰象郡之渠注夫南之外冇金鄰國去夫南可二千餘里土地出銀莫逺非督無思不賓三江靡浪見移文五嶺奚塵見與章司空書式歌式舞詩雖無德與汝式歌且舞仁哉至仁公其饗福於萬斯春晉陵太守王勵本傳竹勱德政碑樹屏曰本傳勱字公齊侯景之亂奔江陵厯位晉陵太守時兵飢之後郡中凋弊勱為政清簡吏人便安之大建元年纍遷尚書右僕射時東境大水以勱為晉陵太守在郡甚有威惠郡人表請立碑頌勱政德詔許之若夫雎陵世傳已詳載德之華徐州先賢亦著清風之美偉哉文獻光啓中興晉書王祥傳祥字休徵琅邪臨沂人漢諫議大夫吉之後也厯官司空轉太尉加侍中五等建封睢陵侯邑一千六百户祥弟覽子裁裁子導字茂𢎞元帝過江導厯位至丞相輔相三世及薨詔喪葬參用天子之禮諡曰文獻吳樹聲曰國語祭公謀父曰我先王不窋奕世載德世標曰後漢王良傳良字仲子東海蘭陵人也王莽時不仕建武三年徵拜諫議大夫六年代宣秉為大司徒司直在位恭儉妻子不入官舍布被瓦器范曄論當世咨其清人君髙其節隋地理志東海郡屬徐州琅邪郡屬徐州郭莖表其深源見為貞陽侯書何籌慙其逺慶後漢王敞傳敞六世祖比干為汝陰縣獄吏決曹掾乎活數千人有老嫗謂曰公有陰德今天錫君䇿以廣公之子孫因出懷中符策凡九百九十枚子孫佩印綬者當此算豈惟桓氏之鳴玉范曄論桓氏自榮至典父子兄弟代為帝師國語趙簡子嗚玉以相張家之珥貂漢書張安世子孫相繼為侍中中常侍諸曹散騎列校尉者凡十餘人詳歐陽頠碑袁姓之朱衣後漢袁安傳安道逢二書生指一處云葬此地當世為上公故纍世降盛楊宗之華轂漢楊惲傳惲家方降盛時乘朱輪者十人又有佽飛遮列漢百官公卿表佽飛掌弋射有九丞兩尉班弓夾門後漢班超傳悉持弓弩夾門而伏濯龍俯望後漢馬皇后紀太后詔曰前過濯龍門上見外家問起居者車如流水馬如遊龍百官志有濯龍監一人緹騎盈道漢官曰執金吾緹騎二百人環濟要略司隸出從緹騎奕世如此何其盛哉南史勱祖份纍遷尚書左僕射父琳位司徒左長史兄銓衛尉卿錫纍遷吏部郎中僉太子中庶子通尚書右僕射弟質厯位侍中固遷潯陽太守君以藍田美玉三秦記藍田出美玉吳志諸葛恪少有才名孫權竒之曰藍田美玉真不虛也大海明珠曹植贈丁廙詩大國多良材譬海出明珠灼灼美其聲華英英照其符彩丰神雅淡識量寬和既有崔琰之鬚眉魏書崔琰聲資髙暢眉目疏朗鬚長四尺甚有威重朝士瞻望太祖亦敬重焉非無鄭玄之腰帶後漢書鄭玄身長八尺飲酒一斛秀眉明目容儀溫偉爛爛若髙巖下電騷騷若長松裏風世説裴令公目王安豐眼爛爛如巖下電世日李元禮謖謖如徑松下風勢利無擾於胸襟行藏不槩於懷抱家門雍睦孝友為風上交不諂下交不瀆見繫辭脫貂救厄情靡矜吝未詳釋馬窮塗惟濟危殆後漢亷范傳范遷蜀郡太守坐法免歸鄉里肅宗崩范奔赴敬陵時盧江郡掾嚴麟奉章弔國俱會於路麟乘小車塗深馬死不能自進范見而愍命從騎下馬與之不告而去至於網羅圖籍脂粉藝文學侣挹其精微辭宗稱其妙絶本傳勱美風儀博涉書史恬然清簡未嘗以利欲干懷出為仁武將軍晉陵太守宋書南徐州刺史領晉陵太守吳時分吳郡無錫以西為毗陵晉東海王越世子名毗永嘉五年帝改為晉陵五雞二彘勤恤有方漢龔遂傳遂為渤海太守使民家養二母彘五母雞問羊知馬鉤巨兼設漢書趙廣漢為京兆尹善為鉤巨以得事情鉤巨者設欲知馬價則先問狗已問羊又問牛然後及馬參伍其價以類相凖則知馬之貴賤濟北移樹纍政之所未洽未詳汝南爭水連年之所無斷汝南先賢傳趙規為安陽令與朗陵黃萌爭水割指一朝明決曽不留滯四民商販咸用殷阜銘曰康哉寶運美矣良臣渭自灃水源以洛濱公侯世及宰輔相因曰我民秀山川降神風情穆穆孝友恂恂學則經笥後漢邊韶傳韶曰腹便便五經笥文為世珍髙風逺矣曠代難倫鼎鉉虛職易鼎玉鉉台階未臻晉書羊祜表曰恩詔拔臣使同台司注台司三公也安知霜霰遽夭松椿莊子上古有大椿者以八千歲為春八千歲為秋碣石斯表民情既陳徒然下拜何報陽春蔡雍獨斷春為少陽其氣始出生長丹陽上庸路碑在天成象咸池屬於五潢在地成形滄海環於四瀆史記天官書西宫咸池曰天五潢注元命包曰咸池主五榖其星五者各有所職樹本曰封禪書四瀆者江淮河濟也國險者固其金湯漢蒯通傳金城湯池不可攻也儲蓄者因於轉漕漢宣帝紀大司農中丞耿夀吕奏設常平倉以給北邊省轉漕貨財為禮曲禮貧者不以貨財為禮專俟會通厥田為上書禹貢四海會同又徐州厥田惟上中皆資滲漉見侯安都碑大矣哉坎德之為用也木華海賦曠哉坎德易坎為水是以握圖之主財以利民御斗之君因之顯教揚雄長楊賦髙祖奉命順斗極運天關上哉少昊初命水官未詳左傳剡子曰共工氏以水紀故為水師而水名逖矣髙陽爰重冥職帝王世紀顓頊髙陽氏以水事紀官祭法冥勤其官而水死舜為太尉於是九澤載疏禹作司空然後百川咸導河圖曰舜以太尉即位與三公臨河觀黃龍五采負圖出置舜前以黃玉為柙白玉為檢黃金為繩紫芝為泥章曰天皇帝符璽舜典伯禹作司空禹貢奠髙山大川又九澤既陂開華山於髙掌述征記華山本一山巨靈所開今睹手迹於華嶽而腳迹在首陽山下鑿靈沼於周原詩王在靈沼又周原膴膴莫匪神功皆由聖德我大梁之受天明命勞已濟民有道稱皇無為曰帝帝王世紀功合神者稱皇德合地者稱帝德合人者稱王若夫雲雷草創易雲雷屯又天造草昧翦商黜夏之勳疑脫二句詩后稷之孫實維大王居岐之陽實始翦商湯誥罪人黜服鑄寶鼎於昆吾安能紀勒後漢崔駰傳蔡雍銘論吕尚作周太師其功銘於昆吾之鼎陳鴻鐘於豐嶽豈易揄揚漢司馬相如賦撞鴻鐘山海經豐山有九鐘注霜降則自鳴揚樹屏曰班固西都賦雍容揄斯固名言所絶也及乎膺斯寶運大拯橫流晉王尼傳尼常歎曰滄海橫流處處不安也屈至道於汾陽勞凝神於姑射莊子至道之極昏昏默默又用志不分乃疑於神詳卷三聖人作樂簫韶備以九成見書益稷哲王盡禮春官總於三代見周禮豈止金門桴竹玉泉記立春之日取宜陽金門山竹為管河內葭草為灰以候陽氣玉尺調鐘世説茍勗善解音聲遂正雅樂阮咸妙賞時謂神解每公會作樂而心謂之不調勗意忌之遂出阮為始平太守後有一田父耕於野得周時玉尺便是天下正尺茍始以校已所治鐘鼓金石絲竹皆覺短一黍於是伏阮神識公帶獻明堂之圖封禪書濟南人公玉尺上黃帝時明堂圖明堂圖中有一殿四面無殿以茅蓋通水圜宫垣為復道上有樓從西南入命曰昆侖天子從之入以拜祠上帝匡衡建后土之議郊祀志匡衡以甘泉泰畤河東后土之祠宜可徙置長安願與羣臣議定若斯而已矣天降丹鳥既序孝經干寶搜神記孔子制孝經既成齋戒向北辰而拜乃起白霧摩地赤虹自天而下化為黃玉上有刻字孔子跪受讀之河出應龍乃私周易見勸進表若夫固天將聖垂意藝文五色相宣八音繁會樂記五色成文而不亂注五聲配五行之色屈原九歌云五音紛兮繁會不移漏刻見與楊僕射書才命口占漢遊俠傳陳遵為河南太守召善書吏十人十人於前治私書謝京師故人遵慿几口占書吏且省官事書數百封親疏各有意河南大驚御紙風飛天章海溢皆紫庭黃竹之辭蔡雍琴操周成王琴歌鳳皇翔兮紫庭余何德兮感靈穆天子傳王遊黃臺之上時國中大雪大凍王作黃竹歌三章以哀之晨露卿雲之藻吕氏春秋晨露湯歌也詳勸進表漢之兩帝徒有詠歌漢書髙祖有大風歌漢武故事帝作秋風辭魏之三祖空云詩賦沈約謝靈運傳論曹氏基命三祖陳王盛髙麗漢以為彭老之教終沒愛河升玄經漂浪愛河流吹欲海儒會之宗方離火宅見與李那書豈知五詩八會之殊文未詳復菴和尚華嚴論贊龍樹菩薩入龍宫看藏得華嚴下本回歸西土傳到此方者乃八十卷經三十九品品分七處九會天上人中之妙典優闐王作佛形像經若生天上天中最勝乃至得作六欲天王於六天中尊貴第一雪山羅漢爭造論門傳燈録雪山五百仙人飛空而至阿難為説法鷲嶺名僧俱傳經藏見與李那書香象之力特所未勝雜寶藏經過去久逺比提醯國王有大香象以香象力摧伏迦尸王軍華嚴經現有菩薩名曰香象與其眷屬諸菩薩中三千人俱常在其中而演説法秋兔之毫書而莫盡西京雜記天子筆管以錯寶為跗毛皆以秋兔之毫忠信為寶家語孔子息駕於河梁有懸水三十仞圜流九十里有一丈夫方將厲之曰始吾之入也先以忠信及吾之出也又從以忠信所以能入而復出也禱祈免於白駒漢溝洫志武帝用事萬里沙磧還自臨決河湛白馬玉璧令羣臣從官自將軍以下皆負薪置決河明德惟馨左傳宫之竒引周書曰黍稷非馨明德惟馨山川舍於騂犢見論語至如月離金虎陸機詩望舒離金虎漢書西方金也孔傳昴白虎中星然西方七宿畢昴之屬俱白虎泥染石牛廣州記州有石牛每旱殺牛以血和泥泥石牛背既畢即雨泥盡方止薈蔚朝興滂沱晚注詩薈兮蔚兮南山朝隮乂月離於畢俾滂沱矣而清蹕才動見勸進表纖羅不搖木華海賦輕塵不飛纖蘿不動髙閈將臨左傳髙其閈閎油雲自闢西京雜記雨雲曰油雲陽烏銜日寧懼虎賁之弓廣雅云日名陽烏淮南子日中有踆烏飛樹本曰漢明帝起居注上東巡泰山到滎陽有烏鳴乘輿上虎賁王吉射之中而祝曰烏鳴啞啞引弓射之洞左掖陛下夀萬萬臣為二千石賜錢二百萬飛雨彌天無待期門之蓋漢外戚傳上官桀少時為羽林期門郎從武帝上草泉桀奉蓋雖風常屬車雨下蓋輒御震維舉德易震為長子后文炳曰左傳王子朝告諸侯曰王無適則擇立長年鈞以德德釣以卜非曰尚年見表後啓若發居酆檀弓文王舍伯邑考而立武王注伯邑考文王長子發武王名猶莊在漢後漢書東海恭王疆建武二年立為皇太子十七年而母郭后廢遂讓位於顯宗顯宗明皇帝諱莊光武第四子也母陰皇后按昭明太子早卒簡文帝乃髙祖第三子也故云濤如白馬既礙廣陵之江見侯安都碑山曰金牛孰辨梅湖之路初學記武原淪陷為當湖又有梅湖趙曄吳越春秋海鹽縣淪為招湖徙居武原鄉故越地也世標曰劉道道錢塘記明聖湖在縣南父老相傳湖中有金牛専州典郡青鳬赤馬之舟魏王粲海賦乘囷桂之舟晨鳬之舸吳志太傅諸葛恪制為鴨頭船詳與王太尉書皇子天孫嗚鳳飛龍之乘陶季直京邦記宋武帝度六合龍舟翔鳳以下三千四十五艘晉宫闕記天泉池有飛龍舟莫不欣斯利涉易利涉大川玩此修渠乍擁楫而長歌列女傳趙簡子南擊楚津吏醉不能渡將殺之津吏女涓持楫而前中流奏河激之歌簡子立為夫人乃樅金而鳴籟見歐陽頠碑斯曠世之奇功無疆之鴻烈者也銘曰后王降德於衆兆民髙文象緯晉張華傳妙達象緯妙義幾神業冠遷夏見為陳武帝書功踰入秦漢髙祖紀楚懷王與諸將約先入定關中者王之沛公攻武關入秦時惟大畜象及同人見易慧雨方霤禪枝獨春西域傳羅婆路山北巖前是佛受山神飯已潄口嚼楊枝因生今為茂林寺號楊枝帝德惟厚書大禹謨益曰都帝德廣運皇恩甚深觀乎禹迹見侯安都碑見我堯心孝義寺碑臣聞道階八地猶見后妃淨土論二淨穢土謂淨多穢少即八地已上百緣經佛告比邱此賢劫中波羅奈國梵摩達王正法治化惟無子息禱祀諸神求索有子困不能得時王國中有一池水生一蓮華其華臺中有一童子結跏趺坐王及后妃見甚歡喜即抱還宫養育漸大隨其行處􅘟華承足因香立字名栴檀香後悟非常成辟支佛身升虛空作十八變願生千佛無非賢聖雜寶藏經波羅奈國中有山名曰仙山有梵志在彼山住大小便利於石上有雌鹿來舐即便有身生一女子梵豫國王立為第二夫人後時有身便生千葉蓮華時大夫人取千葉蓮華盛著籃裏擲於河中時烏耆延王接取見千葉蓮華葉葉有小兒長大各有大力千子即時將諸軍衆降服諸國次到梵豫第二夫人却之以五百子與親母以五百子與養父母時二國王分閻浮提各畜五百子佛言欲知彼時千子者賢劫千佛是也以誓願力常生賢聖汲引之義雖同隨機之感非一至如媯汭有禮皇源所以前興堯典釐降二女于媯汭嬪于虞周女斯歸陳宗所以流慶左傳庸以元女大姬配胡公而封諸陳以備三恪大矣神基帝系淑聖重光者也慈訓太后陳后妃傳武宣章皇后諱要兒吳興烏程人本姓鈕父景明為章氏所養因改姓焉武帝先娶同郡錢仲方女早卒後乃聘后永定元年立為皇后武帝崩后與中書舍人蔡景厯定計召文帝及即位尊后為皇太后宫曰慈訓德佐初九道暉上六周易初九曰潛龍勿用何謂也子曰龍德而隱者也又上六龍戰于野其血玄黃象曰龍戰于野其道窮也居天上天中之極見丹陽碑處太任太姒之尊詩思齊太任文王之母又太姒嗣徽音則百斯男蘋藻之化斯深葛覃之風彌逺詩于以采蘋南澗之濵于以采藻于彼行潦又葛之覃兮施于中谷皇帝膺兹上聖契彼援神後漢翟酺傳注援神契鉤命決皆孝經緯篇名也愛敬在乎一人德教刑於四海是以明星皎皎流半月之光孫氏瑞應圖景星者天精也狀如半月生於晦朔助月為明王者不私人則見甘露團團灑如餳之味晉書甘露者仁澤也其凝如脂其美如飴嘉禾自秀孝經援神契德下至地則嘉禾生浪井恆清瑞應圖浪井不鑿自成王者清淨則仙人主之天降徵祥日聞書府左傳女叔侯曰史不絶書府無虛月自大明紹運周易順而麗乎大明神武應期繫辭古之聰明睿知神武而不殺者夫至道旁通無思不格戊己校尉西關玉門漢書元帝初元時置戊巳校尉屯田車師故地後漢班超傳不敢望到酒泉郡但願生入玉門關注玉門關在燉煌郡今沙州伏波將軍南表銅柱見歐陽頠碑方使三千世界百億須彌長阿含起世經等云四洲地心即是須彌山山外别有八山圍如須彌山下大海深八萬四千由旬其邊八山大海初廣八千由旬中有八功德水如是漸小至第七山下廣一千二百五十由旬其海鹹海廣於無際海外有山即是大鐵圍山四周圍輪并一日月晝夜回轉照四天下名為一國土即以此為量漸至滿千鐵圍繞訖名一小千復至一千鐵圍繞訖名為中千世界即數中千復滿一千鐵圍繞訖名為大千世界此中四洲山王日月乃至頂各有萬億成則同成壞則同壞是皆一化佛所統之處名為三千大千世界號為娑婆世界同望飛輪轉法輪經佛在鹿野樹下時空中有自然法輪飛來當佛前而轉共稟玄德舜典玄德升聞乃命以位天嘉三年正月二十一日詔旨陳文帝紀世祖文皇帝諱蒨字子華始興昭烈王之長子也武帝甚愛之永定三年六月丙午武帝崩皇后稱遺詔徴文帝入纂皇統改元天嘉仰惟聖德方被兆民乃敕有司改東成里為孝義里昔岱山徙號重華著其受終舜典正月上日受終於文祖歲二月東巡狩至于岱宗德水移名秦人表其嘉運史記秦始皇本紀始皇并天下更名河曰德水以為水德之始豈若盡在輿地書兹里門仰述天經孝經子曰夫孝天之經也地之義也光臨父母繫辭無有師保如臨父母臣陵稽首周禮太祝辨九拜一曰稽首乃作銘曰願此良因大寶積經樂施於人獲五種名利五能為菩提作上妙因宜資貴親公羊傳子以母貴母以子貴三乘並䇿見與李那書四梵為賓大悲芬陀利經佛言我於林中三十六年遊四梵處為益衆生故食衆果法苑珠林大洛那力者是第四梵王那羅延力是紺殿安坐梁元帝集善覺寺碑云寶繩交映無慙紫紺之宫白帖佛寺為紺園蓮華養神佛升忉利天為母説法經摩耶夫人兩乳血出猶白蓮華而入如來口中燈前禮佛涅槃經若於佛法供養一香燈乃至獻一華則生不動國地後邊身寶積經昔舍衛城有二十人皆是最後邊身更有怨家二十人奪其命根如來為調伏是四十人故告目連言令此地中出佉違羅刺欲刺我足此刺即長一肘佛言我過去世入大海中持矟刺人得如是報彼時二十怨賊欲害二十人者作是思惟如來法王尚不免報况我等輩即從坐起向佛悔過並濟含識法苑珠林梁元帝捨道文引含識於涅槃咸歸至真法苑珠林故經中來至佛所云南無無所著至真等正覺是名口業稱歎如來德也國家隆盛同享遐慶謹勒豐碑檀弓公室視豐碑陳其舞詠潘尼釋奠頌不知手舞口詠齊國宋司徒寺碑無色之外方為化城非想之中猶稱火宅楞嚴經有色無色有想無想若非有色若非無色若非有想若非無想詳與李那書若夫衆生無盡世界無窮華嚴經一切法界虗空界等世界芬若披蓮關令尹喜傳真人遊時各各坐蓮華之上一花輒徑十丈逺如散墨法華經假使有一磨以為墨過於東方千國土乃下一點大如微塵又過千國土復下一點如是展轉盡地種墨是諸佛土若算師知其數否善財童子南行未窺華嚴經善財童子問法於五十三參善知識而德雲比邱乃第一也又善財童子歡喜頂禮繞無數匝殷勤瞻仰辭退南行目蓮沙門北遊不見盂蘭盆經目蓮見其亡母在餓鬼中即鉢盛飯往餉其毋一一剎土皆由業緣觀佛三昧經六日出時此地皆悉煙出從須彌山乃至三千大千剎土及八大地獄靡不燒滅未曽有經罪業因緣相續不絶百緣經以是業緣五百世中受毒龍身萬萬僧祇終非常樂藥王藥上經衆僧得聞是五十三佛名者是人於百千萬億阿僧祇劫不墮惡道大集經佛言休息綺語獲十種功德三常樂實事隋書經籍志船涅槃譯言滅度亦曰常樂天宫蹇産起世經其天宫城內雕飾受欲其歡樂不可具説楚辭思蹇産而不釋注蹇産詰曲貌猶傾四大之風樹本曰圓覺經此身四大和合毛髮爪齒皮肉筋骨腦髓垢色皆歸於地唾涕膿血涎沫津液痰淚精氣大小便利皆歸於水暖氣歸火動轉歸風四大各離今日妄身常在何處魔殿崔嵬樓炭經在欲色二界中間别有魔宫華嚴經如來即於口中放大光明名無礙無畏映蔽一切諸魔宫殿終懼三災之火長阿含經三災上際云何若火災起時至光音天為際若水災起時至遍淨天為際若風災起時至果實天為際朱樓寶塔輝煥爭華宣律師住持感應傳樹神即將七寶來至尊所以神力故於一念頃即成四塔髙五十由句又造真珠樓觀及白銀臺於此四塔內各造樓觀具八萬四千炯曰西域志波斯匿王都城東百里大海邊有大塔塔中有小塔髙一丈二尺裝衆寶飾之夜中每有光耀如大火聚云佛涅槃百五歲後龍樹菩薩入大海化龍王龍王以此寶塔奉獻龍樹龍樹受已將施此國地造莊飾嚴好過佛在時經百五十年魔天燒滅則當此土既義暢中土道流遐域顯默同歸華夷俱慕自枕石漱流見諫罷道書始終一槩悟智交養三十餘年春秋八十三古人云道存人亡法師之謂凡我門徒感風徽之緬邈傷咨悟之永滅敢以殘見揚德金石銘曰九流依真後漢書班固九流百家之言靡不窮究三乘歸佛見與李那書道住絶迹慈還接物白帖如來慈心如彼大雲蔭注世界孰是發蒙易初六發蒙昭我慧日齊王屮頭陀寺碑注慧日喻明也攝亂以定本相經年十九踰城出家學道勤行精進禪定闢邪以律齊尚統師傳魏皇初三年曇摩迦羅譯出戒律秦皇雄感蔽理通情王孫偏解逺死滯生太平御覽蜀本紀曰始皇陵有銀蠶金雀以多竒物故俗云秦皇地市漢書揚王孫學黃老之術厚自奉養生無所不致及終令其子曰吾學裸葬以反吾真必無易吾意班固贊曰觀揚王孫之志賢於秦始皇逺矣夫子之悟萬劫獨明寒暑遞易悲欣臯壤家語孔子出聞哭聲至臯魚也曰吾有三哭少而遊學以後吾親一髙尚吾志間吾事君二與友厚而小絶之三立稿而死檀弓孔子之故人曰原壤其母死夫子助之沐槨原壤登木曰久矣豫之不託於音也歌曰貍首之斑然執女手之卷然夫子為弗聞也者而過之炯曰莊子山林與臯壤與使我欣欣然而樂與樂未畢也哀又繼之秋蓬四轉春鴻五響孤松獨秀德音長往節有推遷情無遺想長干寺衆食碑昔炎皇肇訓繫辭神農氏作斫木為耜揉木為耒耒耜之利以教天下稷正修官舜典棄黎民阻飢汝后稷播時百穀信矣民天之言見歐陽頠碑誠哉國寶之義范子計然曰五榖者國之重寶自非道登正覺本願經佛告阿難我以十事致最正覺安住於大般涅槃華嚴經乃至最後涅槃分布其身起廟塔心經注梵語涅槃此云無為行在真空觀佛三昧經過去久逺有佛出世號曰空王火炯曰海録碎事如來藏中性火真空性空真深入於無為般若見罷諫道書則菩薩應化咸同色身婆沙論佛在世時色身受用奘法師傳婆毗吠迦論師於觀自在菩薩立志祈請待見於是觀自在乃為現色身立世阿毗曇論閻浮提衆生色身種種不同諸佛淨土皆為搏食法華論無煩惱衆生住處名為淨土毗婆沙論若以一搏之食起殷淨心奉於僧衆於當來世決定不達飢饉災起證常住者爰乞乳糜涅槃經有人聞常住二字是人生生不墮惡道支僧載外國事佛在貝多樹下坐滿六年長者女以金鉢盛牛乳糜上佛佛於水邊噉糜補尊位者猶假香飯見諫罷道書亦有三心未滅菩薩善戒經菩薩心有上中下七反餘生觀佛三昧經金翅鳥王名曰正音日食一龍王及五百小龍經八千歲死相既現諸龍吐毒不能得食從金剛山直下從大水際至風輪際為風所吹還上金剛如是七返然後命終應會天宫法苑珠林傳云釋迦受食四王奉鉢滅後流行上升兜率彌勒見曰釋迦佛鉢今來至此七日供養還下龍宫就齎龍海智度論阿羅漢常入龍宫食已以鉢授與沙彌令洗鉢中有殘飯數粒沙彌嗅之大香食之甚美況復􅀈居地轉未詳按奘法師西國傳數量之稱謂踰繕那踰繕那者自古聖王一日運行也舊傳一踰繕那四十里矣咸憩珠疑作殊庭漢書上望祀蓬萊之屬幾至殊庭師古曰殊庭蓬萊中仙人庭固以皆種仙禾並資靈粟者矣曹植社頌靈稼阿那一禾千莖拾遺記員嶠之山名環邱上有方湖千里多大鵲髙一丈羣飛於湖際銜采不周之粟於環邱之上粟生穟髙五丈其粒皎然如玉也法師常願以智慧火燒煩惱薪華嚴經智慧火令衆生離障礙苦皆得具足文殊問經住家者為煩惱所燒出家者滅煩惱火普施衆生同餐甘露四分律天帝釋便作是念我今令王慧燈以此瘡死者甚非所以當以天甘露灌其身上瘡即平復况復安居自恣經律異相精舍告成白王遣使請佛安居願學髙年或次第於王城法苑珠林食中有六者一乞食二次第三不作餘食法食四一坐食五一團食亦名節量食六中後不飲漿雜阿含經爾時世尊晨朝著衣持鉢共諸比邱入王舍城乞食猶棲遑於貧里後漢徐稚傳謂茅容曰為我謝郭林宗何為棲棲不遑寧處維摩詰經憶念我昔於貧里而行乞時迦留乞麵若用神通十誦律佛在舍衛國時有長老迦留陀夷得阿羅漢道持鉢入城乞食到一婆羅門舍主人不在婦閉門作煎餅迦留陀夷比邱即入禪定起通從外地沒涌出中庭乃以指彈婦即語夷言縱使眼脫我亦不與而以神力即兩眼脫出復念縱出眼如碗我亦不與即變眼如碗復念縱若倒立我前我亦不與即於前倒立復念縱汝若死我亦不與即入滅受想定心想皆滅無所覺知即語比邱言汝若活者我施與一餅迦留陀夷便出於定婦更刮盆邊即一小麵煎之迦留語言我不須是餅為説法妙即於座上得法眼淨作優婆夷須提請飯致遺豪貴未詳於是思營衆業勝天王經乃往古世廣修淨業願造坊廚涅槃經須達長者七日之內成立大房足三百日禪坊淨處六十三所冬室夏堂各各别異廚坊浴室洗腳之處大小圊厠無不備足庶使應供之僧皆同自然之食百緣經佛在世時王舍城中有一長者其婦生女名曰善愛後求出家世尊告善愛尼言汝今可設飲食供養佛僧尋取佛鉢擲虛空中百味飲食自然盈滿如是次第取千二百五十比邱鉢所飯亦皆滿都令豐足升堂濟濟無勞四輩之頻大集經復有比邱晝夜精勤樂修善法誦讀經典坐禪習慧不舍須臾以是因緣感諸四輩種種供養髙廩峨峨恆有千食之糒詩亦有髙廩萬億及秭水經注澆河西南一百七十里有黃沙望黃沙猶若人委千糒於地其外鐵市銅街晉石苞傳苞為吏到鄴乃販鐵於鄴市中詳與楊僕射書青樓紫陌魏曹植詩青樓臨大道王粲獵賦倚紫陌而並征辛家黑白之里未詳甲第王侯之門漢書張放傳帝賜甲第莫不供施相髙資儲轉衆沐魄經給二十歲儲資糧法師善巧方便佛本行經有釋名為善覺其子名羼提提婆堪教太子兵戎法式其所解知一切凡有二十九種善巧妙術又淨飯王復白仙言我意欲令我子常在云何方便及令幼年勿使舍我漚合含羅未詳四分律世尊般涅槃後百歲毗舍離拔闍子比邱行十事乃至十事非法非毗尼非佛所教已皆在含羅在毗舍離七百阿羅漢集論法毗尼故名七百集法毗尼又感應記祇垣寺殿內簷下有四銀臺兩臺內有毗尼藏黃金為牒白銀為字毗尼律藏是龍王書教授滋生隨年增長假使桑林不雨吕氏春秋湯五年不雨乃以身禱於桑林瓠水揚波漢書上使汲仁郭昌發卒數萬人塞瓠子決河猶厭稻粱永無飢乏加以五鹽具足海録碎事五色鹽出安息國阿含經一切味不過八種一苦二澀三辛四鹹五淡六甜七酢八不了味七菜芳軟荆楚歲時記正月七日為人日以七種菜為羮牟類天廚未詳沈約齊尼淨秀行狀於彼天上彼波利餅將還意欲與今法師有人問何意將餅去答云欲與今法師是又不聽將去紫炯曰星經天廚六星在微宫東北果同香樹栴檀樹經維耶梨國有五百人經厯深山一人卧熟失伴有大栴檀香樹樹神謂窮人言可止留此自相給衣食到春可去窮人還至國中國王病頭痛惟得栴檀香以護病得愈王便令匠臣將窮人往伐取香樹至到樹所使者見樹華果煌煌心不忍伐羮鼎之大殷王未逢未詳按劉向説苑湯時大旱使人持九足鼎祝山川而天大雨糜護之深齊都非擬見移文昆吾在次皆鳴鷲嶺之鐘感應記如來成道已至第三十八年於祇洹精舍重閣講堂上佛告文殊師利菩薩汝往戒壇所鳴鐘召十方天龍及比邱諸大菩薩衆等普集祇洹遊鋭曰大哀經佛在王舍城靈鷲山者古昔諸佛之所居如來威神之所建立詳丹陽碑㿩谷初升同洗龍池之鉢堯典分命羲仲宅嵎夷曰暘谷寅賔出日道宣律師住持感應曰佛告文殊師利我入王舍城受彼國王請我既食訖即命羅睢先將我鉢還於彼龍池洗之徐孝穆集箋注卷四
