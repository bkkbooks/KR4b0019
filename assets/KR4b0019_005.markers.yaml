  - {type: line-break, offset: 0, content: '', id: KR4b0019_WYG_005-1a01}
  - {type: variant, offset: 0, length: 2097, content: 欽定四庫全書徐孝穆集箋注巻五陳徐陵撰呉江呉兆宜注東陽雙林寺傅大士碑夫至人無已屈體申教聖人無名顯用藏迹故維摩詰降同長者之儀維摩經毗耶離城中有長老名維摩詰文殊師利現儒生之像宣律師住持感應傳佛告文殊師利及四天王等教初流行彼汝文殊師利分身變為國王金剛齊菩薩分身為大臣金剛幢菩薩分身為比邱汝等三大士共流通我教提河獻供之旅王城列衆之端見長千寺碑抑號居士師子月佛本生經比邱名蓮華藏多與國王長者居士而為親友時為善宿成實論八戒優婆塞者此言善宿男大經所說智度論有梵志名長爪言十八種大經盡欲讀之當轉法輪釋道安西域志波羅祭斯國佛轉法輪處大品之言皆紹尊位法苑珠林晉周閔家有大品一部以半幅八丈素反覆書之斯則神通應化不可思議者乎法苑珠林諸徳釋云世界初成昔古遺迹相似而現並是佛之神力變化所為故五不可思議中一是佛神力也東陽郡烏傷縣雙林寺傅大士者即其縣人也翻釋名義集娑羅樹東西南北四方各雙故曰雙樹方而悉皆一榮一枯昔巖谿藴徳渭浦呈祥天賜殷宗誕興元相書說命夢帝賚予良弼俾以形旁求于天下說築傅巖之野惟肖爰立作相景侯佐命樊滕是埒漢書傅寛同景侯與樊噲夏侯為髙祖功臣介子揚名甘陳為伍漢書傅介子與甘延壽陳湯俱立功西域東京世載西晉重光惟是良家降神攸託若如本生本行或示縁起千佛因緣經梵王言我見辟支佛受持五戒以戒齋法當行十善觀諸緣起按佛有本生本行二經子長子雲自敘元系漢書司馬遷字子長揚雄字子雲俱有自敘則云補處菩薩仰嗣釋迦法王真子是號彌勒大悲經佛告阿難我為第四次復彌勒當補我處釋迦譜善慧菩薩功行滿足位登十地生兠率天一生補處名聖善白為諸天師瑜伽論若諸國王任持正法名為法王佛在金棺敬福經若受約敕是佛真子賢愚經婆羅門家生一男兒字曰彌勒法苑珠林西云釋迦此云能仁西云彌勒此云慈氏雖三會濟濟華林之道未孚賢愚經彌勒出家學道成最正覺三會說法得蒙度者悉我遺法種福衆生皆得在彼三會之中頌曰挺此四人姿映蔚華林園千尺巖巖穰佉之化猶逺彌勒下生經身長千尺圓光二十丈真諦師傳彌勒佛出由世時須達為蠰佉國大臣名須達多此園地還廣一旬純以七寳徧滿布地奉施如來起為住處梵語蠰佉此云貝但分身世界濟度羣生雜寶經佛法寛廣濟度無涯機有殊源應無恒質自序因緣大宗如此按停水經云觀世音菩薩有五百身在此閻浮提地長阿含經南方天王名毗瑠璃此云增長主領鳩槃荼及薜荔神將䕶閻浮提人示同凡品教化衆生彌勒菩薩亦有五百身在閻浮提種種示現利益衆生故其本迹難得而詳言者也爾其烝烝大孝肅肅惟恭厥行以禮教為宗其言以忠信為本加以風神爽朗氣調清髙流化親朋善和紛諍維摩經善和諍訟言必饒益豈惟更盈毀壁未詳宜僚下丸而已哉莊子徐無鬼篇市南宜僚㺯丸而兩家之難釋至如王戎吏部晉書王戎襲父爵辟相國掾厯吏部黄門郎散騎常侍鄧禹司徒後漢鄧禹傳光武即位於鄗使使者持節拜禹為大司徒禹時年二十四同此時年有懷棲遯仍隠居松山雙林寺棄捨恩愛非梁鴻之並遊見荅周處士書拜辭親老如蘇躭之永别神仙傳蘇躭郴縣人少孤養母至孝忽辭母云受性應仙當違供養母曰汝去使我如何存活曰明年天下疫疾庭中井水簷邊橘樹可以代養至時病者食橘葉飲井水愈自修禪逺壑婆娑論人趣中有修禪發智絶粒長齋奘法師傳䭾那羯磔迦國屬南印度都城東西據山間各有大寺其寺有婆毗吠迦論師於觀自在菩薩絶粒而服水三年立志祈請待見彌勒菩薩非服流霞抱朴子項曼卿修道山中自言至天上遊紫府遇仙人與流霞一杯飲之輒不飢渴若餐朝沆司馬相如大人賦吸沆瀣餐朝霞列仙傳陵陽子春餐朝霞夏食沆瀣太守王烋言其詭詐乃使邦佐幽諸後曹迄至兼旬曾無假疑作叚食増一阿含經有四種食諸入口之物可食噉者是謂叚食於是州鄉媿伏漢法本内傳明帝置佛舍利及經放火燒經並成煨燼道士等大生媿伏佛之舍利放五色光上空如葢覆日映衆逺邇歸依師子月佛本生經比邱即為彌猴說三歸依逃迹山林集一切福徳三昧經昔過去久逺阿僧祗刼有一仙人住山林中名曰最勝具五神通常行慈心肆行蘭若華嚴經願一切衆生常安居止阿蘭若處寂靜不動又釋氏要覽梵言阿蘭若此言空靜又自序云七佛如來十方並現觀佛三昧經毗婆尸佛尸棄佛毗舍婆佛拘留孫佛拘那含牟尼佛迦葉佛釋迦牟尼佛七佛身並紫金色釋尊摩頂法苑珠林第三身心恭敬禮者聞唱佛名便念佛身如在目前手摩其頂除我罪業願受深法華嚴經有諸法師得勝妙法大乗深法每至楗槌應叩增一阿含經佛告阿難汝今連擊楗椎釋氏要覽梵云楗槌此云鐘磬法鼔裁鳴華嚴經普為衆生撃法鼔空界神仙共來行道菩薩處胎經上方七十二億空界菩薩亦來雲集入胎中其外人所見者拳握之内或吐異香婆娑論帝釋欲遊戲時伊鉢羅龍王背上自然有其香手現胷臆之間乍表金色宗門統要世尊於涅槃㑹上以手摩胸告衆云汝等善觀吾紫磨金色之身時有信安縣隋書東陽郡領信安縣比邱僧朔與其同類逺來觀化未及祗肅忽見大士身長丈餘朔等驚慙相趨禮拜虔恭既畢更覩常形又有比邱智勰優婆夷錢滿願等伏膺累載頻覩異儀或見脚長二尺指長五寸餘兩眼光明雙瞳照耀皆為金色並若金錢阿育王經阿育王夫人産生一女一手常巻掌中有一金錢隨取隨生譬李老而相侔老子志畧老子一名李耳兩目日光方瞳綠筋同周文而等狀孟子文王十尺姜嫄所履詩疏姜嫄履大人迹天步可以為儔詩天步艱難河流大屐祖沖之述異記苻健皇始中津監寇登於河中流得大屐一隻長七尺三寸足迹稱屐指長尺餘文深七寸神足宜其相比興起行經辟支引空七反回旋飛還時城内人見此神足舉國歡喜支郎之彥既恥黄晴, SBCK: ''}
