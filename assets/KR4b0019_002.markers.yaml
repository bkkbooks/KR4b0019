  - {type: variant, offset: 20673, length: 1236, content: 車之命後漢書張奐傳小人不明得過州将又周景為豫章刺史辟陳蕃為别駕蕃不就景題别駕輿曰陳仲舉座南陽坐嘯寄以共治後漢書汝南太守宗資以范滂為功曹南陽太守成瑨以岑晊為功曹皆委心聽任二郡為之謠曰汝南太守范孟博南陽宗資主畫諾南陽太守岑公孝𢎞農成瑨但坐嘯東海行歌資其主弼古逸詩寗戚飯牛車下擊牛角而疾商歌桓公授之以政梁竦不好徒為大言後漢梁竦傳竦字叔敬嘗登髙望逺歎息言曰大丈夫處世生當封侯死當廟食如其不然閒居可以養志詩書足以自娯州郡之職徒勞人耳鄧禹生平惟望如此後漢鄧禹傳禹字仲華南陽新野人也光武謂曰我得専封拜生逺來寜欲仕乎禹曰不願也光武曰即如是欲何為禹曰但願明公威徳加於四海禹得效其尺寸垂功名於竹帛耳若棲遲偃仰見詩因事丘中詩丘中有麻桃果三名西京雜記漢武初脩上林苑羣臣各獻果有湘核桃紫文桃金城桃栗園千樹史記燕秦千樹栗此其人與千戶侯等持竿而釣徵聘不來酈元曰磻谿中有泉謂之兹泉積水為陣即太公釣處水次磐石釣處即太公垂釣之所負耒而耕公侯靡屈孟子伊尹耕於有莘之野而樂堯舜之道焉何其髙也盖復休哉如脫推延或遲竝問吾階緣人乏叨簉皇華見與楊僕射書王事無淹公禮将畢既而揚都蕩覆方離獫狁之災詩獫狁孔熾詳與王太尉書越界風塵復蹈輶軒之禮見與楊僕射書屏居空館見與王僧辯書多歴嵗時釁犯靈祗揚雄河東賦靈祗既饗招延禍罰號慕無窮肝膽屠殞煩冤胷臆屈原九章蹇蹇之煩冤兮在樹屏曰荘子引聲歌天地之道近胷臆不自堪居無心奈何無状奈何自裵囘河朔亟積寒暄風患彌留書顧命病日臻既彌留半體枯廢折臂為公雖非羊祜晉羊祜傳祜泰山南城人也封南城侯有善相墓者言祜祖墓所有帝王氣若鑿之則無後祜遂鑿之相者見曰猶出折臂三公而祜竟墮馬折臂位至公而無子跛足而使無慙郤克左傳晉侯使郤克徵㑹於齊齊頃公帷婦人使觀之郤子登婦人笑於房注跛而登階故笑之固以形如槁木心若死灰荘子形固可使如槁木心固可使如死灰匍匐苫廬纔有魂氣詩凡民有䘮匍匐救之䘮大記父母之䘮居倚廬不塗寝苫枕凷南史簡文被閉摛不獲朝謁因感氣疾而卒年七十八贈侍中太子詹事謚貞子夫迷山之客遲遙響於巖崖窮海之賓望孤煙於島嶼魏管寜傳注傅子曰寜在遼東積三十七年乃歸寜之歸也海中遇大風船皆没惟寧乗船自若時夜風晦冥船人盡惑莫知所泊望見有火光輒趨之得島島無居人又無火燼行人咸異焉以為神光之佑也況乃宗均魯衛地匪燕呉車騎相望舟艫朝夕三條不逺班固西都賦披三條之廣路五達非難爾雅五達謂之康信乃闊然遂不蒙問昔桃花之峽長避嬴秦晉陶潛桃花源記晉太元中武陵人捕魚從溪而行忽遇桃花林夾两岸數百步無雜木芳華芬曖落英繽紛漁人異之前行窮林林盡見山山有小口髣髴有光便舍船步入初極狹行四五十步豁然開朗邑室連接雞犬相聞男女被髮怡然竝足見漁人大驚問所從來要還為設酒食云先世避秦難率妻子來此遂與外隔絶不知有漢無論晉魏也既出白太守太守遣人隨而尋之迷不復得路芝草之山遙然滄海未詳猶復漁船可入此下疑脱一句何況平途不兼旬月勞懐既積輒命行人弦望之問見檄周文遲枉歸翰儻二三兄弟能敦昭穆之詩求我漳濱幸問劉楨之疾魏劉楨詩余嬰沈痼疾竄身清漳濱陽春改節竝念将宜扶力為書多不詮次陵白徐孝穆集箋注巻二, SBCK: ''}
