  - {type: variant, offset: 243, length: 2, content: 㢘隅, SBCK: 且歌且詠吾卽呼舍吏責列不答而走反爲憾恚妄相陷辱至六月初遂作盲書便見誣謗聖朝明鑒悉知虛罔唯云吾取徐樞爲臺郞南司檢問了不窮推承訓劾爲信言致成隳免此事􅁈枉天下所無吾市徐樞宅爲錢四萬任人市估文劵歷然不􅀩申理見枉虚巧二者樞是故少府卿鱗之子鱗殞身侯景之役又爲西臺所贈兖州左衛官位甚高未知其子何忝郞署魏晉之前如爲又遠宋齊以降其例甚多如徐愛阮佃夫之子可不得郞官耶紀文卿公向璡皆爲列棘豈冗雜曹郞乎三者樞入身梁朝解褐岳陽王小府墨曹承聖時爲故敬常晉安王諷席文墨具存陜西官爵乃多浮濫更􅀘臺郞不爲勝擢未知何㥯推宅貨官四者徐領軍節度自啓樞爲郞􅃯付􅃟序吾旣不啓據又不爲􅃟職所可相􅀜止是得中侯相聞爲呈啓而已以此見罪一何􅁈濫吾昔在承華是弟所悉行年六十無復儕儔非意餘生忽此誣謗堯有驚於讒説孔將惑於拾塵雖復聖主機明不能委照殿下德高兩憲風美二南億兆歸心衣􅃣有託乆願通啓披訴聖明伏見軍戎多務所以不敢祈冒弟與吾遊眷亟廻星紀故人如此寧不矜歎耶侍言有便云何且爲啓聞一􅀩神鑒照其枉􅀡方殖幽泉無恨􅁅壤伏覲謁帝承明緒言多次服矜遺老曲賜湔濯則殿下前時妄澤匪復偏私遂吳良延薦之恩無王丹所舉之謬吾得方辭武騎永附梁賔雖愧家丞庻呈秋實緣弟深眷故此敬慿于謁非宜益懷􅋺􅁣徐陵白梁貞陽侯與王太尉僧辯書淵明頓首頓首昔自天狼炳曜非無戰陣之風參虎揚芒便有干戈之務至於夏鍾夷羿周厄犬戎漢委珠囊秦亾寶篋彰於史籍可得而聞未有國家殲危遂若當今者也我}
