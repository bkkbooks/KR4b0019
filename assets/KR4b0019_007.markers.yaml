      ', id: KR4b0019_krp_007-bkkkrnewl15}
  - {type: line-break, offset: 260, content: '', id: KR4b0019_WYG_007-1b06}
  - {type: variant, offset: 260, length: 0, content: '', SBCK: 道三辟公車十徵若斯者終}
  - {type: variant, offset: 261, length: 0, content: '', SBCK: 不屈此旣然矣請復詳言昔楚國兩龔同時紆組漢隂二老相擕抱甕兄之幽貞若其鑿坏􅀒石方同形影結綬彈冠無容越楚況乎糞土䕫龍羶臊名器己行所不欲非應及人忽承來音良以多感何則頴陽巢父不曾令薦許由商洛園公未聞求徵綺季斯所未喻高懷而躊躇於矛楯也唯遲山阿近信更惠芳音如或誠言謹便聞奏第夙勞比劇不復多呈答族人梁東海太守長孺書恩報近歲奉使來歸辱彼河淸年中告行并惠以明鏡亟離寒暑雖復時陳梁寉日照孫鸞言慰相思反増離眷劉傅三常侍還又承書札銀鈎甚麗玉疏依然開封伸􅁓破愁爲笑素秋方屇溽暑稍闌體中何如善保元吉藂臺之璧少海之珠何必鄕里所在爲貴卿託身大國旣已積年彼朝英彥理相欽挹方當交辟三命淸官兩宮何乃濶然遲有問也吾七十之歲崦嵫已迫朽老之疾隨年而甚徒懷北邙之切未遂東都之期牽役承閒但有哀頓自歸來鄕國亟徙炎凉牽課疲朽不無辤製而應物隨時未曾編錄旣承今告輒復搜撿行人相繼别簡知音但旣乏新聲全同古樂正恐多慙於恊律致睡於文侯}
  - {type: page-break, offset: 261, content: '', id: KR4b0019_SBCK_007-2a}
  - {type: page-break, offset: 261, content: '', id: KR4b0019_SBCK_007-2b}
  - {type: variant, offset: 262, length: 0, content: '', SBCK: 燕南趙北地角天涯言接末由但以濳欷善敬德中郞竝比境之良􅃟皇華之上求若可輶軒别當委白與李那書籍甚淸徽常懷虛眷山川緬邈河渭像於經星顧望風流長安遠於期日靑要戒節白露爲霜君子惟宜福履多愈雍容廊廟獻納便繁留使催書駐馬成檄車騎將軍賔客盈座丞相長史瞻􅍟有勞脱惠箋繒慰其翹想吾栖遲茂陵之下臥病漳水之濵迫以奄兹難爲砭藥平生壯意竊愛篇章忽覿高文載懷勞佇此後殷儀同至止王人授館用阻斑荆常在公筵敬析名作鏗鏘竝奏能驚趙鞅之䰟輝煥相蕐時瞬安豐之眼山澤晻靄松竹參差若見三􅉄之峰依然四皓之廟甘泉鹵簿盡在淸文扶風輦路悉陳蕐簡}
