  - {type: variant, offset: 4, length: 2, content: 箋注, SBCK: 目錄卷一賦鴛鴦賦詩日華詠雪詠柑子山齋長安道洛陽道二首劉生􅀜山月二首出自薊北門行長想思宛轉歌折楊柳梅花落二首紫騮馬驄馬驅山池應令奉和山池征虜亭送新安王應令别毛尚書秋日别庾正員新亭送别雜曲侍宴和賽漢高帝廟春情鬬雞詠舞隴頭水中婦織流黃烏栖曲二首詠織婦春望春和簡文帝山齋同江詹事登宮城南樓卷二璽書梁禪陳璽書陳高祖􅃯州郡璽書冊命陳公九錫文詔陳文帝登祚尊皇太后詔始興王詔進武帝爲長城公詔卷三表讓五兵尚書表勸進元帝表讓散騎常侍表爲王儀同致仕表爲始興王讓瑯琊二郡太守表讓左僕射初表讓右僕射初表啓成安王讓錄尚書表}
