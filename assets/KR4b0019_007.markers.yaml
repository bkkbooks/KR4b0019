  - {type: page-break, offset: 254, content: '', id: KR4b0019_SBCK_006-13b}
  - {type: variant, offset: 255, length: 0, content: '', SBCK: 昔晉侯不能乗鄭馬趙將不能用楚兵一非水土難爲騁力楊州卑濕厥土塗泥如遇秋霖杳同江漢假令蚩尤重出白起還生控代馬而陵波躡胡靴而湔水終難逞効詎有成功六州勇士雖有百萬十姓豪傑徒勞千億不能爲患斷可知矣昔我平世天下乂安人不識於干戈時無聞於桴鼓故}
  - {type: page-break, offset: 255, content: '', id: KR4b0019_SBCK_006-14a}
  - {type: variant, offset: 256, length: 0, content: '', SBCK: 兇人侯景濟我橫江天歩中危實由􅁯戰自亂離已久人解用兵女子無愧於韓彭童兒不􅊋於衞霍吳鈎甚利蜀甲􅊋輕槊動風霜弩穿金石高樓大艦槩日陵雲叱咤而起風雷吹嘘如倒山嶽侯車騎國家重將分陜上流近隔以邊塵時􅉛表疏王途旣泰貢賦相望尋令子弟侍奉京邑蕭太保龍驤於賁海王儀同虎視於洞庭若望高烽便當投袂何則凡諸將帥各䕶家鄕非􅀡吾人獨憂宗社日者頻辱司馬行臺及諸公有告裴行臺當今方召此諸賢莫非英傑其餘軍士悉是驍雄庸蜀氐羌之兵烏丸百虜之騎以此衆戰誰能禦之何爲比吾陪薄相懸何惡諸君身名俱滅來告以細柳之軍踰於灞上吾恐今之趙括不及廉頗也近張舍人至始奉嚴勅朝廷遣劉叔經仍往啓聞願達丹誠用停王赫伏計天􅄌理當懸照此身日月所鑒天地所明豈敢虚言欺望宸極足下旣未知始末容有疑恠大軍多士希惠矜弘量非此}
  - {type: page-break, offset: 256, content: '', id: KR4b0019_SBCK_006-14b}
  - {type: variant, offset: 257, length: 1, content: 各, SBCK: 時騰表疏幸停師旅已存盟信庶其小徐孝穆集卷六終徐孝穆集卷七陳郯徐陵著明東海屠隆評書答周處士書仰披􅂠翰甚慰翹結承歸來天目得肆閑居差有弄玉之俱仙非無孟光之同隱優游俯仰極素女之經文升降盈虛盡軒皇之圖藝雖復考槃在阿不爲獨宿詎勞金液唯飮玉泉比夫煑石紛紜終年不爛燒丹辛苦至老方成及其得道㝠眞何勞逸之相懸也又承有方生亦在天目理當仰禀明師總斯秘要豈如張陵弟子}
  - {type: page-break, offset: 257, content: '', id: KR4b0019_SBCK_006-16a}
