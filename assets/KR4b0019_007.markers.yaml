  - {type: variant, offset: 246, length: 2, content: 文論, SBCK: 梁膺龍圖而受命御鳳邸以承天軒頊比於諸王湯武方於兒戲三光有乂四海無波靈貺咸臻表裏禔福非日非月蒼生仰其照臨如雲如􅀨天下􅀩其恩䕃而屯亨有數剝極爲灾梟獍豺狼肆逞兇逆後主誕資上聖光啓中興大剪􅄷讐方平宗社雖復瀟湘舉斧庸蜀彎􅃓凡厥兇徒誰不殲撲豈圖天未悔禍喪亂薦臻羌虜無厭乗此多難虔劉我南國蕩覆我西京奉問驚號肝膽崩潰雖復金行版蕩火政淪亾綠林靑犢之羣黑山白馬之卒八王故事曾未混淆九州春秋誰云禍亂昔隆周從播皆慿晉鄭之功强漢阽危終假虚牟之力今者武皇之子無復一人藐是孤孫還同三叛等子頺而爲暴同劉芳而入􅀜乞命諸戎勢何支乆孤宗室之長爰自布衣皇運之初彌承天德何則據鞍輟哭雖紹霸圖獨居掩涕終討家怨孤二三昆季方可戴天被此恩慈如何酧答所以徐彭之役不希輕軀哀荷之誠乆聞朝聽况復􅀖家不造至此橫流宗社無依何所逃責因以提戈􅀒劒臥泣行號言念荊巫志雪讎恥大齊觀書有洛輯瑞榮河功格蒼旻德滿天地慈孝之道通於百靈仁信之風覃於萬國是以日月所照舟車所通候海水以來賔瞻蒼雲以奉貢昔自軒農炎昊曾無宣國之規虞夏商周非有伐戎之略豈知華夷仰德遠近同心穀價無堯湯之憂糧儲同水火之賤精兵利器勢勇雷霆天馬龍媒量比山谷斯固開闢已來未之有也至於親隣之道夙契逾􅀷無改曩懷尊感彌篤以爲興亡繼絕事昞前經推擇庸虚命守宗祀方欲仰慿神武淸我寇讎㫖喻難違諸懷更恧明公誕膺時運光賛本朝勒瑞姜璜書名何􅂦故以通期管樂宜契風雲戮不}
