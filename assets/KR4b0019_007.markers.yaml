  - {type: variant, offset: 266, length: 3, content: 荅湘東, SBCK: 皇帝旣而黑山巨盗慿陵上國白水彊胡虔劉中夏公傾其產業募其驍雄思報皇儲累殲鯨寇屬幽風有􅁚代邸方降搜荆楚之英才資班輸之妙畧百樓忽起登雲霄而俯臨萬弩俱張隨雷霆而並震揚兵於九天之上决勝於千里之中殪彼羣兇皆無旋踵陳寶應至懷反叛客引周廸資其食力更事窺窬公奉詔崇朝飮氷將力前茅後勁歩驟奔馳仍向甌閩殄其巢窟若夫鳴虵之洞深谷隱於蒼天飛猿之嶺喬樹參於雲日宜越艇而登嶠􅀩燕犀而渉江威武紛紜震山風海於是咸俘僞師悉據高墉爰泊滄溟莫不懲乂旣而齊人無信將謀郢藩鬬艦戈船窺江淹漢公纔聞羽檄遽禀師期馳襲荆鄖應時燒蕩方欲宣威隴汧大討梁蕐屬上將之韜光逢中台之掩曜大建三年薨於軍幕爾乃靑烏拍墓白鶺標墳林有逃車樹同蕐蓋前旍熊軾後乗龍轜介士發三河之民哀鐃同駟馬之曲長安傳坐恩禮盛於西京襄陽墮淚悲慟喧於南峴裴使君墓誌銘君五音之候兼其方牧八陣之圖窮其巧變用能戰必勝攻必取督稱無難兵號解煩朝飛火箭夜聳雲梯燧􅁚從奔聮狼巳合於是厥顏不撓極咍諸戎龎德高聲肆言羣逆胡夷總至猶持子路之纓鋒刅相交終荷溫生之節毎以輕財篻籜義重嵩衡割宅字貧友之􅀌開門延故人之殯篤好朋遊居常滿席毎至鮮雲藹藹披}
