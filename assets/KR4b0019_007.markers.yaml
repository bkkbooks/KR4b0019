  - {type: variant, offset: 126, length: 0, content: '', SBCK: 裹糧坐甲固敵是求方欲大討於秦崤敦修於與睦叶謀上相爰納朕躬思所以敬答忠􅈴用申朝典可進爵爲長城縣公徐孝穆集卷二終徐孝穆集卷三陳郯徐陵著明東海屠隆評表讓五兵尚書表臣聞仲尼大聖猶云書不盡言士衡高才嘗稱文不逮意臣比哀痾日積思緒茫然頻託朋游爲裁章表雖復陳琳健筆未盡愚懷孫惠詞人頗加煩飾所以高天􅃡邈弗降昭回瞻拜絲綸更增憂憊臣雖不敏弱􅃣登朝伊言承華豫遊多士晚逢興運爰濫寵私爾時四郊多壘七雄分爭國家制度日不暇給趙宮論受命之宜隨邑奏升壇之禮而叅聞秘計弗解單于之兵飛箭馳書未動聊城之將不期枚乗老􅅱忽降時恩馮唐暮年見申明主擢宰京邑朝坐棘林遂致洛陽無雨非比長安多盜其宜屏錮用寘嚴科猶處名僚乆爲叨竊但著書天禄雖如劉向朔望登朝轉同王隱於其朽劣尚可從容司會文昌邈然非據勸進元帝表封唐有聖還承帝嚳之家居代維賢終纂高皇之祚無爲稱於華舄至治表於垂衣而撥亂反正非聞前古至如金行重作源出東筦炎運猶昌枝分南頓豈得掩顯姓於軒轅非才子於顓頊莫不因時多難俱繼神宗者}
