  - {type: variant, offset: 238, length: 1, content: 志, SBCK: 姦謀而非爲􅀖之勝略也抑又聞之雲師火帝澆淳乃異其風龍躍麟驚王霸雖殊其道莫不崇君親以詔物敦敬養以治民預有􅀖司曾無隆㬱吾奉違溫淸仍屬亂離冦虜猖狂公私播越蕭軒靡御王舫誰持瞻望鄕􅀜何心天地自非生慿廪竹源出空枽行路含情猶其相愍常謂擇官而仕非曰孝家擇事而趨非云忠國况乎欽承有道驂駕前王郞吏明經鴟鳶知禮廵方省化咸問高年東序西膠皆尊􅂄耋吾以圭璋玉帛通聘來朝屬世道之屯期鍾生民之否運兼年累載無申元􅀡之祈銜泣吞聲長對公閭之怒情禮之訢將同逆鱗忠孝之言皆應齚舌是所不圖也非所仰望也且天倫之愛何得忘懷妻子之情誰能無累夫以淸河公主之貴餘姚書佐之家莫限高卑皆被驅略自東南醜虜抄販饑民臺署郞官俱餒墻壁况吾生離􅋱别多歷暄寒孀室嬰兒何可言念如得身還鄕土躬自推求猶冀提擕俱免凶虐夫四聪不逹華陽君所謂亂臣百姓無􅁈孫叔敖稱爲良相足下高才重譽叅賛經綸非豹非􅆛聞詩聞禮而中朝大議曾未矜論淸禁嘉謀安能相及諤諤非周舍容容􅀋胡廣何其無諍臣哉歲月如流平生何幾晨看旅鴈心赴江淮昏望牽牛情馳揚越朝千悲而掩泣夜萬緒而廽腸不自知其爲生不自知其爲􅂮}
