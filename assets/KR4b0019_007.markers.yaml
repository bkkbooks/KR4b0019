  - {type: variant, offset: 221, length: 2, content: 巻末, SBCK: 非復危􅀖計彼中途便當靜晏自斯以北桴鼓不鳴自此以南封疆未壹如其境外脱殞輕軀幸非邊吏之羞何在匹夫之命又此賔遊通無貨殖忝非韓起聘鄭私買玉環吳札過徐躬要寶劒由来宴錫凡厥囊裝行役淹畱皆巳虛罄散有限之微財供無期之久客斯可知矣且據圖刎首愚者不爲運斧全身庸流所鑒何則生輕一髮自重千鈞不以賈盜明矣骨肉不任充􅂦爼皮毛不足入貨財盜有道焉吾無憂矣又公家遣使脱有資須本朝非隆平之時遊客豈皇華之勢輕裝獨宿非勞聚􅈀之儀微騎間行寧望輶軒之禮歸人將從私具驢騾緣道亭郵唯希蔬粟若曰畱之無煩於執事遣之有費於官司或以顚沛爲言或云資裝可懼固非通論皆是外篇斯所未喻三也又若以吾徒應還矦景矦景凶􅊇殱我國家天下含靈人懷憤厲旣不􅀗投身社稷衛難乘輿四冡磔􅃖􅀹千刀剸王莾安所謂俛首頓膝歸奉冦讐佩弭腰鞬爲其皁􅀠日者通和方敦曩睦凶人徂詐遂駭狼心頗疑宋萬之誅彌懼荀罃之請所以奔蹄勁角專恣慿陵凡我行人徧膺讐憾政復􅉁觔醢骨抽舌􅊥肝於彼凶情猶當未雪海內之所知也君矦之所具焉又聞本朝王公都人士女風行雨散東播西流京邑丘墟葌蓬蕭瑟偃師還望咸爲草萊㶚陵囘首俱沾霜露此又君之所知也彼以何義爭免冦讐我以何親爭歸委質昔鉅平貴將懸重於陸公叔向}
