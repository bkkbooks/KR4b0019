  - {type: line-break, offset: 29, content: '', id: KR4b0019_WYG_007-1a03}
  - {type: variant, offset: 35, length: 3, content: 名行簒, SBCK: 民歸含靈於仁壽之域上德不德無爲以爲夏長春生顯仁藏用忠信爲寶風雨弗􅄽仁惠爲基牛羊勿踐功成治定樂奏咸雲安上治民禮兼文質物色丘園衣裾里巷朝多君子野無遺賢菽粟同水火之饒工啇富猗頓之旅是以天無蘊寳地有呈祥潏露卿雲朝團曉映山車澤馬服馭登閑旣景煥於圖書方葳􅅋於史諜高勲踰於􅁚緯積德冠於嵩華固無得而稱者矣朕又聞之前王宰世茂賞尊賢式樹蕃長總征羣伯二南崇絕四履遐曠泱泱表海祚土維齊巖巖㤗山俾矦於魯抑又勤王反鄭夾輔遷周召伯之命斯隆河陽之禮咸備况復經營宇宙寧唯斷鰲足之功弘濟蒼生非􅀡鑿龍門之嶮而疇庸報德寂爾無聞朕所以垂拱當宁載懷慙悸者也今授公相國以南豫州之陳畱南丹陽宣城揚州之吳興東陽新安新寧南徐州之義興江州之鄱陽臨川十郡封公爲陳公錫茲靑土苴以白茅爰定爾􅀖用建冡社昔旦奭分陜俱爲保師􅀳鄭諸矦咸作卿士兼其內外禮實攸宜今命使持節兼太尉王通授相國印綬陳公璽紱使持節兼司空王瑒授陳公茅土金獸符第一至第五左竹使符第一至第十相國秩踰三鉉任總百司位絶朝班禮由事革其以相國總百揆除錄尚書之號上所假節侍中貂蟬中書監印章中外都督太傅印綬義興公印策其鎭衛大將軍揚州牧如故又加公九錫其敬聽後命以公禮爲楨􅆬律等衘策四維皆舉八柄有章是用錫公大輅戎輅各一玄牡二駟以公賤寶崇榖疏爵待農室富京坻民知榮辱是用錫公衮冕之服赤舄副焉以公調理隂陽爕諧風雅三靈允降萬國同和是用錫公軒縣之樂六佾之舞以公宣導王猷弘闡風教光景所照鞮􅁚必通是用錫公朱戸以居以公抑揚淸濁褒德進賢髦士盈朝幽人虛谷是用錫公納陛以登以公嶷然廊廟爲世鎔範折衝四表臨御八􅂽是用錫公武賁之士三百人以公執茲明罰期在刑措􅁚㳟無赦干紀必誅是用錫公斧􅃏各一以公英猷遠量跨厲嵩溟抱一車書括囊寰宇是用錫公彤弓一彤矢百玈弓十玈矢千以公天經地義貫徹幽明春露秋霜允㳟粢盛是用錫公秬鬯一卣圭瓚副焉陳國置丞相以下一遵舊式往欽哉其㳟循朕命克相皇天弘建􅀖家允興洪業以光我高祖之休命詔陳文帝登祚尊皇太后詔朕以虛薄才非弘濟}
