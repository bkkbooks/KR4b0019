  - {type: variant, offset: 7, length: 1, content: 䟦, SBCK: 啓謝兒報坐事付治中啓謝敇賚燭監賞荅齊國移文啓謝敇賜祀三皇五帝餘饌啓謝賚麕啓謝賚蛤啓謝東宮賚蛤蜊啓謝敇賚烏賊啓卷四書武皇帝作相時與嶺南酋豪書與楊僕射書與王僧辨書卷五書與顧記室書梁貞陽侯與王太尉僧辨書爲王太尉僧辨荅貞陽侯書梁貞陽侯荅王太尉書荅諸求官人書代梁貞陽侯與荀昻兄弟書荅周主論和親書卷六書梁貞陽侯重與王太尉書王太尉僧辨荅貞陽侯書梁貞陽侯與陳司空書代陳司空荅書梁貞陽侯重與裴之横書裴之橫荅書貞陽侯荅王太尉書爲陳高祖與周宰相書武皇帝作相時與北齊廣陵城主書卷七書荅周處士書荅族人梁東海太守長孺書與李那書報尹義尚書在北齊與宗室書與王吳郡僧智書荅李顒之書與周􅃁宰宇文䕶論邊境事書與章司空昭達書諫仁山深法師罷道書與天台智者大師書重與天台智者大師書重與天台智者大師書上智者法師書卷八頌皇太子臨辟雍頌銘太極殿銘麈尾銘序玉臺新詠序移文爲䕶軍長史王質移文移齊文檄文檄周文卷九碑徐州刺史侯安都德政碑廣州刺史歐陽顧德政碑晉陵太守王厲德政碑孝義寺碑齊國宋司徒寺碑東陽䨇林寺傅大士碑天台山舘徐則法師碑長干寺衆食碑丹陽上庸路碑卷十哀冊陳文皇帝哀冊文墓誌司空河東康簡王墓誌銘司空章昭達墓誌銘裴使君墓誌銘徐孝穆集目錄終徐孝穆集卷一陳郯徐陵著明東海屠隆評賦鴛鴦賦飛飛兮海濵去去兮迎春炎皇之季女織素之佳人未若宋玉之小史含情而􅂮憶少婦之生離恨新㛰之無子旣交頸於千年亦相隨于萬里山雞映水那自得孤鸞照鏡不成雙天下眞成長合會無勝比翼兩鴛鴦觀其哢吭浮沈輕軀瀺灂拂荇戲而波散排荷翻而水落特訝鴛鴦鳥長情眞可念許處勝人多何時肯相厭聞道鴛鴦一鳥名敎人如有逐春情不見臨卭卓家女秪爲琴中作許聲詩日華朝暉爛曲池夕照滿西陂復有當晝景江上鑠光儀時從高浪歇乍逐細波移一在雕梁上詎比扶桑枝詠雪瓊林玄圃葉桂樹日南華豈若天庭瑞輕雪帶風斜三農喜盈尺六出舞崇華明朝闕門外應見海神車詠甘子朱實挺江南苞品擅珍淑上林雜嘉樹江潭間修竹萬室擬封家千株挺荆國綠葉萋以布素榮芬且郁得陳終宴歡良垂雲雨育山齋桃源驚往客寉嶠斷來賔復有風雲處蕭條無俗人寒山微有雪石路本無塵竹徑朦朧巧茅齋結構新燒香披道記懸鏡壓山神砌水何年溜簷桐幾度春雲霞一巳絕寧辨漢將秦長安道輦道乗雙闕豪雄被五都橫橋􅁚天漢法駕應坤圖韓康賣良藥董偃鬻明珠喧喧擁車騎非但執金吾洛陽道綠柳三春暗紅塵百戲多東門向金馬南陌接銅駝乗軒翼葆吹飛蓋響鳴珂潘郞車欲滿無奈擲如何其二洛陽馳道上春日起塵埃濯龍望如水河橋渡似雷聞珂知馬蹀傍幔見甍開相看不得語密意眼中來劉生劉生殊倜儻任俠遍京華戚里驚鳴筑平陽吹怨笳俗儒排石氏新室是誰家高才被擯壓自古共憐嗟􅀜山月關山三五月客子憶秦川思婦高樓上當牕應未眠星旗映踈勒雲陣上祁連戰氣今如此從軍復幾年其二月出柳城東微雲掩復通蒼茫縈白暈蕭瑟帶長風羌兵燒上郡胡騎獵雲中將軍擁節起戰士夜鳴􅃓出自薊北門行薊北聊長望黃昏心獨愁燕然􅍟古刹代郡隱城樓屢戰橋恒斷長氷塹不流天雲如地陣漢月帶胡秋乞土泥函谷接䋲縳凉州平生燕頷相會自去封矦長相思長相思望歸難傳聞更始戍樓蘭龍城遠雁門寒愁來瘦轉劇衣帶自然寛念君今不見誰爲抱腰看宛轉歌七夕天河白露明八月濤水秋風驚樓中恒聞哀曲響塘上復有苦辛行不解何意悲秋氣􅀡置無秋悲自生不怨前堦促織鳴偏愁便路擣衣聲别燕差池自有返離嬋寂莫詎含情雲聚含情四望臺月冷相思九重觀欲題芍藥詩不成來採芙蓉花巳散金樽送曲韓娥起玉柱調絲楚妃勸翠眉結恨不復開寶􅁂迎秋度前亂湘妃拭淚洒貞筠行樂翫花何處人歩歩香飛金箔履盈盈扇掩􅃢瑚脣巳言採桑期陌上復能解珮就江濵競入華堂要花枕爭開羽帳奉華茵不惜獨眠前下鈎欲許便作後來新後來瞑瞑同匡床可憐顏色無比方誰能巧笑時窺井乍取新聲舉遶梁宿處留嬌墮黃珥鏡前含笑弄明璫卷葹摘心心不盡茱萸折葉葉更芳巳聞能歌洞簫賦詎是故愛邯鄲倡折楊柳嫋嫋河堤樹依依魏主營江陵有舊曲洛下作新聲妾􅍟長楊􅁐君登高柳城春還應共見蕩子太無情梅花落臘月正月早驚春衆花未發梅花新可憐芬芳臨玉臺朝攀晚折還復開長安年少多輕薄兩兩常唱梅花落蒲酌金杯催玉柱落梅樹下宜歌舞金谷萬株連綺甍梅花密處藏嬌鸎桃李佳人欲相照摘葉牽花來竝笑楊柳條靑樓上輕梅花色白雪中明橫􅅇短簫悽復切誰知栢梁聲不絕其二􅍟戸一株梅新花屢發材鷰拾還蓮井風吹上鏡臺倡家愁思妾樓上獨徘徊啼和竹葉錦笑罷未能裁紫騮馬玉鐙繡􅆞鬃金鞍錦覆幪風驚塵未起草淺埒猶空角􅃓連兩兎珠彈落雙鴻日斜馳逐罷連翩還上東驄馬驅白馬號龍駒雕鞍名鏤衢諸兄二千石小婦字羅敷倚端輕掃史召募繫休屠塞外多風雪城中絕詔書空憶長楸下連蹀復連􅘠山池應令畵舸圖仙獸飛艎挂采斿榜人事輕漿約女理銀鈎細萍時帶檝低荷乍入舟猿啼知谷晚蟬思覺山秋奉和山池羅浮無定所鬱鳥屢遷移不覺因風􅀨何時入後池樓臺非一勢臨玩自多奇雲生􅍟戸石猨掛入欄枝征虜亭送新安王應令鳳吹臨南浦神駕餞東平亭廻漳水乗斾轉洛濵笙地凍斑輪響風嚴羽蓋輕燒田雲色暗古樹雪花明岐路一廻首流襟動睿情别毛尚書顧子厲風規歸來振羽儀嗟}
