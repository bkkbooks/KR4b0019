  - {type: variant, offset: 254, length: 0, content: '', SBCK: 方其禍亂譬彼虔劉者也吾謬以庸薄屬當興運自昔登庸淸諸百越徐聞浪泊靡不征行銀洞珠宮所在淸乂自還麾南極伐逆東都宣力驅馳亟淹寒暑六延梁社十剪强寇黃帝與􅃖尤七十戰魏祖在軍中三十年方厥劬勞未若勤苦加以百神所感明靈應期萬里徂征虬龍表瑞於是中軍勇銳上將橫行承此休符遂興王業梁氏以天祿斯改期運永終欽若唐風推其􅂦命吾驚惶三讓拜手陳辭盈庭公卿稽顙敦偪眷言頴水徒抱素心尚想汾陽無因高蹈猥以庸薄遂膺天寵去月乙亥昇禮太壇言念遷徊但有慚愧昔賔門之始境外無交雖遣行人未申嘉好今上天有命光膺寶曆永興周室方同斷金我運惟新宜修朝聘今遣侍中都官尚書周弘正衘使長安故指有白陳某白武皇帝作相時與北齊廣陵城主書籍甚英風常懷眷屬封疆有限寤寐增勞辱此月九日告深慰情佇方秋尚􅀬體中何如戎帳艱辛無乃爲弊吾以庸薄謬膺台鉉旣荷先帝㧞擢之恩兼􅀩今主責成之寄政以皇齊大德世紹和風方藉威靈庶平讐恥提携小國願預藩臣還詔哀矜許垂容納奉勅須質便遣入朝部下諸將哀告誠節一兒一弟無所遺恡立志立義無􅀒上天但故丞相諸子及湛海珍等並依勅㫖馳遣渡江主上又遣吏部尚書王通鴻臚卿謝岐等至和州與司馬行臺共爲盟誓而蕭􅁤等决信叛亾苟相陵易鬱從東道馳至北郊旣逼宮闈無容静黙兩兩相􅍟俱有損傷彼聞人馬因此奔散且置兵之地溝澗且多退兵之時投赴相積近遣張都來此具是行人所見但廣陵建業纔隔一江戰場去岸不盈五里軍人退散理反鄕家綠岸村人復有舟檝且蘆簰荻筏竟浦浮江千百爲羣前後相繼吾又勒兵案甲不聽討捕若無恐懼並應安達假使在此不可更生至彼而殂差非吾過如其枉理必是興軍見伐於有道之人加兵於無罪之國若彼王師如此又是違盟后十皇天山川社稷察其怨語寧容相祐辱告承上黨殿下及匹屢領軍應來江右師出無名此是和義小之事大差無違禮彼之陵我自是乖言玄天所伐匹馬無違翻見怨尤一何非理若彼􅀑神有知寧可斯背􅀑神無知何用盟歃去歲抑達磨等石頭天井連月亢陽三子纔降連冬大雪黃袍盡没白帳皆浮旣因以之泥塗兼加之以疾疫蕭裴旣還雲霧便除從爾以來稍成災旱定知衣冠之國禮樂相承天道不言不容都滅長江􅄅渺巨浪湯湯如鬬艦舟師詎有深利近梁山之戰卽是前車蕪湖之役可爲明}
