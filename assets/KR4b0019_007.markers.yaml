  - {type: variant, offset: 252, length: 0, content: '', SBCK: 豈不休哉言念此私但以號咽蕭淵明頓首爲王太尉僧辯答貞陽侯書孤子僧辯頓首頓首席威卿反命具有奉答馬嵩仁至又奉去月二十八日誨增用傾悚秦爲不道西都失守率土臣妾莫不驚惶喪君有君實惟典禮繼世嗣曆明於通誥所以百辟羣司四方岳牧共立大計僉議所歸故紹晉安殿下用傳寶祚樹立之宜無由遠謀鄰國足下宗枝蕃戚德譽早隆旣身限北庭事隔􅋌賛今者借助齊主楊斾南轅但嗣守洪基卽旣其主若阿衡帝載誠所推揖弘佐中興誰曰不可所望齊朝永存信誓謹當命北舟人奉迎麾駕無容進枉齊兵遠於江表仰冀弼諧時政用極奮庸但江東之地數千餘里民附國險水陸衿帶若舊京從命楊徐承㫖又恐西南之地二十餘州不卽威懷容爲齊國之患而糧裹之宜更遲動靜祗展之日冀在一二謹因馬嵩仁并遣眞威將軍通􅀡郞散騎常侍馬瑱口宣諮述孤子王僧辯頓首頓首梁貞陽侯答王太尉書姜常侍暠至復枉去月三十日告具公所懷良以􅁣息孤雖庸薄不及通賢猶曰生民寧無心識自皇家禍亂亟積寒暄九州萬國之人蟠木流沙之地莫不行號卧泣想望休平何况於孤預在宗室家荷報雪之恩身􅀩鞠養之愛者先皇之慈也烝嘗不絕於私廟子弟得嗣於南藩者後主之惠也朱方之地建業之都誰家丘陵誰家宮廟豈有爲人臣子荷此恩靈親執干戈自殉家國公之忠孝信感人神公之盟誓事同懸􅁚雖復宗盟不造骨肉爲讎安可相期盡如蕭􅊫耶古者天子六軍是爲萬乗今日凶荒致闕斯禮偏禆將挍尚握精兵州郡官曹各有交吏未有居稱扆座行曰乗輿遂無五尺之童高謝千人之長於公明允意復云何國家彫荒旣乏屯衛皇齊與睦幸惠優矜何乃自起趦趄茍違隣德克勘禍亂欲立功名咸自軍師豈在芻􅀠湛海珍等前朝舊將差匪齊人分給羸兵卽是梁甲非云背信豈曰渝盟朝野群雄何所携貳且公天資命世再造皇家梁代之桓文蕭宗之伊管誰其遠近不禀英謨如有姦回正速齊斧尚何憂於共工何畏於有苗哉所覽來書旣爲疑難上黨王恭承朝旨不敢相同方篤隣和不容全異如須滅損更遲行人張廷尉種等所具此無多及蕭淵明頓首答諸求官人書自古有吏部尚書者品藻人倫簡其才能尋其門胄逐其少多量其官爵但古來數千年非無明時也非無明主也自有才用雖美階級不通門戸雖高官資殊屈若斯人者其例甚多請問諸君此是何義夫一千錢一斛米之多少猶􅀜相椂况復皇朝官爵理係玄天內典謂之爲業外書稱之爲命五行有驛馬之言六甲有官􅀑之說必令驛馬時發官鬼尅身所望借榮便當果遂如其不爾决是難諧豈可改尚書作官鬼驅老僕爲驛馬耶若見問尚書何不分判用與不用許與不許僕答云君非屈滯豈可相期决言應果若今驛馬差爽便是􅆾信此􅀜君命僕何以相答耶若朝散之流行止之屬門戸相似人才不殊選家斟酌無能爲爾若陟大位淸官悉由玄命夫人君賔用竝是前緣故宋文帝云人豈無運命每有好官缺輒憶羊玄保梁武帝云世間人言有目色我特不目色范悌自此而論豈非前業且世諺云圖官在亂世覓富在荒年梁孝元帝承侯景之凶荒王太尉接荆州之禍敗爾時喪亂無復典章故使官方窮此紛雜自紹泰太平及永定中聖朝草創爾時州州自帝郡郡稱王天下干戈尚無條序兼以府庫空虛賞賜懸乏白銀之寶難得黃􅁓之板易營假以官榮代於錢絹義在撫綏無計多少又有非舊非勲非地非才託節將而求官因時人以買位賣官旣賤皆爲淸顯故員外常侍路上比肩諮議參軍市中無數四軍五挍車載斗量豈是朝章應其如此今衣􅃣禮樂日富年華主上體成王之風太傅弘周公之德西戎北狄畏我王威時旣淸矣時旣平矣何可猶作亂世意而覓非分之官耶凡人所以稱屈滯者身巳不無寸能官又不及父祖旣是明時可以於邑所見諸君多踰本分猶言太屈未喻高懷若問梁朝朱領軍等竝爲卿相此不踰其本分耶此天子所用非􅀜􅃟序舊章秦有車府令趙高􅀡爲丞相漢有高廟令田千秋亦爲丞相此復可爲例耶僕七十之歲朝思夕計竝願與諸賢爲眞善知識曾無嫌􅂩差可周旋非欲令君作此怨訴但忝衡流應須粉墨庻其允當無􅀒朝寄耳去年疾患亦餘氣息不能相答通作此書所望諸賢􅀷明鄙意徐君白代梁貞陽侯與荀昻兄弟書張佛奴至未枉還告但以勞悒夫興亡繼絕往帝之通規分災䘏患聖王之恒典自敦龎旣散詐僞萌生時託親隣信有澆慝大齊道􅃣三皇風高九代仁信之本關於至誠言與之恩由於孝德孤謬􅀩殊奬還嗣本朝勑諭分明言誓殊重若使􅀖家克定境內無虞凡廣陵歷陽皆許見還白水黃河屢奉然諾彛章禮數莫不優華斯乃不世之殊恩寧是悠常之恒事王太尉勲踰呂望德􅃣伊衡凡厥英謀筭靡遺策豈容當滔天之巨寇違大國之隆恩計彼賢明必當不爾卿維兄及弟莫非雄才江外風塵不染兇寇賈氏三虎豈獨貴於前修荀家八龍信服在於今日近者州司不道或致流言朝聽矜明巳如前及想謀元宰善保良圖南道主人以相付也見所答東海徐湛書粗且來意昔恒慿莒衆文用秦政是假隣國之威以備非常之變若使江東宰匠具領齊恩時命封疆遠相迎接故常􅂝諸舊􅀠率我賔遊朝服簮纓􅀡拜園寢梁人望國自合水而浮舟齊師言歸指滄江而廻斾如其彼相未悟良機將恐戎麾遂踐京邑若其求成取敗豈謂和風龍馬雲旗差不相渉一二復令張佛奴口具相見在近此不多及蕭淵明疏答周主論和親書使人使持節車騎大將軍儀同三司大都督治司城使主杜子暉忠軍山遂伯使副鮑宏等至省告具懷夫聖君明辟司御兆民則天􅁚地佇育黔首故張旜以往拭玉而來同在蒼生恢宏文武雖毁戈鑄㦸未擬上皇散馬休牛載懷􅅯伯非期與睦忽爽和風奚用殲師信由天討追尋曩好歎想兼懷言覿今書甫承家難知以􅃁卿執政擅同淵藪令尹當朝妄專征伐無君之讁俾墜其師無將之誅巳從司寇刑名旣徐孝穆集卷五終徐孝穆集卷六陳郯徐陵著明東海屠隆評書梁貞陽侯重與王太尉書淵明頓首頓首席威卿等還枉此月十四日告披覽未周良深􅁣息昔長平建策猶聞蝕昴之徵疎勒效忠時致飛泉之感豈在余凉德書不盡言遂使吾賢猶迷所執斯故衘哀掩涙仍復披陳者也􅀌以庸薄寧有霸圖侯服于周常懼盈滿豈望身居黃屋手御靑綸揖讓而􅍟三靈端委而朝百辟詢諸圉牧莫不皆知援誓神明固自無爽但大齊仁聖之道􅀜於至誠睦隣之懷由於孝德遂􅀩􅊋奬歸嗣本朝拜首陳辭敦誘彌廣旣而仇讐未殄方慿大國之威宗祏阽危尤仰親仁之德僶俛恩寄號靦惟深而勅諭分明信誓􅊋重乃云􅀖家有乂社稷無虞凡廣陵歷陽皆許見還白水黃河屢奉然諾至於夏藩衝要控遏上流且命强兵爲我臨據若其自有精甲能捍醜徒並用還梁皆如前㫖以􅀌頻經沗竊屢守淮肥門生故吏遍於江右凡諸部曲竝使招携投赴戎行前後雲集霜戈雪㦸無非武庫之兵龍甲犀渠皆是雲臺之仗文物以紀之聲名以發之斯實不世之隆恩寧曰循常之恒禮明公固天所授弘濟本朝曲阜同功營丘等烈若夫伊尹庖厨賤宰霍光階闥小臣諸􅁑亮無應變之才管夷吾非王者之相論其世業較彼勤勞書契已來罕有明德且程嬰之義自古爲難荀息之忠良以喜慰但先朝秉玉鏡之符御金輪之寶菩薩之化行於十方仁壽之功沾於萬國兇人侯景遂殄邦家何况於今亦有吳㑹江東如掌差匪虚言淮陽在面方此非局不稼不穡多歷歲時大東小東全無機杼􅀜中醜虜寧非冒頓之鋒齊國强兵便是軒轅之陣西南當扼喉之􅀔東北承撫背之機首尾交侵華夷俱騁而冲人數歲復子方賖德未感於黎蒸威不加於將帥斯等怏怏非少主臣安有碌碌因人成事公之才具雖復明􅁢􅀔何如於天監時何若於大同棄與國之隆恩當滔天之猛寇匡救之德翻未有從忠許之謀誰其相曉臥薪待火方此弗危繫草從風儔之非切若能思其上策審此英圖見引軨獵之車還向長安之邸一則二則惟在大賢外相內相終當相屈正當携諸舊􅀠率我賔遊朝服簪纓􅀡拜園寢梁人望國俱登赤馬之舟齊師臨江仍轉蒼鷹之斾分袖南浦揚鞭北風民不疲勞軍無怨讟如其執事尚秉前言將恐戎麾便濟江表何則西浮夏首巳㨿咽喉東進彭波次指心腹廣陵京口烽烟相望魯柝聞邾方之尚遠胡桑􅍟薊比此爲遙水陸争前龍虎交至則揚都蕩定功自齊師江左臣民非􅀜梁國豈不追慙後主崇寄之恩還􅀒齊朝親隣之意東門黃犬固以長悲南陽白衣何可復得立茲㓜弱非曰大勲滅我宗祊何所逃舋今復遣前吉州刺史馬嵩仁至彼更具往懷想不遠而復無貽抵悔也若英謨有在方興祀夏之功明監如違便等過殷之嘆存亾社稷一在於公臨􅁓崩號不復多及蕭淵明頓首頓首王太尉僧辯荅貞陽侯書僧辯頓首頓首白席威卿至奉今月五日誨披凾伸􅁓號恥交哀天未悔禍地維重絕九縣沸騰四海悲憤嗣主欽明濬哲齊聖廣淵體自宸極受命文祖主梁祀者非此而誰且年倍漢昭具明上官之詐德踰姬誦彌昭周旦之誠今海內衣冠中朝卿士或南陽舊􅀠官成天監之初代邸故臣榮光承聖之始莫不人竭其力争求効命輸心嗣主以報先帝之恩今荆陜淪覆止是江北數縣卽東南藩翰萬里而遥主甲治兵艫舳相接長波天限方漢城池修德綏民中興可待􅀌子本以庸懦加復窮喘且平生素蓄志不在位世􅀩朝寵身實許國武皇擢之千里先主申其三顧因此踰濫遂居端右屬天歩艱難寄深憂積方欲詢于髦傑採之輿皁同康時務共賛皇猷一彼車書刷茲讐恥然後守其侯服歸老赤松至如今日使須白事披奉來誨承彼送還今璇枝令戚播越秦虜明公儻能入朝同奬王室伊呂之任僉曰仰歸寧不副兹仄席濟扶匡救若斯言不渝更聽後㫖便遣鷁舟弘舸奉迎麾斾但閱來朝意在主盟今江東所奉彼屬披圖未􅀩朝意鄭拒子忽左史是之漢背劉襄班書稱􅁢况屬疎於踖彌不敢奉命謀期通識賜亮此誠􅀌子王僧辯頓首頓首梁貞陽侯與陳司空書淵明頓首頓首軒轅旣作遇蚩尤之兵顓頊爲君阻共工之亂雖復搖山蕩谷驅電乘雷殘厥兇渠曾靡遺孽未有時當至治世在欽明元惡滔天遂陷􅀖家者也我大梁開金繩之寶牒紐玉鏡之珍符功烈與造化相侔德施與風雲俱遠戴日戴斗何向不賔太平之基無思無届逆賊侯景殱亂本朝釁重聰彌凶逾羿浞後主天經地緯義冠人靈驅馭熊羆遂剪勍盗少康祀夏何可􅍟揚大戊興殷彌無等級不圖天未悔禍喪亂荐臻羌賊慿陵侵蕩荆漢乘輿幽辱旣陷兇徒黎獻崩騰莫不淪没故以哀窮兆庶痛極蒼旻者也夫諸侯釋位寧非亂禍之朝宗子維城本濟殷憂之日武皇遺胄皆陷虜庭乞命偷生何能支久􅀌宗室之長爰自布衣辛癸之朝容身靡託追惟先業大庇生民旣雪伯叔之怨仍紹桓王之霸􅀌二三昆季情禮獲申等預蕃枝偏承皇德近歲彭都之役得僃戎行鞍甲之勞庶酬天寵况復邦家不造至此橫流凶狡猶存何所逃責固以提戈􅀒劒臥泣行號言念荆巫志雪讐恥大齊德竝天地明符日月隆禮詔俗張樂􅀍民義感蕐夷仁侔造化玉羊銀甕嘉瑞必彰澤馬山車禎符總集若夫中朝猛士本自無窮沙塞精兵斯何有量是以家國之富文景所未儔兵馬之强秦漢所未敵但親隣之道旣篤夙私明發之懷彌敦先好以爲興亾繼絕聖典通䂓爰命無庸嗣守社稷旣方慿大國庶討仇讐恩喻難違諸懷慙哽公體兹懋德毗奉中興歸自畨禺志在討亂至於雲行電邁谷静山空扼鵲尾而定王畿登牛頭而掃天闕漸臺僞帥將傳首於帝京郿塢元兇皆橫屍於軍市高庸茂烈振古希儔承此欣然深所嘉歎今者殷憂未巳禍難相尋宗社無依奥主宐立夙承所眷尚在冲年王室猶難何以康濟董侯㓜弱終覆漢朝馬業童􅂪仍傾晉室所謂前事之不􅁯後事之􅀛兆也􅀌過荷恩靈預奉帷幄黃河白日亟降誠言分災䘏患事非虚旨但當小國之禮無失敬恭闔境人民俱勞寤寐方窮人爵之重以報非常之功惠覽今書希能留意也上黨王文高劉德武冠曹彰爰降宗英遠于將送裴侍中英起賛奉師德俱事戎間月壘連營雲旗蔽野同集江淮翼我歸斾湛海珍等並前朝舊將夙著勲庸江左氛妖投身齊國今者皆􅀩恩奬並在戎行歸附明公共剪讐難去月將晦便屇壽春巳具舟艫將臨巢浦若公爲內主方同國子之勲余以定家得免臧孫之嘆豈不功名富貴共保無疆前望鄕􅀜唯增號哭蕭淵明頓首頓首代陳司空荅書某頓首頓首使人孔文端至奉此月四日誨兼翰累牘俯加循覽以悲以慰先皇聖德在躬體道康哲􅁢㳟克讓就日望雲玄雀衘書皇天眷命光宅區宇司牧黎元澤與風行恩隨雨散朔南曁敎要荒貢篚而運鍾百六時屬陵夷賊臣侯景內奰中國掘剪公室鞭撻寓縣三光掩曜四海分崩嗣后大孝發􅂨志清國舋載齊車以誓衆墨衰裳而鞠旅遥授兵略􅆓流電邁不崇朝而戮封豕纔信宿而剪奔鯨雖天未絕梁伊帝之力方欲克復梁雍吞滅崤凾卽都渚宮將議進取而穹昊不惠頻降愍凶秦氏虎狼肆其虐暴主上幽辱鑾輿播遷悲結萬姓痛深九服社稷須主天下難曠晉安殿下地惟密戚親實愛子弱表狥齊㓜而岐嶷群公卿士岳牧藩鎭莫不頓首屈膝請嗣宗祧王太尉秉德居宗實爲元輔僕以不敏預叅末將今朝野寧晏方鎭協和戮力華夷同奬王室庶竭股肱蕩刷讐舋殿下夙標令譽早播明德親則章興地惟蔣邢昔因多故託身大國今􅀩發勅巳次壽春載披來㫖實深傾注但帝子承制非爲乏主􅃁宰匡翊寧俟長君雖則末學頗聞前載成王踐祚曾未壯年昭帝君臨實惟童孺若以家國多故思濟艱難仰惟尊戚莫不屬望分陜之寄側聽高㫖如使不繼親地便議崇極上相居中自當奉報昔仲子舍孫檀􅃓有作趙求外主穆嬴以啼前事不􅁯可爲故實蕃維末鎭敢用多陳遠降誨凾唯深哽佩陳某頓首頓首梁貞陽侯重與裴之橫書張佛奴昨還得去月二十九日書覽以増􅁣昔桓公始反􅃹仲親射其車重耳初還呂郤終焚其室頃家國多患頻遘閔凶前事不􅁯便爲􅀛兆所以皇齊大德禮秩兼常威武紛紜洪恩汪濊况復旌旗照日皷吹從風文物俱蕐羽衞相鬱書契巳來斯未有也卿天監之始門官有成承聖之初身名俱泰正應勤王効命詶二后之恩憂國如家報三靈之寵何有方規異志苟樹童􅀩阻地險於長川􅁯天討之應及􅀌昔忝蕃維非無遊士平原之館乃乏如錐田文之家差有彈鋏雖復李廣麾下莫不封侯衞靑故人多懷彼此豈可文辭簡畧禮等平交披封伸􅁓益多歎異相鼠無儀表詩人之作茅鴟刺傲彰魯史之文宿昔相期不應如此衆軍卽便頓江􅀜相見在近不復多及蕭淵明頓首頓首裴之橫荅書之横白足下定國等至枉雅誨具高氏致送之㫖卽彼行人遠到京城大慰應有成命但江山夐阻未奉朝廷報辭第下國之麟趾先朝所寄籍彼隣好義深主祀自宜單車入境端委還朝而朱斾啓行戎旌望國江東士子未達高懷僕早預簪裾夙叨眷與弦矢旣暌江淮成阻靑黎裁封雖斷西鳥之辭白雪在天豈無北風之歎但變故紛紛忠貞宜顯寒松􅀒雪誠愧節者之徒勁草疾風寧􅁯烈士之槩齊師若反斾淮路退舍肥水彼之敬送止縉紳之徒此之奉迎則軒蓋而已伏聽朝㫖遲申展敬之橫白貞陽侯答王太尉書周尚書弘正張廷尉種姜常侍嵩等至枉此月二十六日告并遣賢弟子世珍賢子顒等具忠欵之至公養孤之恩愛甚鄧侯少子之懷情深張禹豈非憂勞社稷用􅃘飢膚天下含靈誰無悲愧余遭家不造敬累吳賢言念忠誠益以號咽但皇齊大德過見憂矜微借輕兵以垂將送意謂江東凋弊累積寒暄供膳資儲理當多闕輙白上黨王止請三千人二百疋而已凱衆人􅊋尚有疑難將恐諸士未喻雅懷今復命周尚書及姜常侍還彼具陳一二夫以受爲寇非有晉􅀖不送爲譏終無楚國五千歩卒旣謝李陵三千羸兵亦等無忌公之明義理不爲嫌行人失辭尚停然諾臨江總轡企望音郵唯遲來書此不多具蕭某白爲陳高祖與周宰相書昔有天地便立帝王革昊唯農遷虞斯夏莫不三靈所佑五運相推梁德不造固天攸棄雖復東漢之末區宇沸騰西晉之亾生民蕩覆未}
