  - {type: variant, offset: 220, length: 0, content: '', SBCK: 饗帝御鳳扆以承天曆數在躬疇咨爲讓某官等至鄴伏承聖㫖謙冲爲而不宰或云洛陽未復函谷無泥旋駕金陵方膺天睠愚謂大庭少昊非有定居漢祖殷宗皆無恒宅登封岱嶽且署明堂廵狩荆州時行司􅀠何必西瞻虎踞乃建王宮南望牛頭方稱天闕抑又聞之玄珪旣錫蒼玉無陳乃棫樸之愆期非苞茅之不貢雲和之瑟乆廢甘泉􅀌竹之管無聞方澤豈不懼歟伏願陛下因百姓之心振萬􅀖之命豈可逡廵固讓方示石戸之農高謝爲君徒弘箕山之客未知上德之不德惟見聖人之不仁率土翹瞻蒼生何望昔蘇季張儀違鄕􅀒俗尚復招三方以事趙請六國以尊秦况臣等預奉皇華親承朝命珪璋特達通聘河陽貂珥雍容尋盟􅗭水加牢貶館隨世汙隆瞻望鄕􅀜誠均休戚但輕生不造命與時乖等一介之行人同三危之遠擯承間內殿事絕耿弇之因封奏邊城私等劉琨之哭讓散騎常侍表臣聞五十知命宗師之格言六百辭滿通賢之高槩昔墨子諸生褰裳救楚魯連隱士高論􅁍秦况乎謬􅀩知巳寧無感激洪私過談寘以通班司憲文昌遂諧常伯今者昆吾小器諦視不見玄黃鈞天竝奏靜聽能聞鍾鼓雖神農分藥岐伯提針㝠衆因緣難可匡救陛下嗣臨寶曆光闡大猷屬意銓衡留情槱棫燕臺裝玉儻不精眞齊客吹竽諒宜澄簡南郊奉乗當求鄭默之才西省文辭應用羅含之學爲王儀同致仕表尺波歸海恒嘆不居樹火爲薪猶悲假續况復星廻日薄通人有乞老之言鐘鳴漏盡前史有夜行之誡五陵􅂦族家傳軒冕四姓卿矦榮由恩澤虛名靡實世官非才年力方强不能辭退今三元肇慶六呂司春得奉萬壽之盃豫叅百辟之禮便釋朝衣謹遵初服同孔光之杖載游户庭比廣德之車方懸私館爲始興王讓瑯琊二郡太守表甫離懷袖裁脫綺紈適荷隆私使膺珪組執玉不起摳衣未勝自甘泉通火細柳屯兵旁帶戎臣頗同疆場言瞻漢草廼曰中州遙望胡桑巳成邊郡誠復居藩體國應思馬駿之功論地惟親宜慕蕭彰之勇讓左僕射初表臣聞七十之歲揚雄擬經六十之年平津􅍟策若斯强壯無歎耆老臣勵則胄華軒冕才允卿相出納流譽朝野具瞻臣弘正國老儒宗情尚虚簡玄風勝業獨王當年臣重器懷沈密文史優􅁉東南貴秀朝廷親賢竝見壯猷皆宜左執若漢武好少而微臣巳老若周文愛老則有此羣才伏願天明更謀梓匠求其妙􅃟稱是能官讓右僕射初表加以言尋盟好仍屬亂離先零盜其牛馬烏孫竊其印綬子卿茹雪叔向爲國雖復東歸備罹此厄昔李廣遺恨不値漢初甯戚自悲不逢堯禪臣隨望聖運實在權輿時參決勝之籌頗奏發兵之讖當塗錫舍非無董昭之誠典午禪文不降張華之實啓安成王讓錄尚書表後啓臣聞間平就國乃盛漢之常儀郕霍無官實宗周之明典何則皇季之重非待歷階王爵之隆自高羣辟况臣戢翼要荒亟離寒暑進慙趙勝能定楚從退匪齊文馳免秦厄固以內切皇心外貽家恥甘輸重餌降禮單于迾城十五如諸和璧市鄕三十聊同寶劒武夫力而獲諸原微臣還而反諸敵瞻言馬駿著隴右之功追念曹彰克烏丸之虜前王子弟若此勲庸偏其反而豈可勝愧謝兒報坐事付治中啓夫拾金樵路高士所羞整冠李下君子斯愼兒報不能謹潔敢觸嚴網右趾鐵繫事允法科左挍論輸實由恩宥老臣過庭之訓多謝古賢折笄之杖有愧前達謝敇賚燭監賞答齊國移文啓昔班彪草移阮瑀裁書馳譽當年遂無加賞非常大賚始自今恩雖賈逵之頌神雀竇攸之􅍟鼫䑕漢臣射覆之言魏士投壺之賦方其寵錫獨有光前官燭斯燃更慙良吏霄光可學乃會􅂄年臣職居南史身典東觀謹述私榮傳之方策謝勑賜祀三皇五帝餘􅄿啓竊以甘泉之殿舊禮羲農長樂之宮本圖堯舜自東京晩世曠代無聞西漢盛儀復覩今日金壺流十旬之氣玉案備千品之羞昔絳羅爲薦旣延王母紫葢爲壇允招太一同期美號理致衆星臣以餘年豫開淸祀如陪瑤席遂飮瓊漿謝賚􅍪啓臣昨旣陪羽獵仍宴上林固謝長卿之文彌慙子雲之賦預割鮮禽巳同監浦頻􅀩大臠更異梁王詰旦歸來猶爲飽飫虞衡所獻復降命恩賜細君以爲歡非屠門而大嚼謝賚蛤啓比鴻雀入猶新纔變秋程巳聞冬獻謝東宮賚蛤蜊啓船俗嚴戈渔人資設于彼海童冒兹水豹望樓闕之徐孝穆集卷四陳郯徐陵著明東海屠隆評書武皇帝作相時與嶺南酋豪書夫否終斯泰屯極則亨若日月之􅅆環猶隂陽之報復近者數鍾九厄王室中微聖主欽明還承寶運卽是高祖武皇帝之孫世祖孝皇帝之子重光累聖胤國承家天下生民孰不歸德賊勃不涯䟽戚希纂帝圖信是奸兇階茲禍亂自王宮再淪於醜逆虜馬四飮於江沲社稷阽危鑾輿幽辱勃身居列岳自御強兵高視趦趄坐觀成敗旣而天維重綴國歩還康翻畫凶圖更謀神􅂦且其兵馬之任資於長昆方牧之權由於承聖操兄戈而斬姪藉國寵而弑君不忠不義莫斯爲甚比春初便遣大都督歐陽頠摭城主傅泰等兇徒數十遂到臨川吾奉承朝筭指畫戎略樊滕耿賈戮力争馳天地靈祗水陸間道􅀗傅泰不勞於一箭擒歐陽無待於尺兵僞黨皆俘連城盡拔所􅀵軍資不可稱筭去月十六日德州刺史陳法武等願憤􅅆戈仍梟兇豎一夫挺劒傳首上京萬里澄淸人神慶躍彼豪門著姓典牧方州拘隔天朝亟離寒暑公私憤歎豈可爲懷今王道平夷理增懽忭朱明戒節比復何如軍士平安境內淸謐吾以庸薄叨秉國鈞恒務牽􅅶諸有勞弊自天數云否朝禍薦臻東夏崩驣西京蕩覆身惟許國任在勤王宣力皇家靡有寧歲一還京師保持鴻業四驅夷狄奪得江左始則杜龕元惡張彪不㳟據有泰稽連縱巨震隨機討掩觸向平夷叛臣任約徐嗣徽等屢引齊虜前年末旣踐京師江畔邊城皆爲戎戍賴􅆛貅騁力衞霍同心殱厥胡夷不日淸殄去年將夏傾國大來鐵􅀐八千許匹甲士二十餘萬胡塵飛于北闕虜鼓震于南宮躬率偏裨聊與挑戰虜便土崩瓦解投險赴坑大小皆擒鯨鯢盡戮三江之上塞水無流千里之間伏屍相枕生􅀗大都督蕭􅁤裴英起東方老李布光王敬寶等虜中驍將唯此數人屢破􅀜西之兵頻取淮右之地一朝俘斬無復孑遺遠邇敬欣華夷怖慴如聞彼虜稍是危亾尋命熊羆欲就征討方可以雷行趙魏電掃幽并混一車書􅀔在朝暮而矦瑱跋扈江州公私阻絕卽平北賊仍事南征肉袒􅆕縛歸首闕庭卽爲申聞優其禮秩台儀不貶位遇兼常今所擒歐陽頠傅泰等莫不弘宥政爾授其兵馬處以榮祿坦然遊狎無介懷抱年號武平國卽淸晏君之聞此寧不欣躍但借緣王事遊踐貴鄕日想山川依然舊識吾旣忝荷朝私位逾台衮身持帝王之柄手握天下之圖故鄕如此誠爲衣繡故人不見還同宵錦天涯藐藐地角悠悠言􅆕無由但以情企今者王猷帝載化被無垠浮海窮山罔不咸格投竿􅀒􅂦馳歩蒼龍崖穴丘園爭趨金馬君之才具信美登朝如戀本鄕不能遊宦門中子弟望遣來儀當爲申聞各處榮祿􅀷加將保念嗣音郵今遣某甲等使彼指此不多陳諱白與楊僕射書夫一言所感凝暉照於魯陽一志㝠通飛泉涌于疏勒况復元首康哉股肱良哉隣國相聞風教相期者也天道窮剥鍾亂本朝情計馳惶公私哽懼而骸骨之請徒淹歲寒顚沛之祈空盈卷軸是所不圖也非所仰望也執事不聞之乎昔分鼇命鳸之世觀河拜洛之年則有日烏流災風禽騁暴天傾西北地缺東南盛旱坼三川長波含五嶽我大梁應金圖而有亢纂玉鏡而猶屯何則聖人不能爲時斯固窮通之恒理也至如荆州刺史湘東王機神之本無寄名言陶鑄之餘猶爲堯舜雖復六代之舞陳於總章九州之歌登於司樂虞䕫拊石晉曠調鐘未足頌此英聲無以宣其盛德者也若使郊禋楚翼寧非祀夏之君戡定艱難便是匡周之覇豈徒豳王徙雍朞月爲都姚帝遷河周年成邑方今越裳藐藐馴雉北飛肅眘􅃼􅃼風牛南􅅯吾君之子含識知歸而答㫖云何所投身斯其未喻一也又晉熈等郡皆入貴朝去我潯陽經􅂗何幾至於鐺鐺曉漏的的宵烽隔漵浦而相聞臨高臺而可望泉流寶盌遥憶湓城峰號香鑪依然廬嶽日者鄱陽嗣王治兵匯􅂀屯戌瀹波朝夕牋書春秋方物吾無從以躡屩彼何路而齊鑣豈其然乎斯不然矣又近者邵陵王通和此國郢中上客雲聚魏都鄴下名卿風馳江浦豈盧龍之徑於彼新開銅駞之街於我長閉何彼途甚易非勞於五丁我路爲難如登於九折地不私載何其爽歟而答㫖云還路無從斯所未喻二也晉熈盧江義陽安陸皆云􅅃}
