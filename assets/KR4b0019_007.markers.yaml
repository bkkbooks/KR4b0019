  - {type: variant, offset: 224, length: 0, content: '', SBCK: 流􅀷知於􅎦篾吾雖不敏常慕前修不圖明庻有懷翻其以此量物昔魏氏將亾羣凶挺爭諸賢戮力想得其朋爲葛榮之黨邪爲邢果之徒邪如}
  - {type: variant, offset: 225, length: 2, content: 備考, SBCK: 不然斯所未喻四也假使吾徒還爲凶黨矦景生於趙代家自幽怛居則台司行爲連率山川形􅀔軍國􅃔章不勞請箸爲籌便當屈指能􅄸景以逋逃小醜羊豖同群身寓江臯家􅅏河朔春春井井如鬼如神其不然乎抑又君之所知也且夫宮闈袐事竝若雲霄英俊訏謨寧非帷幄或陽驚以定策或焚藁}
  - {type: page-break, offset: 225, content: '', id: KR4b0019_SBCK_004-7a}
  - {type: variant, offset: 228, length: 1, content: 質, SBCK: 奏書朝廷}
  - {type: variant, offset: 230, length: 2, content: 余余, SBCK: 士猶難參預羇旅之人何階耳目至於禮樂㳂革刑政寛猛則謳歌巳遠萬舞成風不知手之舞之足之蹈之也安在揺其牙齒爲間諜者哉若}
  - {type: variant, offset: 233, length: 3, content: 顯令維, SBCK: 復命西朝終奔東虜雖齊梁有隔尉候奚殊豈以河曲之難浮而曰江􅀜之可濟河橋馬度寧非宋典之姦關路雞鳴皆曰田文之客何其通蔽乃爾相妨斯所未喻五也又兵交使在雖著前經儻同狥僕之􅀹追肆寒山之怒則凡諸元帥並釋縲囚爰及偏裨同無翦馘乃至鍾儀見赦朋笑遵途襄老􅀩歸虞歌引路吾等張􅎶拭玉修好尋盟渉泗之與浮河郊勞至於贈賄公恩旣被賔敬無違今者何􅄽翻􅀩貶責若以此爲言斯所未喻六也若曰妖氛永久喪亂悠然哀我奔波存其形魄固巳銘兹厚德戴此洪恩譬渤澥而俱􅀷方嵩華而猶重但山梁飮啄非有意於籠樊江海飛浮本無情於鐘鼓况吾等營䰟巳謝餘息空畱悲黙爲生何能支久是則雖􅀩養䕶更天天年若以此爲言斯所未喻七也若云逆豎殱夷當聽反命高軒繼路飛盖相隨未解其言何能善謔夫屯亨治亂豈有意於前期謝常侍今年五十有一吾今年四十有四介巳知命儐又杖鄕計彼矦生肩隨而巳豈銀臺之要彼未從師金竈之方吾知其訣政恐南陽菊水竟不延齡東海桑田無由可望若以此爲言斯所未喻八也足下淸􅁭勝託書囿文林凡自洪荒終乎幽厲如吾今日寧有其人爰至春秋㣲宜商略夫宗姬殄墜霸道昏凶或執政之多門或陪臣之凉德故臧孫有禮翻囚與國之賔鄭伯無􅄽空怒天王之使遷箕卿於兩舘縶驥子於三年斯匪貪亂之風邪寧當今之高例也至於雙崤且帝四海争雄或搆趙而侵燕或連韓而謀魏身求盟於楚殿躬奪璧於秦庭輸寶􅂦以託齊王馳安車而誘梁客其外膏脣販舌分路揚鑣無罪無辜如兄如弟逮乎中陽受命天下同規廵省諸華無聞幽辱及三方之霸也孫甘言以娬􅆺曹屈詐以覊縻旍軫歲到於句吳冠盖年馳於庸蜀則客嘲殊險賔戯巳􅀷共盡遊談誰云猜忤若使搜求故實脱有前蹤恐是叔}
