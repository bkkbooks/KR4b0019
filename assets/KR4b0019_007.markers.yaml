  - {type: page-break, offset: 246, content: '', id: KR4b0019_SBCK_005-4b}
  - {type: variant, offset: 250, length: 0, content: '', SBCK: 渠兇殲滔天之巨寇重以三湘放命七國連從征旅東西必翦妖逆雖復棧道木閣田單之奉舊齊綰璽將兵周勃之扶隆漢中宗佐命俱畵丹靑光武功臣皆懸星象非􅆛非虎之封同心同德之勞挍彼功庸曾何髣髴但與在與亡期於體國喪君有君寧容無主夙承所立猶則孱􅀩天歩方難寧可弘濟自淹畱大國}
  - {type: page-break, offset: 250, content: '', id: KR4b0019_SBCK_005-5a}
  - {type: variant, offset: 251, length: 0, content: '', SBCK: 荷恩私朝夕宮闈預奉顏色黃河白日亟亶誠言分災䘏患事非虚㫖但善相小國終資大賢定我􅀖家繄公是賴淮流不竭豈獨琅琊望能喻此衷懷思之無忽近陸君士有啓陳其禍亂朝旨卽命河東王岳等勒率熊羆便相抵赴道阻且長雖無之及所聞西浮夏首便當險隘之衝南捍巴陵方拒窺窬之寇上黨王皇齊寵弟是號宗英親御戎軒遠于將送裴侍中英起淮南貴族兼事戎行躍冀馬者千羣披燕犀者萬隊來自河陽曾不旬日持節徐武潼三州諸軍事散騎常侍明遠將軍束徐州刺史始興縣開國侯湛海珍等竝前朝舊將夙著􅈴庸推轂海邊屬是喪亂雖復拔身有道志雪朝怨咸預戎行共指鄕國江淮舊􅀠悉已招􅂝方禀英謨共翦讎難去月將晦便屇壽春已具舟師將臨江浦使人入境行陳所懷揆日覘光遲枉還牘當使宗祊有主余同小白之勲家國無虞公保阿衡之貴何其美}
