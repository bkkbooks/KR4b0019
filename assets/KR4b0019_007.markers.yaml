  - {type: variant, offset: 127, length: 7, content: 顯令箋注徐庾兩, SBCK: 伏惟陛下出震等於勛華鳴謙同於旦奭握褒秉􅃏將在御天玉媵珠衡先彰元后神祗所合非惟太室之祥圖諜斯歸何止堯門之瑞若夫大孝聖人之心中庸君子之德固以作訓生民貽風多士一日二日研覽萬機允文允武包羅羣藝擬兹三大賔是四門歷試諸艱咸熈庻績斯無間而稱也自無妄爲􅁚鍾禍上京梟獍虔劉宗社蕩墜嶙頭銕額興暴皇年封狶修虵行災中國靈心所宅下武其興望紫極而行號瞻丹陵而殞慟}
