  - {type: variant, offset: 11, length: 0, content: '', SBCK: 王瑒奉皇帝壐綬受終之禮一依唐虞故事王其時陟元后寧育兆民光闡洪猷以承昊天之命陳高祖勅州郡璽書夫四王革代啇周所以應天五勝相推軒羲所以當運梁德不造喪亂積年東夏崩騰西都蕩覆蕭勃干紀非唯趙倫矦景滔天踰於劉載貞陽反􅆲賊約連兵江左累屬於鮮卑金陵久非於梁國有自氤氲混沌之世龍圖鳯紀之前東漢興平之初西朝永嘉之亂天下分崩未有若於梁朝者也朕以虛薄屬當興運自昔登庸首淸諸越徐門浪泊靡不征行浮海乘山所在戡定冐愬風塵騁馳師旅六延梁祀十翦彊冦豈曰人謀皆由天啓梁氏以天祿斯改期運永終欽若唐虞推其􅂦玉朕東西退讓拜手陳辭避舜子於箕山之陽求支伯於滄洲之野而公卿敦逼率土翹惶天命難稽遂享嘉祚今月乙亥升禮太壇言念遷桐但有慙德自梁氏將未頻月亢陽火運斯終秋霖奄䧏翼日成禮圓丘􅀫設埃雲晚霽星􅁚夜張朝景重輪泫三危之膏露晨光合璧帶五色之卿雲顧惟寡薄彌慙休祉昧旦丕顯方思}
