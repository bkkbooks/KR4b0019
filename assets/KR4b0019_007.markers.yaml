  - {type: variant, offset: 259, length: 0, content: '', SBCK: 墜高巖孫泰門人競投滄海何其樂乎聖朝虛心版築尚想丘園若彼能赴嘉招便當謹申高命但其人往歲亦望至京師觀此風神􅃀乎難㧞故以忘懷爵祿詎持犧牲之談高視公卿獨騁蜡蛵之訓所恐}
