  - {type: page-break, offset: 11, content: '', id: KR4b0019_SBCK_002-3b}
  - {type: variant, offset: 12, length: 1, content: 魏, SBCK: 治卿等擁旄方岳相任股肱剖符名宇方寄恤隱玉曆惟新念有欣慶想􅀷求民瘼務在亷平愛惠以撫􅀌貧威刑以禦疆猾若有萑蒲之盗或犯戎啇山谷之酋擅彊幽險皆從肆赦咸使知聞如或迷途俾在無貸今遣使人具宣往㫖念思善政副此虛懷冊命陳公九錫文大哉乾元資日月以貞觀至哉坤元慿山川以載物故惟天爲大陟配者欽明惟王建國翼輔者齊聖是以文武之佐磻溪藴其玉璜堯舜之臣濙河鏤其金版况乎體得一之鴻姿寧陽九之危厄拯橫浦於碣石撲燎火於崑岑驅馭於韋彭跨蹍於秦􅀳神功行而靡用聖道用而無名者乎今將授公典策其敬聽朕命日者昊天不弔鍾亂於我國家網漏吞舟彊胡內贔􅃼􅃼宇宙惵惵􅀺元方足圓顱萬不遺一太淸否亢橋山之痛巳􅀷大寳屯如平陽之禍相繼上宰膺運康救兆民鞠旅於滇池之南揚旌於桂嶺之北懸三光於巳墜謐四海於群飛屠猰㺄於中原斮鯨鯢於􅄥汜蕩寧上國光啓中興此則公之大造於皇家者也旣而天未悔禍夷醜薦臻南夏崩騰西京蕩覆羣胡孔熾藉亂乘間推納藩枝盜假神噐冡司昏撓旁引寇讐旣見貶於桐宮方謀危於漢閣皇運巳殆何殊贅旒中國揺然非徒如綫公赫然投袂匡救本朝復莒齊都平戎王室朕所以還膺寶歷重履宸居挹建武之風猷謌宣王之雅頌此又公之再造於皇家者也公應務之初登庸惟始三川五嶺莫不窺臨銀洞珠宮所在寧謐孫盧肇釁越貊爲災番部阽危􅀔將淪殄公赤旗所指祅壘洞開白羽纔撝兇徒粉潰非其神武乆喪南藩此又公之功也大同之末邊政不修李賁狂迷竊我交愛敢稱大號驕恣甚於尉陀據有連州雄豪熾於梁碩公英譽雄􅄸電掃風行馳御樓船􅀡跨滄海新昌典徹備履艱難蘇歷嘉寧盡爲京觀三山獠洞八角蠻陬逖矣水寓之鄕悠哉火山之國馬援之所不届陶璜之所未聞莫不懼我王靈爭朝邊候歸琛天府獻狀鴻臚此又公之功也自冦虜陵江宫闈幽辱公枕戈嘗膽提劒撫心氣涌靑霄神飛紫闥而番禺連率本自諸夷言得其朋是懷同惡公仗此忠誠乗機勦定執沛令而釁鼓平新野而據鞍此又公之功也世道初艱方隅多難勲門桀􅃛作亂衡嶷兵切池隍衆兼夷獠公以國盜邊警知無不爲䘏是同盟誅其醜􅀋莫不魚驚鳥散􅆕縳頭懸南土黔黎重保蘇息此又公之功也長驅嶺㠐夢想京畿緣道酋豪遞爲榛梗路養渠率全據大都蓄聚逋逃方謀阻亂百樓不戰雲梯之所未窺萬弩齊張高輣之所非敵公龍驤虎歩嘯吒風雲山靡堅城野無彊陣淸妖氛於灨石滅沴氣於雩都此又公之功也遷仕㐫匿屯據大臯乞活􅀋馬騰之軍流民多杜􅋶之衆推鋒轉鬬自北徂南頻歲稽誅實惟勍虜公坐揮三畧遥制六奇義勇同心􅆛貅騁力雷奔電擊谷静山空列郡無犬吠之驚􅓜祠罷狐鳴之盜此又公之功也王師討虜次屇淪波兵乏兼儲士有饑色公囘麾蠡澤積榖巴丘億庾之詠斯豐壺漿之迎是衆軍民轉􅈇曾無砥柱之難艫舳相望如運敖倉之府犀渠貝胄顧蔑雷霆高艦層樓仰捫霄漢故使三軍勇鋭百戰無前承此兵糧遂殄兇逆此又公之功也若夫英圖邁俗義旅如雲湓壘猜􅂝用淹戎略公志唯同奬師克在和鵠塞非虞鴻門是會若}
