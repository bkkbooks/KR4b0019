  - {type: variant, offset: 215, length: 0, content: '', SBCK: 卿雲似葢晨映姚鄕甘露如珠朝垂原寢芝房感德咸出銅池蓂莢伺辰無勞銀箭重以東漸玄菟西踰白狼高柳生風扶桑衘日莫不編名屬國歸貢鴻臚荒服來賔遐邇同慶其文昭武穆跗蕚也如彼天平地成功業也如此乆應}
