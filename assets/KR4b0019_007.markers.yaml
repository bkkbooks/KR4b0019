  - {type: variant, offset: 9, length: 1, content: 讀, SBCK: 今老病此别畏長離白馬君來哭黃泉我詎知徒勞脫寶劒空掛隴頭枝秋日别庾正員征途愁轉斾連騎􅃤停鑣朔氣陵疎木江風送上潮靑雀離帆遠朱鳶别路遙唯有當秋月夜夜止河橋新亭送别風吹臨伊水時駕出河梁野燎村田黑江秋岸荻黃隔機聞上鼓回舟隱去檣神襟愛遠别流涕極淸漳雜曲傾城得意巳無儔洞房連閣未消愁宮中本造鴛鴦殿爲誰新起鳳凰樓綠黛紅顏兩相發千嬌百熊情無歇舞衫回袖勝春風歌扇當牕似秋月碧玉宮妓自翩妍絳樹新聲最可憐張星舊在天河上從來張姓本連天二八年時不憂度傍邊得寵誰相妬立春曆日自當新正月春幡底舊故流蘓錦帳挂香囊織成羅幔隱燈光祗應私將虎珀枕暝暝來上􅃢瑚床侍宴園林才有􅀬夏淺更勝春嫩竹猶含粉初荷未聚塵承恩與下席應阮獨何人和賽漢高帝廟山宮􅀋牛首漢寢若龍川玉椀無秋酎金燈滅夜烟丹帷迫靈岳紺席下羣仙堂空沛筑響釵低戚舞妍何殊后廟裏子建作華篇春情風光今旦動雪色故年殘薄夜迎新節當罏却晚寒故香分細霧石炭擣輕紈竹葉裁衣帶梅花奠酒盤年芳袖裏出春色黛中安欲知迷下蔡先將過上蘭鬬雞季子聊爲戲陳王欲騁才花冠巳衝力金爪復驚媒鬬鳳羞衣錦雙鸞耻鏡臺陳倉若有信爲覓寶雞來詠舞十五屬平陽因來入建章主家能敎舞城中巧畵粧低鬟向綺席舉袖拂花黃燭送空邊影衫傳篋裏香當由好留客故作舞衣長隴頭水别途聳千仞離川懸百丈攅荆夏不通積雪冬難上枝交隴底暗石礙波前響廻首咸陽中唯言往時夢中婦織流黃落花還井上春機當戸前帶衫行障口覓釧枕檀邊數鑷經無亂新漿緯易牽蜘蛛夜伴織百舌曉驚眠封用􅀺陽土書因計吏船欲知夫婿處今督水衡錢烏棲曲卓女紅妝期此夜胡姬沽酒誰論價風流荀令好兒郞偏能傅粉復薰香其二繡帳羅帷隱燈燭一夜千年猶不足唯憎無賴汝南雞天河未落猶爭啼詠織婦纖纖運玉指脉脉正蛾眉振鑷開交縷停梭續斷絲簷前初月照洞戸未垂帷弄機行掩涙彌令織素遲春望岸烟起暮色岸水帶斜暉逕狹橫枝度簾揺驚燕飛落花承歩履流澗寫行衣何殊九芝盡薄暮洞庭歸奉和簡文帝山齋架嶺承金闕飛橋􅍟石梁竹密山齋冷荷開水殿香山花臨舞席水影照歌􅇃同江詹事登宮城南樓元良居上德率土被中孚漢幄朝無怠周門夕復趨桓經旣受業賀拜且尊儒壯志諧風雅高文會斗樞鏗鏘叶舞蹈炤爛等琨瑜溝水慙雄伯漳川仰大巫鮑魚寧入俎釣鼈匪充㕑叔譽恒詞屈防年豈濫誅徐孝穆集卷一終徐孝穆集卷二陳郯徐陵著明東海屠隆評璽書梁禪陳璽書君子者自昭明德達人者先天弗違故能進退咸亨動静元􅁻朕雖􅀩寡庶乎景行何則三才剖判九有區分情性相乖亂離云起是以建彼司牧推乎聖賢授受者任其時來皇王者本非一族人謀是與屈巳從萬物之心天意斯歸鞠躬奉百靈之命謳歌所往則攘袂以膺之菁華巳竭乃褰裳而去之昔在唐虞鑒於天道舉其黎獻授彼明哲雖復質文殊􅁤沿革不同歷代因循斯風靡㬱我大梁所以考庸太室接禮貳宫月正元日受終文祖但運不常夷道無恒㤗山嶽傾􅅯河海沸騰電目雷聲之禽鉤爪鋸牙之獸咀齧含生不知紀極二后英聖相仍在天六夷貪狡爭侵中國縣王都帝人懷干紀一民尺土皆非梁地朕以不造幼罹閔凶仰慿衡佐亟移年序周成漢惠邈矣無階惟是童蒙必貽顚蹷若使時無聖哲世靡艱難猶當高蹈于滄洲自求於㤗伯者矣惟王應期誕秀開籙握圖性道故其難聞嘉庸以其􅀍物乾行同其燾覆日馭比其貞明登承聖於復禹之功樹鞠子於興周之業滅陸渾於伊洛殱驪戎於鎬京大小二震之驍徒東南兩越之勍冦遽行天討無遺神策仁霑葭葦信及豚魚殷牖斯空夏臺虛設民惟大畜野有同人加以雲飛紫蓋水躍黃龍東伐西征掩映川陸榮光曖曖巳冐墟廛甘露瀼瀼亟流庭苑車轍馬跡誰不率從蟠木流沙誰不懷德祥圖遠至非唯赤伏之符靈命昭然何止黃星之氣且自攝提無紀孟陬殄滅枉矢宵飛天弧曉映久矣夷羊之在牧時哉蛟龍之出泉革運之兆咸徵惟新之符竝集朕以欽若勛華屢囘星琯昔者木運斯盡予高祖受焉今歷去炎精神歸樞紐敬以火德傳於爾陳遠鑒前王近謀羣辟明靈有悦率土同心今遣使持節兼太保侍中尚書左僕射平樂亭矦王通兼太尉司徒左長}
