  - {type: variant, offset: 263, length: 0, content: '', SBCK: 魏武虛帳韓王故臺自古文人皆爲詞賦未有登兹舊閣歎兹幽宮標句淸新發言哀斷豈止悲聞帝瑟泣望羊碑一詠歌梁之言便掩盈懷之涙至如披文相質意致縱橫才壯風雲義􅀷淵海方今二乗斯悟同免化城六道知歸皆踰火宅宜陽之作特會幽衿所覩黃絹之詞彌懷白雲之頌但恨賖遠擅特高峰開士羅浮康公懸澑不獲銘兹雅頌耀彼幽巖循環省覽用忘飢渴握之不置恒如趙璧翫之不足同於玉枕京師長者好事才人爭造蓬門請觀高製軒車滿路如看太學之碑街巷相塡無異華隂之市但豐城兩劒尚不俱來韓子雙環必希皆見莫以好龍無别木鴈可􅅓載望瓊瑶因之行李金風巳勁玉質宜調書不盡言但聞爻繫報尹義尚書别離二國雲雨十年目懸河陽追銅爵而無遠神遊漳水與金鳳而俱飛北使還辱去冬十月十一日告忽同言敘循環巧製欣慰良􅀷河朔年芳雖當淹晚白溝凂凂春流巳淸紫陌依依長楊稍合體中何如豈無鄕思第三秦世胄六輔良家文武兼能志懷開遠谷永之筆無慙古人蓋延之功高視前彥而淹畱趙魏亟歷寒暄企望鄕關理多悲切聖朝欽明纂曆大拯生民戮巨海之奔鯨殲中原之封豕晉君之說長安遠於日邊揚雄有言交州在於天際則輸賝王府屈膝閶門川洞酋豪强梁溟海神兵一指率土咸康方當偃伯於靈臺韜戈于武庫變大風於五禮驅蒸民於昌辰物色英聲搜揚俊傑投竿􅀒􅂦馳歩蒼龍巖穴丘園爭趨金馬而畱連河北義等周南懷此殊才實可傷嗟吾崦嵫旣暮容􅁂皤然風氣彌畱砭藥無􅀘追惟疇昔共傋行人室家安危賔禮升降懸壺代哭俱歷春冬移館于箕同兹辛苦鳴蜩抱樹亟見藏氷歸鴈衘蘆多經寒食靖言念此如何可忘握翫來書彌其承臉夫以擁腫之木得免因於不才觳觫之牛自保由其無用以余鄙陋未友龔生惟歎吾賢不同蘧瑗耳若推溝拯溺每切皇衷逸翮飄鱗見優機檻所以降咫尺之書馳輶軒之使心期與國必遂還途寧謂親隣更成難請言尋雅告所及縲四便訪鴻臚幸無淹使聞諸司寇或有邊俘前歲中流是維同惡燕禽望闕冀馬臨江裁頓雲羅自投天網京觀之塜宜彰武功周醜之門方申明罰而聖朝好生惡殺􅀵雷寢電兵車所獲雖同長萬之來恩澤從容無異荀罃之禮方之於弟况擬非倫伊昔梁朝共奉嘉聘張兹大帛處彼高閎庭奏歌鐘座延僑􅆄賔客之敘方於阼階田獵之禽同於君膳正以鄕􅀜阻亂致爾拘畱家國隆平義應旋反况復韓宣屢至宰孔頻還飜爾遲􅅆豈云隣睦弟遂鍾儀之操􅍟此皇華高厚之詩一何非􅀋關徐廉樂之況三戰七擒之言此日借子之矛攻子之室彼之使客猶尚不還此於齊都豪門貴戚周行匪例事義相懸豈與大弟同年而語吾本自凡流以復衰老稍近東岱不奢擊壤之年惟欣堯俗若耶之復長保安臥時思之不棄沗亞宗卿非得侵官天扆但當令艽艽在詠濟濟盈朝才􅃣卿雲智同荀郭文辭富於江海高論泊於雲霄趨走丹墀之門侍奉淸規之內弟來欵言至欲附所聞聯􅀋非宜更其多惑若使良有猶希贈鯉之書郵驛方通復行飛鶬之信執筆潜然不知何向在北齊與宗室書陵白臨淮􅀒海是謂徐州顓頊高陽世有明德自興王啓霸無勞委劒之鋒開國承家實饗彤􅃓之賜其後金柯玉葉霞振雲從􅂄舊通人茂才多士或以天下之貴􅀒石自沉王命之尊拂衣高蹈或熊衣雉製靑組朱旗儒盛江東文高河北或復分齊處魯移魏居燕瓜瓞雖遙芳枝無遠昔有王敦王莽無關控鵠之宗劉曜劉淵彌非偃龍之族又有朱家别錄邾子之苗何氏殊源韓侯之㣧三烏五鹿時事無恒東郭西門遷訛非一吾宗雖廣未有駢枝咸自駒王同分才子正以金衡委御玉斗宵亡胡賊慿陵中原傾覆我則供犧牷於東國載主祏於南都二百餘年家于楊越此則盧諶不去裴寧仍畱高館燕秦遲廻鄕壤山河有隔敘覯無緣望冀馬而增勞瞻賔鴻而永嘆昔竇公累世光武稱其外家許都遙遠靈王思其舊宅其言雖大可以喻小况在宗親寧無停眷比月應雩龍星移殷鳥天明和煦體中何如願百年之老興居多福萬石之君寒暑淸豫其外族忠孝比屋連甍信義勇於干戈詩書甘於酒醴或有漁獵三史紛綸五經都講開􅓺詩生􅀒帙􅀖君佇德寧無掛榻之思州將欽風應有題車之命南陽坐嘯寄以共治東海行歌資其主弼梁竦不好徒爲大言鄧禹平生唯望如此若栖遲偃仰因事丘中桃果三名栗園千樹執竿而釣徵聘不來􅀒耒而耕公侯靡屈何其高也蓋復休哉如脫推延或遲竝問吾階緣人乏叨簉皇華王事無淹公禮將畢旣而揚都蕩覆方離獫狁之災越界風塵無復輶軒之禮屏居空館多歷歲時舋犯靈祗招延禍罰號慕無窮肝膽屠殞煩􅁈胸臆不自堪居無心奈何無狀奈何自徘徊河朔亟積寒暄風患彌畱半體枯廢折臂爲公雖非羊祜跛足而使無慙郤克固以形如稿木心若死􅁅匍匐苫廬纔有䰟氣夫迷山之客遲遙響於巖崖窮海之賔望孤烟於洲嶼况乃宗均魯衛地匪燕吳車騎相望舟艫朝夕三條不遠五達非難信乃濶然遂不􅀩問昔桃花之峽長避秦嬴芝草之山遙然滄海猶復漁􅂳可入何况平途不兼旬月勞懷旣積輒命行人弦望之間遲枉歸翰儻二三兄弟能敦照穆之詩求我漳濵幸問劉禎之疾陽春改節竝念將宜扶力爲書多不詮次與王吳郡僧智書昔林宗道主時人多慕德之賔無忌雄豪天下盡希風之客况復王家沉黙謝氏混玄名貴公門譽華卿子而秦峰阻􅗥浙水悠長諮訴無因但用窮結比靑葽巳戒白露方溥體中何如願保康勝鄧仲華服衮之年荀令則擁麾之日徒云早達未可同功今日相方豈不高視竊承富春頃歲多難薦臻邑閈皆空黔黎將盡御史舊榻零落不存太傅齊室荒茫無處自神麾所屇襁􅀒斯歸新屋方華故田斯墾府吏閑坐長史誦經督郵無事唯慮吹􅅇東苞海水俱承幕府之威西泊江沱同仰惟良之化政差邊張何其神也孤子無心靦冒茍郄光隂風疾彌畱示有餘息恩將公聘窮擯虜庭博望侯極跡於黃河顧中監流滯於滄海自斯以後唯有庸賤本應埋䰟趙魏折骨幽并豈意餘年復反鄕國仰屬伊公在亳渭老師周旌賁丘園採拾衡巷遂以哀駘不棄甕盎無遺還顧庸虚未應階此竊承君侯過被以光輝屢有吹嘘之言頻􅀩薦延之澤故得周行紫閣升降丹墀􅀧汙清朝豈不荒愧雖復華隂砥柱帶地窮深嵩高維岳極天爲重未可以方斯盛典譬此洪恩年迫桑榆豈期酬報政以川波非遠􅍟奉無因夜夢子長之遊朝覽希道之疏浮雲西北徒懷魏帝之文行雨東南思假飛山之便窮誠已結荒係逾深方事祈寒願加珍納謹扶力白書迷乏不次答李顒之書近謬枉淸音無伸窮眷忽辱來告文製兼美君山西盛族素挺風流河北辭林本所嗟賞子桓虚座寧不敬期伯喈倒屣固以相屬一日復其草土思􅗓衣裾披素淸顏但覺形穢公輔之量不􅀒高名王佐之才信表天骨孺子之榻雖其可懸仲康之車彌軫恒眷孤子階緣素乏叨簉皇華今日形容無􅀜天壤殘光炯炯慮在昬明餘息綿綿待盡鐘漏安可以樹揚名士游處盛賔來喻泰高知爲善謔文艷質寡何似上林華而不實將同桂樹但忘年之欵昔有張裴隣國之交非無嬰孔儻哀駘可悅甕盎非疑方願投衿庻比傾蓋頃陳陽之疾歲月增深羊祜之痾秋冬彌劇且年光遒盡觸面崩心扶力含毫諸不申具與周􅃁宰宇文護論邊境事書國有三慶民有四安所謂通和是由隣睦况周陳欵好一紀于兹懷抱相期百世方遠灌瓜之美乆勅邊吏拾橡之尤想應無忽梁氏以漸水東爲安湘小郡宜立巴州多歷年所此於荆部本包分界近得刺史符元舉啓稱蕭山歸忽遣杜元茂神僧訓等將率人馬踰淄涉澌便置城隍謀爲侵軼適荷隣德合州見還不容今眷仍縱蕭氏元舉累移論及翻相河漢更往研問便騁鋒鏑彼軍人恃勇遂致俘擒聞此紛紜甚以驚歎其商奄餘孽才力甚微爲􅁀邊城良慿大國但情均忌器不可加兵便勑軍司以禮相放且前歲所大疆城本以南平等五郡輸薦貴朝至如安湘旣屬巴郡幸承隣惠無候渉言放下漸東唯如灃北政是標其大桶屬荆州之界耳彼此方申分好義絕規圖所貴唯和所重唯信夫以南平等郡地壙民豐雲夢之田楚王爲寶吳當勁蜀晉拒强秦資彼山川竝爲州鎭朕若棄其仁義務廣封域寧容延歲竝貢周朝今者和親已固山岳而方謀尺寸之土用益蒹葭之地哉幸非竊疾相見鑒容江陵小寇旣爾䖍劉前至之言或相誣罔一二因使人宇文平口具其懷耿耿故此相白陳諱頓首與章司空昭達書君白日聖朝受命天下廓淸所餘殘兇唯有歐紇南通交愛北據衡疑兄弟叔侄盤阻川洞百越之賮不供王府萬里之民不由國家明公受脤嚴冬持兵抄歲開氷踐露􅌊火宵行便屇含淮乃其神􅄩未騁三略非勞六奇薄交旗皷仍平醜􅀋自太淸之末永定以來所闢疆界不過郡邑今兹赴㨗二十餘州若較此功庸方兹英力漢之馬援不能爲擬吳之歩隲故是相懸况孫處宗之叛徒正槌盪主耳公私慶快豈可勝言且僕一子屯窮妖徒所制五嶺遐夐存亡不測玄懷飮淚破膽復全􅀩荷英恩保其身命餘年仰戴何力能勝今遣主師某馳往稱慶徐君呈諫仁山深法師罷道書竊聞出家閑曠猶在虚空在俗樊籠比於牢嶽非但經有明文亦自世間共見瞥聞法師覆彼舟航􅃐返緇衣之務此爲目下之英奇非久長之深計何以知然從苦入樂未知樂中之樂從樂入苦方知苦中之苦弟子素與法師雖無曩舊相知以來亦復不疎夫良藥必自無甘忠諫者决乎逆耳倚見其僻是以不􅃘不言且三十年中造莫大之業如何一旦捨巳成之功深爲可惜敬度高懷未解深意將非帷帳之策欲集劉侯形類臥龍擬求􅁑氏黃石兵法寧可再逢三併茅廬無由兩遇封爵五等唯見不逢中閤外門難朱易白鳴笳鳳管非有或聞儛女歌姬空勞反翫覓之者等若牛毛得之者譬猶牛􅊁以此之外何所窺窬法師今若退轉未必有一稱心交失現前十種大利何者佛法不簡細流入者則尊歸依則貴上不朝天子下不讓諸侯獨翫世間無爲自在其利一也身無執作之勞口餐香積之飯心不妻妾之務身餙芻摩之衣朝無踐境之憂夕不千里之苦俯仰優游寧不樂哉其利二也躬無重任居必方域白壁朱門理然致敬夜琴晝瑟是自娛懷曉筆莫詩論情頓足其利三也假使棘生王路橋化長溝巷吏門兒何由仰喚寸絹不輸官庫升米不進公倉庫部倉司豈須求及其利四也門前擾擾我足安眠巷裏云云余無驚色家休大小之調門停强弱之丁入出隨心往還自在其利五也出家無當之僧猶勝在俗之士假使心有殺戮手無斷命之愆密裏通情决勝灼然嬌俗如斯煩垢萬倍不如白衣一入愛河永沉無出其利六也聽鐘聲而致敬尋香馥以生心朝覩尊儀莫披寶軸刹那之善逐此而生水滴微功漸盈大器未知因緣果報善惡皎然就此而言其利難陳矣假使達相白衣猶有埃塵之務縱令遥寄彈指逺近低頭形去心留身移意往閑有者得如此貧苦者本無因近在目前不言可見其利七也山間樹下故自難期枕石潄流實爲希有猶斯之類不可思議如此者難逢一心者悕遇法師未能不學交習聽勝之因一旦退心於理邈矣其利八也開織成之帙見過去之因摛琉璃之卷驗當來之果識因識果不以爲愆知福知報何由作罪上無舟檝交見没溺之悲下失浮囊則有沉身之患其利九也曠濟羣品爲天人之師水陸空行皆所尊貴言必闍黎和尚書輒致敬和南遠近嗟詠貴賤顒仰法師今必退轉立成可驗􅅻脫袈裟逢人輒稱汝我始解偏袒姓名便亦可呼平交者故自不論下劣者亦恐不讓薄言稱巳榻席懸異從來小得自在便以君爲題封若不屈膝歛手自達無由俯仰承迎未閑合度如此專專何由可與其利十也畧言十事空失此機其間深道寧容具述仰度仁者心居魔境爲魔所迷意附邪途受邪易性假使眉如細柳何足􅀜懷頰似桃花詎能長久同衾分枕猶有長信之悲坐臥􅁯時不免秋胡之怨洛川神女尚復不惑東阿世上班姬何􅀜君事夫心者面焉若論繾綣則共氣共心一遇纒綿則連宵宴起法師未通返照安悟賣花未得他心那知彼意嗚呼桂樹遂爲豆火所焚可惜明珠乃受淤泥埋没弟子今日橫諮必爲法師所哂世上白衣何貲何限且一人退道而不安危推此而言實成難解譬如瓦礫盈路人所不驚片子黃金萬夫息歩正言法師入道之功巳僃染俗之法未加何異金博赤銅銀換鉛錫可悲可惜猶可優量能􅃘難􅃘方知其最願棄俗事務息塵勞正念相應行志兩全薄加詳慮更可思維悔之在前無勞後恨如弟子筭遠卽十數年中决如惻惻近卽三五歲內空唱如何萬恨萬悲寧知遠及自誤自錯永棄一生乃知斷絃可續情去難留或若火裏生花可稱希有迷人知返去道不遥幸􅄩推排急登正路法師非是無智遂爲愚者所迷􅀋似阿難便爲魔之所嬈猶須承三寶之力制彼羣兇􅆆般若之幢天魔自欵若此言㫖當卽便冀棄芻蕘若不㑹高懷幸停深恠耳與天台智者大師書陵和南昨預沈儀同法席餐奉甘露無畏之吼衆咸歸伏然正法炬朗諸未悟自慶餘年得逢玅說尋事諮展書不申心又與天台智者大師書陵和南注傾之心難可敷具㧞公至􅀩三月念日示用慰積歲傾心麥冷體中何如願一日康勝山中春夏無餘障腦耳遲復存㫖弟子二三年來溘然老至眼耳聾闇心氣昏塞故非復在人兼去歲第六兒夭喪痛苦成疾猶未除愈適今月中又有哀故頻歲如此窮慮轉深自念餘生無復能幾無由禮接係仰何言敬重璪書今還白書不次又與天台智者大師書陵和南放生星聞公家極相隨喜事是㧞公口具謹不多諮唯遲㧞公廷出數百里水全其命根如此功德筭數無盡隨喜無量此不委諮上智者禪師陵和南弟子思出樊籠無由羽化旣善根微弱冀願力莊嚴一願臨終正念成就二願不生地獄三途三願卽還人中不高不下處託生四願童眞出家如法奉戒五願不墮流俗之憎慿此誓心以策西暮今書丹欵仰乞證明徐孝穆集卷七終徐孝穆集卷八陳郯徐陵著明東海屠隆評頌皇太子臨辟雍頌臣聞天大王大詳於道德之言天文人文顯於爻􅁚之説是以大君革命黔首所以庇焉聖人創物文籍所以生焉咸由此道制爲民極莫不􅍟越上靈裁成庻􅀋濟世育德昭彼昆蟲皇帝世膺下武體兹上德握天鏡而授河圖執玉衡而運乾􅁚皇太子耀彼重離光兹􅍰鬯儀天以文化成天下侍中國子祭酒新安王宗室羽儀衣􅃣凖的惟善爲樂造次必儒粤以十一年三月二十一日受詔弘宣發論語題攝齊升堂摳衣卽席􅍟揚天人開闢大訓淸言旣吐精義入神副德爰動音鋒起問難泉涌辨論綸之異定倫理之疑玉振鏘鏘雲浮雨布介王奉繫聖蹤馳辯秀出信令張禹慙其師法何晏忸其訓詁穆穆焉洋洋焉此實虞朝之盛德生民之壯觀者也臣抑又聞之魯頌聿興史克宣其懿晉雍大啓王廙逞其詞所以述休平之風揚君上之德輕以下才敢爲頌曰皇運勃啓膺圖受命紫蓋東臨黃旌南映積仁累德重明疉聖四海無浪三階巳平儲駕戾止和鸞有聲弘風講肆崇儒肅成丹書貴道黃金賤籝洙泗興業闕里增榮銘太極殿銘夫紫蓋黃旗揚都之王氣長乆虎踞龍蟠金陵之地體貞固天居爽塏大寢尊嚴高應端門仰模營室歸于有德譬彼河圖傅我休明義同商􅂦太極殿者法氐􅁚亢王者之位以尊左平右墄天子之堂爲貴往朝煨燼多歷年所世道隆平宜其休復監軍鄒子度啓稱卽日忽有一大梓柱從流來泊在後渚岸嵳峩容與若漢水之僊槎搖􅃞波濤似新亭之龍刹孤拔靈山允彰天貺昔梁氏承聖將圖繕修東虜窺江西胡犯蹕定之方中亟興師旅揆之以日輒有災故是知秦人所止實漢祖而爲宮吳都佳氣乃元皇而斯宅千櫨赫奕萬拱崚嶒植綠芰而動微風舒丹蓮而制流火甘泉遠望觀正殿之崢嶸函谷遙看美皇居之佳麗信可以齊三光而示宇宙㑹萬國而朝諸侯爰命微臣乃爲銘曰雍峙相望參差未央偃師廻顧崔嵬德陽高捫太乙正睹瑶光峩峩靈柱赫赫流樟美以宮室嘉哉今日御扆垂旒當朝靖蹕樂備韶夏禮兼文質帝旅無諠王旗斯謐肅肅卿士邕邕承弼漢座雕屏周人檻櫺城隅有勤殿省皆銘况復皇寢宜昭國經方流典訓永樹天廷麈尾銘爰有妙物窮兹巧制員上天形平下地勢靡靡絲垂綿綿縷細入貢宜吳出先陪楚壁懸石拜帳中玉舉旣落天花亦通神語用動捨黙出處隨時揚斯雅論釋此繁疑拂靜塵暑引飾妙詞誰云質賤左右宜之序玉臺新詠序凌雲槪日由余之所未窺千門萬戸張衡之所曾賦周王璧臺之上漢帝金屋之中玉樹以􅃢瑚作枝珠簾以玳瑁爲柙其中有麗人焉其人也五陵豪族充􅃟掖庭四姓良家馳名永巷亦有潁川新市河間觀津本號嬌娥曾名巧笑楚王宮內無不推其細腰魏國佳人俱言訝其纖手閲詩敦禮非􅀡東鄰之自媒婉約風流無異西施之􅀍敎弟兄協律自小學歌少長河陽由來能舞琵琶新曲無待石崇箜篌雜引非因曹植傳鼓瑟于楊家得吹簫于秦女至若寵聞長樂陳后知而不平畵出天仙閼氏覽而遙妬且如東鄰巧笑唯侍寢于更衣西子微顰將橫陳于甲帳陪游馺娑騁纖腰于結風長樂鴛鴦奏新聲于度曲粧鳴蟬之薄􅁂照墮馬之垂鬟反挿金細橫抽寶樹南都石黛最發雙蛾北地臙脂偏開兩靨亦有嶺上仙童分丸魏帝腰中寶鳳授曆軒轅金星與婺女爭蕐麝月共嫦娥競爽驚鸞冶䄂時飄韓掾之香飛燕長􅅂宜結陳王之珮雖非圖畵入甘泉而不分言異神仙戲陽臺而無别眞可謂傾國傾城無􅍟無雙者也加以天情開朗逸思彫􅂠妙解文章尤工詩賦琉璃研匣終日隨身翡翠筆牀無時離手淸文滿篋非惟芍藥之花新製連篇寧止葡萄之樹九日登高時有緣情之作萬年公主非無累德之辭其佳麗也如彼其才情也如此旣而椒房宛轉柘館隂岑絳鶴晨嚴銅鋪晝靜三星未夕不事懷衾五日猶賖誰能理曲優游少託寂寞多閑厭長樂之疎鐘勞宮中之緩箭輕身無力怯南陽之擣衣生長􅀷宮笑扶風之織錦雖復投壺玉女爲歡盡於百驍爭博齊姬心賞窮於六著無怡神于暇景惟屬意于新詩可得代彼萱蘇微蠲愁疾但往世名篇當今巧製分諸麟閣散在鴻都不藉篇章無由披覽於是燃脂暝寫弄墨晨書􅁧錄艷歌凡爲十卷曾無參于雅頌亦靡濫于風人涇渭之間若斯而巳於是麗以金䋲裝之寶軸三臺妙札龍伸蠖屈之書五色花牋河北膠東之􅁓高樓鉛粉仍定魯魚之文辟惡生香聊防羽陵之蠧雲飛六甲高擅玉函鴻烈仙方長推丹枕至于靑牛帳裏餘曲旣終朱鳥牕前新粧巳竟方當開兹縹帙散此緗編永􅍟玩于書帷長循環于纖手豈如鄧學春秋儒者之功難習竇傳黃老金丹之術不成固勝西蜀豪家託情窮于魯殿東臺甲舘流詠止于洞簫孌彼諸姬聊同棄日猗與彤管麗矣香奩爲䕶軍長史王質移文比金風巳勁玉露方圓宐及窮秋幸踰高塞當使􅀌旌不反隻騎無還非止湯羅豈知堯德其承比年昬墊仍歲蘊隆粒粟貴於隋珠分糜乏於齊􅂦且氐羌旅拒巳跨伊􅗉胡羯慿陵方踰汾潞刺虎之􅀔時期卞生拾蜯之機彌驗蘇子但國家體茲明信有同皎日豈惟風􅀨之旦猶救匹夫宵夢之言無欺幽壤賊蕐皎近以臨蕃有譴作牧無章旣懼檻車之徵便憂齊斧之戮遂乃治兵楚夢竊戴干戈傍引西戎共謀爲䕶軍長史王質移文比金風巳勁玉露方圓宐及窮秋幸踰高塞當使􅀌旌不反隻騎無還非止湯羅豈知堯德其承比年昬墊仍歲蘊隆粒粟貴於隋珠分糜乏於齊􅂦且氐羌旅拒巳跨伊􅗉胡羯慿陵方踰汾潞刺虎之􅀔時期卞生拾蜯之機彌驗蘇子但國家體茲明信有同皎日豈惟風􅀨之旦猶救匹夫宵夢之言無欺幽壤賊蕐皎近以臨蕃有譴作牧無章旣懼檻車之徵便憂齊斧之戮遂乃治兵楚夢竊戴干戈傍引西戎共謀東夏僞周遣其衞國公宇文􅀡等總統獯獫爲其羽翼醜徒濟岸來攻郢城逆䜿浮舟同􅃐夏浦王師􅋈櫂素在中流群帥争驅應時殱蕩羌胡寶馬縱橫七澤之中荆楚樓船彌滿三江之上俘禽所􅀗水陸無遺蕐皎擢自芻微叨居蕃翰情慙犬馬㒺顧恩靈飜執干戈自圖家國聞諸間諜具彼隣謀乃授冬官卽爲鄕導雖傷仁義之俗非敢有私期和與之情猶冀無失移齊文􅀗去月二十日移承羯寇平殄同懷慶悅眷言鄰穆深副情佇夫天網之大固無微而不擒神武之師本無征而不克至如戎王傾其部落逆䜿道其鄕􅀜非厥英圖殆難戡戮况復洞庭遐曠兵食陰阜西窮版屋北罄璮廬聲冠苻姚􅀔兼聰勒庸蜀寶馬彌山不窮巴漢樓船陵波無際我之元戎上將協力同心承禀朝謨致行明罸爲風爲火殪彼􅀩衝如霆如雷擊其舟艦羌兵楚賊赴水沈沙棄甲則兩岸同奔橫屍則千里相枕江川盡滿譬睢水之無流原隰窮胡等陰山之長哭於是黑山叛邑諸城洞開白虜連羣投戈請命長沙鵩鳥靡復爲妖湘川石燕自然還儛克翦無筭縲禽不貲欲計軍俘終難巧曆所􅀗龍駒驥子百千其羣更開首蓿之園方廣騊駼之廐於是衞霍甘陳虬髭瞋目心馳壟路志飮河源乘勝長驅未知所限豈如桓溫不武棄彼􅀜中殷浩無能長茲羌賊方且西踰酒郡抵我境而置邊亭東略鹽池爲齊朝而反侵地此亦翦妖氛未窮巢窟便聞慶㨗愧佩良深檄周文主上㳟膺寶歷嗣奉瑶圖旣禀聖人之材兼富神武之畧乂安兆庶共靖戎蕐用戢干戈永銷鋒鏑况復追惟在楚無􅁯玉帛之言軫念過曹猶感盤餐之惠年馳玉節之使歲降銀車之恩庶使懷音微悟知感而反其藏匿招我叛臣翊從瀟湘空竭關壟荆梁左右漢􅃆東西􅈼天呼地望停哀救夫一人掩泣猶愴滿家百姓爲心彌切宸扆大都督吳明徹台司上將德茂勲高威著荆湘化聞庸蜀叱咤而平宿豫吹嘘而定壽陽席捲江淮無淹弦望徐孝穆集卷八終徐孝穆集卷九陳郯徐陵著明東海屠隆評碑徐州刺史侯安都德政碑巖巖天柱大矣周山之峰桓桓地軸壯哉崑崙之阜三光懸而不墜九土鎭以無疆承乾合德之君則天體元之后所以並咨四鎭咸建五臣業配蒼祗功成㝢縣至於流名雅頌著美風詩年代悠然寂寥無紀其能繼兹歌詠者司空侯使君乎自文昭武穆祚土開家濮水盛其衣簪榮波分其緒秩仁義之道夷門美於大梁儒雅之風司徒重於强漢自通人許劭託命於江湖高士袁忠寄身於交越俱違建安之難獨處衡山之陽祖天資秀傑世載雄豪卓富擬於公侯班佃必於旌鼓父光祿大夫邑里開通德之門州鄕無抗禮之客自茫茫禹迹赫赫宗周家滅驪戎國亡夷羿我高祖武皇帝迎河圖於浪泊括地􅁚於炎州南興涿鹿之師北問共工之罪天生宰輔堯年致白虎之祥神賜英賢殷帝感蒼龍之傑公亦觀時佇聖嘯咤風雲跪開黃石之書高詠玄池之野沈呤梁甫自比管仲之才惆悵莘郊久􅀒伊生之歎自羯虜侵蕐羣蠻縱軼後臯桂部之地四戰五達之郊郡境賢豪將謀禦難長者僉論推公主盟義士雄民星羅霧集公旣膺五聘方啓六韜率是驍徒仍開嶺嶠自大討瀟湘同茲樊酈下軍違命上策不宣敗我王師受拘勍盜大陳格於文祖咸秩具神率土依風群靈禀朔公亦忠爲令德天纂之謀吳帳斯開衞門無擁雖復季孫還魯隨武濟河國慶民歡相儔匪若卽授使持節開府儀同三司丹陽尹昔光武不尤於馮異穆公深禮於孟明終報王官之師遂舉咸陽之地斯乃聖主之宏畧而名臣之遠圖者焉皇帝以陶唐啓國致玉版於河宗顓頊承家佐金天於江水經綸草昧定􅂦之業居多締構權輿斷鼇之功相半固以英聲馳於海外信義感於寰中主器攸歸當璧斯在公於是抗表長信淸宮未央從億兆以同心引公卿而定策馳輕軒於軨轕奉待駕於中都七廟之基於焉永固萬􅀖之本由此克寧乃復進司空公南徐州刺史於是鎭之以淸静安之以惠和望杏敦耕瞻蒲勸穡室歌千耦家喜萬鍾陌上成陰桑中可詠春鶊始囀必具籠篚秋蟀載呤競鳴機杼或肅拜靈祀躬瞻舞雩去駕擁於風塵還旌阻於飄沐京坻歲積非勞楚堰之泉倉廪年豐無用秦渠之水雖復東過小縣夏雨逐其輕輪南渡滄江秋濤弭其張蓋固不得同年語矣若夫聽採民訟昏曉必通召引軒􅎉躬親辨决立授符於前案無留詣於後曹接務高城之中非異甘棠之下欣欣美俗濟濟都塵以賈琮郭賀之風行建武永平之化於是州民散騎常侍王瑒等拜表宮闕請揚茲美化樹彼高碑民欲天從允彰絲誥銘曰鬱鬱三􅁚􅃼􅃼九州綿天滲惨浹地虔劉赫矣高祖爰淸國讐元勲佐命力牧風后亦旣旋歸􅀖家有暉宮亭蠡浦􅁬翅高飛電卷勍宼風行國威文身被髮作貢來綏我皇纂武攀號東序謁渭同周迎門唯呂流矢爲暴攙搶斯舉喋喋蒼黎危危刀爼自我徂征妖氛克平爰驅大􅇾實翦長鯨北震巢浦南俘灌城靑羌卷介赤狄􅅆兵蹈舞難踰歌謡靡宣曰我黎庻俱祈上玄山移兩越海變三田公爲上相復倍斯年廣州刺史歐陽顧德政碑弱水導其洪源軒臺表其增殖懿哉少府師儲皇於二京盛矣司徒傳儒宗於九世廣陵邕邕族擅江右渤海赫赫名重洛陽若夫岳鎭龍蟠星懸鶉火衡山誕其高德湘水降其淸輝千􅌇􅀌標萬頃無渡年當小學志􅃣成童因孝爲心欲仁成體屯騎府君早棄榮祿易簀之日幾將毀終不杖之言深非通制遺貲巨萬富擬猗頓裁變槐榆竝賑宗戚南茨大麓北眺淸湘得性於橘洲之間披書於杏壇之上三冬文史五經縱橫頻致嘉招確乎難㧞旣而帝啓黃樞神亾赤伏天地崩霣川􅃁沸騰群悍酋豪更爲禍亂朝披羽檄夜炤爟烽浴鐵蔽於山原摐金駭於樓堞公疲兵屢出獨據胡􅇃勍賊重圍尚凭書几揚􅁅旣散駕棒將揮咸剋凶梁以保衡服常以二主􅀩塵三光掩曜出入逾於嘗膽殷憂獨其撫心不治第宅深符去病志梟群醜彌同越石自禹珪旣錫堯玉巳傳物變謳謠風移笙管商周之際􅀌竹尚其哀歌曹劉之間蘇子猶其狂哭况番禺連帥實謂宗枝迷我天機自窺梁􅂦以公威名本重逼統前軍乾數難違剥􅁚終悔高祖永言惟舊彌念奇功卽訓皇家深弘朝網檻車才至輿襯巳焚祝史袄於夷吾壇塲延於井伯綢繆安樂造次紆謀爰珥豐貂􅁢光金蟪但八桂之土蠻夷不賔九疑之陽兵凶歲積以公昔在衡臯深留風愛仁恩可以懷猛獸威名可以懼啼兒乃授持節散騎常侍衡州刺史我皇帝從唐侯以胤國屈啓筮而登家一㳟寶祚開定江􅃆三改璇衡包羅湘峽昔中宗屈申於處仲高祖遺恨於平城漢武承基方通沙塞􅀳明紹運裁平姑孰方其盛業綽有光前踐􅍈之初進公位征南將軍廣州刺史又都督東衡州二十州諸軍事宜公乃務是民天敦其分地火耕水耨彌亘原野賊盗皆􅅯工賈競臻鬻米商鹽盈衢滿肆新垣旣築外戸無扄脂脯豪家鐘􅂦爲樂揚袪灑汗振􅀨流風市有千金之租田多萬箱之詠僧釋慧羡等來朝綘闕備啓丹誠乞於大路康莊式刋豐琰庶樊卿寶􅂦復述台司之功羊􅅱高碑更紀征南之德於是跪開黃素爰登紫泥鑒此誠祈皆如所奏乃詔庸臣爲其銘曰赫赫宗陳桓桓􅂦臣千乘建學五典攸因盛德斯遠公門日新嵩高惟岳貺甫生申去衡移廣遷征自鎭悠悠銅界藐藐金鄰莫遠非督無思不賔三江靡浪五嶺奚塵式歌式舞仁哉至仁公其饗福於萬斯春晉陵太守王厲德政碑若夫睢陵世傳以詳載德之蕐徐州先賢亦著淸風之美偉哉文獻光啓中興郭莖表其深源何籌慙其遠慶豈惟桓氏之鳴玉張家之珥貂袁姓之朱衣楊宗之蕐轂又有佽飛遮列班弓夾門濯龍俯望緹綺盈道奕世如此何其盛哉君以藍田美玉大海明珠灼灼美其聲芳英英照其符彩風神雅淡識量寛和旣有崔琰之鬚睂非無鄭玄之腰帶爛爛如高巖下電騷騷若長松裏風􅀔利無擾於胸襟行藏不槩於懷抱家門雍睦孝友爲風上交不謟下交不凟脫貂救厄情靡矜􅈔釋馬窮途唯濟危殆至於網羅圖籍脂粉藝文學侶揖其精微詞宗稱其妙絕出爲仁武將軍晉陵太守五雞二彘勤䘏有方問羊知馬鉤距兼設濟北移樹累政之所未治汝南争水連年之所無斷一朝明决曾不留滯四民商販咸用殷阜銘曰康哉寶運美矣良臣胄自澧水源於洛濵公侯世及宰輔相因曰我民秀山川降神風情穆穆孝友恂恂學則經笥文爲世珍高風遠矣曠代難倫􅂦鉉虚職台階未臻安知霜霰遽夭松椿碣石斯表民情旣陳徒然下拜何報陽春孝義寺碑臣聞道階八地猶見后妃願生千佛無匪聖賢汲引之義雖同隨機之感非一至如嬀汭有禮皇源所以前興周女斯歸陳宗所以流慶大矣哉神基帝系淑聖重光者也􅄌訓太后德佐初九道暉上六居天上天中之極處太任太姒之尊蘋藻之化斯深􅁑覃之風彌遠皇帝膺茲上聖契彼援神愛敬在乎一人德敎形乎四海是以明星皎皎流半月之光甘露團團灑如飴之味嘉禾自秀浪井恒淸天降徵祥日聞書府自大明紹運神武應期至道傍通無思不格戊巳挍尉西􅀜玉門伏波將軍南表銅柱方使三千世界百億須彌同望飛輪共禀玄德元嘉三年正月二十一日詔㫖仰惟聖德方被兆民乃敇有司改東成里爲孝義里昔岱山徙號重蕐著其受終德水移名秦人表其嘉運豈若盡在地輿書茲里門仰述天經光臨父母臣陵稽首乃作銘曰願此良因宜資貴親三乘竝策四梵爲賔紺殿安坐蓮花養神燈前禮佛地後邊身竝濟含識咸歸至眞國家隆盛同饗遐慶謹勒豐碑陳其舞詠齊國宋司徒寺碑無色之外方爲化城非想之中猶稱火宅若夫衆生無盡世界無窮芬若披蓮遠如散墨善財童子南行未窺目連沙門北遊不見一一刹土皆由業緣萬萬僧祗終非常樂天宮蹇産猶傾四大之風魔殿崔嵬終懼三灾之火朱樓寶塔輝煥增華旣義暢中土道流遐域顯黙同歸華夷俱慕自枕石漱流始終一槩悟智交養三十餘年春秋八十三古人云道存人亾法師之謂見我門徒感風徽之緬邈傷諮悟之永滅敢以淺見揚德金石銘曰九流依眞三乘歸佛道徃絕跡􅄌還接物孰是發􅀩昭我慧日攝亂以定闢邪以律秦皇雄感蔽理通情王孫偏解遠死滯生夫子之悟萬劫獨明寒暑迭易悲欣臯壤秋蓬四轉春鴻五響􅀌松獨秀德音長往節有推遷情無遺想東陽䨇林寺傅大士碑自修禪遠豁絕粒長齋非服流霞若食朝沆姜原所􅂂天步可以爲儔河流大􅄚神足宐其相比夫以連城之寶照廡之珍野老恠而相捐工人迷而不識昔漢皇受道欒大不臣魏祖優賢楊叟如客河上之老輕舉臨於孝文臺下之人高尚加於光武五胡內奰蒼鵞之兆未萌四海橫流夷羊之牧匪見滳海未盡其辭懸河不窮其義伯陽之德貞桓紀於瀬鄕仲尼之道高碑書於魯縣亦有楊雄弟子鄭玄門人俱述淸猷載刋玄石銘曰來儀上國抗禮承明妙辯無相深言不生撞鐘比說擊鼓慙英樂論天口誰其與京乍見仙掌爰標神足色豔浮檀香踰簷匐噭噭門人承師若親寧焚軟疊弗燎香薪合窟爲定方墳以墟須彌巨海變炭揚塵净土無壤靈儀自眞何時踴塔復覩令身天台山館徐則法師碑夫海水揚塵幾千年而可見天衣拂石幾萬歲而應平至人者譬彼晨昏方乎晷刻固非俗士之所能言寰中之所能量者也至如不死之草猶稱南裔長生之樹尚挺西崑百紀遊􅀛皆登蓮葉千齡壽鶴或舞松枝假矣生民何其夭脆譬彼風電同諸泡沫琢火之歎聞諸往賢逝水之悲嗟呼前聖樵人看博信未須彌巨海變炭揚塵净土無壤靈儀自眞何時踴塔復覩令身天台山館徐則法師碑夫海水揚塵幾千年而可見天衣拂石幾萬歲而應平至人者譬彼晨昏方乎晷刻固非俗士之所能言寰中之所能量者也至如不死之草猶稱南裔長生之樹尚挺西崑百紀遊􅀛皆登蓮葉千齡壽鶴或舞松枝假矣生民何其夭脆譬彼風電同諸泡沫琢火之歎聞諸往賢逝水之悲嗟呼前聖樵人看博信未始乎淹留仙客彈琴固不移於俄頃然而子孫皆其數世鄕黨咸爲草來是以志士名賢飄然長騖臊羶榮利懕穢風塵服冕乘軒其猶桎梏朱庭紫閣事甚籠樊隱淪巖洞飡餌芝髓忽矣身輕俄然羽化金繩玉版受謁帝之符龍駕霓裳處仙官之籙法師蕭然道氣卓矣仙才千􅌇􅀌標萬頃無度所以伊川控鶴葉縣乘鳬靈化無方去還斯在銘曰來去三鳥賔遊二童然香雨上擊磬雲中玉粒雖軟金膏未鎔方流道業濟彼昏􅀩長干寺衆食碑昔炎皇肇訓稷正修宮信矣天民之言誠哉國寶之義自非道登正覺安住於大般湼槃行在眞空深入於無爲般若則菩薩應化咸同色身諸佛净土皆爲揣食證常住者爰乞乳糜補尊位者猶假香飯亦有三心未滅七反餘生應㑹天宮就齎龍海况復居地轉咸憇珠庭固以皆種仙禾並資靈粟者矣法師常願以智慧火燒煩惱薪普施衆生同飡甘露况復安居自恣願學高年或次第於王城猶栖遑於貧里迦留乞䴵苦用神通須提請飯致貽詞責於是思營衆業願造坊厨庶使應供之僧皆同自然之食升堂濟濟無勞四軰之類高廪峩峩恒有千食之僃其外鐵市銅街靑樓紫陌辛家黑白之里甲第王侯之門莫不供施相高資儲轉衆法師善巧方便漚和舍羅敎授滋生隨年增長假使桑林不雨􅉚水揚波猶厭稻梁永無饑乏加以五鹽具足七菜芳軟䴵􅀋天厨果同香樹羮􅂦之大殷王未逢糜鑊之深齊都非擬昆吾在次皆鳴鷲嶺之鐘暘谷初升同洗龍池之鉢丹陽上庸路碑在天成􅁚咸池屬於五潢在地成形滄海環於四凟國險者固其金湯儲蓄者因於轉漕貨財爲禮專俟㑹通厥田爲上皆資滲漉大矣哉坎德之爲用也是以握圖之主財以利民御斗之君因之顯敎上哉少昊初命水官逖矣高陽爰重㝠職舜爲太尉于是九澤載疏禹作司空然後百川咸導開蕐山於高掌鑿靈沼於周源莫匪神功皆由聖德我大梁之受天明命勞巳濟民有道稱皇無爲曰帝若夫雲雷草創翦商黜夏之勲鑄寶􅂦於昆吾安能紀勒陳鴻鐘於酆岳豈易揄揚斯固名言之所絕也及乎􅈾斯寶運大拯橫流屈至道於汾陽勞凝神於藐射聖人作樂簫韶僃以九成喆王盡禮春官總於三代豈止金門桴竹玉尺調鐘公帶獻明堂之圖匡衡建后土之議若斯而巳矣天降丹鳥旣序孝經河出應龍乃私周易若夫固天將聖垂意藝文五色相宣八音繁㑹不移漏刻􅂊命口占御􅁓風飛天章海溢皆紫庭黃竹之詞晨露卿雲之藻漢之兩帝徒有詠歌魏之三祖空云詩賦以爲彭老之敎終没愛河儒㑹之宗方難大宅豈如五詩八㑹之􅊋文天上人中之妙典雪山羅漢争造論門鷲嶺名僧俱傳經藏香􅁚之力特所未勝秋兎之臺書而莫盡忠信爲寶禱祈免於白駒明德惟馨山川舍於騂犢至如月離金虎泥染石牛㑹蔚朝興滂沱晚注而淸蹕纔動纎羅不搖高閈將臨油雲自闢陽烏馭日寧懼武賁之弓飛􅀨彌天無待期門之蓋震維舉德非曰尚年若發居鄷猶莊在漢濤如白馬卽礙廣陵之江山曰金牛孰辨海湖之路專州典郡靑鳬赤馬之船皇子天孫鳴鳳飛龍之乗莫不欣斯利渉玩此修渠乍擁揖而長歌乃樅金而鳴􅄜斯曠世之奇功無疆之鴻烈徐孝穆集卷九終徐孝穆集卷十陳郯徐陵著明東海屠隆評哀冊陳文皇帝哀冊文維太康元年太歲丙戌四月丁未朔二十七日癸酉大行皇帝崩于有覺殿殯于太極之西階粤六月丙寅將遷於永寧陵禮也宮車晚駕幄殿晨張旌銘具列綍翻成行哀子嗣皇帝諱擗蜃輅於丹階攀龍帷於紫庭趨過窮於屏闕拜慟感於明靈東京飛其瑞露北陸霣其祥星乃詔雲臺之史稽採咸池之曲叶大雅於鳴金同藏書於群玉其辭曰若水傳帝薰風御民重光所集世載于陳赫矣高祖愍哉上旻蟬聮寶霄暉煥郊禋我皇誕聖應此家慶道主衢鐏神凝懸鏡洛書天表河紀靈命納揆馳芳賔門流詠稽陰克伐震野勤王亳道増搆􅃎風㑹昌言瞻少昊實狀高陽効駕轇轕淸宮未央歡覃兆庶德洎遐荒穆齊高寢上膳長樂肅肅承顔哀哀薦酌悼園㳟儉章陵謙約大寶崇明無間改作纂武升歷遺憂寔繁三湘九􅂀沴氣雲昏力折天柱才傾地門丹泉夜照細柳朝屯谷魅山􅀑横流塞源赫赫英謨﨣﨣雄斷逓行天討無遺神筭鬱掃江淮長驅巴漢九夷百越雷隨風渙北俘昆邪西戡伊靬荷􅀒皇極劬勞萬幾勤民聽政昃食宵衣服貴綈皂風移閫闈唐山罷奏濮水韜徽訪採狂狷搜􅆒仄㣲世感中孚民惟大畜外戸無閉高垣奚築降情儒雅凝懷庠塾御廡爲歡臨雍彌肅禮兼三代樂僃九成天資武德地照文明墨屨斯在幪巾自淸連珠合璧曜爽流精獸舞時務禽歌頌平帝載維遠王靈維大候􅀨占風荒中海外憬彼鞮譯咸承􅃣帶是曰君臨斯爲交泰白環巳貢玄珪克貞東河佇楫北狄思征鉞斧將戒􅋛珩未鳴星􅁋去楚日沴悲荆億兆何舋穹昊遽傾嗚呼哀哉大禹胼胝重蕐腒腊仰惟勞務同斯違懌吉夢無徵昭祈奚益聽茂陵之鐘鼓抱喬陽之劒舄雖髣髴於神儀終􅆞綿以號擗嗚呼哀哉三占巳吉四海星奔列贈天宇崩號帝閽千門啓於閶闔萬乘警其靈輼槐風悲於輦道松􅀨思於郊源鑾斾動而虚悲宿衞静而空尊嗚呼哀哉畢陌平夷流山蟠固紀無遷市唐有通樹經白社之修途􅅆靑門之廣路思沛邑以東臨懷周京以西顧嗚呼哀哉機神不測性道難稱克窮靡寄孺慕奚慿唯封云亭之與禪父肅玉牒之與金繩楊英聲而永久共日月而俱升嗚呼哀哉墓誌司空河東康簡王墓誌銘夫聖人至德天道福謙大哉堯舜貽慶長遠明兩之盛中陽纂於豢龍百世之祀皇家兆於鳴鳳違丹丘於海北應紫蓋於江南帝系皇基重光累葉高祖之建天柱列聖之補地維蕩蕩乎民無得而名焉者也王資神昴緯託曜房靈體斯孝烈不由師保月生之􅍟曾何用於擬議日近之言亦無階於等級封河東王加侍中淑貌與金燧相宜淸顏與玉壺同照授使持節南徐州刺史武羌旅拒亭障遷移漠草非長廣之東湖萊近荆門之北王常譏庾翼使白面之非才深慕曹彰歎黃鬚之爲可火精不退奚應善言水蛭難消徒持陰德薨于沙鎭時年一十有七追贈司空加鼓吹班劒謚曰康簡王洛北占墳河南除道葭悲煙殿之聲劒動豐城之氣豈惟晉王寵悼重琅邪之贈官魏后高文制蒼舒之哀誄司空章昭達墓誌銘周原膴膴佳氣葱葱王業攸興帝圖斯盛在昔光武佐命隣縣者鄧侯高祖元臣同郡者蕭相公台輔之量便著綺紈瑚璉之姿無待雕琢起家爲東宮􅀡前所奉之君則}
