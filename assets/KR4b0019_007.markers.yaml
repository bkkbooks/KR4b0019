  - {type: variant, offset: 0, length: 0, content: '', SBCK: 海屠隆題徐陵本傳唐散騎常侍姚思㢘􅁧徐陵字孝穆東海郯人也祖超之齊鬱林太守梁員外散騎常侍父摛梁戎昭將軍太子左衞卒贈侍中太子詹事謚貞子母臧氏嘗夢五色雲化而爲鳳集左肩上巳而誕陵焉時寶誌上人者世稱其有道陵年數歲家人擕以候之寶誌手摩其頂曰天上石麒麟也光宅惠雲法師毎嗟陵早成就謂之顏囘八歲能屬文十二通莊老義旣長博涉史籍縱横有口辯梁普通二年晉安王爲西平將軍寧蠻挍尉父摛爲王諮議王又引陵參寧蠻府軍事大通二年王立爲皇太子東宮置學士陵充其選稍遷尚書度支郞出爲上虞令御史中丞劉孝儀與陵先有􅂩風聞劾陵在縣􅂍汙因坐免久之起爲南平王府行參軍遷通􅀡散騎侍郞梁簡文在東宮撰長春殿義記使陵爲序又令於少傅府述所製莊子義尋遷鎭西湘東王中記室參軍太淸二年兼通􅀡散騎常侍使魏魏人授館宴賔是日甚􅀬其主客魏收嘲陵曰今日之􅀬當由徐常侍來陵卽荅曰昔王肅至此爲魏始制禮儀今我來聘使卿復知寒暑收大慙及侯景寇京師陵父摛先在圍城之內陵不奉家信便蔬食布衣若居憂恤會齊受魏禪梁元帝承制於江陵復通使於齊陵累求復命終拘留不遣陵乃致書於僕射楊遵彥竟不報書及江陵䧟齊送貞陽侯蕭淵明爲梁嗣乃遣陵隨還太尉王僧辯初拒境不納淵明往復致書皆陵詞也及淵明之八僧辯得陵大喜接待餽遺其禮甚優以陵爲尚書吏部郞掌詔誥其年高祖率兵誅僧辯仍進討韋載時任約徐嗣徽乘虚襲石頭陵感僧辯舊恩乃往赴約及約等平高祖釋陵不問尋以爲貞威將軍尚書左丞紹泰二年又使于齊還除給事黃門侍郞袐書監高祖受禪加散騎常侍左丞如故天嘉初除太府卿四年遷五兵尚書領大著作六年除散騎常侍御史中丞時安成王頊爲司空以帝弟之尊􅀔傾朝野􅀡兵鮑叔㪫假王威權抑塞辭訟大臣莫敢言者陵聞之乃爲奏彈導從南臺官屬引奏案而入世祖見陵服章嚴肅若不可犯爲歛容正坐陵進讀奏版時安成王殿上侍立仰視世祖流汗失色陵遣殿中御史引王下殿遂劾免侍中中書監自此朝廷肅然天康元年遷吏部尚書領大著作陵以梁末以來選授多失其所於是提舉綱維綜覈名實時有冒進求官諠競不巳者陵乃爲書宣示衆咸服焉時論比之毛玠廢帝卽位高宗入輔謀黜異志者引陵預其議高宗纂曆封建昌縣侯邑五百戸太建元年除尚書右僕射二年遷尚書左僕射陵抗表推周弘正王勱等高宗召陵入內殿曰卿何爲固辭此職而舉人乎陵曰周弘正從陛下西還舊藩長史王勱太平相府長史張種帝鄕賢戚若選賢與舊臣宐居後固辭累日高宗苦屬之陵乃奉詔及朝議北伐高宗曰朕意巳决卿可舉元帥衆議咸以中權將軍淳于量位重共署推之陵獨曰不然吳明徹家在淮左悉彼風俗將畧人才當今亦無過者於是争論累日不能决都官尚書裴忌曰臣同徐僕射陵應聲曰非但明徹良將裴忌卽良副也是日詔明徹爲大都督令忌監軍事遂克淮南數十州之地高宗因置酒舉杯屬陵曰賞卿知人陵避席􅍟曰定策出自聖􅂨非臣之力也其年加侍中餘竝如故七年領國子祭酒南徐州大中正以公事免侍中僕射尋加侍中給扶又除領軍將軍八年加翌右將軍太子詹事置佐史俄遷右光祿大夫餘竝如故十年重爲領軍將軍尋遷安右將軍丹陽尹十三年爲中書監領太子詹事給鼓吹一部侍中將軍右光祿中正如故陵以年老累表求致仕高宗亦優之乃詔將作爲造大齋令陵就第攝事後主卽位遷左光祿大夫太子少傅餘如故至元年卒時年七十七詔曰愼終有典抑乃舊章令德可甄諒宐追遠侍中安右將軍左光祿大夫太子少􅀓南徐州大中正建昌縣開國侯陵弱齡學尚登朝秀頴業高名軰文曰詞宗朕近歲承蕐特相引狎雖多目疾方期克壯􅍕然殞逝震悼于懷可贈鎭右將軍特進其侍中左光祿鼓吹侯如故并出舉哀喪事所須量加資給謚曰章陵器局深遠容止可觀性又淸簡無所營樹祿俸與親族共之太建中食建昌邑邑戸送米至于水次陵親戚有貧匱者皆令取之數日便盡陵家尋致乏絕府僚恠而問其故陵云我有車牛衣裳可賣餘家有可賣不其周給如此少而崇信釋敎經論多所精解後主在東宮令陵講大品經義學名僧自遠雲集毎講筵商較四座莫能與抗目有靑睛時人以爲聰慧之相也自有陳創業文檄軍書及禪授詔策皆陵所製而九錫尤美爲一代文宗亦不以此矜物未嘗詆訶作者其於後進之徒接引無倦世祖高宗之世國家有大手筆皆陵草之其文頗變舊體緝裁巧密多有新意每一文出手好事者巳傳寫成誦遂被之蕐夷家藏其本後聞喪亂多散失存者三十卷有四子儉份儀僔史臣曰徐孝穆挺五行之秀禀天地之靈聰明特達籠􅇁今古及締構興王遭逢泰運位隆朝宰獻替謀猷蓋亮􅀡存矣孝克砥身厲行養親逾禮亦參閔之志歟}
