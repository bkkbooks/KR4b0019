  - {type: variant, offset: 14, length: 0, content: '', SBCK: 矦之誓白水如蕭王之推赤心屈禮交盟人祗感咽故使舟師並路遠邇同心此又公之功也姑熟襟要崤函阻慿宼虜據其􅀜梁大盜負其扄鐍公一枝裁撝三雄並奮左賢右角沙潰土崩木甲殪於中原氊裘赴於江水他他藉藉萬計千群鄂坂之隘斯開夷庚之道無塞此又公之功也義軍大衆俱集帝京逆豎兇徒猶屯皇邑若夫表裏山河金湯嶮固疏龍首以抗殿揃華嶽以爲城雜虜慿焉強兵自若公囘兹地軸抗此天羅曾不崇朝俾無遺噍軍容甚穆國政方修物重覩於衣􅃣民還瞻於禮樂楚人滿道争覩於葉公漢老衘悲俱觀於司􅀠此又公之功也內難初靖諸矦出􅀜外郡傳烽鮮卑犯塞莫非且渠當戸中貴明王冀馬列於淮南胡笳動於徐北公舟師歩甲亘野橫江殱厥群羝遂殫封狶莫不絓木}
  - {type: page-break, offset: 14, content: '', id: KR4b0019_SBCK_002-7b}
  - {type: variant, offset: 15, length: 0, content: '', SBCK: 止戎車靡遺遇濘而旋歸驂盡殪此又公之功也公克黜禍難劬勞皇室而孫􅇞之黨翻啓狄心伊洛之間咸爲虜戍雖金陵佳氣石壘天嚴朝闇戎塵夜喧胡鼔公三籌旣畫八陣斯張裁舉靈旗亦抽金僕咸俘醜􅀋悉反高墉異李廣之皆誅同龎元之盡赦此又公之功也任約叛渙梟聲不悛戎羯貪婪狼心無改穹廬氊幕抵北闕而爲營烏孫天馬指東都而成陣公左甄右落箕張翼舒掃是攙搶驅其獫狁長狄之種埋於國門椎髻之酋烹於軍市投秦坑而盡沸噎濉水而不流此又公之功也一相居中自折􅃔􅂦五湖小守妄懷同惡公夙駕兼道秉羽杖戈玉斧將揮金鉦且戒袄酋震懾遽請􅁅釘􅅡櫬以表其含弘焚書以安其反側此又公之功也賊龕兇橫陵虐具區阻兵安􅃘慿災怙亂自古蟲言鳥跡混沌洪􅂽凡或虔劉未此殘酷公雖宗居汝頴世寓東南育聖誕賢之鄕含章挺生之地眷言桑梓公私憤切卓爾英狀承䂓奉算戮此大憝如烹小鮮此又公之功也亂離永久羣盜孔多浙左兇渠連兵搆逆豈止千兵五校白雀黃龍巳哉公以中軍無率􅃟是親賢奸冦途窮漼然冰泮刑溏之所文命動其大威雷門之間勾踐行其嚴戮英䂓聖跡異代同風此又公之功也同姓有扈頑兇不賔慿藉宗盟圖危社稷觀兵滙澤􅀔震京師驅率南蠻巳爲東帝公論兵於廟堂之上决勝於尊爼之間寇賈樊滕浮江}
  - {type: page-break, offset: 15, content: '', id: KR4b0019_SBCK_002-8a}
  - {type: page-break, offset: 15, content: '', id: KR4b0019_SBCK_002-8b}
  - {type: page-break, offset: 15, content: '', id: KR4b0019_SBCK_002-9a}
  - {type: variant, offset: 16, length: 0, content: '', SBCK: 瀨一朝揃撲無待甸師萬里澄淸非勞新息此又公之功也豫章袄冦依慿山澤繕甲完聚各歷歲時結從連橫爰洎交廣呂嘉旣􅀗吳濞巳摐命我還師征其不恪連營盡拔僞黨斯擒曜聖武於匡山囘神旌於蠡浱此又公之功也自八紘九野􅀲剖豆分竊帝偷王連州比縣公武靈巳暢文德又宣折簡馳書風猷斯遠至於蒼蒼浴日杳杳無雷北洎丈夫之鄕南踰女子之國莫不屈膝膜拜求吏欵􅀜此又公之功也京師禍亂亟積寒暄雙闕低昻九門寥豁寧秦宫之可顧豈魯殿之猶存五都簮弁百僚卿士胡服縵纓咸爲戎俗高冠厚履希復華風宋微子麥穟之歌周大夫黍離之歎方之於斯}
  - {type: page-break, offset: 16, content: '', id: KR4b0019_SBCK_002-9b}
  - {type: variant, offset: 17, length: 6, content: 嘗不廢書三歎, SBCK: 足爲悲矣公求衣昧旦昃食高春興構宮闈具瞻遐邇膠庠宗稷之典六符十等之章還聞太史之風流重覩永平之遺事此又公之功}
  - {type: variant, offset: 24, length: 8, content: 南北朝凡九君皆假, SBCK: 公有濟天下之勲重之以明德凝神體道合德符天用百姓以爲心隨萬機而成務耻一物非}
