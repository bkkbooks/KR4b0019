  - {type: variant, offset: 40, length: 4, content: 舉沿習成, SBCK: 嚴規下逼羣公之廷諍遂以庸質升纂帝基􅍟揚大化彌增號懼今宜式遵舊則奉上皇后尊號爲皇太后御慈訓宮一依前典若中流靜晏皇嗣歸來輒當解􅌧於箕山之陽歸老于瑯琊之國復子明辟還承寶圖若問與夷無媿園寢始興王詔漢祖天倫伯叔追封晉元世系瑯琊傳國仰惟二后重光率由前典朕昔因藩次􅀩繼本宗分在要荒乆離寒燠天嘉紹祚别命皇枝歸自崤函禮隔登獻每至霜庭可履矚垣寢而懷悲}
