  - {type: variant, offset: 241, length: 0, content: '', SBCK: 下素挺詞鋒兼長理窟匡丞相解頥之説樂令君淸耳之談向所諮疑誰能曉喻若鄙言爲謬來㫖必通分請􅁅釘甘從斧鑊何但規規黙黙齰舌低頭而巳哉若一理存焉猶希矜眷何必期令我等必􅂮齊都足趙魏之黃塵加幽并之片骨遂使東平拱樹長懷向漢之悲西洛􅀌墳恒表思鄕之夢千祈}
  - {type: page-break, offset: 241, content: '', id: KR4b0019_SBCK_004-10b}
  - {type: variant, offset: 242, length: 0, content: '', SBCK: 屢哽慟增􅀷與王僧辯書昔者雲師火帝非無戰陣之風堯誓湯征咸用干戈之道至於揺山蕩海驅電乘雷殲厥兇渠無虧皇極若夏鍾夷羿周厄犬戎漢委珠􅇸秦亾寶鏡然則皆聞之矣未有膺龍圖以建國御鳳邸以承家二后欽明三靈交㤗而天崩地坼妖冦橫行者也自古銅頭鐵額興暴皇年檮杌窮奇流災中國王彌石勒吞噬􅀜河綠林靑犢之群黑山白馬之衆校彼兵荒無聞前史八王故事曾未混淆九州春秋非去禍亂我皇受命中興光宅天下㤗寧􅃈􅃈安敢執鞭建武栖栖何其扶轂抑又聞之陶唐旣作天歸鳥喙之臣豐畢將興特挺鷹揚之佐明公量苞金鉉神表玉璜儷衮欽才平階佇德固以畱連管樂惆悵風雲濡足維時投竿斯在去歲兇徒不騁言次巴丘鼔聲聞一柱之臺烽火照三休之殿公則懸麾羽扇猶􅍟投壼戎羯咸奔鯨鯢俱剪樓船萬軸還繫昆明胡馬千群皆輸長樂於是乎夏首西浮雲行電邁彭波東匯谷静山空扼鵲尾而據王畿登牛頭而掃天闕漸臺僞帥仍傳首於帝京郿塢元兇咸刳腸於軍市靑羌赤狄同􅂌豺狼胡服夷言咸爲京觀公園陵盡拜忠貫長沙神主咸安勲踰高密重以秦宫旣􅀗魯殿猶存闢綠草於應門開靑槐於武庫長安五陵之族鄠杜六遷之民褓􅀒而歸都壥斯滿鬻脂藏脯遊騎擊鐘故市新城飛甍華屋東筦舊宅人識桑榆南頓荒田家分禾􅁰豈以鄕名穀熟邑號禾興而巳哉若夫卦起龍文書因鳥跡劬勞王室大拯生民自開闢以來未之有也雖十六才子明允篤誠八百諸矦專心同德中宗佐命俱畵丹靑光武功臣皆懸星􅁚棧道木閣田單之奉霸齊綰璽將兵周勃之扶强漢壤蟲之比黃鵠轍鮒之仰河宗未足云也􅀌子階緣多幸叨簉皇華鄕國屯危公私燋迫邳􅊮之切長亂心胸徐庶之祈終無開􅁢旣而屏居空館多歴歲時釁犯幽祗躬當勦滅何圖釁咎災極蒼旻號暮煩􅁈肝腸屠殞酷痛柰何無狀奈何惟枽與梓翻若天涯杖栢栽松悠然長絕明明日月號呌無聞􅃼􅃼宇宙容身何所窮劇奈何自忝膺嘉聘仍屬亂離上下年尊偏嬰此酷昔人迎門請盜恒懷廢寢之憂當輓輿親猶有危途之懼况乎逆冦崩騰京師播越興居動止長隔山河温淸饘􅓞誰經心眼程糜不繼原粟何資瞻望風雲朝夕嗚咽固乃遊魂巳謝非復全生餘息空畱非爲全死同氷魚之不絕似蟄燕之猶蘇良可哀也良可哀也自東都紹漢南亳興殷修好徵兵彌畱星琯韓宣范武方駕連鑣蘇秦張儀朱輪華轂而􅀌子三危是擯四罪同科聽别馬而長號杖歸旍而永慟王稽反命旣無託乘之恩椒舉相逢誰爲班荆之位昔人違齊處魯時䧏徵求亡晉奔秦猶􅀩招請問管寧於遼左追王朗於浙東竝物譽時賢卿門公族懸須應務􅀷挾情祈斯豈庸賤之儔耶非餘生之敢望也但預在輶軒誠爲過誤珪璋特逹通聘河陽貂珥雍容尋盟漳水差有黃門啓封非無靑􅁓詔書郡將州司郊迎􅀒弩鄕亭里􅀱餙館陳兵豈是復介而奔齊寧當竊妻而逃晉巳焉哉羌難得而言也漢之谷吉捐軀者幾人楚之申胥埋魂者何極􅀌子何所歎焉但頓伏苫廬徒延光晷夫以啁噍鷰雀躑躅鳴號含識懷情未有其痛且夫曾耕雨雪猶尚悲歌蘇使幽囚無馳哽噎公履忠弘孝冠冕縉紳化感煙雲量標海岳行糜仲月王政無塞分榖高年仁風斯遠固以衣纓仰訓黎庶投懷今日憔惶彌布洪澤雖復􅀌骸不返方爲漠北之塵營魄知歸終結江南之草徐孝穆集卷四終徐孝穆集卷五陳郯徐陵著明東海屠隆評書與顧記室書吾伏事天朝本非舊􅀠殿下殊恩遠垂薦拔故常戰戰慄慄甘心痛謹庻其愚老無􅀒明據近者旣居臺轄唯務奉公去年正月十五日尚書官大朝元凱旣集丞郞肅然忽有陳慶之見陳暄者帽簮釘額絛布裹頭虜袍通踝胡靴至膝􅀡來郞座遍相排抱或坐或}
