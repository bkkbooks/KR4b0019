  - {type: variant, offset: 0, length: 21034, content: 欽定四庫全書徐孝穆集箋注巻一陳徐陵撰呉江呉兆宜註賦鴛鴦賦飛飛兮海濱去去兮迎春炎皇之季女漢張良傳注師古曰赤松子仙人號也神農時為雨師服水土教神農能入火自燒至昆山上常止西王母石室隨風雨上下炎帝少女追之亦得仙去織素之佳人古詩新人工織縑故人工織素織縑日一匹織素五丈餘將縑來比素新人不如故未若宋王之小史含情而死列異傳宋康王埋韓馮夫妻宿夕文梓生有鴛鴦雌雄各一恒栖樹上晨夕交頸憶少婦之生離恨新婚之無子玉臺新詠漢建安中焦仲卿妻劉氏為仲卿母所遣其家逼嫁没水仲卿亦縊人哀之為詩云中有雙飛鳥自名為鴛鴦既交頸於千年亦相隨於萬里山雞映水那自得異苑山雞愛其毛羽映水則舞孤鸞照鏡不成雙范泰鸞鳥詩序昔罽賓王結罝峻卵之山獲一鸞鳥王甚愛之三年不鳴其夫人曰嘗聞鳥見其類而後鳴何不照鏡以映之鸞覩影悲鳴而絶天下真成長合㑹無勝比翼兩鴛鴦觀其哢吭浮沈左思蜀都賦哢吭清渠輕軀瀺灂張衡南都賦汰瀺灂兮船容裔拂荇戲而波散排荷翻而水落特訝鴛鴦鳥長情真可念許處勝人多何時肯相厭聞道鴛鴦一鳥名敎人如有逐春情不見臨邛卓家女祇為琴中作許聲玉臺新詠琴歌序相如遊臨邛富人卓王孫有女文君新寡竊於壁間窺之相如鼔琴歌以挑之其歌曰何緣交頸為鴛鴦胡頡頏兮共翺翔樂府驄馬驅白馬號龍駒晉陸雲傳閔鴻見而竒之曰此兒若非龍駒定是鳯雛雕鞍名鏤衢三輔決録平陵公孫奮富聞京師梁冀知奮儉恡以鏤衢鞍遺奮從貸五千萬諸兄二千石徐樹榖曰後漢循吏傳秦彭字伯平扶風茂陵人也六世祖襲為潁川太守與羣從同時為二千石者五人故三輔號曰萬石秦氏小婦字羅敷古樂府秦氏有好女自言名羅敷倚端輕埽史一作吏未詳漢高五王傳魏勃少時欲求見齊相曹參家貧無以自通乃常獨早埽齊相舍人門外舍人怪之以為物而伺之得勃於是舍人見勃曹參因以為舍人言之悼恵王拜為内史召募撃休屠漢霍去病傳上曰票騎將軍收休屠王祭天金人塞外多風雪城中絶詔書空憶長楸下曹植名都篇走馬長楸間連蹀復連􅘠文君白頭吟今日十酒㑹明旦溝水頭蹀躞御溝上溝水東西流按􅘠音鋪馬蹀跡也中婦織流黄玉臺新詠古樂府相逢行曰大婦織羅綺中婦織流黄小婦無所作挾瑟上高堂落花還一作飛井上春機當户前帶衫行幛口覓釧枕檀一作入檀邊數鑷疑作躡經無亂魏志舊綾機五十綜者五十躡六十綜者六十躡扶風馬鈞患其喪功費日皆易以十二躡新螿緯易牽古今注莎雞一名催織一名絡緯催織謂鳴聲如急織絡緯謂其聲如紡績也蜘蛛夜伴織張協雜詩蜘蛛網四屋百舌曉驚眠易緯通卦百舌者反舌鳥也能反覆其舌隨百鳥之音封用黎陽土東觀漢記鄧訓故吏知訓好青泥封書從黎陽步推鹿車過易陽載青泥一襆遺訓書因計吏船揚雄答劉歆書天下上計孝㢘及内郡衛卒㑹者雄常把三寸弱翰齎油素四尺以問其異語欲知夫壻處古樂府東方千餘騎夫壻居上頭今督水衡錢漢書本始二年春以水衡錢為平陵徙民起第宅注應劭曰水衡與少府皆天子私藏出自薊北門行樂府遺聲都邑三十四曲有出自薊北門行鮑昭出自薊北門行注薊故燕國薊北聊長望黄昏心獨愁屈原離騷曰黄昏以為期燕山對古刹代郡隠一作倚城樓屢戰橋恒斷長冰塹不流天雲如地陣漢月帶胡秋漬土泥函谷顧有孝曰後漢隗囂傳王元曰元請以一丸泥為大王東封函谷闗挼繩縛涼州朱鶴齡曰漢西域傳烏秅國其西則有縣度縣度者石山也谿谷不通以繩索相引而度云平生燕頷相㑹自得封侯後漢班超傳相者指曰生燕頷虎頸飛而食肉此萬里侯相也後以西域五十餘國悉皆納質封定逺侯隴頭水崔豹古今注横吹胡樂也張騫入西域傳其法唯得摩訶兜勒一曲李延年因造新聲二十八解魏晉以來不存見用黄鵠隴頭折楊柳等十曲别塗聳千仞離川懸百丈攢荆夏不通積雪冬難上枝交隴底暗漢地理志隴西郡注應劭曰有隴坻在其西也石礙波前響囘首咸陽中三輔黄圖秦孝公始都咸陽咸陽在九嵕山渭水北山水俱在南故名咸陽唯言夢時往折楊柳嫋嫋河堤樹漢溝洫志哀平初平當使領河堤張衡西京賦周以金堤樹以柳杞依依魏主營徐炯曰魏文帝集栁賦序云昔建安五年上與袁紹戰於官渡時余始植斯柳自彼迄今十有五載矣感物傷懐乃作斯賦江陵有舊曲洛下作新聲未詳按晉書謝安石能為洛下書生詠妾對長楊苑三輔黄圖長楊榭在長楊宫秋冬較獵其下天子登此以觀君登高柳城後漢靈帝紀護烏桓校尉出高柳春還應共見蕩子太無情枚乗雜詩昔為倡家女今為蕩子婦闗山月二首樂府解題闗山月傷别離也闗山三五月張尚瑗曰禮記月三五而盈三五而闕客子憶秦川思婦高樓上當窗應未眠星旗映疎勒晉書左旗九星在河鼔兩旁右旗亦如之河鼔居中後漢耿恭傳恭以疏勒城旁有澗水可固乃引兵據之雲陣上祁連漢書注師古曰天山即祁連山也匈奴謂天為祁連戰氣今如此從軍復幾年月出柳城東微雲掩復通蒼茫縈白暈漢書高帝七年月暈圍參軍七重是歲高皇帝為冒頓所圍七日乃解蕭瑟帶長風羌兵燒上郡胡騎獵雲中漢五行志文帝後六年匈奴天入上郡雲中㷭火通長安將軍擁節起戰士夜鳴弓洛陽道二首玉臺新詠梁簡文帝元帝樂府題皆有洛陽道綠柳三春暗紅塵百戲多後漢安帝紀延平元年罷魚龍曼延百戲東門向金馬張瑩漢南記馬援奏曰武帝時善相馬者鑄作銅馬法獻之有詔立馬於魯班門外則更名曰金馬門南陌接銅駝洛陽記兩銅駝在宫之南街東西相向高尺洛陽人謂之銅駝街華軒翼葆吹江淹詩許史乗華軒説文軒曲輈轓車也蜀志先主少時戲言吾必當乗此羽葆葢車飛葢響鳴珂通俗文馬勒飾曰珂本草珂貝類皮黄黑而骨白可為馬飾生南海曹植公讌詩清夜遊西園飛葢相追隨潘郎車欲滿無奈擲花何晉書潘岳字安仁為河陽令美姿儀少常挾彈出洛陽道婦人遇之者皆連手縈繞投之以果滿車而歸洛陽馳道上漢賈山傳秦為馳道於天下道廣五十步三丈而樹厚築其外隠以金椎樹以青松三輔黄圖蔡邕曰馳道天子所行道也春日起塵埃濯龍望如霧後漢馬皇后紀太后詔曰前過濯龍門上見外家問起居者車如流水馬如游龍河橋渡似雷晉書杜預以孟津渡險請建河橋於富平津聞珂知馬蹀見上傍幰見甍開儀制令諸車一品青油纁通幰朱裏朱絲絡網三品以上青通幰朱裏五品以上青偏幰碧裏六品以下皆不得用幰謝恵連雪賦注甍屋棟也相看不得語宻意眼中來長安道玉臺新詠庾肩吾有賦得横吹曲長安道輦道乗雙闕三輔黄圖武帝作建章宫宫在未央宫西長安城外帝於未央宫營造日廣以城中為小乃於宫西跨城池作飛閣通建章宫構輦道以上下古歌云長安城西有雙闕豪雄被五都尹文子魏王得玉召玉工相之工曰此無價以當之五城之都僅可一觀横橋象天漢三輔黄圖秦始皇兼天下都咸陽渭水貫都以象天漢横橋南渡以法牽牛法駕應坤圖疑作輿三輔黄圖鹵薄天子出車駕次第謂之鹵簿有大駕有法駕有小駕大駕則公卿奉引大將軍參乗太僕御屬車八十一乗作三行尚書御史乗之備千乗萬騎出長安郊祠天於甘泉備之百官有其儀注名曰甘泉鹵簿法駕京兆尹奉引侍中參乗奉車郎御屬車三十六乗北郊明堂則省副車小車祠宗廟用之繫辭坤為大輿韓康賣良藥後漢逸民傳韓康字伯休嘗采藥名山賣於長安市口不二價董偃鬻明珠漢東方朔傳董偃與母以賣珠為事偃年十三隨母出入主家諠諠擁車騎非但執金吾後漢百官志執金吾一人中二千石注胡廣曰衛尉巡行宫中則金吾徼於外相為表裏以擒姦討猾梅花落鮑昭呉均江總樂府題皆有梅花落對户一株梅新花落故栽燕拾還蓮井風俗通殿堂象東井形刻作荷菱荷菱水物也所以厭火風吹上鏡臺魏武雜物疏鏡臺出魏宫中有純銀參帶鏡臺一純銀七子貴人公主鏡臺四倡家怨一作愁思妾樓上獨裵囘啼看竹葉錦龍輔女紅餘志桓豁女字女幼製綠錦衣帶作竹葉様遠視之無二故無瑕詩云帶葉新裁竹簪花巧製蘭女幼庾宣婦也又梁簡文帝冬曉詩惟牽竹葉帶簪一作篸義同罷未能裁紫騮馬樂府鼔角横吹十五曲有紫騮馬玉鐙繡纒鬃齊武帝諸子傳廬陵王子卿作銀鐙金薄裹箭脚按鐙音凳馬鞍踏鐙鬃音叢馬鬣也金鞍錦覆幪徐樹敏曰初學記宋劉義恭啟賜臣供御金梁橋鞍制作精巧按幪音蠓覆葢也風驚塵未起揚雄羽獵賦林叢為之生塵草淺埓猶空晉書王濟常買地為馬埒角弓連一作穿兩兔詩騂騂角弓珠彈落雙鴻吕氏春秋以隋侯之珠彈千仞之雀世必笑之日斜馳逐罷連翩還上東劉生劉生殊倜儻漢禮樂志志俶儻精權竒任俠徧京華漢游俠傳郭解父任俠解為俠益甚戚里驚鳴筑漢書高祖召石奮姊為美人徙其家長安中戚里又上撃筑自歌曰大風起兮雲飛揚威加海内兮歸故鄉安得猛士兮守四方平陽吹怨笳未詳按馬融長笛賦序融獨臥郿縣平陽鄔中有洛客舍逆旅吹笛俗儒排左氏漢儒林傳劉歆白左氏春秋可立哀帝納之以問諸儒皆不對歆於是數見丞相孔光為言左氏以求助光卒不肯後漢賈逵傳侍中劉歆欲立左氏不先暴論大義而輕移太常恃其義長詆挫諸儒諸儒内懐不服相與排之新室忌漢家漢元后傳王諫欲諂莽上書言皇天廢去漢而命立新室太皇太后不宜稱尊號當隨漢廢以奉天命高才被擯壓自古共憐嗟烏棲曲二首樂録烏棲曲者鳥獸二十一曲之一也卓女紅妝期此夜見鴛鴦賦胡姬酤酒誰論價呉兆宫曰辛延年羽林郎詩胡姬年十五春日獨當壚風流荀令好兒郎偏能𫝊粉復熏香世説劉季和嘗言荀令君至人家坐處嘗三日香見襄陽記繡帳羅帷隱燈燭一夜千年猶不足惟憎無賴汝南雞天河未落猶爭啼後漢百官志注蔡質漢儀衛士甲乙徼相傳甲夜軍傳乙夜相傳盡五更衛士傳言五更未明三刻後雞鳴衛士踵丞郎趨嚴上臺不畜宫中雞汝南出雞鳴衛士候朱雀門外當傳雞鳴於宫中雜曲徐樹聲曰陳后妃傳後主自居臨春閣張貴妃居結綺閣龔孔二貴嬪居望仙閣竝複道交相往來以宫人有文學者袁大捨等為女學士後主毎引賓客對貴妃等游宴則使諸貴人及女學士與狎客共賦新詩采其尤豔麗者以為曲調選宫女有容色者歌之其曲有玉樹後庭花臨春樂等大抵所歸皆美張貴妃孔貴嬪之容色傾城得意巳無儔洞房連閣未消愁漢李延年歌傾城復傾國佳人難再得後漢梁冀傳堂寢皆有陰陽奥室連房洞户宫中本造鴛鴦殿飛燕外傳帝居鴛鴦殿便房省帝簿嬺上簿嬺因進言飛燕有女弟合徳美容體性純粹可信不與飛燕比為誰新起鳯皇樓三輔黄圖楊震闗輔古語云長安民俗謂鳯皇闕為貞女樓綠黛紅顔兩相發千嬌百念情無歇舞衫回袖勝春風歌扇當窗似秋月碧玉宫伎自翩妍樂府有情人碧玉歌一云劉碧玉宋汝南王妾絳樹新聲最可憐魏文帝集荅繁欽書今之妙舞莫巧於絳樹張星舊在天河上天官書注星經云栁星張周之分野三河也從來張姓本連天諾臯記天翁姓張名堅字刺渴漁陽人漢張放傳放取皇后弟平恩侯許嘉女上為放供張賜甲第充以乗輿服飾號為天子取婦皇后嫁女大官私官竝供其第兩宫使者冠葢不絶二八年時不憂度宋玉招魂二八齊容起鄭舞些旁邊得寵誰相妒立春厯日自當新晉禮志太史毎歲上年厯立春讀五時令服各隨其方色帝御座尚書已下就席讀訖賜酒一巵正月春幡底須故續漢書立春之日夜滆未盡五刻京都百宫皆衣青立春旛施土牛耕人於門外流蘇錦帳挂香囊織成羅幌隱燈光晉摰虞決疑要注天子帳流蘇為飾古詩紅羅複斗帳四角垂香囊只應私將琥珀枕呉兆騫曰宋武帝紀寜州嘗獻琥珀枕光色甚麗價盈百金冥冥來上珊瑚牀本草珊瑚似玉紅潤生海底盤石上一歲黄三歲赤海人先作鐵網沈水底貫中而生絞網出之失時不取則腐長相思二首樂府怨思二十五曲其一曰長相思長相思望歸難傳聞奉詔戍臯蘭漢霍去病傳鏖臯蘭下師古曰臯蘭山名龍城逺漢書將軍衛青出上谷至龍城鴈門寒山海經鴈門山者鴈飛出於其間愁來瘦轉劇衣帶自然寛枚乗雜詩相去日已逺衣帶日已緩念君今不見誰為抱腰看玉臺新詠恵帝時童謠曰鄴中女子莫千妖前至三月抱胡腰長相思好春節夢裏恒啼悲不洩帳中起窗前髻栁絮飛還聚本草經栁花一名絮遊絲斷復結沈約詩遊絲映空轉欲見洛陽花董嬌嬈詩洛陽城東路桃李生路旁花花自相對葉葉自相當如君隴頭雪詩同汪詹事登宫城南樓元良屬上徳率土被中孚書一人元良萬邦以貞老子上徳不徳詩率土之濱莫非王臣中孚見周易漢幄朝無怠東觀漢記時明帝年十二在幄後周門夕復趨文王世子文王之為世子朝于王季日三雞初鳴而衣服至于寢門外問内豎之御者曰今日安否何如内豎曰安文王乃喜及日中又至亦如之及莫又至亦如之桓經既受業後漢書孝明皇帝光武第四子十九年立為皇太子師事博士桓榮學尚書賀拜且尊儒晉書賀循世為儒宗除太子太傅命皇太子親往拜之壯志諧風雅高文㑹斗樞西京雜記揚子雲曰廊廟之下朝廷之中高文典冊用相如鏗鏘叶舞蹈照爛等琨瑜河水慙雄伯漳川仰大巫呉書張綋見陳琳作武軍賦歎之琳荅曰僕在河北少文人易為雄伯故使僕有此談今足下子布在彼所謂小巫見大巫神氣殫矣鮑魚寜入俎賈誼書文王使太公望傳太子發嗜鮑魚公不與曰鮑魚不登俎豈有非禮而可養太子哉釣鼈匪充廚晉潘尼集鼈賦序皇太子遊於𤣥囿遂命釣魚有得鼈而獻之者令侍臣賦之叔譽恒詞屈汲冢周書晉平公使叔譽聘于周見晉太子與之言五稱而三窮防年疑作嚴豈濫誅後漢馬援傳援謂司馬吕种曰國家諸子竝壯而舊防未立則多通賓客則大獄起矣後帝收捕諸王賓客更相牽引死者以千數种亦豫其禍走筆戲書應令此日乍殷勤繁欽定情詩何以致殷勤相嫌不如春今宵花燭淚非是夜迎人何遜看新婚詩何如花燭夜輕扇掩紅妝舞席秋來巻歌筵無數塵曾經新代故那惡故迎新片月窺花簟南史王摛傳尚書令王儉嘗集才學之士總校虚實類物𨽻之謂之𨽻事唯廬江何憲為勝乃賞以五花簟白團扇輕寒入錦巾呉任臣曰魏武帝紀注傅子曰漢末王公多委王服以幅巾為雅是以袁紹崔豹之徒雖為將帥皆著縑巾魏太祖以天下凶荒資財匱乏擬古皮弁裁縑帛以為帢合於易簡隨時之義以色别其貴賤于今施行可謂軍容非國容也秋來應瘦盡偏自著腰身春情風光今旦動雪色故年殘薄夜迎新節當壚却晚寒竒一作故香分細霧一作篆石炭𢷬輕紈竹葉裁衣帶見樂府梅花奠酒盤未詳按四時寶鏡立春日春餅生菜號春盤年芳袖裏出春色黛中安欲知迷下蔡宋玉登徒子好色賦嫣然一笑惑陽城下蔡先將過上蘭三輔黄圖上林苑有上蘭宫奉和詠舞玉臺新詠梁簡文帝詠舞詩戚里多妖麗重聘滅秦余逐節工新舞嬌態似凌虛納花承襵概垂翠逐當舒扇開衫影亂巾度履行疎徒勞交甫憶自有專城居十五屬平陽因來入建章主家能敎舞漢衛皇后傳后字子夫子夫為平陽主謳者既飲謳者進帝獨説子夫主因奏子夫送入宮城中巧畫妝後漢馬廖傳長安語曰城中好高髻四方高一尺城中好廣眉四方且半額城中好大袖四方全匹帛低鬟向綺席漢郊祀志注師古曰漢舊儀云祭天用六綵綺席六重用玉几玉飾器凡七十女樂即禮樂志所云使童男童女俱歌也舉袖拂花黄燭送空回一作窗邊影衫傳篋裏香當繇好留客故作舞衣長景差大招長袖拂面善留客只和簡文帝賽漢高帝廟原注聲偶作徐摛詩彚作庾肩吾竝誤尚瑗曰梁簡文帝集漢高帝賽神詩玉車犬朝行動闔閭旦應開白雲蒼梧上丹鳯咸陽來日正江無影城斜漢屢回瞻流知地脈望嶺匹天台欲袪九愁恨聊舉十千杯山宫類牛首三輔黄圖牛首池在上林苑中西頭漢寢若龍川漢地理志南海郡龍川縣注裴氏廣州記本博羅縣之東鄉也有龍穿地而出即穴流泉因以為號玉盌無秋酎張載酒賦中山夏啓醇酎秋發金燈滅夜煙後漢李尤有金羊燈銘丹帷迫靈嶽未詳紺席下羣仙徐樹屏曰漢舊儀皇帝自行羣臣從齋皆百日紫壇帳幄高皇帝配天居堂下西南紺幄紺席堂虛沛筑響釵低戚舞妍陳鋭曰西京雜記高帝戚夫人善鼔瑟撃筑帝常擁夫人倚瑟而絃歌畢毎泣下流漣夫人善為翹袖折腰之舞歌出塞入塞望歸之曲聲入雲霄何殊后廟裏子建作華篇魏曹植集漢高帝贊屯雲斬蛇靈母告祥朱旗既抗九野披攘禽嬰克羽埽滅英雄承機帝世著功武湯山齋桃源驚往客晉陶潛集有桃花源記詳與宗室書鶴嶠斷來賓㑹稽記射的山南有白鶴山此鶴為仙人取箭漢太尉鄭𢎞嘗采薪得一箭頃有神人至問何所欲𢎞曰嘗患若耶溪載薪為難願旦南風暮北風後果然復有風雲處蕭條無俗人山寒微有雪石路本無塵竹徑䝉籠巧茅齋結構新燒香披道記後漢襄楷傳注南陽張津為交州刺史常著絳袙頭鼔琴焚香讀邪俗道書云以助化懸鏡厭山神抱朴子道士以明鏡九寸懸於背老魅不敢近砌水何年溜簷桐幾度春雲霞一巳絶寜辨漢將秦詠柑藝文初學竝作徐陵乃劉孝綽舊集載此或誤收也朱實挺江南包品擅珍淑張衡西京賦朱實離離禹貢揚州厥包橘柚錫貢上林雜嘉樹西京雜記初修上林苑羣臣逺方各獻名果異樹江潭間修竹東方朔七諌便娟之修竹寄生於江潭萬室擬封侯千株挺荆國漢貨殖傳蜀漢江陵千樹橘渭川千畝竹此其人與千户侯等吳志李衡遣客於武陵龍陽況州上作宅種甘橘千株敕兒曰有木奴千頭不責汝衣食歲上一匹絹綠葉萋以布左思吳都賦布濩臯澤素榮芬且郁得陳終宴歡良垂雲雨育侍宴園林才有熱夏淺更勝春嫩竹猶含粉初荷未聚塵承恩預下席應阮獨何人魏王粲傳文帝為五官將及平原侯植皆好文學粲與北海徐幹字偉長廣陵陳琳字孔璋陳留阮瑀字元瑜汝南應瑒字徳㼀東平劉楨字公幹竝見友善奉和山池梁簡文帝有山池詩日暮芙蓉水聊登鳴鶴舟飛艫飾羽葩長幔覆緹油停輿依栁息住葢影空留古樹横臨沼新藤上挂樓游魚向暗集戲鳥向槎流羅浮無定所後漢郡國志南海郡博羅縣注有羅浮山自㑹稽浮往博羅山故置博羅縣鬱島屢遷移未詳按魏志邴原將家屬入海住鬱林㖄山中不覺因風雨何時入後池樓臺非一勢臨翫自多竒楚辭層臺累榭臨高山雲生對户石猨挂入櫩枝山池應令畫舸圖仙獸陳啓源曰晉書王濬畫鷁首怪獸於船首以懼江神飛艎挂采斿左傳楚大敗呉師獲其乗舟餘皇顔延之詩祥飈被綵斿注綵斿旗名榜人事金槳曹植朔風詩誰忘汎舟媿無榜人注刺船之人也釣女飾銀鉤細萍時帶檝低荷乍入舟猿啼知谷晚蟬咽覺山秋别毛永嘉英華作别毛尚書人鋭曰南史毛喜字伯武滎陽陽武也魏平江陵喜與宣帝俱遷長安及宣帝即位厯丹陽尹吏部尚書委政於喜益見親重喜言無回避時皇太子好酒徳喜常言之宣帝太子遂銜之即位後稍見疎逺至徳元年授永嘉内史願子厲風規歸來振羽儀嗟余今老病此别空長離白馬君來哭後漢范式傳張劭喪至壙將窆而柩不肯進見有素車白馬號哭而來其母曰是必范巨卿也黄泉我詎知繆襲挽歌朝發高堂上莫宿黄泉下陸機挽歌呼子子不聞泣子子不知徒勞脱寶劒空挂隴頭枝烈士傳延陵季子解寶劒挂徐君墓柏樹秋日别庾正員藝文作張正見征途愁轉斾連騎慘停鑣朔氣凌疎木江風送上潮青雀離帆逺古詩青雀白鵠舫朱鳶别路遙後漢郡國志交阯郡十二城一名朱鳶惟有當秋月夜夜上河橋見樂府新亭送别應令晉祖逖傳晉時南渡過江人士新亭飲宴風吹臨伊水時駕出河梁野燎村田黑江秋岸荻黄隔城聞上鼓迴舟隱去檣神襟愛一作憂逺别流睇極清漳地志漳水二一出上黨沾縣大黽谷名清漳一出上黨長子縣鹿谷山名濁漳和王舍人送客未還閨中有望倡人歌吹罷對鏡覽紅顔拭粉留花稱疑作勝北堂書鈔釋名花勝言著之則勝御覽金勝一名金稱除釵作小鬟釋名又枝也因形名之也綺燈停不滅高扉掩未闗良人在何處光惟見月還為羊兖州家人荅餉鏡兆騫曰南史羊侃傳侃字祖忻泰山梁父人也魏正光中為征東大將軍東道行臺領泰山太守初其父祉恒使侃南歸侃至是將舉濟河以成先志魏帝聞之使授侃驃騎大將軍司徒泰山郡公長為兖州刺史侃斬其使大同三年至建鄴授徐州刺史累遷侍中都官尚書侃性豪侈姬妾列侍窮極奢靡有彈箏人陸大喜著鹿角爪長七寸舞人張靜婉腰圍一尺六寸時人咸推能掌上儛又有孫荆玉能反腰帖地銜得席上玉簪敕賚歌人王娥兒東宫亦賚歌者屈偶之竝妙盡竒曲一時無對信來贈寶鏡亭亭似團月鏡久自逾明人久情逾歇取鏡挂空臺于今莫復開不見孤鸞鳥香魂何處來見鴛鴦賦詠織婦纖纖運玉指脈脈正蛾眉振躡開交縷見樂府停梭續斷絲兆宫曰異苑陶侃嘗漁雷澤得一織梭簷前初月照洞户朱帷垂一作未垂帷弄機行掩淚彌令織素遲見鴛鴦賦内園逐涼昔有北山北樹穀曰後漢逸民傳法真字高卿扶風人也太守請見欲任以功曹真曰以明府見待有禮故敢自同賓末若欲吏之真將在北山之北南山之南矣今余一作來東海東見本傳納涼高樹下直坐落花中狹徑長無迹茅齋本自空提琴就竹篠酌酒勸梧桐鬭雞季子聊為戲左傳季郈之雞鬭季氏芥其雞郈氏為之金距平子怒陳王欲騁才藝文類聚魏陳思王植有鬭雞詩花冠巳衝力南越志雞冠四開如蓮花鳴聲清徹芥爪復驚媒鬭鳯羞衣錦兆騫曰鄴中記錦署有鳯皇錦雙鸞恥鏡臺見鴛鴦賦陳倉若有信為覓寶雞來晉太康地志秦文公時陳倉人獵得獸如彘不知名牽以獻之逢二童子童子曰此名為媦媦亦語曰二童名陳寶得雄者王得雌者霸陳倉人乃逐之化為雌雉上陳倉北阪為石梁祀之詠日華朝暉爛曲池夕照滿西陂復有當晝景江上鑠光儀時從高浪歇乍逐細波移一在雕梁上梁武帝碧玉歌杏梁日始照詎比扶桑枝淮南子日拂於扶桑詠雪瓊林𤣥圃葉淮南子崑崙山中有曾城九重有珠樹玉樹桂樹日南華廣志桂出合浦冬夏常青其類自為林間無雜樹交阯置桂園豈若天庭瑞揚雄劇秦美新上陳天庭輕雲帶風斜三農喜盈尺謝恵連雪賦盈尺則呈瑞於豐年六出儛崇花韓詩外傳凡草木之花多五出雪花獨六出明朝闕門外應見海神車樹屏曰金匱武王伐紂都洛邑雨雪十餘日深丈餘甲子平旦有五丈夫乗五車從兩騎止門外尚父告武王曰五車兩騎四海之神與河伯雨師耳春日岸煙起暮色岸水帶斜暉徑狹横枝度簾搖驚燕飛落花承步履呉北寛曰釋名履禮也飾足以為禮流澗寫行衣何殊九枝葢薄暮洞庭歸未詳奉和簡文帝山齋梁簡文帝集山齋詩玲瓏繞竹澗間闗通槿藩缺岸新成浦危石久為門北榮下飛桂南柯吟夜猿暮流澄錦磧晨氷照彩鸞架嶺承金闕飛橋對石梁竹宻山齋冷荷開水殿香山花臨舞席水影照歌牀闕表勸進梁元帝表梁書大寶二年五月湘東王繹命王僧辯等東撃侯景十月太宗崩侯景僭位其明年二月王僧辯平侯景奉表勸進荅曰淮海長鯨雖云授首襄陽短狐未全革面太平玉燭爾乃議之五月司空南平王恪等復勸進湘東王猶不受八月兼散騎常侍聘魏使徐陵於鄴奉表勸進九月四方征鎮王公卿士復勸稱尊號猶謙讓未許表三上乃從之十一月丙子即皇帝位於江陵詔改太清六年為承聖元年臣聞封唐有聖還承帝嚳之家帝王世紀帝嚳崩摯於兄弟最長得登帝位封異母弟放勲為唐侯後政微弱而唐侯徳盛乃造唐而致禪居代維賢終纂高皇之祚漢書諸吕既誅諸大臣謀曰代王高帝子最長仁孝寛厚乃迎立之無為稱於革舄漢書東方朔曰孝文皇帝身衣弋綈之衣履革舄至治表於垂衣繫辭黄帝堯舜垂衣裳而天下治而撥亂反正非間前古漢高帝紀羣臣曰帝撥亂世反之正至如金行重作晉五行志董養曰白者金色國之行也中興書有晉金行奄君四海源出東莞晉書元帝父琅邪恭玉覲祖琅邪武王仙武帝踐祚封東莞郡王炎運猶興漢高帝贊漢承堯運協于火徳枝分南頓後漢光武紀南頓令欽生光武豈得掩顯姓於軒轅帝王世紀黄帝二十四子得姓者十四人皇甫謐曰黄帝居軒轅之邱故因以為名又以為號非才子於顓頊在傳顓頊氏有不才子天下之人謂之檮杌莫不因時多難左傳司馬侯曰或多難以固其國俱繼神宗者也書大禹謨正月朔旦受命于神宗伏惟陛下出震等於勛華鳴謙同於旦奭握圖一作褒秉鉞春秋合誠圖黄帝遊𤣥扈洛水上鳳皇銜圖置帝前帝再拜受圖書王左杖黄鉞右秉白旄以麾胡渭生曰孝經援神契舜龍顔重瞳大口手握襃宋均注手中有襃字將在御天易時乗六龍以御天玉勝珠衡春秋命厯序神農戴玉理宋均曰玉理玉英玉勝也孝經援神契伏羲天日山準日角而連珠衡注衡中有骨表如連珠象玉衡星漢書音義眉上曰衡子徐樹本曰海録碎事顔淵山庭日角曽珠衡犀角先彰元后書元后作民父母神祗所命非惟大室之祥左傳楚共王無冢適曰當璧而拜者神所立也乃與巴姬密埋璧於大室之庭使五人齊而長入拜平王弱抱而入再拜皆壓紐圖牒斯歸何止堯門之瑞班固典引應圖合牒窮祥極瑞漢書李倢仔居鈞弋宫生昭帝任身十四月乃生上曰昔聞堯十四月而生今鈞弋亦然乃命其所生門曰堯母門南史元帝諱繹武帝第七子也帝夢眇目僧執香爐稱託生王宫及生帝舉室中非常香有紫胞之異封湘東王鎮江陵任臣曰梁書元帝背生黑子巫媪見曰此大貴兆當不可言若夫大孝聖人之心中庸君子之徳見中庸固以作訓生民貽風多士一日二日研覽萬幾允文允武包羅羣藝見書擬兹三大老子故道大天大地大王亦大域中有四大而王居其一焉賓是四門舜典賓于四門厯試諸難書序虞舜側微堯聞之聰明將使嗣位厯試諸難作舜典咸熙庶績見書斯無間而稱也論語禹吾無間然矣南史累遷鎮西將軍都督荆州刺史機務煩多軍書羽檄文章詔誥㸃毫便就殆不游手自无妄為象繫辭无妄災也鍾禍上京梟獍䖍劉晉書崔懿之謂靳準曰汝心如梟獍必為國患左傳吕相絶秦曰䖍劉我邊垂宗社蕩墜銅頭鐵額興暴皇年魚龍河圖黄帝攝政有蚩尤兄弟八十一人竝獸身人語銅頭鐵額威震天下封豨修虵行災中國左傳申包胥曰呉為封豖長蛇以薦食上國靈星所宅漢郊祀志三星為泰乙鏠旗命曰靈旗為兵禱太史奉以指所伐國下武其興詩下武維周望紫極而行號爾雅北極謂之北辰春秋合誠圖北辰其星五在紫微中進渭生曰漢書李尋曰紫宫極樞通位帝紀劉琨勸表莫不叩心絶氣行號巷哭瞻丹陵而殞慟帝王世紀堯母慶都孕十四月而生堯于丹陵南史東魏高歡卒侯景與高澄不協奉表以河南十三州降梁遂據夀陽作亂攻陷臺城家冤將報天賜黄鳥之旗墨子天錫武王黄鳥之旗國害宜誅神奉𤣥狐之籙黄帝出軍決帝伐蚩尤乃睡夢西王母遣道人被𤣥狐之裘以符授之南史王僧辯討侯景次於天雷軍人杜稜夢雷池君周何二神乗朱航陳甲仗稱下討侯景剋李軼於河津後漢書馮異為孟津將軍軍河上以拒朱鮪李軼等初軼與光武首結謀約及更始立反共陷伯升欲降不自安乃與異通書光武故宣露之鮪怒殺軼征陶謙於海岱魏志曹操父嵩避難在琅邪操迎之嵩輜重百餘兩陶謙別將守陰平掩襲嵩於華費間殺之操引兵撃謙攻拔十餘城皆屠之南史武帝為景所制憂憤成疾口苦索蜜不得再曰荷荷遂崩又立簡文帝尋使彭儁進上囊而弑之滕公擁樹雄氣方嚴漢書夏侯嬰為滕令奉車故號滕公項羽大破漢軍漢王不利馳去見孝恵魯元載之漢王急馬罷虜在後常蹳兩兒棄之嬰常收載行面雍樹馳卒得脱張繡交兵風神彌勇魏志張繡與曹操戰殺操長子昂操中流矢敗走南史世子方等討河東王譽軍敗死之忠誠貫於日月渭生曰戰國䇿唐雎曰専諸之刺王僚也彗星襲月聶政之刺韓傀也白虹貫日此皆有志之士懐怒未發休祲見於天孝義感於冰霜冰霜用王祥鄒衍事如雷如霆見詩非貔非虎牧誓尚桓桓如虎如貔前驅効命詩為王前驅元惡斯殲𦙍征殲厥渠魁既挂膽於西州世説姜維死時見剖膽大如斗方燃臍於東市後漢書董卓築塢於郿號萬歳塢及誅暴屍於市守吏為大炷置臍中燃之光明達曙蚩尤三塚寜謂嚴誅雲笈七籤軒轅本紀所殺蚩尤身首異處帝閔之令葬其首冢於夀張其肩膂冢在山陽其髀冢在鉅鹿王莽千剸非云明罰漢王莽傳莽在漸臺商人杜呉殺莽校尉公賓就斬首軍人分裂莽身支節肌骨臠分之傳首詣宛陳沂震曰禮記公侯有罪則殲剸青羌赤狄英雄記董卓説校尉賈龍撃劉焉焉出青羌與戰通鑑注青羌羌之一種漢書晉文公攘戎狄居西河圁洛之間號曰赤翟白翟同畀豺狼詩投畀豺虎胡服夷言趙世家武靈王胡服騎射左傳衛侯輒歸效夷言咸為京觀左傳楚子曰古者明王伐不敬取其鯨鯢而封之於是乎有京觀南史王僧辯入據建康侯景奔呉羊侃子鵾殺景送屍建康傳首江陵暴屍於市民爭食之并骨皆盡邦畿濟濟還見隆平宗祀愔愔方承多福詩邦畿千里又濟濟多士班固東都賦即土之中有周成隆平之治焉孝經宗祀文王於明堂以配上帝束晢補亡詩愔愔我王紹文之緒善曰左傳祈招之愔愔杜預曰愔愔安和貌詩綏以多福自氤氲混沌之世驪連栗陸之君繫辭天地絪緼萬物化生三皇本紀自人皇以後有五龍氏燧人氏大庭氏柏皇氏中央氏巻須氏栗陸氏驪連氏赫胥氏尊盧氏混沌氏昊英氏有巢氏朱襄氏葛天氏陰康氏無懐氏葢三皇巳來有天下者之號卦起龍圖三皇本紀宓犧氏有龍瑞以龍紀官號曰龍師始畫八卦文因鳥迹晉衛恒書勢黄帝之史沮誦蒼頡眺彼鳥迹始作書契雲師火帝非無戰陣之風三皇本紀炎帝神農氏以火徳王故曰炎帝以火名官五帝本紀黄帝軒轅氏修徳振兵以與炎帝戰于阪泉之野三戰然後得其志官名皆以雲命為雲師堯誓湯征咸用干戈之道大禹謨禹乃㑹羣后誓于師曰濟濟有衆咸聽朕命仲虺之誥東征西夷怨南征北狄怨星躔東井時破崤潼漢書漢元年冬十月五星聚于東井東井秦之分野沛公至霸上秦王子嬰素車白馬係頸以組奉皇帝璽降於軹道傍雷震南陽初平尋邑後漢光武紀世祖奔二公陣二公兵走北殺司徒王尋昆陽城中兵亦鼔譟而出㑹大風雷雨二公大衆遂潰未有援三靈之已墜文選注三靈天地人也救四海之羣飛揚雄劇秦美新海水羣飛注喻大亂也赫赫明明龔行天罰見書如當今之盛者也於是卿雲似葢晨暎姚鄉吕氏春秋虞舜卿雲歌曰卿雲爛兮糺縵縵兮日月光華旦復旦兮孔安國曰瞽叟妻握登見大虹感而生舜於姚墟故姓姚甘露如珠朝垂原寢後漢書明帝永平中甘露降於原陵按光武葬於原陵芝房感徳咸出銅池漢書武帝作芝房之歌又宣帝時金芝九莖産於函徳殿銅池中蓂莢伺晨無勞銀箭帝王世紀堯時有草夾階而生隨月生死以占日月之數名曰蓂莢尸子使雞伺晨陸陲新漏刻銘云毎旦晨興屬傳漏之音聴雞人之響又金徒抱箭南史天寶二年十月辛丑朔紫雲如葢臨江陵城重以東漸𤣥菟漢武帝紀朝鮮斬其王右渠降以其地為樂浪臨屯𤣥菟真番郡西踰白狼晉地理志高雲以并州刺史領白狼高柳生風後漢郡國志代郡十一城一名高栁扶桑銜日十洲記扶桑在碧海中樹長數千里一千餘圍於張尚玠曰淮南子日拂扶桑莫不編名屬國歸貢鴻臚後漢百官志承秦有典屬國别主四方夷狄朝貢侍子成帝省并於大鴻臚荒服來賓國語蠻夷要服戎狄荒服遐邇同慶南史大寶二年九月己亥盤盤國獻馴象其文昭武穆左傳富辰曰管蔡郕霍魯衛毛聃郜雍曹滕畢原酆郇文之昭也邗晉應韓武之穆也跗萼也如彼詩常棣之華鄂不韚韚箋承華者曰鄂跗鄂足也地平天成書地平天成功業也如此久應旁求掌故漢舊儀太常博士弟子試射䇿中乙科補掌故司馬相如封禪文宜命掌故悉奏其儀而覽焉咨詢天官周禮天官冢宰斟酌繁昌魏志文帝受禪為壇於繁陽黄初元年改潁陰之繁陽亭為繁昌縣經營高邑後漢光武紀命有司設壇場於鄗南千秋亭即皇帝位因改鄗曰高邑宗王啓霸非勞武徳之侯魏志明帝紀帝諱叡年十五封武徳侯黄初七年立為皇太子丁巳即皇帝位清蹕無虞何事長安之邸中華古今注秦制出警入蹕後漢安帝紀帝父清河孝王慶殤帝崩太后與兄車騎將軍鄧隲定䇿拜帝為長安侯即皇帝位揚龍旂以饗帝魯頌龍旂承祀御鳯扆以承天周禮掌次職王太旅上帝則張氊案設皇邸鄭司農曰皇羽覆上邸後板也𤣥謂後板屏風與染羽象鳯皇羽色以為之疏言後板者謂為大方板於坐後畫為斧文言屏風者據漢法混之厯數在躬大禹謨帝曰天之厯數在汝躬疇咨為讓堯典帝曰疇咨若時登庸去月二十日兼散騎常侍柳暉等至鄴齊神武帝紀神武以孝武既西恐逼崤陜洛陽復在河外接近梁境如向晉陽形勢不能相接乃議遷鄴伏承聖㫖謙沖為而不宰老子生而不有為而不宰是謂𤣥徳或云洛陽未復杜氏通典魏文帝受禪後修洛陽宫室權都許昌宫殿狹小元日於城南立氊殿青帷以為門設樂饗食後遷洛陽依漢舊事函谷無泥見樂府旋駕金陵初學記江寜縣楚之金陵邑也呉晉宋齊梁陳六代都之方膺天眷南史十一月丙子帝即位於江陵下詔將還建康胡僧佑等諌止之愚謂大庭少昊非有定居左傳注杜預曰大庭氏古國名在魯城内帝王世紀少昊帝名摯降居江水邑於窮桑以登帝位都曲阜號金天氏漢祖殷宗皆無恒宅漢高帝紀帝西都洛陽戍卒婁敬説上都闗中張良勸上是曰車駕西都長安殷本紀盤庚之時殷已都河北盤庚渡河南居西亳復居成湯之故居迺五遷無定處登封岱嶽且署明堂漢武帝紀上登封泰山降坐明堂方陳鍔曰孝經援神契明堂者天子布政之宫上員下八窗四闥在國之陽兆寛曰大戴禮明堂凡有九室一室而有四户八牖總三十六户七十二牖以茅葢屋巡狩荆州時行司隷後漢竇武傳桓帝巡狩南陽以武府掾胡騰為䕶駕從事騰上言臣請以荆州刺史比司隷校尉臣自同都官從事帝從之自是肅然莫敢妄有干欲何必西瞻虎踞乃建王宫蜀志諸葛亮曰鍾山龍盤石城虎踞南望牛頭方稱天闕一統志牛頭山在應天府一名牛首山有二峯東西相對晉元帝初作宫殿王導指雙峯曰此天闕也故又名天闕山抑又聞之𤣥圭既錫禹貢禹錫𤣥圭蒼玉無陳周禮大宗伯之職蒼玉禮天黄琮禮地乃棫樸之愆期詩芃芃棫樸非包茅之不貢左傳管仲對楚曰爾貢苞茅不入寡人是征雲和之瑟久廢甘泉孫竹之管無聞方澤周禮大司樂孤竹之管雲和之琴瑟雲門之舞冬日至于地上之圜丘奏之則天神皆降孫竹之管空桑之琴瑟咸池之舞夏日至于澤中之方丘奏之則地示皆出漢郊祀志武帝作甘泉宫中為臺室畫天地泰乙諸鬼神置祭具以致天神豈不懼歟伏願陛下因百姓之心振萬邦之命賈逵國語注振救也豈可逡巡固讓公羊傳齊侯逡巡而謝知樹敏曰漢外戚傳耿育疏太伯見厯適逡循固讓方求石戸之農皇甫謐高士傳石戸之農與舜為友舜以天下讓之石戸夫負妻戴攜子入海高謝為君左思魏都賦高謝萬邦徒引箕山之客高士傳許由字武仲聞堯致天下而讓焉乃遯於潁水之陽箕山之下未知上徳之不徳惟見聖人之不仁老子上徳不徳是以有徳又聖人不仁以百姓為芻狗率土翹瞻詩率土之濱廣雅翹舉也蒼生何望書益稷帝光天之下至於海隅蒼生昔蘇季張儀違鄉負俗尚復招三方以事趙請六國以尊秦史記蘇秦傳秦字季子東周洛陽人為從約長并相六國北報趙王行過雒陽車騎輜重擬於王者秦喟然歎曰使吾有雒陽負郭田二頃豈能佩六國相印乎張儀傳儀魏人也入秦恵王以為客卿與謀伐諸侯漢書武帝詔士或有負俗之累㑹稽典録范蠡字少伯越之上將軍也本是楚宛三戸人佯狂倜儻負俗李斯上秦王書恵王用張儀之計散六國之從使之西面事秦況臣等顯奉皇華詩皇皇者華遣使臣之詩也親承朝命珪璋特達聘義以珪璋聘重禮也通聘河陽曹植送應氏詩置酒此河陽晉地理志河内郡領河陽縣貂珥雍容漢官云秦置散騎又置中常侍漢因之皆銀璫附蟬為文貂尾為飾謂之貂璫尋盟漳水左傳㑹於葵邱尋盟且修好也魏都賦北臨漳滏加牢貶館左傳士鞅來聘加四牢焉為十一牢隨世汙隆禮記道隆則從而隆道汙則從而汙瞻望鄉闗誠均休戚盧諶詩義等休戚但輕生不造謝朓詩輕生諒昭洒詩遭家不造命與時乖忝一介之行人同三危之遠擯左傳晉行人子員對鄭曰不使一介行李告於寡君禹貢三危既宅注三危在雍州之西南境即舜竄三苗之地山有三峯高嵸甚危故名三危本傳太清三年兼通直散騎常侍使魏陵累求復命終拘留不遣承間内殿事絶耿弇之恩後漢書蕭王幸温明殿耿弇請間曰王郎雖破天下兵革乃始耳聖公敗必不久王曰卿勿妄言我告斬卿弇曰大王哀厚弇如父子故敢披赤心耳封奏邊城私等劉琨之哭晉書劉琨段匹磾相與歃血同盟翼戴晉室遣右司馬温嶠奉表詣建康勸進不勝區區之至謹拜表以聞讓五兵尚書表本傳天嘉四年遷五兵尚書領大著作臣聞仲尼大聖猶云書不盡言見繫辭士衡高才尚稱文不逮意語見文賦臣比衰疴自積思緒茫然頻託朋遊為裁章表雖復陳琳健筆未盡愚懐魏文帝書孔璋章表殊健孫恵詞人頗加繁飾晉書孫恵好學有才識以書干東海王越為記室㕘軍所以高天緬邈陸機擬古詩緬邈若飛沈弗降昭囘詩倬彼雲漢昭回于天瞻拜絲綸更增憂憊臣雖不敏弱冠登朝伊昔承華初學記太子之門曰承華豫遊多士晩逢興運爰濫寵私爾時四郊多壘見禮記七雄分爭正義王赧卒後天下無主三十五年七雄竝爭至秦始皇立天下一統國家制度日不暇給班固兩都賦序大漢初定日不暇給趙公論受命之宜隨邑奏升壇之禮未詳而參聞祕計弗解單于之兵漢陳平傳高帝至平城為匈奴所圍七日不得食用平奇計使單于閼氏解圍以得聞其計祕世莫得聞飛箭馳書未動聊城之將魯仲連傳田單攻聊城歲餘不下魯連乃為書約之箭以射城中燕將自殺不期枚乗老叟忽降時恩漢枚乗傳武帝以安車蒲輪徴乗馮唐暮年見申明主漢書武帝求賢良舉馮唐時年九十餘不能為官擢宰京邑朝坐棘林周禮朝士掌建邦外朝之法左九棘孤卿大夫位焉右九棘公侯伯子男位焉面三槐三公位焉遂致洛陽無雨東觀漢記永初二年三月京師旱至五月和熹鄧太后幸洛陽省獄舉寃未還宫澍雨大降非比長安多盜漢張敞傳以敞守京兆時長安市偷盜尤多百賈苦之上問敞故以為可禁其宜屏錮用寘嚴科猶處名僚久為叨竊但著書天祿雖如劉向漢劉向傳向嘗校書天禄閣夜有老人以青藜火照之曰太乙之精聞卯金之子好學故下觀朔望登朝轉同王隱未詳案漢張禹傳禹領尚書代王商為丞相封安昌侯罷就第以列侯朝朔望位特進其於朽劣尚可從容司㑹文昌邈然非據周禮天官司㑹之職鄭𤣥曰㑹大計也司㑹主天下之大計計言之長若今之尚書矣樹聲曰荀綽晉百官表注尚書為文昌天府讓散騎常侍表本傳天嘉六年除散騎常侍臣聞五十知命宗師之格言見論語六百辭滿通賢之高槩姜宸英曰漢兩龔傳邴漢兄子曼容為官不肯過六百石輒自免去其名過出於漢昔墨子諸生褰裳救楚淮南子楚將攻宋墨子聞之自魯趨而往一日一夜足重繭而不休息裂裳裏之至郢見楚王魯連隱士高論却秦魯仲連傳仲連難新垣衍以秦為帝秦軍為却況乎謬䝉知已戰國䇿士為知巳死女為恱已容寜無感激洪私過誤寘以通班司憲文昌見上遂諧常伯晉職官志侍中於周為常伯之任今者昆吾小器諦視不見𤣥黄未詳鈞天竝奏靜聽能聞鐘鼓趙世家簡子病二日而寤曰我之帝所甚樂與百神遊於鈞天廣樂九奏萬舞雖神農分藥補三皇本紀神農以赭鞭鞭草木始嘗百草始有百藥岐伯提鍼司馬相如賦詔岐伯使尚方張揖曰岐伯者黄帝太醫屬使主方藥也㝠衆因縁難可匡救陛下嗣臨寶厯光闡大猷屬意銓衡留情槱棫詩芃芃棫樸薪之槱之燕臺裝玉儻不精真闞子宋愚人得燕石以為大寶藏以華篋十重緹巾十襲客見掩口盧胡而笑齊客吹竽諒宜澄簡韓子齊宣王使人吹竽必三百人南郭處士請為王吹竽宣王悦之廪食以數百人南郊奉乗當求鄭黙之才晉鄭黙傳黙為散騎常侍武帝出祀南郊詔使黙參乗西省文辭應用羅含之學晉羅含傳含累遷散騎常侍侍中少嘗晝臥夢鳥入口藻思日新謝尚稱為湘中之琅玕讓左僕射初表本傳大建元年除尚書右僕射二年遷左僕射陵抗表推周𢎞正王勱等固辭累日陵乃奉詔臣聞七十之歲揚雄擬經漢書揚雄以經莫大於易故作太𤣥六十之年平津對䇿漢書公孫𢎞對䇿金馬門後為丞相封平津侯若斯强壯無歎耆老臣勵當作勱詳碑則胄華軒冕才允卿相出納流譽舜典帝曰龍命汝作納言夙夜出納朕命惟允朝野共瞻臣𢎞正南史周𢎞正字思行至江陵王僧辯飛騎迎之相見歡甚即日啓元帝授黄門侍郎直中書省俄遷左戸尚書加散騎常侍太平元年授侍中領國子祭酒遷太常卿都官尚書陳宣帝即位遷特進領國子祭酒國老儒宗左傳季孫謂仲尼曰子為國老敎樹本曰後漢書樓望授不倦世稱儒宗情尚虛簡𤣥風勝業獨王當年臣鍾當作種南史張種字士苖永從孫也種少恬靜居處雅正傍無造請景平初司徒王僧辯以狀奏請為中從事陳武帝受禪為太常卿厯位左户尚書侍中中書令金紫光禄大夫氣懐沈宻文史優裕漢書東方朔曰臣朔年十二學書三冬文史足用東南貴秀朝廷親賢竝見壯猷詩方叔元老克壯其猷皆宜左執若漢武好少則微臣巳老漢書顔駟龎眉皓髪為郎武帝問之對曰陛下好少臣巳老若周文愛老則有此羣才齊世家吕尚年老以漁釣干西伯伏願天明更謀梓匠求其妙選稱是能官讓右僕射初表本傳大建元年除尚書右僕射加以言尋盟好仍屬亂離先零盜其牛馬漢蘇武傳武字子卿單于幽武置大窖中絶不與飲食武臥齧雪與氊毛并咽之至海上仗漢節牧羊後丁零盜武牛羊武復窮厄烏孫竊其印綬漢常恵傳恵從吏卒十餘人隨昆彌還未至烏孫烏孫人盜恵印綬節子卿茹雪叔向為凶未詳雖復東歸備罹此厄昔李廣遺恨不值漢初漢李廣傳文帝曰惜廣不逢時令當高祖世萬戸侯豈足道哉甯戚自悲不逢堯禪吕氏春秋甯戚飯牛歌南山矸白石爛生不逢堯與舜禪臣隨望聖運實在權輿爾雅權輿始也時參決勝之籌漢書高帝曰運籌帷幄之中決勝千里之外吾不如子房頗奏發兵之讖後漢光武紀同舍生彊華奉赤伏符至曰劉秀發兵捕不道當塗錫命非無董昭之誠魏志董昭傳昭與列侯諸將議以丞相宜進爵國公九錫備物以彰殊勲典午禪文蜀志譙周常書版示文王曰典午忽兮典午者謂司馬也魏書云陳留王咸熙二年二月詔羣公卿士具儀設壇於南郊使使者奉皇帝璽綬冊禪位於晉嗣王如漢魏故事不降張華之實為王儀同致仕表尺波歸海恒歎不居陸機長歌行尺波豈徒旋注喻年命流行曽無止息也爝火為薪猶悲假續高士傳堯舜致天下而讓許由曰十日並出而爝火不息其光不亦難乎況復星回日薄通人有乞告之言劉勰新論天回日轉其謝如矢顧湄曰古樂府白日薄西山鐘鳴漏盡前史有夜行之誡魏志田豫荅司馬宣王曰年過七十而居位譬猶鐘鳴漏盡而夜行不休也五陵鼎族家傳軒冕班固西都賦注高恵景武昭帝五陵在北士人多宅於此四姓卿侯榮由恩澤後漢明帝紀四姓小子侯注尚書以上為甲姓九卿方伯為乙姓散騎常侍大中大夫為丙姓吏部正員郎為丁姓虛名靡實世官非才書官以世年力方强不能辭退今三元肇慶玉燭寶典正月一日為元日亦云三元六吕司春得奉萬夀之杯漢兒寛傳武帝東封泰山還登明堂倪寛上夀曰臣寛奉觴再拜上千萬歲夀預參百辟之禮便釋朝衣謹遵初服同孔光之杖載遊戸庭漢孔光傳光稱疾辭位太后詔曰太師光聖人之後賜太師靈夀杖入省中用杖廣徳之車方懸私館漢書薛廣徳為御史大夫免賜安車駟馬歸沛沛以為榮懸其安車示子孫為始興王讓琅邪二郡太守表隋書南海郡曲江縣注舊置始興郡東海郡朐山縣注舊曰朐置琅邪郡之炯曰南史文帝諸子傳始興王伯茂字鬱文帝第二子也初武帝兄始興昭烈王道談仕梁為東宫直閣將軍侯景之亂援臺中流矢卒紹泰二年贈南兖州刺史封義興郡公諡曰昭烈武帝受禪重贈太傅改封始興郡王道談生文帝及宣帝宣帝以梁承聖未遷於長安至是武帝遙以宣帝襲封始興嗣玉以奉昭烈王祀武帝崩文帝入纂帝位時宣帝在周未還文帝以本宗乏饗徙封宣帝為安成王封伯茂為始興王以奉昭烈王祀甫離懐袖班倢伃怨歌行出入君懐袖裁脱綺紈漢書班伯在綺襦紈袴之間注貴戚子弟服適荷隆私使膺珪組執玉不趨摳衣未勝曲禮執玉不趨又兩手摳衣去齊尺論語執圭鞠躬如也如不勝自甘泉通火漢書文帝時匈奴使騎兵入燒回中宫烽火及甘泉宫細柳屯兵漢書周亞夫軍細柳注長安有細柳聚旁帶戎臣頗同疆埸左傳疆埸無主則啓戎心言瞻漢草迺曰中州未詳按漢書胡中草白昭君冢草獨青遙望胡桑已成邊郡曹植豔歌出自薊北門遙望胡地桑誠復居藩體國應思馬駿之功晉書扶風王駿鎮闗中善撫御有威恩論地惟親宜慕曹彰之勇魏志任城王彰少善射御膂力過人手格猛獸太祖持彰鬚曰黄鬚兒竟天竒也移檄為䕶軍長史王質移文南史王質傳質字子貞梁世以武帝甥封甲口亭侯陳宣帝輔政為司徒左長史北史附庸傳後梁蕭巋嗣位之五年陳湘州刺史華皎巴州刺史戴僧朔竝來附皎送其子𤣥響為質於巋仍請兵伐陳巋上言其狀武帝詔衛公直督荆州總管權景宣大將軍元定等赴之巋亦遣其柱國王操率水軍二萬㑹皎於巴陵既而與陳將呉明徹等戰於沌口直軍不利元定遂沒巋大將軍李廣等亦為陳人所擄長沙巴陵竝陷於陳初華皎戴僧朔從衛公直與陳人戰率其麾下數百人歸於巋巋以皎為司空封江夏郡公比金風已勁玉露方團宜及窮秋幸踰高塞當使孤旌不反隻騎無還公羊傳秦伯將襲鄭晉人與姜戎要之殽而撃之匹馬隻輪無反者非止湯羅帝王世紀湯出見羅者命解其三面而置其一面漢南諸侯聞之咸曰湯澤及禽獸歸者三十六國豈知堯徳堯典克明峻徳其承比年民墊書下民昏墊仍歲藴隆詩旱既太甚藴隆蟲蟲粒粟貴於隨珠説苑墨子謂滑釐曰今凶年有欲與子隨侯之珠者又欲與子一鍾粟者子將何擇滑釐曰粟可取也分糜乏於齊鼎封氏見聞錄青州南城佛寺有二大鑊大者容四十石小者容三十石舊傳寺即孟嘗居宅鑊即用以待食客者後毁為兵器且氐羌旅拒後漢馬援傳援曰黠羌欲旅拒巳跨伊瀍漢書三川注河洛伊也隋書豫州河南郡河南縣注有瀍水胡羯憑陵後漢呉漢傳居上黨武鄉羯室因號羯胡左傳馮陵我城郭方踰汾潞隋書冀州文城郡注東魏置南汾州後周改為汾州上黨郡注後周置潞州刺虎之勢時期卞生陳軫傳卞莊子欲刺虎館豎子曰此兩虎方且食牛食甘必爭爭則鬬鬬則大者傷小者死從而刺之莊子果有雙虎之功拾蜯之機彌驗蘇子戰國䇿趙且伐燕蘇代謂恵王曰今者來過川蜯方出曝而鷸啄之兩不相舍漁者得而并禽之但國家體兹明信左傳茍有明信有同皎日詩王風謂予不信有如皎日豈惟風雨之旦猶救匹夫宵夢之言無欺幽壤未詳按列士傳羊角哀與左伯桃為友俱往仕楚至梁山逢雪糧盡度不兩全遂并糧與哀至楚楚用為上卿後收葬伯桃伯桃墓逼荆將軍陵而伯桃告云吾日夜被荆將軍伐之哀乃加兵未勝云我向地下看之遂自刎死琴操其思革子對楚王曰臣友三人石文子叔愆子竊慕大王高義欲俱來謁至於嶔巖之間逢飄風暴雨衣寒糧乏度不能俱活二子不以臣為不肖推糧與臣二子遂凍飢而死賊華皎近以臨蕃有譴作牧無童疑作勳既懼檻車之徴魏鄧艾傳詔書檻車徴艾便憂齊斧之戮魏文帝紀注令曰方將整以齊斧遂乃治兵楚夢漢司馬相如傳楚有七澤其小者為雲夢方九百里竊載干戈樂記倒載干戈傍引西戎禹貢西戎即敘共謀東夏左傳聞君將靖東夏偽周遣其衛國公宇文直等總統獯獫為其羽翼漢張良傳上曰羽翼巳成難動矣醜徒濟岸來攻郢城逆豎浮舟同趣夏浦本傳周武帝遣柱國長湖公元定攻圍郢州梁明帝授任蠻奴巴陵内史潘智䖍岳陽太守章昭裕桂陽太守曹宣湘東太守錢明竝𨽻於皎又長沙太守曹慶等本𨽻皎下因為之用王師艤櫂素在中流羣帥爭驅應時殲蕩左傳門官殲焉注杜預曰殲盡也本傳慮皎先發乃前遣明徹率衆三萬乗金翅直趣郢州又遣撫軍大將軍淳于量率衆五萬乗大艦繼之羌胡寶馬史記李斯上書曰中廏之寶馬臣得賜之縱横七澤之中見上荆楚樓船彌滿三江之上漢武帝紀路博徳等皆將罪人江淮以南樓船十萬人山海經注江湘沅水皆㑹巴陵洞庭陂號三江口俘禽所獲水陸無遺華皎擢自芻微本傳皎起自下吏叨居藩翰情慙犬馬罔顧恩靈翻執干戈自圖家國聞諸間諜左傳晉人獲秦諜注諜間也今謂之細作具彼鄰謀乃授冬官周禮冬官大司空之職以佐王富邦國即為鄉導魏志太祖北征烏丸令田疇將其衆為鄉導雖傷仁義之俗非敢有私期和與國之情猶冀無失移齊文南史淳于量傳華皎構逆以量為征南大將軍西討大都督總率大艦自郢州樊浦拒之皎平并降周將長湖公元定等詳前移獲去月二十日移承邊寇平殄同懐慶悦眷言鄰睦深副情佇夫天網之大老子天罔恢恢疎而不漏固無微而不禽神武之師魏王粲詩所從神且武安得久勞師本無征而不克至如戎王傾其部落漢匈奴傳秦昭王時宣太后詐而殺義渠戎王於甘泉遂起兵伐滅義渠逆豎道其鄉闗非厥英圖殆難戡戮況復洞庭遐曠兵食殷阜西窮版屋北罄氊廬詩在其版屋漢書匈奴法漢使不去節不以墨黥其面不得入穹廬聲冠苻姚勢兼聰勒苻秦姚後秦聰漢勒後趙俱東晉僭國見晉書庸蜀寶馬彌山不窮巴漢樓船陵波無際曹植洛神賦凌波微步木華海賦萬里無際詳前移我之元戎上將協力同心承稟朝謨致行明罰為風為火殪彼䝉衝呉志周瑜傳與曹公遇於赤壁黄葢取戰艦數十艘實以薪草灌膏油其中同時發火時風甚猛悉延燒岸上營落軍遂敗退如霆如雷語見詩撃其舟艦羌兵楚賊赴水沈沙棄甲則兩岸同奔横尸則千里相枕江川盡滿譬睢水之無流漢高帝紀羽敗漢兵睢水上水為之不流原隰窮胡等陰山之長哭漢匈奴傳郎中侯應曰冒頓單于依陰山治兵器後武帝奪其地匈奴過者未嘗不哭於是黑山叛邑見與王僧辯書諸城洞開陸機漢高祖功臣頌胡馬洞開白石連羣未詳後漢段熲傳雜種羌屯聚白石注白石山今蘭州東鋭曰北史鄧至者白水羌也世為羌豪因地名號自稱鄧至投戈請命揚雄解嘲解甲投戈長沙鵩鳥靡復為妖漢書賈誼為長沙王傳三年有鵩鳥飛入誼舍止於坐隅鵩不祥鳥也湘川石燕自然還儛湘中記零陵有石燕遇雨則飛止還為石克翦無算縲禽不貲欲計軍俘終難巧厯莊子巧厯不能得所獲龍駒驥子百千其羣更開苜蓿之園述異記張騫苜蓿園今在洛中苜蓿本胡中菜也騫於西戎得之方廣騊駼之廏漢百官公卿表注漢舊儀云天子六廏未央承華騊駼騎馬輅軨大廏也馬皆萬匹於是衛霍甘陳虬髭瞋目衛衛青霍霍去病陳陳湯甘甘延夀見漢書晉桓温傳劉琰稱温曰温鬚如蝟毛磔蜀志張飛據水㫁橋瞋目横矛曰身是張翼徳也可來共決死敵心馳隴路志飲河源乗勝長驅未知所限豈如桓温不武棄彼闗中晉書桓温入闗王猛被褐詣之捫蝨而談當世之務旁若無人且曰公不逺數千里深入敵境今長安咫尺而不度灞水百姓未知公心所以不至初温指秦麥以為糧既而秦人悉芟麥清野以待之温軍乏食徙闗中三十餘户而歸殷浩無能長兹羌賊晉書殷浩連年北伐師徒屢敗糧械都盡桓温因朝野之怨上疏請廢之朝廷不得已免浩為庶人徙之信安浩既廢黜雖愁怨不形辭色常書空作咄咄怪事四字方且西踰酒郡抵我境而置邊亭東畧鹽池為齊朝而反侵地史記大宛傳燉煌置酒泉都尉西至鹽水往往有亭漢地理志酒泉郡注武帝太初元年開應劭曰其水若酒故曰酒泉也又河東郡安邑縣注鹽池在西南此政亦翦妖氛未窮巢窟便聞慶捷媿佩良深檄周文南史呉明徹傳太建九年詔明徹北征軍至吕梁周徐州總管梁士彦率衆拒戰主上恭膺寶厯嗣奉瑤圖既稟聖人之材兼富神武之畧乂安兆庶共靖戎華用戢干戈詩載戢干戈永銷鋒鏑後漢陳龜年傳疏曰守塞候望懸命鋒鏑況復追惟在楚無忘玉帛之言軫念過曹猶感盤飱之恵左傳晉公子重耳及曹僖負羈乃饋盤飱置璧焉公子受飱反璧及楚楚子饗之曰公子若反晉國則何以報不穀對曰子女玉帛則君有之其何以報君陳宣帝諸子傳始興王叔陵魏克江陵宣帝遷闗右宣帝之還以後主及叔陵為質天嘉三年隨後主還朝梁承聖中生於江陵年馳玉節之使周禮掌節守邦國用玉節者炯曰公羊傳陳乞謂陽生曰吾不立子所以生子者也走矣與之玉節而走之歲降銀車之恩未詳庶使懐音微悟知感而反其藏匿招我叛臣謂華皎等也詳前移翊從瀟湘空竭闗隴荆梁左右漢沔東西隋書荆州沔陽郡沔陽縣注梁置沔陽營陽州城三郡籲地呼天後漢張奐傳寃則呼天窮則叩心望佇哀救夫一人掩泣猶愴滿堂説苑聖人於天下也譬猶滿堂飲酒有一人向隅而泣則一堂之人皆不樂百姓為心彌切宸扆老子聖人無常心以百姓為心大都督呉明徹台司上將徳茂勲高威著荆湘本傳宣帝詔授明徹都督湘州刺史仍與征南大將軍淳于量等討平華皎化聞庸蜀本傳文帝詔以明徹為江州刺史隋書梁州隆山郡隆山縣注舊曰犍為置江州叱咤而平宿豫吹噓而定夀陽漢韓信傳項王喑啞叱咤千人皆廢隋書徐州下邳郡宿豫縣注舊置宿豫郡後漢鄭㤗傳孔公緒嘘枯吹生隋書揚州淮南郡領夀春縣按夀陽晉郡名治夀春縣樹屏曰後漢皇甫嵩傳閻忠曰指撝足以振風雲叱咤可以興雷電陳宣帝紀太建五年三月以開府儀同三司吳明徹都督征討諸軍事畧地北邊冬十月呉明徹克夀陽城斬王琳傳首建業本傳齊遣王琳拒守也七年進攻彭城軍至吕梁又大破齊軍八年進位司空席巻江淮無淹弦望李陵與蘇武詩安知非日月弦望自有時啓安成王讓録尚書表後啓梁宗室傳安成康王秀字彦達文帝第七子也仕齊為太子舍人天監元年封安成郡王六年為江州刺史尋遷荆州刺史加都督魏縣瓠城人反殺豫州刺史司馬懐悦引司州刺史馬仙琕仙琕籤荆州求應援衆咸謂宜侍臺報秀即遣兵赴之十三年為郢州刺史加都督郢州夏口嘗為戰地多暴露骸骨秀於黄鶴樓下祭而埋之時司州叛蠻田魯生魯賢超秀據䝉籠來降武帝以魯生為北司州刺史魯賢北豫州刺史超秀定州刺史為北境扞蔽而魯生超秀互相讒毀有去就心秀撫喻懐納各得其用當時賴之遷雍州刺史在路薨喪至都贈司空諡曰康隋書揚州廬陵郡安復縣注舊置安成郡臣聞間平就國乃盛漢之常儀後漢光武十王傳東平王蒼建武十七年進爵蒼自以至親輔政意不自安上疏歸職永平五年乃許還國章帝八王傳河間孝王開以永元三年封延平元年就國奉遵法度吏人敬之郕霍無官實宗周之明典左傳五叔無官豈尚年哉何則皇季之重非待厯階王爵之隆自高羣辟況臣戢翼要荒呉越春秋扶同曰鷙鳥將搏必卑飛戢翼詳勸進表亟離寒暑見詩進慙趙勝能定楚從趙平原君傳毛遂謂楚王之左右曰取雞狗馬之血來毛遂奉銅盤而跪進之楚王曰王當㰱血而定從次者吾君次者遂遂定從於殿上毛遂左手持盤血而右手招十九人曰公相與㰱此血於堂下公等錄録所謂因人成事者也退匪齊文馳免秦厄史記齊田文自秦逃歸王悔追之闗法雞鳴乃出客時尚早追者將至客有善為雞鳴者野雞皆應之乃脱固以内切皇心外貽家恥甘輸重餌降禮單于漢賈誼傳試以臣為屬國之官以主匈奴請必係單于之頸而制其命真徳秀曰新書以主匈奴下陳三表五餌而史削之列城十五如請和璧趙藺相如傳秦王欲以十五城易趙王和氏璧藺相如奉璧見秦王秦王無意償趙城相如因紿璧却立倚柱曰臣觀大王無意償趙城故臣復取璧大王必欲急臣臣頭與璧俱碎於柱矣因持璧睨柱秦王恐破璧乃謝相如市鄉三十聊同寶劒越絶書越王句踐有寶劒五其一曰純鉤客有直之者有市之鄉二駿馬千匹千户之都二武夫力而獲諸原微臣還而反諸敵曕言馬駿著隴右之功見讓表追念曹彰克烏桓之冦魏志代郡烏丸反彰乗勝逐北至於桑乾前王子弟若此勲庸偏其反而見論語豈可勝媿謝敕賚燭盤賞荅齊國移文啓昔班彪草移後漢班彪傳竇融曰所上章奏皆従事班彪所為阮瑀裁書魏文帝書元瑜書記翩翩致足樂也按瑀字元瑜馳譽當年遂無加賞非常大賚始自今恩雖賈逵之頌神雀東觀漢記永安中神爵集京師帝敕蘭臺給筆札令賈逵作神爵頌拜為郎竇攸之對鼮鼠竇氏家傳世祖與百僚大㑹靈臺得鼠身如豹文焚之光澤世祖問羣臣莫知惟攸對曰名鼮鼠見爾雅賜帛百匹漢臣射覆之言漢書上嘗使諸數家射覆東方朔連中輒賜帛魏士投壺之賦魏畧邯鄲淳作投壺賦千餘言文帝賜帛千匹方其寵錫獨有光前官燭斯燃更慙良吏謝承後漢書巴祗為揚州刺史與客坐闇中不燃官燭霄光可學乃㑹耆年説苑師曠曰老而學者如秉燭之光臣職居南史左傳南史氏聞太史盡死執簡以往身典東觀後漢和帝紀永元十三年春帝幸東觀覽書林閲篇籍博選術藝之士以充其官謹述私榮傳之方䇿謝敕賜祀三皇五帝餘饌啓竊以甘泉之殿舊禮羲軒漢郊祀志武帝作甘泉宫畵天地泰一諸鬼神而置祭具甘泉更置前殿宣帝即位立黄帝天神帝原水凡四祠於膚施成帝時匡衡奏罷之又公孫卿言黄帝接萬靈明庭明庭者甘泉也長樂之宫本圖堯舜漢官儀帝祖母稱長信宫帝母稱長樂宫皇后稱長秋宫嘗樹屏曰藝文類聚陳思王畫贊序昔明徳馬皇后帝從觀畫前見陶唐之像后指帝曰嗟乎羣臣百僚恨不得為君如是帝顧而笑自東京晚世曠代無聞西漢盛儀復暏今日金壺流十旬之氣韻書九醖十旬酒名玉案備千品之羞楚漢春秋淮陰侯曰漢王賜臣玉案之食昔絳羅為薦既延王母漢武故事帝齋於尋真臺設紫羅薦夜二更後西王母至紫蓋為壇允招太乙漢郊祀志武帝時亳人繆忌奏祀泰一方曰天神貴者泰一泰一祝宰則衣紫及繡成帝時丞相衡言甘泉泰畤紫壇八觚宣通象八方又紫壇有文章采鏤黼黻之飾及玉女樂同斯爽號理致衆星臣以餘年豫聞清祀如陪瑤席沈約集賽蔣山廟文楊玉桴布瑤席遂飲瓊漿真誥明星玉女者居華山服玉漿謝兒報坐事付治中啓夫拾金樵路高士所羞呉越春秋延陵季子出遊於齊見道傍遺金有披裘采薪者季子呼薪者取彼地金薪者曰吾當夏五月而薪豈取金者哉整冠李下君子斯慎古詩君子防未然不處嫌疑問𤓰田不納履李下不整冠兒報不能謹潔敢觸嚴網右趾鐵繫事允法科漢食貨志敢私鑄鐵器鬻鹽者􅎂左趾韋昭曰􅎂以鐵為之著左趾以代刖也左校論輸實繇恩宥後漢皇甫規傳規以餘寇不絶論輸左校漢官儀左校署屬將作大匠老臣過庭之訓見論語多謝古賢折笄之杖國語范文子曰有秦客廋辭於朝大夫莫之能對也吾三知焉武子撃之以杖折其委笄有媿前達謝賚麕啓臣昨既陪羽獵仍宴上林固謝長卿之文彌慙子雲之賦漢書司馬相如字長卿有上林賦揚雄字子雲有羽獵賦預割鮮禽已同鹽浦司馬相如子虚賦騖於鹽浦割鮮染輪頻䝉大臠更異梁王晉書梁孝王彤謂王銓曰我從兄為尚書令不能啖大臠銓曰大臠為誰曰盧播詰旦歸來猶為飽飫虞衡所獻復降今恩周禮冬官山虞林衡川衡澤虞掌山林川澤之政令賜細君以為歡漢東方朔傳朔曰拔劒割肉一何壯也割之不多又何㢘也歸遺細君抑何仁也非屠門而大嚼桓譚新論闗東鄙語曰知肉味美則過屠門而大嚼謝東宫賚蛤蜊啓船俗嚴戈漢南粤傳注粤人於水中負人船又有蛟龍之害故置戈於船下漁人資設詩魚網之設于彼海童左思呉都賦海童於是宴語注海童海神也冒兹水豹望樓闕之氣得波潮之下漢書海傍蜃氣象樓臺謝賚蛤啓鴻化生蛤雀入猶新月令季秋之月爵入大水為蛤纔變秋成已聞冬獻徐孝穆集箋注巻一, SBCK: ''}
