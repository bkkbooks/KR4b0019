  - {type: variant, offset: 0, length: 2120, content: 欽定四庫全書集部二徐孝穆集箋注别集類一陳提要臣等謹案徐孝穆集六巻陳徐陵撰國朝呉兆宜注陵字孝穆東海郯人梁太子左衛率摛之子八嵗能屬文既長博涉史籍在梁世已以文章名入陳後累官侍中安右將軍左光禄大夫南徐州大中正建昌縣開國侯諡曰章事迹具陳書本傳隋書經籍志載陵集本三十巻久佚不傳此本乃後人從藝文類聚文苑英華諸書内採掇而成陵文章綺麗與庾信齊名世號徐庾體史稱其緝裁巧宻多有新意自有陳創業文檄軍書及禪授詔策皆陵所製為一代文宗其集舊無注釋兆宜既箋庾信集因并陵集箋之未及卒其同里徐文炳續為補緝以成是編其中可與史事相證者如資治通鑑梁武帝太清二年遣建康令謝挺散騎常侍徐陵等聘于東魏胡三省註謂建康令秩千石散騎常侍秩二千石謝挺不當在徐陵之上盖陵將命而使挺特輔行耳今案集中在北齊與楊僕射書有云謝常侍今年五十有一吾今年四十有四介已知命賔又杖鄉云云是謝挺實為正使盖假散騎常侍以行特通鑑但書其本官並非舛誤胡三省未考陵書不免曲為之説參諸此集可正其訛而兆宜所箋略不言及盖主于捃拾字句不甚考訂史傳也然箋釋詞藻亦頗足備稽考故至今與所箋庾集並傳焉乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀本傳徐陵字孝穆東海郯人也祖超之齊鬱林太守梁員外散騎常侍父摛梁戎昭將軍太子左衛率贈侍中太子詹事諡貞子母臧氏嘗夢五色雲化而為鳯集左肩上已而誕陵焉時寶誌上人者世稱其有道陵年數歳家人攜以候之寶誌手摩其頂曰天上石麒麟也光宅恵雲法師每嗟陵早成就謂之顔囘八歲能屬文十二通莊老義既長博涉史籍縱横有口辨梁普通二年晉安王為平西將軍寜蠻校尉父摛為王諮議王又引陵參寜蠻府軍事大通二年王立為皇太子東宫置學士陵充其選稍遷尚書度支郎出為上虞令御史中丞劉孝儀與陵先有隙風聞劾陵在縣贓汙因坐免久之起為南平王府行參軍遷通直散騎侍郎梁簡文在東宫撰長春殿義記使陵為序又令於少傅府述所製莊子義尋遷鎮西湘東王中記室參軍太清二年兼通直散騎常侍使魏魏人授館宴賓是日甚熱其主客魏收嘲陵曰今日之熱當由徐常侍來陵即荅曰昔王肅至此為魏始制禮儀今我來聘使卿復知寒暑收大慙及侯景寇京師陵父摛先在圍城之内陵不奉家信便蔬食布衣若居憂恤㑹齊受魏禪梁元帝承制於江陵復通使於齊陵累求復命終拘留不遣陵乃致書於僕射楊遵彥遵彥竟不報書及江陵陷齊送貞陽侯蕭淵明為梁嗣乃遣陵隨還太尉王僧辯初拒境不納淵明往復致書皆陵辭也及淵明之入僧辯得陵大喜接待餽遺其禮甚優以陵為尚書吏部郎掌詔誥其年高祖率兵誅僧辯仍進討韋載時任約徐嗣徽乗虛襲石頭陵感僧辯舊恩乃往赴約及約等平高祖釋陵不問尋以為貞威將軍尚書左丞紹泰二年又使於齊還除給事黄門侍郎祕書監高祖受禪加散騎常侍左丞如故天嘉初除太府卿四年遷五兵尚書領大著作六年除散騎常侍御史中丞時安成王頊為司空以帝弟之尊勢傾朝野直兵鮑僧叡假王威權抑塞辭訟大臣莫敢言者陵聞之乃為奏彈導從南臺官屬引奏案而入世祖見陵服章嚴肅若不可犯為斂容正坐陵進讀奏版時安成王殿上侍立仰視世祖流汗失色陵遣殿中御史引王下殿遂劾免侍中中書監自此朝廷肅然天康元年遷吏部尚書領大著作陵以梁末以來選授多失其所於是提舉綱維綜覈名實時有冒進求官諠競不巳者陵乃為書宣示自是衆咸服焉時論比之毛玠廢帝即位高宗入輔謀黜異志者引陵預其議高宗纂厯封建昌縣侯邑五百户大建元年除尚書右僕射二年遷尚書左僕射陵抗表推周𢎞正王勱等高宗召陵入内殿曰卿何為固辭此職而舉人乎陵曰周𢎞正從陛下西還舊藩長史王勱太平相府長史張種帝鄉賢戚若選賢與舊臣宜居後固辭累日高宗苦屬之陵乃奉詔及朝議北伐高宗曰朕意已決卿可舉元帥衆議咸以中權將軍淳于量位重共署推之陵獨曰不然呉明徹家在淮左悉彼風俗將畧人才當今亦無過者於是爭論累日不能決都官尚書裵忌曰臣同徐僕射陵應聲曰非但明徹良將裵忌即良副也是日詔明徹為大都督令忌監軍事遂克淮南數十州之地高宗因置酒舉杯屬陵曰賞卿知人陵避席對曰定䇿出自聖衷非臣之力也其年加侍中餘竝如故十年領國子祭酒南徐州大中正以公事免侍中僕射尋加侍中給扶又除領軍將軍八年加翊右將軍太子詹事置佐史俄遷右光祿大夫餘竝如故十年重為領軍將軍尋遷安右將軍丹陽尹十三年為中書監領太子詹事給鼔吹一部侍中將軍右光禄中正如故陵以年老累表求致仕高宗亦優之乃詔將作為造大齋令陵就第攝事後主即位遷左光禄大夫太子少傅餘如故至徳元年卒時年七十七詔曰慎終有典抑乃舊章令徳可甄諒宜追逺侍中安右將軍左光祿大夫太子少傅南徐州大中正建昌縣開國侯陵弱齡學尚登朝秀穎業高名輩文曰詞宗朕近歲承華特相引狎雖多臥疾方期克壯奄然殞逝震悼於懐可贈鎮右將軍特進其侍中左光禄鼔吹侯如故并出舉哀喪事所須量加資給諡曰章陵器局深逺容止可觀性又清簡無所營樹禄俸與親族共之大建中食建昌邑邑户送米至於水次陵親戚有貧匱者皆令取之數日便盡陵家尋致乏絶府僚怪而問其故陵云我有車牛衣裳可賣餘家有可賣不其周給如此少而崇信釋教經論多所精解後主在東宫令陵講大品經義學名僧自逺雲集毎講筵商較四座莫能與抗目有青睛時人以為聰慧之相也自有陳創業文檄軍書及禪授詔䇿皆陵所製而九錫尤美為一代文宗亦不以此矜物未嘗詆訶作者其於後進之徒接引無倦世祖高宗之世國家有大手筆皆陵草之其文頗變舊體緝裁巧宻多有新意毎一文出手好事者巳傳寫成誦遂被之華夷家藏其本後逢喪亂多散失存者三十巻有四子儉南史儉一名報陳書云儉一名衆非份儀僔, SBCK: ''}
