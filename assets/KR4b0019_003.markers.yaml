  - {type: variant, offset: 0, length: 13899, content: 欽定四庫全書徐孝穆集箋注巻三陳徐陵撰吳江吳兆宜註書在北齊與梁太尉王僧辯書太清六年六月五日孤子徐陵頓首昔者雲師火帝非無戰陣之風堯誓湯征咸用干戈之道至於揺山蕩海驅電乗雷殲厥兇渠無虧皇極若夏鍾夷羿周厄犬戎漢委珠囊秦亡寶鏡然則皆聞之矣未有膺龍圖以建國御鳯邸以承家二后欽明三靈交泰而天崩地坼妖寇横行者也自古銅頭鐵額興暴皇年見勸進表及為貞陽侯書檮杌窮竒流災中國左傳顓頊氏有不才子天下之人謂之檮杌少昊氏有不才子天下之人謂之窮竒王彌石勒吞噬關河晉書東萊王彌家世二千石彌有勇畧善騎射青州人謂之飛豹後為羣盜降劉聰為石勒所殺又劉淵以石勒為護漢將軍平晉王衆至十餘萬集衣冠人物别為君子營後據襄國為後趙緑林青犢之羣黑山白馬之衆較彼兵荒無聞前史八王故事曾未混淆九州春秋非云禍亂見為貞陽侯書我皇受命中興光宅天下泰寧瑣𤨏安敢執鞭史記晏子傳贊余雖為之執鞭所忻慕焉按泰寧晉明帝年號建武棲棲何期扶轂揚雄羽獵賦桓文曾不足使扶轂按建武晉元帝年號抑又聞之陶唐既作天歸鳥喙之臣春秋元命苞曰堯為天子季秋下旬夢白帝子遺以鳥喙子其母曰扶始升高丘丘有雲如虎感巳而生臯陶淮南子云臯陶鳥喙豐畢將興特挺鷹揚之佐詩維師尚父時維鷹揚涼彼武王肆伐大商㑹朝清明明公量苞金鉉易鼎黄耳金鉉神表玉璜見為貞陽侯書儷兖當作補衮欽才詩衮職有闕惟仲山甫補之平階佇德揚雄長楊賦是以玉衡正而泰階平也固巳留連管樂見為貞陽侯書惆悵風雲濡足維時新序今為濡足之故不救人溺可乎投竿斯在見與宗室書去歲兇徒不逞言次巴丘鼓聲聞一柱之臺博物志南荆賦江陵有臺甚大而惟一柱衆木皆拱之烽火照三休之殿藝文類聚賈子曰翟王使使者之楚楚王欲誇之享客章華之臺三休乃至其上公則懸麾羽扇語林亮與司馬懿克日交戰懿使偵之孔明葛巾羽扇指麾三軍從容自若懿歎曰諸葛君可謂名士矣猶對投壺後漢書祭遵為將軍耿士皆用儒術對酒設樂必雅歌投壺戎羯咸奔鯨鯢俱翦見勸進表樓船萬軸還繫昆明三輔黄圖武帝作昆明池學水戰法胡馬千羣皆輸長樂漢百官志長樂廐丞一人於是乎夏首西浮見為貞陽侯書雲行電邁彭波東匯禹貢東匯澤為彭蠡谷静山空見與陳司空書扼鵲尾而據王畿綱目質實池州府銅陵縣有鵲頭山今廬江西岸有鵲尾渚登牛頭而埽天闕漸臺偽帥仍傳首於帝京郿塢元兇咸刳腸於軍市青羌赤狄同畀豺狼胡服夷言咸為京觀見勸進表公園陵盡拜忠貫長沙吳志孫堅為長沙太守舉兵討董卓乃前入至洛陽修諸陵平塞卓所發掘神主咸安勲踰高密後漢書鄧禹南至長安率諸將齋戒擇吉日修禮謁祠高廟收十一帝神主遣使奉詣洛陽因循行園陵為置吏士奉守焉重以秦宮既獲漢張良傳沛公入秦宮殿帷帳狗馬重寶婦女以千數欲留居之魯殿猶存晉王延夀魯靈光殿賦序靈光巋然獨存闢緑草於應門沈約詩應門照緑苔開青槐於武庫未詳長安五陵之族鄠杜七遷之民班固西都賦南望杜霸北眺五陵注宣帝杜陵文帝霸陵高惠景武昭帝五陵在北士人多宅於此又三遷七遷充奉陵邑注七遷為編徒居七陵充供奉也又鄠杜濵其足注扶風有鄠縣杜陽縣襁負而歸論語則四方之民襁負其子而至矣都廛斯滿見與楊僕射書鬻脂藏脯遊騎擊鐘貨殖傳翁伯以販脂而傾縣邑濁氏以胃脯而連騎張里以馬醫而擊鐘故市新城飛甍華屋漢地理志河南郡有故市縣曹參傳東取咸陽更名曰新城顧非䂥曰戰國策蘇秦説趙王於華屋之下吳祥曰何晏景福殿賦高甍崔嵬注甍屋櫩也東莞舊宅人識桑榆南頓荒田家分禾黍見勸進表豈以鄉名穀熟括地志宋州榖熟縣西南三十五里南亳故城即南亳湯都也邑號禾興而已哉吳志孫權立子和為太子大赦改禾興為嘉興若夫卦起龍文書因鳥跡見勸進表劬勞王室大拯生民自開闢以來未之有也雖十六才子明允篤誠左傳高陽氏有才子八人齊聖廣淵明允篤誠天下之民謂之八愷高辛氏有才子八人忠肅共懿宣慈惠和天下之民謂之八元此十六族也世濟其美不隕其名八百諸侯專心同德書武王伐紂不期而㑹孟津八百諸侯又子有亂臣十人同心同德中宗佐命俱畫丹青光武功臣皆懸星象棧道水閣田單之奉霸齊綰璽將兵周勃之扶强漢見為貞陽侯書壤蟲之比黄鵠淮南子盧敖視若士曰吾比夫子猶黄鵠與壤蟲也轍鮒之仰河宗莊子外物篇莊子貸粟於監河侯侯曰以金貸汝周曰昔見轍中涸鮒曰無升斗之水以活我乎周曰待我決西江水以活汝鮒曰如君言不如早索我於枯魚之肆也未足云也孤子階縁多幸叨簉皇華鄉國屯危公私憔迫邳彤之切長亂心胷後漢書王郎所置信都王捕繫彤父弟及妻子使為手書呼彤曰降者封爵不降族滅彤涕泣報曰事君者不得顧家㑹更始所遣將攻拔信都郎兵敗走彤家屬得免徐庶之祈終無開允見與楊僕射書既而屏居空館潘岳寡婦賦歸空館而自憐多厯歲時釁犯幽祇躬當勦滅何圖釁咎災極蒼旻號慕煩冤肝腸屠殞酷痛柰何無狀柰何維桑與梓翻若天涯古詩各在天一涯杖柏栽松悠然長絶明明日月號叫無聞詩或不知叫號茫茫宇宙容身何所漢鄒陽傳申徒狄徐衍不容身於世窮劇柰何自忝膺嘉聘仍屬亂離上下年尊偏嬰此酷昔人迎門請盜恒懷廢寢之憂後漢書趙咨少孤有孝行躬率子孫耕農為養盜嘗夜徃劫之咨恐母驚懼乃先至門迎盜因請為設食謝曰老母八十疾病須養居貧朝夕無儲乞少置衣糧妻子物一無所請盜皆慙歎奔出當輓輿櫬猶有危途之懼後漢亷范傳范京兆杜陵人父遭喪亂客死於蜀漢范遂流寓西州西州平歸鄉里西迎父喪載船觸石破沒范抱持棺柩遂俱沈溺衆傷其義鉤求得之況乎逆寇崩騰京師播越興居動止長隔山河朝夕饘􅓞誰經心眼内則婦事舅姑如事父母饘􅓞酒醴芼羮菽麥蕡稻黍粱秫唯所欲程糜不繼師覺授孝子傳程曾年七歲喪母哀號哭泣不異成人祖母憐之嚼肉食之覺有味便吐去原粟何資論語原思為之宰與之粟九百瞻望風雲朝夕鳴咽固乃游魂已謝後漢謝夷吾傳遊魂假息無所施刑非復全生餘息空留非為全死同冰魚之不絶汲冢周書時訓解立春之五日魚上冰吳樹臣曰易通卦驗大雪魚負冰似蟄蟲之猶蘇月令孟春東風解凍墊蟲始振良可哀也良可哀也本傳侯景寇京師陵父摛先在圍城之内陵不奉家信便蔬食布衣居若憂恤自東都紹漢南亳興殷見勸進表修好徵兵左傳凡君即位卿出竝聘踐修舊好要結外援好事鄰國以衛社稷又王以戎難告齊徴諸侯而戍周彌留星琯韓宣范武方駕連鑣見左傳蘇秦張儀朱輪華轂蘇秦傳燕文侯資蘇秦車馬金帛以至趙張儀傳蘇秦乃言趙王發金幣車馬使人微隨張儀所欲用為取給儀遂得以見秦惠王而孤子三危是擯四罪同科孟子四罪而天下咸服詳勸進表聽别馬而長號杖歸旍而永慟王稽反命既無託乗之恩見與楊僕射書椒舉相逢誰為班荆之位左傳伍舉奔鄭將遂奔晉聲子將如晉遇之於鄭郊班荆相與食而言復故昔人違齊處魯時降徵求亡晉奔齊猶䝉招請左傳鮑叔帥師來言曰子糾親也請君討之管召讎也請受而甘心焉管仲請囚鮑叔受之及堂阜而税之曰管夷吾治於高傒使相可也公從之又隨㑹在秦乃使魏夀餘偽以魏叛者以誘士㑹執其帑於晉使夜逸請自歸於秦秦伯許之履士㑹之足於朝既濟魏人譟而還問管寧於遼左魏管寧傳寧字幼安北海朱虛人聞公孫度令行於海外遂至遼東文帝即位徵寧遂將家屬浮海還郡追王朗於浙東魏王朗傳朗為㑹稽太守孫策渡江畧地朗自以身為漢吏宜保城邑遂舉兵與策戰敗績朗乃詣策太祖表徵之朗自曲阿展轉江海積年乃至拜諌議大夫參司空軍事竝物譽時賢卿門公族懸須應務湥挾情祈斯豈庸賤之儔邪非餘生之敢望也但預在輶軒見與楊僕射書誠為過誤珪璋特達通聘河陽貂珥雍容尋盟漳水見勸進表差有黄門啟封非無青紙詔書晉山簡表臣父濤奉先帝手澤青紙詔郡將州司後漢皇甫規傳坐觀郡將巳數十年矣注郡將郡守也郊迎負弩漢書霍去病為票騎將軍擊匈奴道出河東河東太守郊迎負弩矢先驅鄉亭里候西京賦注秦法十里一亭周禮夏官有候人飾館陳兵左傳鄭穆公使視客館則東載厲兵秣馬矣豈是復介而奔齊左傳公孫歸父欲去三桓以張公室與公謀而聘於晉人去之冬公薨季文子使臧宣叔逐東門氏子家還及笙壇帷復命於介既復命袒括髮即位哭三踊而出遂奔齊寧當竊妻而逃晉左傳共王即位將為陽橋之役使屈巫聘於齊且告師期巫臣盡室以行申叔跪從其父將適郢遇之曰異哉夫子有三軍之懼而又有桑中之喜宜將竊妻以逃者也及鄭使介反幣而以夏姬行將奔齊齊師新敗曰吾不處不勝之國遂奔晉已焉哉羌難得其言也漢之谷吉捐軀者幾人漢書谷吉永之父也元帝時為衛司馬使送郅支單于侍子為郅支所殺楚之申胥埋魂者何地左傳申包胥如秦乞師立依於庭牆而哭七日秦哀公為之賦無衣九頓首而坐秦師乃出孤子何所歎焉但頓伏苫廬見與宗室書徒延光晷謂光隂日晷夫以啁噍燕雀躑躅鳴號禮記三年問今是大鳥獸則失喪其羣匹越月踰時焉則必反巡過其故鄉翔囘焉鳴號焉蹢躅焉踟蹰焉然後乃能去之小者至於燕雀猶有啁噍之頃焉然後乃能去之含識懷靈未有其痛且夫曾耕雨雪猶尚悲歌琴操曾子耕泰山下雨雪不得歸思父母作梁山操蘇使幽囚無馳哽噎見讓右僕射初表趙紹熹曰本傳陵不奉家信便布衣疏食曾耕句言己之思親蘇使句言已之奉使公履忠𢎞孝冠冕搢紳化感煙雲量標海岳行糜仲月王政無塞月令仲秋之月養衰老授几杖行糜粥飲食分穀高年仁風斯逺漢文帝紀有司請八十巳上月賜米肉酒九十已上加帛絮長吏閲視丞若尉致固以衣纓仰訓黎庶投懷今日憔惶彌布洪澤雖復孤骸不返方為漠北之塵營魄知歸終結江南之草左傳魏武子有嬖妾武子卒顆嫁之及輔氏之役顆見老人結草以亢杜回囘躓而顛故獲之夜夢之曰余而所嫁婦人之父也爾用先人之治命余是以報詳與楊僕射書孤子徐陵頓首與王吳郡僧智書南史王僧辯傳僧辯既亡弟僧智得就任約約敗走僧智肥不能行又遇害孤子徐陵頓首昔林宗道主時人多慕德之賓後漢書郭泰字林宗遊於洛陽始見河南尹李膺膺大竒之由是名震京師後歸鄉里衣冠諸儒送至河上車數千兩林宗惟與李膺同舟而濟衆賓望之以為神仙無忌雄豪天下盡希風之客信陵君傳魏公子無忌為人仁而下士士無賢不肖皆謙而禮交之士以此方數千里爭徃歸之致食客三千人況復王家沈黙晉書王昶為人謹厚名其兄子曰黙曰沈戒之曰欲爾曹顧名思義不敢違也謝氏混𤣥晉書謝混字叔源少有才名𤣥字幼度少穎悟與從兄朗俱為叔父安所器重名貴公門譽華卿子漢項籍傳楚懐王召宋義為上將軍號卿子冠軍而秦峰阻夐浙水悠長諮訴無因但用窮結比青葽已戒淮南子注青女青腰玉女主霜雪也白露方漙詩零露漙兮體中何如願聞康勝鄧仲華服衮之年後漢書鄧禹字仲華光武拜為前將軍持節中分麾下精兵二萬人遣西入關及即位於鄗使使者持節拜禹為大司徒封酇侯食邑萬户禹時年二十四後定封高密侯荀令則擁旄之日晉荀羡傳羡字令則除兆中郎將徐州刺史監徐兖二州揚州之晉陵諸軍事假節時年二十八中興方伯未有如羡之少者也徒云早達未可同功今日相方豈不高視魏曹植與楊德祖書足下高視於上京竊承富春頃歲多難薦臻邑閈皆空黔黎將盡御史舊榻零落不存郡國志消山下有夫山祠山北湖隂又有消御史廟孤石聳出似婦人豔妝而坐太傅齋室荒茫無處後漢循吏傳桓帝好黄老道悉毁諸房祠惟特詔密縣存故太傅卓茂廟自神麾所届襁負斯歸新屋方華故田斯墾府吏閒坐長使誦經謝承後漢書張霸為㑹稽太守甚有名稱其餘有素行者皆見擢用郡中爭勵志節誦習者以千數道路但聞誦書聲督郵無事惟慮吹笛馬融長笛賦序融性好音律能鼔琴吹笛為督郵無留事獨卧郿縣平陽塢中有洛客舍逆旅吹笛融去京師踰年暫聞甚悲而樂之作長笛賦東包海水俱承幕府之威班固集奏記東平王蒼曰幕府新開廣延羣俊西洎江沱同仰惟良之化漢書宣帝曰與我共理者其惟良二千石乎政差邊疑作趙張何其神也漢趙廣漢等傳贊自孝武置左馮翊右扶風京兆尹而吏民為之語曰前有趙張後有三王孤子無心靦冒茍郄光隂風疾彌留見與宗室書示有餘息恩將公聘窮擯虜庭博望侯極迹於黄河漢張騫傳漢使窮河源其山多玉石采來天子按古圖書名河所出山為昆侖云按騫封博望侯栘中監流滯於滄海漢昭帝紀栘廐中監蘇武前使匈奴留單于庭十九歲乃還奉使全節以武為典屬國蘇林曰栘音移廐名也自斯以後惟有庸賤本應埋魂趙魏析骨幽并鮑照蕪城賦莫不埋魂幽石委骨窮塵豈意餘年復反鄉國仰屬伊公在亳渭老師周旌賁丘園見易采拾衡巷遂以哀駘不棄莊子哀公問仲尼曰衛有惡人焉曰哀駘也甕盎無遺莊子甕盎大癭還顧庸虚未應偕此竊承君侯過被以光輝屢有吹嘘之言見檄周文頻䝉薦延之澤故得周行紫閣陸雲喜霽賦㬬六龍於紫閣升降丹墀左思魏都賦丹墀臨猋注天子庭以丹塗地故曰丹墀㸃汚清朝豈不荒媿雖復華隂砥柱帶地窮湥禹貢導河積石至于龍門南至于華隂東至于砥柱嵩高維岳極天為重詩嵩高維岳峻極于天未可以方斯盛典譬此洪恩年迫桑榆淮南子日西垂景在於樹端謂之桑榆豈期酬報政以川波非逺對奉無因夜夢子長之遊漢書司馬遷字子長二十而南遊江淮上㑹稽揬禹穴閫九疑浮於沅湘北渉汶泗講業齊魯之都觀孔子之遺風鄉射鄒嶧戹困鄱薛彭城過梁楚以歸朝覽希道之疏未詳按南史謝莊字希逸製木方丈圖山川土地各有分理離之則州郡殊别合之則宇内為一道逸字畫相近或致誤耳浮雲西北徒懷魏帝之文魏文帝雜詩西北有浮雲亭亭如車蓋行雨東南思假飛山之便吳越春秋范蠡作城訖怪山自至怪山者琅邪東武海中山也一夕自來百姓怪之故曰怪山窮誠已結荒係逾湥方事祁寒君牙冬祁寒小民亦惟曰怨咨願加珍納謹扶力白書迷乏不次孤子徐陵頓首荅李顒之書近謬枉清音無申窮眷忽辱來告文製兼美君山西盛族素挺風流河北辭林本所嗟賞子桓虚座寧不敬期吳志魏文帝諱丕字子桓嘗為虞翻設虚座伯喈倒屣固以相屬後漢書蔡邕才學顯著貴重朝廷常車騎填巷賓客盈坐聞王粲在門倒屣迎之曰此王公孫也有異才吾不如也吾家書籍文章盡當與之一日復其草土思􅗓衣裾後漢趙岐傳注岐與友書曰馬季長雖有名當世而不持士節三輔高士未嘗以衣裾􅗓其門也披素清顔但覺形穢世説衛玠俊爽有風姿王濟輒歎曰珠玉在前覺我形穢公輔之量不負高名晉石苞傳市長趙元儒歎苞當至公輔王佐之才信表天骨後漢王允傳郭林宗竒之曰王生一日千里王佐才也孺子之榻雖其可懸後漢徐穉傳穉字孺子陳蕃為豫章太守在郡不接賓客惟穉來特設一榻去則懸之仲舉之車彌軫恒眷見與宗室春孤子昔縁素乏叨簉皇華今日形容無關天壤殘光炯炯慮在昏明餘息緜緜待盡鐘漏見為王儀同表安可以樹揚名士游處盛賓吳志襄欽與太子登游處來喻泰高如為善謔文豔質寡何似上林漢書序傳文豔用寡子虚烏有寓言湥麗北風終始華而不實將同桂樹漢五行志成帝時歌謡云桂樹華不實黄雀巢其顛故為人所羡今為人所憐但忘年之款昔有張裵未詳後漢書禰衡始弱冠孔融年四十與為忘年交鄰國之交非無嬰札左傳吳公子札聘於齊悦晏平仲儻哀駘可悦甕盎非疑見與王僧智書方願投衿庶比傾蓋家語孔子之郯遇程子於途傾蓋而語終曰甚相親頃陳湯之疾歲月增湥羊祜之疴秋冬彌劇見與宗室書且年光遒盡觸目崩心扶力含毫諸不申具孤子徐陵頓首為陳武帝作相時與北齊廣陵城主書齊書辛術字懷哲武定八年除東南道行臺尚書遷東徐州刺史為淮南經畧及王僧辯破侯景術招攜安撫城鎮相繼款附前後二十餘州於是移鎮廣陵籍甚英風漢陸賈傳賈遊漢廷公卿間名聲籍甚常懷眷屬封疆有限寤寐增勞辱此月九日告湥慰情佇方秋尚熱體中何如戎帳艱辛無乃為弊吾以庸薄謬膺台鉉既荷先帝拔擢之恩兼䝉今主責成之寄政以皇齊大德世紹和風方藉威靈庶平讎恥提攜小國願預藩臣南史梁貞陽侯明傳陳霸先襲殺僧辯復奉晉安王仍請稱臣於齊永為蕃國還詔哀矜許垂容納奉敕須質便遣入朝部下諸將哀吾誠節一兒一弟無所遺恡南史南康愍王曇朗武帝母弟忠壯王休先之子也紹泰二年齊兵次逼建業因請和求武帝子姪為質乃遣曇朗質於齊齊背約遣蕭軌等隨徐嗣徽渡江武帝大破之虜蕭軌東方老等誅之齊人亦害曇朗於晉陽立志立義無負上天但故丞相諸子及湛海珍等竝依敕㫖馳遣渡江主上又遣吏部尚書王通鴻臚卿謝岐等南史本傳岐㑹稽山隂人陳武帝引參機密為兼尚書右丞至和州與司馬行臺共為盟誓南史貞陽侯明傳齊遣行臺司馬㳟及梁人盟於厯陽而蕭軌等決信敗亡陳武帝紀齊兵至秣陵故城帝率宗室王侯及朝臣於大司馬門外白虎闕下刑牲告天以齊人背約發言慷慨涕泗交流士卒觀者益奮齊文宣帝紀天保六年十一月梁秦州刺史徐嗣徽南豫州刺史任約等襲據石頭城竝以州内附壬辰大都督蕭軌帥衆至江遣都督柳達摩等度江鎮石頭巳亥柳達摩為霸先所攻遂以石頭降七年三月丁酉大都督蕭軌等帥衆濟江六月乙卯蕭軌等與梁師戰於鍾山西遇霖雨失利軌及都督李希光王敬寳東方老軍司馬裵英起竝汲士卒還者十二三茍相陵易鬱從東道馳至北郊陳武帝紀齊軍至𤣥武湖西北莫府山南將據北郊壇既通宮闈無容静黙兩兩相對俱有損傷彼聞人馬因此奔散且置兵之地溝澗且多退兵之時投赴相積陳武帝紀壬子夜大雨平地水丈餘齊軍晝夜坐立泥中而臺中及潮溝北水退路燥官軍每得番易近遣張都來此具是行人所見但廣陵建業纔隔一江戰場去岸不盈五里軍人退散理反家鄉縁岸村人復有舟檝且蘆牌荻筏竟浦浮江陳武帝紀齊軍士得竄至江者縛筏以濟中江而溺流尸至京口者彌岸千百為羣前後相繼吾又勒兵按甲漢書雋不疑傳右將軍勒兵闕下以備非常韓信傳廣武君對曰方今為將軍計莫如按甲休兵不聽討捕若無恐懼竝應安逺假使在此不可更生至彼而殂差非吾過如其枉理必是興軍見伐於有道之人加兵於無罪之國若彼王師如此又是違盟后土皇天山川社稷察其怨語寧容相祐辱告承上黨殿下及匹婁領軍齊書婁叡字佛仁代郡平城人也齊受禪得除領軍將軍武成至河陽遣總偏師赴懸瓠叡在豫境留停百餘日專行非法詔免官應來江右師出無名此是何義小之事大差無違理彼之陵我自是乖言𤣥天所伐匹馬無違翻見怨尤一何非理若彼鬼神有知寧可斯背鬼神無知何用盟歃漢外戚傳班使伃對曰使鬼神有知不受不臣之愬如其無知愬之何益去歲柳達摩等石頭天井連月亢陽三子纔降陳武帝紀齊安州刺史翟子崇淮州刺史柳達摩楚州刺史劉士榮率衆赴任約入石頭又梁敬帝紀翟子崇等降竝放還北連冬大雪黄袍盡沒吳其炳曰陳武帝紀柳達摩等被圍謂其衆曰頃在北童謡云石頭𢷬兩襠𢷬青復𢷬黄侯景服青巳𢷬於此今吾徒衣黄豈謡言驗邪白帳皆浮未詳按後漢西域傳帳者猶中國之户數也既因之以泥塗兼加之以疾疫蕭裵既退雪霧便除從爾以來稍成災旱定知衣冠之國禮樂相承博物志君子國人衣冠帶劒好禮讓故為君子國天道不言不容都滅長江渺渺巨浪湯湯如鬬艦舟師詎有湥利近梁山之戰即是前車蕪湖之役可為明鏡通鑑梁敬帝太平元年齊遣蕭軌等與任約徐嗣徽合兵十萬侵梁出柵口向梁山陳霸先帳内盪主黄叢逆撃破之齊師退保蕪湖霸先遣沈泰等就侯安都共據梁山以禦之昔晉侯不能乗鄭馬左傳乗小駟鄭入也慶鄭曰古者大事必乗其産生其水土而知其人心弗聽戰於韓原晉戎馬旋濘而止趙將不能用楚兵史記亷頗一為楚將無功曰我思用趙人一非水土難為騁力揚州卑濕漢地理志江南卑濕丈夫多夭厥土塗泥禹貢揚州厥土惟塗泥如遇秋霖楚辭皇天滛溢而秋霖兮后上何時兮得乾杳同江漢假令蚩尤重出見勸進表白起還生史記白起者郿人也善用兵事秦昭王控代馬而陵波後漢班超傳疏曰代馬依風躡胡靴而湔水終難逞効詎有成功六州勇士漢書金城隴西天水安定北地上郡為六郡雖有百萬十姓豪傑徒勞千億不能為患斷可知矣昔我平世天下乂安人不識於干戈時無聞於桴鼔見與楊僕射書故得兇人侯景濟我横江梁武帝紀太清二年冬十月巳酉侯景自横江濟采石天步中危實由忘戰漢主父偃傳引司馬法曰國雖大好戰必亡天下雖平忘戰必危自亂離巳乆人解用兵女子無媿於韓彭韓韓信彭彭越也見漢書兒童不殊於衛霍見移齊文吳鉤甚利吳越春秋闔閭命於國中作金鉤吳作鉤者殺其二子以血釁之遂成二鉤獻於闔閭鉤師向鉤而呼二子之名吳鴻扈稽我在於此聲絶於口兩鉤俱飛著父之胷吳王乃賞百金蜀甲殊輕槊動風霜未詳弩穿金石韓詩外傳楚熊渠子夜行見寢石似伏獸射之飲羽渠子見其誠心金石為之開而沉於人乎高樓大艦槩日凌雲謂樓艦之高也詳玉臺新詠序叱咤而起風雷吹嘘如倒山岳見檄周文侯車騎陳武帝紀二年以車騎將軍開府儀同三司侯填為司空國家重將分陜上流近隔以邊塵時虧表疏王途既泰貢賦相望尋令子弟侍奉京邑蕭太保龍驤於賁海梁敬帝紀紹泰元年以太尉蕭循為太保詳與酋豪書王儀同虎視於洞庭梁敬帝紀紹泰元年以鎮南將軍王琳為車騎將軍儀同三司本傳琳為元帝舉哀屯兵長沙傳檄諸方為進趣之計時長沙蕃王蕭韶及上㳺諸將推琳主盟若望高峰便當投袂左傳楚子投袂而起何則凡諸將帥各護家鄉非直吾人獨憂宗社日者頻辱司馬行臺及諸公有告裵行臺當今方邵此諸賢莫非英傑其餘軍士悉是驍雄庸蜀氐羌之兵蜀志晉策命曰乃考保據庸蜀商頌自彼氐羌烏桓白虜之騎鳥桓後漢外國名詳移齊文以此衆戰誰能禦之何為比吾倍薄相懸何惡諸君身名俱滅來告以細柳之軍踰於灞上漢書周亞夫為將軍次細柳劉禮為將軍次霸上徐悍為將軍次棘門文帝勞軍至其營曰嗟乎此真將軍矣向者霸上棘門如兒戲耳吾恐今之趙括不及亷頗也史記亷頗者趙之良將也頗將攻秦秦之間言曰秦之所惡獨畏馬服君趙奢之子趙括為將耳趙王因以括為將代亷頗秦軍射殺趙括括軍敗近張舍人至始奉嚴敕朝廷遣劉叔經仍徃啟聞願達丹誠用停王赫詩王赫斯怒伏計天慈理當懸照此身日月所鑒天地所明豈敢虚言欺妄宸極足下既未知始末容有疑怪大軍多士希惠矜𢎞量非此失時騰表疏幸停師旅已存盟信庶其小國永申藩禮天心無爽邇遐一同投筆慷慨不復多白為陳武帝作相時與嶺南酋豪書夫否終斯㤗屯極則亨若日月之回環猶隂陽之報復近者數鍾九厄漢書陽九戹四千五百歲為一元一元之中九陽戹五隂戹四陽為旱隂為水王室中微聖主欽明還承寶運即是高祖武皇帝之孫世祖元皇帝之子重光累聖𦙍國承家天下生民孰不歸德賊勃南史蕭勃梁武帝從弟景之子也不涯疏戚希纂帝圖信是奸兇階玆禍亂自王宮再淪於醜逆虜馬四飲於江沱具九錫文社稷阽危鑾輿幽辱勃身居列岳自御強兵高視趦趄見為貞陽侯書坐觀成敗既而天維重綴國歩還康翻畫凶圖更謀神鼎且其兵馬之任資於長昆南史吳平侯景傳景子勵勸勔勃勵為廣州刺史歲中數獻方物軍國所須相繼不絶武帝歎曰朝廷便是更有廣州大寳初勃鎮嶺南為廣州刺史方牧之權由於承聖南史太寳初廣州刺史元景仲謀應侯景西江督護陳霸先攻景仲迎勃為刺史時湘東王繹在荆州承制授勃鎮嶺南為廣州刺史操兄戈而斬姪藉國寵而弑君不忠不義莫斯為甚比春初便遣大都督歐陽頠墌城主傅泰等兇徒數十遂到臨川南史梁敬帝初即位加勃司徒紹泰中為太尉尋進為太保太平二年太保廣州刺史蕭勃舉兵反詔平西將軍周文育平南將軍侯安都等南討又勃度嶺出南康以歐陽頠為前軍都督周文育破禽之吾奉承朝算指畫戎畧樊滕耿賈樊樊噲滕膝公夏侯嬰高祖功臣耿耿弇賈賈復光武功臣戮力爭驅天地靈祗見與宗室書水陸開道獲傅泰不勞於一箭禽歐陽無待於尺兵偽黨皆俘連城盡拔所獲軍資不可稱算去月十六日德州刺史陳法武等願憤回戈仍梟凶豎一夫挺劒傳首上京萬里澄清後漢范滂傳登車攬轡慨然有澄清天下之志人神慶躍南史三月甲寅德州刺史陳法武前衡州刺史譚逺於始興攻殺蕭勃彼豪門著姓典牧方州拘隔天朝亟離寒暑公私憤歎豈可為懷今王道平夷理增歡忭朱明戒節爾雅夏曰朱明比復何如軍士平安境内清謐吾以庸薄叨秉國鈞詩秉國之鈞恒務牽纏諸有勞弊自天數云否朝禍洊臻東夏崩騰西京蕩覆身惟許國任在勤王宣力皇家靡有寧歲一還京師保持鴻業四驅夷狄奪得江左具九錫文始則杜龕元惡張彪不㳟據有泰稽連蹤巨震隨機討掩觸刃平夷南史杜龕據吳興以叛龕僧辯壻也霸先表自東討仍還都命周文郁進討龕龕以城降誅之梁敬帝紀太平元年春正月巳亥東揚州刺史張彪圍臨海太守王懷振于剡岩二月庚戌遣周文育陳蒨襲㑹稽討彪敗走丙辰若邪村人斬張彪傳首建業叛臣任約徐嗣徽等屢引齊虜前年末既踐京師江畔邊城皆為戎戌賴貔貅騁力見為貞陽侯書衛霍同心見移齊文殲厥胡夷不日清殄南史陳武帝東討杜龕留侯安都杜稜宿衛臺省軍至義興泰州刺史徐嗣徽乗虚奄至闕下侯安都出戰嗣徽等退據石頭帝以嗣徽寇逼巻甲還都命周文郁進討杜龕齊又遣兵萬人於胡墅度米粟三萬石馬千匹入石頭帝乃遣侯安都領水軍夜襲胡墅燒齊船周鐵武率舟師斷齊運輸帝領鐵騎自西明門襲之齊人大潰去年將夏傾國大來鐵騎八千許匹甲士二十餘萬胡塵飛於北闕虜鼓震於南宫躬率褊裨聊與挑戰虜便土崩瓦解投險赴坑大小皆禽鯨鯢盡戮見勸進表三江之上禹貢揚州三江既入塞水無流千里之間伏尸相枕生獲大都督蕭軌裵英起東方老李希光王敬寳等南史二年三月齊遣水軍儀同蕭軌庫狄伏連堯難宗東方老侍中裵英起東廣州刺史獨孤辟惡洛州刺史李希光并任約徐嗣徽王僧愔等衆十萬出柵口向梁山五月齊兵至秣陵故城游騎至臺都下震駭帝潛以精卒三千配沈泰度江襲齊行臺趙彦深於瓜歩獲其舟粟又遣錢明領水軍出江乗邀撃齊人糧運盡獲之齊人大餒帝因命衆軍蓐食攻之齊軍大潰執嗣徽及其弟嗣宗斬之以徇虜蕭軌東方老王敬寳李希光襄英起王僧智等將帥四十六人其軍士得竄至江者縛筏以濟中江而溺流尸至京者彌岸惟任約王僧愔獲免虜中驍將唯此數人屢破關西之兵頻取淮右之地一朝俘斬無復孑遺詩周餘黎民靡有孑遺逺邇敬欣華夷怖慴如聞彼虜稍是危亡尋命熊羆欲就征討方可以雷行趙魏電埽幽并後漢呉漢傳贊電埽羣孽混一車書勢在朝暮而侯瑱跋扈江州後漢梁冀傳帝曰此跋扈將軍也公私阻絶即平北賊仍事南征肉袒面縳左傳楚子圍鄭鄭伯肉袒牽羊以迎又殖綽郭最皆衿甲面縛坐於中軍之鼓下歸首闕庭即為申聞優其禮秩臺儀不貶位遇兼常南史侯瑱鎮豫章甚强又以本事王僧辯未肯入朝後余孝頃與瑱相拒瑱留軍人妻子於豫章令從弟奫知後事悉衆以攻孝頃奫部下侯方兒叛攻奫虜瑱軍府伎妾金玉歸於武帝瑱既失根本以武帝有大量必能容已乃詣闕請罪武帝復其爵位今所禽歐陽頠傅泰等莫不𢎞宥政爾授其兵馬處以榮禄坦然遊狎無介懷抱年號武平建武永平後漢年號詳侯安都碑國即清晏君之聞此寧不欣躍但昔縁王事遊踐貴鄉日想山川依然舊識陳武帝紀蕭暎為廣州陳武帝為中直兵參軍隨之鎮明年為交州司馬與刺史楊㬓討平李賁除江西都䕶高要太守督七郡諸軍事吾既沗荷朝私位逾台衮身持帝王之柄手握天下之圖後漢朱穆傳劉陶等訟穆曰中官近習竊持國柄手握王爵口含天憲詳與楊僕射書故鄉如此誠為衣繡故人不見還同宵錦漢書上謂朱買臣曰富貴不歸故鄉如衣繡夜行又項羽懷思東歸曰富貴不歸故鄉如衣錦夜行天涯藐藐見與王僧辯書地角悠悠言面無由但以情企今者王猷帝載化被無垠傅毅舞賦游心無垠注垠際也浮海窮山罔不咸格投竿負鼎見與宗室及王太尉書馳歩蒼龍後漢百官志北宫門蒼龍司馬主東門注洛陽宫門名為蒼龍闕門崖穴邱園後漢和帝紀詔曰昭巖穴披幽隱遣詣公車朕將悉聽焉詳為貞陽侯書爭趨金馬漢東方朔傳上使待詔金馬門君之才具見為貞陽侯書信美登朝如戀本鄉不能遊宦門中子弟望遣來儀當為申聞各處榮禄深加持保念嗣音郵今遣某甲等使彼指此不多為陳武帝與周宰相書昔有天地便立帝王革昊惟農未詳按史記三皇本紀太皡庖犧氏風姓女媧氏亦風姓代宓犧立號曰女希氏女媧氏没神農氏作神農氏姜姓遷虞斯夏竹書紀年舜在位十有四年於是八風循通慶雲叢聚遷虞而事夏莫不三靈所佑見勸進表五運相推漢律厯志土生金故為金徳金生水故為水徳水生木故為木徳木生火故為火徳火生土故為土徳梁徳不造固天攸棄雖復東漢之末區宇沸騰西晉之亡生民蕩覆見為貞陽侯書未足以方其禍亂譬彼䖍劉者也吾謬以庸薄屬當興運自昔登庸清諸百越徐聞浪泊靡不征行宋州郡志越州合浦太守領徐聞令後漢馬援傳南撃交阯軍至浪泊上銀洞珠官所在清乂益州記銀水在綿州晉書地理志合浦郡領珠官縣自還麾南極伐逆東都宣力驅馳亟淹寒暑六延梁社十翦疆寇具九錫文黄帝與蚩尤七十戰帝王世紀黄帝討蚩尤凡七十二戰魏祖在軍中三十年魏氏春秋夏侯惇謂王曰殿下即戎三十餘年功徳著於黎庶方厥劬勞未為勤苦加以百神所感明靈應期見勸進表萬里徂征虯龍表瑞陳武帝紀帝進軍頓西昌有龍見水濱高五丈五采鮮曜於是中軍勇鋭上將横行承此休符遂興王業梁氏以天禄斯改期運永終欽若唐風推其鼎命吾驚惶三讓拜手陳辭盈廷公卿稽顙敦偪眷言潁水徒抱素心逸士傳堯之讓許由也由以告巢父巢父曰汝何不隱汝形藏汝光非吾友也乃撃其膺而下之許由悵然不自得乃過清冷之水洗其耳拭其目曰嚮者聞言負吾友遂去終身不相見許樹臣曰九域志潁昌府有由臺巢父臺尚想汾陽無因高蹈莊子堯見四子藐姑射之山汾水之陽窅然喪其天下偎以庸薄遂膺天寵去月乙亥升禮大壇言念遷桐但有慙媿昔賓門之始境外無交郊特牲人臣無外交不敢貳君也雖遣行人未申嘉好今上天有命光膺寶厯永與周室方同斷金我運維新宜修朝聘今遣侍中都官尚書周𢎞正銜使長安故指有白為陳主與周冢宰宇文䕶論邊境事書周書䕶字薩保大祖兄邵惠公顥之少子封晉國公文帝曰吾形容若此必不濟諸子幼天下事以屬汝䕶涕泣奉命孝閔踐阼拜大冢宰國有三慶民有四安所謂通和是由鄰睦况周陳欵好一紀於兹懷抱相期百世方逺灌瓜之美乆敕邊吏賈誼新書梁大夫宋就為邊縣令與楚鄰界兩亭皆種瓜楚亭瓜惡就令人竊為楚亭灌瓜楚王悦梁之隂讓也謝以重幣拾橡之尤想應無忽東觀漢記李恂餉遺無所受居新安關下拾橡實為食梁氏以漸水東為安湘小郡宜立巴州隋書荆州巴陵郡注梁置巴州多厯年所此於荆部本包分界近得刺史符元舉啟稱蕭巋北史周附庸傳巋字仁逺詧之第三子也忽遣杜元茂神僧訓等將率人馬踰潰渉澌便置城隍易城復于隍謀為侵軼左傳彼徒我車懼其侵軼我也適荷鄰徳合州見還不容今眷仍縱蕭氏元舉累移論及翻相河漢劉峻辨命論聖人之言河漢而不測更徃研問便騁鋒鏑見檄周文彼軍人恃勇遂致俘禽聞此紛紜甚以驚歎其商奄餘孽周本紀成王既遷殷遺民東伐淮夷踐奄遷其君薄姑才力甚微為暴邊城良憑大國但情均忌器漢賈誼傳諺曰欲投鼠而忌器不可加兵便敕軍司以禮相放且前歲所立疆城本以南平等五郡輸薦貴朝北史附庸傳蕭詧大定四年詧遣其大將軍王操畧取王琳之長沙武陵南平等郡宋書荆州南平内史呉南郡治江南至如安湘既屬巴郡幸承鄰惠無候渉言故下漸東惟如澧北政是標其大桶屬荆州之界耳漢高帝紀築甬道屬河注恐敵抄輜重故築垣牆如街巷周附庸傳江陵平周文命詧主梁嗣居江陵城東資以江陵一州之地其襄陽所統盡入於周又詧子巋天保五年長沙巴陵並䧟於陳彼此方申分好義絶規圖所貴惟和所重惟信夫以南平等郡地曠民豐雲夢之田楚王為寶見移文呉當勁蜀晉拒彊秦資彼山川並為州鎮朕若棄其仁義務廣封域寧容延歲並貢周朝今者和親已固山岳而方謀尺寸之土用益蒹葭之地哉幸非竊疾國䇿墨子見楚王曰今有人於此舎其文軒鄰有敝輿而欲竊之舎其錦繡鄰有短褐而欲竊之舎其粱肉鄰有糟糠而欲竊之王曰必為有竊疾矣相見鑒容江陵小宼既爾䖍劉前至之言或相誣罔一二因使人宇文平口具其懷耿耿故此相白為陳主答周主論和親書使人使持節車騎大將軍儀同三司大都督治司城使主杜子暉中軍山遂伯使副鮑宏等至北史杜杲字子暉京兆杜陵人也明帝初為修城郡守初陳文帝弟安成王頊為質於梁及江陵平頊隨例遷長安陳人請之至是帝欲歸之命杲使焉又鮑宏字潤身東海剡人也仕梁元帝遷通直散騎常侍郎江陵平歸於周明帝甚禮之累遷遂伯下大夫與杜子暉聘陳謀伐齊省告具懷夫聖君明辟司御兆民則天法地佇育黔首故張旜以徃拭玉而來見與楊僕射書同在蒼生恢宏文武雖毁戈鑄㦸未擬上皇龍魚河圖云蚩尢造五兵仗刀㦸大弩散馬休牛載懷偃伯司馬法古者武軍三年不興則凱樂凱歌偃伯靈臺答人之勞告不興也非期與睦忽爽和風奚用殲師左傳宋師敗績公傷股門官殲焉信由天討追尋曩好歎想兼懐言覿今書甫承家難知以冡宰執政擅同淵藪書武成商王受為天下逋逃主萃淵藪令尹當朝妄專征伐無君之謫俾墜其師左傳晉士爕㑹楚公子罷許偃盟曰有渝此盟明神殛之俾墜其師無充胙國無將之誅已從司寇公羊傳君親毋將將而誅焉刑名既肅國歩還康希篤親鄰敬聞衷欵若二境交歡俱饗多福八荒期乂良副所懷今遣具位某甲等使不復多述在吏部尚書答諸求官人書自古有吏部尚書者品藻人倫簡其才能尋其門胄逐其少多量其官爵但古來數千年非無明時也非無明主也自有才用雖美階級不通門户雖高官資殊屈若斯人者其例甚多請問諸君此是何義夫一千錢一斛米之多少猶關相禄况復皇朝官爵理係𤣥天内典謂之為業外書稱之為命五行有驛馬之言六甲有官鬼之説必令驛馬時發官鬼克身所望階榮便當果遂如其不爾決是難諧豈可改尚書作官鬼驅老僕為驛馬邪若見問尚書何不分判用與不用許與不許僕答云君非屈滯豈可相期決言應果若今驛馬差爽便是乖信此關君命僕何以相答邪若朝散之流行止之屬門户相似人才不殊選家斟酌無能為爾若陟大位清官悉由𤣥命夫人君賓用並是前縁故宋文帝云人豈無運命每有好官缺輙憶羊𤣥保南史羊𤣥保太山南城人文帝以𤣥保亷素寡欲頻授名郡嘗曰人仕宦非惟須才亦須運命毎有好官缺我未嘗不先憶羊𤣥保梁武帝云世間人言有目色我特不目色范悌自此而論豈非前業且世諺云圖官在亂世覔富在荒年梁孝元帝承侯景之㓙荒王太尉接荆州之禍敗爾時喪亂無復典章故使官方窮此紛雜自紹泰太平及永定中聖朝草創爾時州州自帝郡郡稱王魏志注令曰設使國家無有孤不知當幾人稱帝幾人稱王天下干戈尚無條序兼以府庫空虚賞賜懸乏白銀之寳難得漢食貨志武帝時有司奏言古者金有三等黄金為上白金為中赤金為下乃造銀錫白金孟康曰白金銀也黄紙之版易營南史張興世傳朝廷遣吏部尚書褚彦回就赭圻行選是役也皆先戰授位檄版不供由是有黄紙札假以官榮代於錢絹義在撫綏無計多少又有非舊非勲非地非才託節將而求官因時人以買位賣官既賤皆為清顯故員外常侍路上比肩諮議參軍市中無數四軍五校車載斗量三國志呉趙咨曰如臣之比車載斗量豈是朝章應其如此今衣冠禮樂日富年華主上體成王之風太傅𢎞周公之徳陳宣帝紀帝諱頊始興昭烈王第二子也光大二年進位太傅西羗北狄畏我王威時既清矣時既平矣何可猶作亂世意而覔非分之官邪凡人所以稱屈滯者身已不無寸能官又不及父祖既是明時可以於邑所見諸君多踰本分猶言太屈未喻高懷若問梁朝朱領軍等並為卿相南史朱异字彦和呉郡錢塘人太清二年為中領軍此不踰其本分邪此天子所用非關選序舊章秦有車府令趙高直為丞相秦始皇本紀二世皇帝元年以車府趙高為郎中令三年冬為丞相漢有高廟令田千秋亦為丞相漢書車千秋傳千秋本姓田氏為高寢郎上急變訟太子寃數日為丞相千秋年老朝見得乗小車入宫殿中故號車丞相此復可為例邪僕七十之歲朝思夕計並願與諸賢為真善知識湼槃經佛言具足梵行乃名善知識曾無嫌隙差可周旋非欲令君作此怨訴但既沗衡流應須粉墨庶其允當無負朝寄耳去年疾患亦餘氣息不能相答通作此書所望諸賢深明鄙意徐君白同前此篇陳書本自古吏部尚書者品藻人倫簡其才能尋其門胄逐其大小量其官爵梁元帝承侯景之㓙荒王太尉接荆州之禍敗爾時喪亂無復典章故使官方窮此紛雜永定之時聖朝草創干戈未息亦無條序府庫空虚賞賜懸乏白銀難得黄札易營權以官階代於錢絹義存撫接無計多少致令員外常侍路上比肩諮議參軍市中無數豈是朝章應其如此今衣冠禮樂日富年華何可猶作舊意非理望也所見諸君多踰本分猶言太屈未喻高懷若問梁朝朱領軍异亦為卿相此不踰其本分邪此是天子所拔非闗選序梁武帝云世間人言有目色我特不目色范悌宋文帝亦云人世豈無運命毎有好官缺輙憶羊𤣥保此則清階顯職不由選也秦有車府令趙高直至丞相漢有高廟令田千秋亦為丞相此復可為例邪既沗衡流應須粉墨所望諸賢深明鄙意答周處士書南史周𢎞讓始仕不得志隱於句容之茅山頻徵不出晚仕侯景為中書侍郎獲譏於代辱去年三月二十七日告仰披華翰甚慰翹結承歸來天目呉興記天目山極高峻嶺上有泉水甚美東南有瀑布下注數畆元和地志天目有兩峰峰頂各一池左右相對為天之左右目故名道書云第三十四洞天得肆閒居禮記孔子閒居差有弄玉之俱仙列仙傳簫史教弄玉吹簫作鳯聲鳯皇來止其屋秦穆公為作鳯臺一旦皆隨鳯飛去非無孟光之同隱後漢逸民傳梁鴻妻孟光曰妾有隱居之服乃更為椎髻著布衣操作而前優游俯仰極素女之經文抱樸子黄帝論導養而質𤣥素二女升降盈虚盡軒皇之圖藝漢藝文志道家者流黄帝四經四篇黄帝銘六篇黄帝君臣十篇雜黄帝五十八篇雖復考槃在阿不為獨宿見詩詎勞金液神仙傳藥之上者有九轉還丹太乙金液唯飲玉泉比夫煮石紛紜終年不爛神仙傳白石生常煑白石為糧燒丹辛苦至老方成及其得道𡨕真莊子至道之精窈窈𡨕𡨕又有真人而後有真知何勞逸之相懸也又承有方生亦在天目理當仰禀明師總斯祕要豈如張陵弟子自墜高巖列仙傳雲臺山絶崖有桃樹大如臂張陵曰得桃實者告以要道弟子無敢視者趙升從上自擲正中桃樹得桃滿懷而至孫泰門人競投滄海南史沈約傳錢塘人杜炅通靈有道術炅死門徒孫奉泰弟子恩傳其業, SBCK: ''}
