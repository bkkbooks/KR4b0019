  - {type: variant, offset: 13894, length: 12080, content: 安三年恩於㑹稽作亂宋武帝紀孫恩自敗後懼見獲乃投水死於臨海何其樂乎聖朝虚心版築尚想邱園見為貞陽侯書若彼能赴嘉招潘岳詩弱冠添嘉招便當謹申高命但其人徃歲亦望至京師觀此風神確乎難拔見易故以忘懷爵禄詎持犧牲之談左傳賓孟適郊見雄雞自斷其尾問之侍者曰自憚其犧也遽歸告王且曰雞其憚為人用乎人異於是犧者實用人人犧實難已犧何害高視公卿獨騁蜡蛵之訓未詳按莊子人食芻豢糜鹿食薦螂蛆甘帯天下味知正味注帯小螳螂蛆喜食其眼所恐有道三辟公車十徴後漢方術傳董扶字茂安廣漢綿竹人也前後宰府十辟公車三徴再舉賢良方正有道皆稱疾不就若斯者終當不屈此既然矣請復詳言昔楚國兩龔同時紆組漢書龔勝龔舎皆楚人也二人相友並著名節故世謂之楚兩龔俱為光禄大夫謝病歸鄉里郡二千石長吏初到官皆至其家如師弟子之禮漢陰一老相攜抱甕莊子子貢過漢隂一丈夫方為圃畦鑿隊而入井抱甕而出子貢曰有機於此日侵百畦圃者笑曰夫有機事必有機心吾差不為也兄之幽貞若其鑿坏負石莊子湯伐桀克之以讓務光光曰無道之世不踐其土况尊我乎乃負石而自投瀘水顔闔不受魯聘鑿坏而遯方同形影玉臺新詠楊方合歡詩譬如形追軀又亦如影追身結綬彈冠漢書蕭育與朱博為友著聞當世徃者有王陽貢禹故長安語口蕭朱結綬王貢彈冠言其相薦逹也無容楚越况乎糞土䕫龍左傳臧紇唁衛侯退而告人曰衛侯其不得入矣其言糞土也羶臊名器周禮注犬腥羊羶左傳仲尼曰惟名與器不可以假人已所不欲非應及人忽承來音良以多感何則潁陽巢父不曾令薦許由見為陳武帝書商洛園公未聞求徴綺季漢書張良傳注四人謂園公綺里季夏黄公甪里先生所謂商山四皓也斯所未喻高懷而躊躇於矛楯也莊子楚人有賣矛及楯者見人來買矛即謂之曰此矛無何不徹見人來買楯則又謂之曰此楯無何能徹者買人曰還將爾矛刺爾楯若何唯遲山阿近信更惠芳音如或誠言謹便聞奏第夙勞比劇不復多呈徐君白與章司空昭達書君白日聖朝受命天下廓清所餘殘兇惟有歐紇南史歐陽紇字奉聖頠子頗有幹畧襲父官爵在廣州十餘年威惠著於百姓宣帝頗疑之太建元年徴為左衛將軍遂舉兵反詔儀同章昭逹討禽之南通交管北據衡疑兄弟叔姪盤阻川洞南史頠合門顯貴威振南土百越之賮不供王府萬里之民不由國家明公受脤嚴冬左傳劉子曰祀有執膰戎有受脤持兵杪歲王制冢宰制國用必於歲之杪開冰踐露􅡒火宵行便届全淮乃其神速未騁三畧非勞六竒李康運命論張良得黄石之符受三畧之説注上中下三計漢書陳平六出竒計薄交旗鼓仍平醜類自太清之末永定以來所闢疆界不過郡邑今兹赴㨗二十餘州若較此功庸方兹英力漢之馬援不能為擬廣州記馬援討平交阯於嶠南立銅柱以表漢之極界呉之歩騭故是相懸呉志歩隲為交州刺史威聲大震南土之賓由此始况孫處宗之叛徒正槌盪主耳陳廢帝紀慈訓太后令曰盪主孫泰等潛相連結大有交通公私慶快可得而言且僕一子屯窮妖徒所制五嶺遐夐漢張耳傳南有五嶺之戍注大庾始安臨賀桂陽揭陽也存亡不測懸懷飲淚破膽復全䝉荷英恩保其身命餘年仰戴何力能勝今遣主帥某馳徃稱慶徐君呈重答朝臣書南史劉師知傳武帝崩六日成服朝臣共議大行皇帝靈坐俠御人衣服吉㓙之制博士沈文阿議宜服吉師知議服衰絰中書舎人蔡景厯江徳藻謝岐等同師知議時以二議不同乃啟取左丞徐陵决斷陵同博士議謝岐議必備衰絰陵答書云云文阿猶執所見衆議不能决乃具録二議奏聞上從師知議老病屬纊不能多説喪大記屬纊俟氣絶古人爭議多成怨府左傳叔孫昭子曰吾不為怨府傅𤣥見尤於晉代晉書傅𤣥為司𨽻校尉毎有奏劾或值日暮捧白簡整簪帶竦踊不寐坐而待旦王商取䧟於漢朝漢書上素重商知張匡言多險制曰勿治謹自三緘家語孔子觀周入后稷之廟有金人焉三緘其口而銘其背敬同高命若萬一不死猶得展言庶與羣賢更申揚𣙜薦陸瓊書南史陸瓊雲公子也字伯玉素有令名為陳文帝所賞以文學累遷尚書又遷新安王文學掌東宫管記及宣帝為司徒妙簡僚佐吏部尚書徐陵薦瓊於宣帝乃除司徒左西掾新安王文學陸瓊見識優敏文史足用見讓左僕射表進居郎署歲月過淹左西掾缺允膺兹選階次小踰其屈滯已積報尹義尚書别離二國見與楊僕射書雲雨十年顔延之詩朋好雨雲乖心想河陽言銅爵而無逺魏志太祖於鄴作銅雀臺神遊漳水與金鳯而俱蜚幽明録鄴城鳯陽門五層安金鳯皇二頭於其上一頭飛入漳河清浪見在水底一頭今猶存北使還辱去冬十月十一日告忽同言叙循環巧製欣慰良深河朔年芳後漢郡國志朔方郡大城故屬西河雖當晼晩屈原九辨白日晼晩其將入兮白溝浼浼水經注督亢水又南謂之白溝水春流已清紫陌依依水經注鄴縣趙建武十一年造紫陌浮橋於水上長楊稍合體中何如豈無鄉思弟三秦世胄漢高祖紀注應劭曰章邯為雍王司馬欣為塞王董翳為翟王分王秦地故曰三秦六輔良家漢兒寛傳寛表奏開六輔渠文武兼能志懷開逺谷永之筆漢游俠傳谷子雲之筆札無慙古人盖延之功後漢盖延傳延與呉漢同歸光武號建功侯高視前彦而淹留趙魏亟厯寒暄企望鄉關理多悲切聖朝欽明纂厯大拯生民戮巨海之奔鯨殲中原之封豕見勸進表晉君之説長安逺於日邊劉昭㓜童傳晉明帝諱紹元帝太子也帝問長安如何日逺答曰不聞人從日邊來只聞人從長安來明日集羣臣宴會復以此問又以為日近元帝動容問何故異昨日之言答曰舉頭見日不見長安揚雄有言交州在於天際揚雄交州箴交州荒裔水與天際則輸琛王府詩來獻其琛屈膝閶門西京賦注閶闔天門也川洞酋豪彊梁溟海古逸詩金人銘强梁者不得其死神兵一指率土咸康詩率土之濱莫非王臣方當偃覇於靈臺見論和親書韜戈於武庫漢魏相傳霍光曰武庫精兵所聚故以丞相子為武庫令變大風於五禮舜典修五禮詳與楊僕射書驅蒸民於昌辰詩天生蒸民物色英聲捜揚俊傑投竿負鼎見與宗室及王太尉書馳歩蒼龍巖穴邱園爭趨金馬見為貞陽侯及與酋豪書而弟留河北義等周邵懷此殊才實可傷嗟吾崦嵫既暮屈原離騷望崦嵫而勿廹注崦嵫日所入之山也容鬢皤然易賁如皤如風氣彌留砭藥無補追惟疇昔檀弓夫子曰予疇昔之夜共備行人室家安危賓禮升降懸壺代哭喪大記君喪狄人出壺司馬乃官代哭大夫官代哭不懸壺士代哭不以官俱厯春冬移館於箕見與楊僕射書同兹辛苦鳴蜩抱樹亟見藏冰月令仲夏之月蟬始鳴爾雅方言蟬楚謂之蜩左傳古者日在北陸而藏冰西陸朝覿而出之歸雁銜蘆多經寒食淮南子雁銜蘆而翔似備弋繳月令孟春之月鴻雁來風呉挺曰荆楚歲時記去冬節一百五日即有疾甚雨謂之寒食靖言念此如何可忘握翫來書彌其承臉夫以擁腫之木得免因於不才莊子惠子曰吾有大樹人謂之樗其本擁腫又人間世篇匠石見櫟社樹曰是不材之木也無所可用故能若是之壽觳觫之牛自保由其無用見孟子以余鄙陋未友龔生見與楊僕射書惟歎吾賢不同蘧瑗耳論語蘧伯玉使人於孔子若推溝拯溺見孟子毎切皇衷逸翮飄鱗見優機檻所以降尺一之書後漢陳蕃傳漢以尺一版寫詔書馳輶軒之使見與楊僕射書心期與國必遂還途寧謂親鄰更成難請言尋雅告所及縲囚左傳知罃對楚子曰兩釋纍囚以成其好便訪鴻臚後漢百官志大鴻臚掌諸侯及四方歸義蠻夷幸無淹使聞諸司寇或有邊俘前歲中流是維同惡左傳韓宣子曰同惡相求如市賈焉燕禽望闕戰國䇿於是乃摩燕鳥集闕見説趙王於華屋之下冀馬臨江左傳司馬侯曰冀之北土馬之所生裁頓雲羅自投天網見移齊文京觀之冡宜彰武功見勸進表周醜疑作首之門方申明罰左傳齊襄公之六年鄋瞞伐齊齊管成父獲其弟榮如埋其首於周首之門而聖朝好生惡殺収雷寢電兵車所獲雖同長萬之來左傳宋公謂南宫長萬曰今子魯囚也恩澤從容無異荀罃之禮左傳荀罃在楚楚子厚其禮而歸之方之於弟况擬非倫伊昔梁朝共奉嘉聘張兹大帛儀禮使者載旜帥以受命於朝周官司常通帛為旃處彼高閎左傳高其閈閎以無憂客使庭奏歌鐘左傳鄭人賂晉侯歌鐘二肆晉侯以樂之半賜魏絳魏絳於是乎始有金石之樂座延僑肸晉叔向名肸鄭子産名僑賓客之叙方於阼階王制主人就東階客就西階客若降等則就主人之階主人固辭然後客復就西階田獵之禽同於君膳王制天子諸侯無事則歲三田一為乾豆二為賓客三為充君之庖正以鄉關阻亂致爾拘留家國隆平義應旋反况復韓宣屢至宰孔頻還翻爾遲回豈云鄰睦弟遂鍾儀之操見與楊僕射書對此皇華高厚之詩左傳齊高厚之詩不類一何非類關徐亷樂之況未詳三戰七禽之言魯仲連遺燕將書曹子以一劍之任刼桓公於壇位之上三戰之所失一朝而反之徐文炳曰晉漢春秋諸葛亮征孟獲七縱七禽此日借子之矛攻子之室見答周處士書彼之使客猶尚不還此於齊都豪門貴戚周行匪例事義相懸豈與大弟同年而語吾本自凡流以復衰老稍近東岱不奢魏劉楨詩常恐遊岱宗不復見故人撃壤之年惟欣堯俗高士傳瓖父者堯時人年五十而撃壤於道中若邪之復長保安卧時思之原注若邪至此闕誤不棄沗亞宗卿非復侵官天扆左傳賈季使續鞫居殺陽處父書曰晉殺其大夫侵官也但當今芃芃在詠濟濟盈朝詩芃芃棫樸又濟濟多士才冠卿雲司馬長卿揚子雲也見漢書智同荀郭荀彧郭淮也見魏志文辭富於江海高論薄於雲霄趨走丹墀之門見與王僧智書侍奉清規之内弟來欵言至欲附所聞聨類非宜更其多惑若疑作蘧使良有原闕二字猶希贈鯉之書古詩呼兒烹鯉魚中有尺素書郵驛方通復行蜚鶬之信魏文帝詩飛鶬晨鳴聲可憐執筆澘然不知何向附尹義尚書漳濱江涘眇若天涯去雁歸鴻雲飛難寄瞻言鄉國泣珠淚而盈懷寤寐徳音仰烟霞而疾首既而署徃寒來愁雲滿塞河氷自結非由漢后之軍草露恒嚴寧假公超之術霜飄虎渠詎知朔野之寒雪覆龍岑徒憶清江之暖眷言疇昔邈矣遐哉係仰清顔願常豐勝雍容廊廟時宣匡奉之風偃息康莊無廢怡神之道義尚望國窮魂繁憂積歲雖其未殞豈曰生平日者謬沗後車陪遊上國曾觀禮樂見季子之知音經奉侍言嗟鄭僑之博物如軍書愈疾之製碑文絶妙之詞猶貴紙於鄴中尚傳聲於許下逮乎百六之年仍離再三之酷吉㓙禮數綿厯歲時嘗膽茹辛備同艱險毎冀穹蒼有感大國矜憫以禮言歸馭驛俱反何期毳毛湮淪墜灑漳濱之水逸翮摩霄輕拂蓬萊之頂信知有幸無幸見生死之殊倫才與不才驗沉浮之異趣昔秦歸趙璧不得連城晉失楚材直亡其寶自國祚中絶行李不通等避世於桃源同流寓於仙嶺每瞻牛候馬想金陵之聖人今覩皇華知有熊之建國賓堯仕舜猶是八才緯武經文方儔四貴幸甚幸甚昔楊朱岐路悲始末之長離蘇武河梁歎平生之永别雖復音塵可嗣終隔風雲夢想時通無因覯止依依望楚寸陰有待百年將半輕生若是命也如何今車書同軌行李相繼猥荷文移通賜論及輶軒既以復命義尚未被哀矜竊以晉楚釋囚共成親好今乃拘彼求此不亦難乎夫以匹夫投分猶須坦蕩况兩國二君那宜細計彼若才如亷樂猶恐不習禁兵茍非其人留之何益然三戰三敗卒成强伯之功七縱七擒終仗天威之力由此言之彼如此耳徐元直西蜀之謀士關雲長劉氏之驍將須歸即遣知叛弗追今之與古何其異趣且二國協和長江共有如首如尾可以同歸或貳或猜豈名唇齒是以隔河分歃君子知其不終衷甲尋盟春秋貶其行詐伏承聖上欽明英賢佐輔方知解網之氣用表無偏之化若彼之俘虜猶且䝉歸此之南冠何辭不遣如其茍相猜貳信不由衷雖篤親鄰義尚何罪不任辛酸之念輕陳萬一之情伏願仁人少存疇昔承間之便希復開言昔張子餘年誠稱呉王之賜微躬邁影實仰含𢎞之澤載筆漣洏罔知所述與李那書北史李昶傳昶小名那幼觧屬文有聲洛下周文令入太學保定初以近侍清要盛選國華乃以昶及安昌公元則中都公陸逞臨淄公唐瑾等並為納言父志字鴻道爾朱之亂奔江左昶以父在江南身寓闗右自少及終不飲酒聽樂時論以此稱焉附那答書繁霜應管能響豐山之鐘𤣥雲觸目又動流泉之奏矧伊物候且或𡨕符况乃衿期相㤀道術楚齊風馬吴會浮雲行李無因音塵不嗣殷御正銜命來歸嘉言累札江南橘柚薊北桑柘隂慘陽舒行止多福足下泰山竹箭浙水明珠海内風流江南獨步扶風計吏議折祥禽平陵李亷辨詶文約况復麗藻星鋪雕文錦縟風雲景物義盡縁情經綸憲章辭殚表奏乆以京師紙貴天下家藏調移齊右之音韻改河西之俗豈直揚雲藻翰獨留千金嗣宗文雅惟傳好事僕世傳經術才謝劉歆家有賜書學匪班嗣弱年有意頻愛雕蟲歲月三餘無忘肄業户牖之間時安筆硯顰眉難巧學步非工恒經牧孺之談屢被陳思之誚羞逄仲子類君山之鼓琴屢見子将同本初之車服不謂殷侯虚談成價遂同布鼓輕響雷門燕石空雕終慙比徳楚翬雖拂實媿棲桐豈若邯鄲舉袖惟聞變曲協律飛塵必應不顧是以日南寳貝遥望歸秦合浦文犀更希還漢芳春行獻嚶其鳴矣懸豫章之牀置長安之驛厚築墻垣思逢鄭僑之聘工歌周頌佇奏延陵之樂書繒有復道意無伸李那頓首籍甚清徽見為陳武帝書常懷虚眷山川緬邈見讓表河渭像於經星見樂府顧望風流長安逺於朝日見報尹義尚書青葽戒節見與王僧智書白露為霜見詩君子惟宜福履多豫雍容廊廟文士傳張衡拜侍中恒居帷幄從容風議拾遺左右獻納便繁漢官儀侍中周官也便繁左右與帝升降卒思近對拾遺補闕百僚之中莫宻於兹留使催書晉孫惠傳惠毎造書檄東海王越或驛馬催之應命立成皆有文采駐馬成檄學林桓温北征鮮卑喚袁宏倚馬前作露布文手不輟筆車騎將軍賓客盈座未詳丞相長史曕對有勞蜀志張裔字君嗣丞相亮出駐漢中裔領留府長史書與所親曰晝夜不得寧息人自敬丞相長史男子張君嗣附之疲倦欲死脱惠箋繒慰其翹想吾棲遲茂陵之下西京雜記司馬相如素有消渴疾漢書司馬相如卒於茂陵卧病漳水之濱見與宗室書廹以崦嵫見報尹義尚書難為砭藥平生壯意竊愛篇章忽覿高文見同汪詹事載懷勞佇此後殷儀同至止呉尚采曰周武帝紀保定元年六月遣銜正殷不害使於陳王人授館國語襄公至陳膳宰不致餼司馬不授館用阻班荆見與王僧辯書常在公筵敬析名作獲殷公所借陪駕終南入重陽閣詩周明帝紀武成二年三月重陽閣成及荆州大乗寺隋書荆州南郡注舊置荆州宜陽石像碑四首鏗鏘並奏能驚趙鞅之魂樂記子夏曰非聽其鏗鏘而已也詳讓表輝煥相華時瞬安豐之眼漢竇融傳融封安豐侯竇氏一公兩侯三公主四二千石皆相與並時自祖及孫官府邸第相望京邑山澤晻靄曹植王粲誄榮耀當世芳風晻靄松竹參差若見三嵕之峰郭璞注三嵕山在聞喜依然四皓之廟張禮遊咸南記圭峰紫閣在終南山四皓祠之西甘泉鹵簿盡在清文扶風輦路悉陳華簡漢地理志右扶風領縣二十一起宫者有八縣詳樂府昔魏武虚帳陸機弔魏武帝文遺令倢伃妓人皆著銅雀臺於臺堂上施八尺牀張繐帳朝晡上脯糒之屬月朝十五輙向悵作伎汝等時時登銅雀臺望吾西陵墓田韓王故臺晉孫楚韓王臺賦序酸棗寺門外夾道左右有兩故臺訪諸故老云韓王聽政觀也自古文人皆為詞賦未有登兹舊閣歎此幽宫標句清新發言哀斷豈止悲聞帝瑟漢郊祀志泰帝使素女鼓五十絃瑟悲帝禁不止故破其瑟為二十五絃泣望羊碑晉羊祜傳祜好遊峴山襄陽人建碑立廟於其地歲時祭祀望其碑者無不流涕因謂之墮淚碑一詠歌梁之言劉向别録魯人虞公發聲清哀拂動梁塵便掩盈懷之淚左傳聲伯夢渉洹或與已瓊瑰食之泣而為瓊瑰盈其懷至如披文相質意致縱横才壯風雲義深淵海方今二乗斯悟寳性論何等為六種人一大乗二中乗三小乗四信佛五信法六信僧同免化城法華經法華導師多諸方便於險道中化作一城是時疲極之衆前入大城生已度想生安穏想六道知歸法苑珠林問曰云何名六趣依毗曇論云趣者名到亦名為道謂彼善惡業因道能運到其生趣處故名為道亦可依所造之業趣彼生處故名為趣皆踰火宅法華經長者以牛車羊車鹿車立門外引諸子出離火宅華嚴經火宅衆苦所燒也宜陽之作特㑹幽衿所覩黄絹之辭㑹稽曲録上虞長度尚使魏朗作曹娥碑文成未出又試使邯鄲淳為之操筆而成無所㸃定朗嗟嘆不暇遂毁其草其後蔡邕題八字曰黄絹㓜婦外孫韲臼彌懷白雲之頌穆天子傳帝宴西王母於瑶池之上西王母為天子歌曰白雲在天山陵自出道里悠逺山川間之將子無死尚復能來但恨耆闍逺岳法華經耆闍窟山中山形如鷲佛常居此中故號鷲嶺檀特高峰佛説太子須大拏經葉波國温陂王語太子汝出國去徙汝著檀特山開士羅浮法苑珠林西晉沙門釋道開燉煌人石虎時來月氐石氏將末與弟子來建業入南浮羅遂卒山舎袁彦伯興寧中登山禮其枯骸也康公懸溜未詳按法苑珠林齊始豐赤城山有釋慧明姓康康居人祖世避地東呉止赤城山石室竟陵文宣王敬以師禮建武末卒於山中不獲銘兹雅頌耀彼幽巖循環省覽用忘饑渴握之不置恒如趙璧藺相如傳相如奉璧奏秦王秦王大喜傳以示美人及左右翫之不足同於玉枕拾遺記漢誅梁冀得一玉虎頭枕頷下篆云帝辛之枕與妲已同枕之京師長者後漢馬援傳謂姊子曹訓曰王氏廢姓也子石當屏居自守而反遊京師長者其敗必也好事才人漢王襃傳益州刺史王襄使襃作中和樂職宣布詩選好事者令依鹿鳴之聲習而歌之爭造蓬門請觀高製軒車滿路如看太學之碑漢蔡邕傳邕正定六經文字自書册於碑使工鐫刻立於太學門外觀視及摹寫者車乗日千餘兩填塞街巷街巷相填無異華隂之市高士傳張楷隱華山學者從之成市但豐城兩劍尚不俱來晉書雷煥為豐城令武帝時斗牛間有紫氣張華問煥答曰寶劍之精耳當在豫章豐城煥至掘獄果得劍二一以送華一以自佩華得劍曰乃干將也莫邪可復至乎然神物終當合耳華誅劍失所在煥子葉擕劍過延平津忽躍入水但見二龍蹯深曲韓子雙環必希皆見見與楊僕射書莫以好龍無别鋭曰莊子葉公子高好龍宫室雕文盡以龍於是天龍聞而下之窺頭於牖拖尾於堂葉公見之棄而退走失其魂魄五色無主木鴈可嗤韓子墨子為木鳶三年而成蜚一日而敗兩呉丹鳯曰南史王彧傳詔答曰張單雙災木鴈失載望瓊瑶詩報之以瓊瑶因乏行李左傳燭之武曰行李之徃來共其乏困金風已勁玊質宜調書不盡言但聞爻繫徐陵頓首與顧記室書未詳按顧越傳越字允南吳郡鹽官人也陳天嘉中詔侍東宫讀除東中郎鄱陽王府諮議參軍甚見優禮又按陳宗室傳鄱陽王伯山字静之文帝第三子也天嘉元年封鄱陽郡王六年為縁江都督北平将軍南徐州刺史伯山性寛厚美風儀於諸王最長吾伏事天朝本非舊𨽻殿下殊恩逺垂薦拔故常戰戰慄慄甘心痛謹庶其愚老無負明據近者既居臺轄唯務奉公去年正月十五日尚書官大朝元凱既集丞郎肅然忽有陳慶之兒陳暄者㡌簪釘額絛布裹頭虜袍通踝胡靴至膝直來郎座徧相排抱或坐或立且歌且詠吾即呼舎吏責列不答而走反為憾恚妄相陷辱至六月初遂作盲書便見誣謗南史陳暄傳陳太康中徐陵為吏部尚書精簡人物搢紳之士皆嚮慕焉暄以玉㡌簪插髻紅絲布裹頭袍拂踝靴至膝不陳爵里直上陵坐陵不之識命吏持下暄徐歩而出舉止自若竟無怍容作書謗陵陵甚病之聖朝明鑒悉知虚罔唯云吾取徐樞為臺郎南司檢問了不窮推承訓劾為信言致成墮免此事寃枉天下所無吾市徐樞宅為錢四萬任人市估文劵厯然不䝉申理見枉虚巧二者樞是故少府卿鱗南史作驎之子鱗殞身侯景之役又為西臺所贈兖州左衛官位甚高未知其子何沗郎署其炳曰南史陸驗徐驎並呉郡呉人兩人遞為少府丞大市令朱异其邑子也尤與之昵世人謂之三蠧驎素為邵陵王綸所憾太清三年為綸所殺魏晉之前如為乆逺宋齊以降其例甚多如徐愛南史作爰阮佃夫之子可不得郎官邪紀文南史作交卿公向璡皆為列棘豈冗雜曹郎乎南史阮佃夫㑹稽諸暨人宋明帝世權亞人主元徽三年遷黄門侍郎領右衛將軍明年改領驍騎將軍遷南豫州刺史厯陽太守猶管内任五年賜死又紀僧真子交卿甚有解用徐爰南琅邪開陽人本名瑗後改三者樞入身梁朝解褐岳陽王小府墨曹南史曲江公詧昭明太子第四子封岳陽郡王隋書荆州巴陵郡湘陰縣注梁置岳陽郡承聖時為故敬帝晉安王諷席文墨具存陜西官爵乃多浮濫更補臺郎不為勝擢未知何忽推宅貨官四者徐領軍節度自啟樞為郎敕付選序吾既不啟據又不為選職所可相關止是得中侯相聞為呈啟而巳以此見罪一何寃濫吾昔在承華見答王太尉書是弟所悉行年六十無復儕儔非意餘生忽此誣謗堯有驚於讒説舜典帝曰龍朕堲讒説殄行震驚朕師命汝作納言孔將惑於拾塵吕氏春秋顔回對曰向者埃煤入甑中棄食不祥因攫而飯之雖復聖主機明不能悉照殿下徳髙兩獻漢孝景十三王傳河間獻王徳修學好古實事求是呉皖曰後漢光武十王傳沛獻王輔矜嚴有法度好經書作五經論時號之曰沛王通論在國謹節始終如一稱為賢王風美二南詩序周南召南正始之道王化之基億兆歸心衣冠有託乆願通啟披訴聖明伏見軍戎多務所以不敢祈冐弟與吾遊眷亟回星紀故人如此寧不矜歎邪侍言有便云何且為啟聞一䝉神鑒照其枉直方殁幽泉無恨灰壤伏覲謁帝承明魏曹植贈白馬王彪詩謁帝承明廬緒言多次服矜遺老曲賜湔濯則殿下前時安澤匪復偏私遂吳良延薦之恩後漢書呉良傳東平王蒼辟良署為西曹上書薦良拜為議郎無王丹所舉之謬王丹傳客有薦士於丹者因辟舉之後所舉者䧟罪丹坐以免吾得方辭武騎漢書司馬相如事孝景帝為武騎常侍永附梁賓漢書景帝拜枚乗為𢎞農都尉乗不樂郡吏以病去官復遊梁雖媿家丞庶呈秋實魏志邢顒為平原侯植家丞顒防以禮由是不合庶子劉楨諫曰君侯采庶子之春華忘家丞之秋實縁弟深眷故此敬憑干謁非宜益懷悚慨徐陵白答族人梁東海太守長孺書原注其人梁末入北齊中云賢從君政佐佑興基此必南人而為齊謀主者按徐之才丹陽人也隨豫章王綜入魏武平四年自散騎常侍轉祕書監之才解天文兼圖讖之學知午年必有革易因高徳政啟之文宣聞而大悦帝登阼後彌見親密惜齊書北史本傳之才俱無表字可攷姑存之恩當作息報南史本傳陵長子儉一名報按集中有謝兒報坐事付治中啟近歲奉使來歸辱彼河清年中告行齊書河清世祖武成皇帝諱湛年號也并惠以明鏡亟離寒暑雖復時陳梁鶴日照孫鸞未詳按列女傳梁寡婦高行者梁王聘之乃懸鏡割鼻梁王高其行號曰梁高行神異傳昔有夫婦將别破鏡人執半以為信忽與人通鏡化鵲飛後人因鑄鏡為鵲安背上也北堂書鈔孫承鏡賦序余昔於呉市得鏡晞日暎水清朗明瑩言慰相思反增離眷劉傅二常侍還陳書傅縡傳縡字宜事北地靈州人也世祖召為縣騎安成王中記室尋以本官兼通直散騎侍郎使齊又承書札銀鉤甚麗晉索靖草書狀婉若銀鉤玉疏依然開封伸紙破愁為笑劉琨答盧諶書舉觴對膝破涕為笑素秋方届梁元帝纂要秋亦曰素秋溽暑稍闌月令季夏之月土潤溽暑體中何如善保元吉藂臺之璧盧諶覽古詩趙氏有和璧漢地理志叢臺在邯鄲趙武靈王築少海之珠山海經無臯之山南望㓜海注即少海也何必鄉里所在為貴卿託身大國既已積年彼朝英彦理相欽挹方當交辟三命見答周處士書清宦兩宫漢竇嬰傳有如兩宫奭將軍則妻子無類矣何乃濶然遲有問也吾七十之歲崦嵫已廹見報尹義尚書朽老之疾隨年而甚徒懷北邙之切張協登北邙山賦墳隴㟪疊未遂東都之期博物志公卿送夏侯嬰葬至東都門外馬不行接地悲鳴得石椁銘云佳城鬱鬱三千年見白日吁嗟滕公居此室乃葬之牽役承閒但有衰頓賢從君政佐佑興基中舎諶殿中並休宜自别有書問來告訪吾文章吾身歸來鄉國亟徙炎涼沈約詩寒署遞炎涼牽課疲朽不無辭製而應物隨時未曾編録既承今告輙復捜檢行人相繼别簡知音但既乏新聲全同古樂正恐多慙於協律致睡於文侯耳漢外戚傳孝武李夫人本以倡進初夫人兄延年性知音善歌舞武帝愛之毎為新聲變曲聞者莫不感動平陽主因言延年有女弟上乃召見之實妙麗善舞由是得幸以延年為協律都尉樂記魏文侯問於子夏曰吾端冕而聽古樂則唯恐卧燕南趙北後漢書公孫瓚時謡言曰燕南陲趙北際中央不合大如礪唯有此中可避世地角天涯言接末由但以潛欷善敬徳中郎並北境之良選皇華之上求若可輶軒見與楊僕射書别當委白君問諫仁山深法師罷道書竊聞出家閒曠猶若虚空在俗籠樊比於牢獄湼槃經在家廹迮猶如牢獄煩惱因之而生出家寛廓猶如虚空一切善法因之增長非但經有明文亦自世間共見瞥聞法師覆彼舟航文殊問經住家者是煩惱大海出家者是大舟航趣返緇衣之務此為目下之英竒非乆長之深計何以知然從苦入樂未知樂中之樂從樂入苦方知苦中之苦見湼槃經弟子素與法師雖無曩舊相知已來亦復不疎夫良藥必自無甘忠諫者沃乎逆耳漢淮南王傳嚴正上書曰毒藥苦口利病忠言逆耳利行倚見其僻是以不忍不言且三十年中造莫大之業如何一旦舎已成之功深為可惜敬度高懷未解深意將非惟帳之䇿欲集留侯漢張良傳良曰始臣起下邳與上㑹留臣願封留詳與楊僕射書形類卧龍擬求葛氏蜀志徐庶謂先主曰諸葛孔明卧龍也將軍豈願見之乎黄石兵法寧可再逢漢張良傳良嘗聞從容歩遊下邳圯上有一父老衣褐至良所直墮其履圯下良因跪進因授一編書曰讀是則為王者師孺子見我濟北穀城山下黄石即我已三顧草廬無由兩遇諸葛亮表三顧臣於草廬之中封爵五等惟見不逄書列爵惟五中閤外門難朱易白世説竺法師在簡文坐劉尹問道人何以遊朱門答曰君自見其朱門貧道如遊蓬户漢吾丘壽王傳或由窮巷起白屋鳴笳鳯管非有或聞魏文帝與呉質書從者鳴笳以啟路詳答周處士書儛女歌姬空勞反翫左傳晏子曰撞鐘舞女覔之者等若牛毛得之者譬猶麟角抱樸子學若牛毛得如麟角以此之外何所窺窬見與王僧辯書法師今若退轉寳女經佛告寳女吾徃古世堅固勸助而不退轉未必有一稱心交失現前十種大利何者佛法不簡細流李斯上秦皇書河海不擇細流入者則尊歸依則貴上生經若有歸依彌勒菩薩當知是人得不退轉上不朝天子下不讓諸侯獨翫世間無為自在其利一也身無執作之勞口餐香積之飯維摩經上方有國佛號香積如來以一鉢盛香飯恒飽衆生心不妻妾之務身飾芻摩之衣未詳按法苑珠林衣中有四者一糞埽衣二毳衣三衲衣四三衣朝無踐境之憂夕不千里之苦俯仰優游寧不樂哉其利二也躬無任重居必方域白璧朱門韓詩外傳楚襄王遣使者持黄金千斤白璧百雙聘莊子為相理然致敬夜琴晝瑟自是娛懷曉筆暮詩論情頓足其利三也假使棘生王路晉藝術傳佛圖澄天竺人也本姓帛氏少學道妙通𤣥術石季龍傾心事澄季龍太享羣臣於太武前殿澄吟曰殿乎殿乎棘子成林將壞人衣季龍令發殿石下視之有棘生焉冉閔小字棘奴明年季龍死遂大亂橋化長溝未詳巷吏門兒何因仰喚寸絹不輸官庫升米不進公倉庫部倉司豈須求及其利四也門前擾擾鮑昭詩擾擾遊宦子我且安眠巷裏云云李陵答蘇武書而執事者云云余無驚色家休小大之調門停强弱之丁入出隨心徃還自在其利五也出家無當之僧猶勝在俗之士假使心存殺戮手無斷命之愆密裏通情決勝灼然矯俗如斯煩垢萬倍勝於白衣四分律沙門以世俗法教白衣一入愛河法苑珠林登常樂之高山出愛河之深際永沈無出其利六也聽鐘聲而致敬増一阿含經鳴鐘偈福尋香馥以生心朝覩尊儀法苑珠林云起千尺之尊儀暮披寶軸刹那之善逐此而生仁王經一念有九十刹那一一刹那中復有九百生滅水滴微功漸盈大器法苑珠林寶積云世尊告言譬如有人析一毛為一分以一分於大海中取一滴水喻彌陀佛刹莊嚴彼大海水喻普見佛刹莊嚴復過於是未知因縁果報善惡皎然就此而言其利難陳矣假使達相白衣猶有埃塵之務縱令遥寄彈指維摩經度百千劫猶如彈指逺近低頭形去心留身移意徃閒有者得如此貧苦者永無因近在目前不言可見其利七也山間樹下故自難期報恩奉盆經一切聖衆或山間禪定或得四道果或樹下經行或得六神通枕石漱流實為希有晉書孫楚曰當欲枕石潄流猶斯之類不可思議如此者難逢一心人悕遇法師未能不學交習聽勝之因一旦退心於理邀矣其利八也開織成之帙見過去之因摛琉璃之巻驗當來之果賢愚經時佛姨母摩訶波闍波提佛已出家手自紡織預作一端金色之㲲奉上如來佛令持此徃奉衆僧注㲲織成大衣也阿育王傳王作八萬四千金銀瑠璃玻瓈篋盛佛舍利齊竟陵王子良付士淨住子淨行法門云藉如此之勝因獲若斯之妙果衆香偈轉不住心退無因果按佛經佛有過去當來之號識因識果不以為愆知福知報何由作罪上無舟檝交見沒溺之悲下失浮囊則有沈身之患大悲經佛告阿難有大商主在海中間其船卒壞或有得船版者或有浮者有命終者我於爾時作彼商主在大海中用以浮囊安隱而度其利九也曠濟羣品為天人之師景徳傳燈録周昭王二十八年釋迦佛生刹利王家放大智光明照十方世界湧金蓮花自然捧䨇足分手指天地作師子吼聲年十九欲出家號天人師水陸空行皆所尊貴言必闍黎和尚釋氏要覽梵語云阿闍黎即唐云軌範也書輒致敬和尚逺近嗟詠貴賤顒仰法師今必退轉立成可驗纔脱袈裟起世經剃除鬚髮著袈裟衣逢人輒稱汝我始解偏袒法苑珠林律中但有三衣通肩被腹如見長老乃偏袒之姓名便亦可呼平交者故自不論下劣者亦恐不讓薄言稱已榻席懸異從來小得自在瑜伽論王過有十二不得自在便以君為提封漢刑法志提封萬井若不屈膝歛手自達無因俯仰承迎未閑合度如此專專何由可與其利十也畧言十事空失此機其間湥道寧容具述仰度仁者心居魔境為魔所迷意附邪途受邪易性假使睂如細柳何足關懷頰似桃花詎能長乆梁元帝詩柳葉生睂上又三月桃花含面脂同衾分枕猶有長信之悲漢書趙氏子弟驕妒倢伃恐乆見危求供養太后長信宫坐卧忘時不免秋胡之怨列女傳魯秋胡潔婦者秋胡子之妻納之五日去宦於陳五年乃歸未至其家見路傍有美婦人以金與之歸至家母呼婦至乃向采桑者也婦自投河而死洛川神女尚復不惑東阿曹植洛神賦注植入朝帝以甄后遺枕付之歸途感而入夢因作感甄賦後改曰洛神按植封東阿王世上班姬即班倢伃何關君事夫心者面焉左傳子産曰人心之不同如其而焉若論繾綣左傳臧昭伯載書繾綣從公無通外内則共氣共心一遇纒綿則連宵厭起法師未通返照安悟賣花大藏一覧悉達多太子妃邪律輸陀羅即是宿命賣花女也未得他心那知彼意嗚呼桂樹戰國策蘇秦對楚王曰楚國食貴於玉薪貴於桂遂為豆火所焚法苑珠林乾薪萬束豆火能焚可惜明珠乃受淤泥埋沒翻譯名義集摩尼或云踰摩正云末尼即珠之總名也此云離垢此寳光淨不為垢穢所染弟子今日横諮必為法師所哂世上白衣可訾何限遺教經白衣受欲非行道人無法自制嗔猶可恕且一人退道而不安危推此而言實成難解譬如瓦礫盈路人所不驚片子黄金萬夫息步正言法師入道之功已備染俗之法未加何異金搏赤銅銀換鉛錫可悲可惜猶可優量能忍難忍方知其最願棄俗事務息塵勞正念相應行志兩全薄加詳慮更可思惟悔之在前無勞後恨如弟子算逺即十數年中決知惻惻近即三五歲内空唱如何萬恨萬悲寧知逺及自誤自錯永棄一生乃知斷弦可續遺教經漢武帝時西海國有獻膠五兩者弓弦斷以口濡香膠續之以射終日不斷因名曰續弦膠情去難留或若火裏生花可稱希有齊蕭子良集經所謂火中生蓮花此實為希有迷人知返去道不遥幸速推排急登正路法師非是無智遂為愚者所迷類似阿難更為魔之所繞摩鄧女經阿難隨水邊行見一女人在水邊擔水而阿難從女乞水女即與水女歸告母我得阿難乃可嫁我母不得者我不嫁也猶須承三寶之力齊蕭子良集照周等覺謂之佛寳禮無非法謂之法寳至德常和謂之僧寶此乃體一義三同性三寶制彼窮兇豎般若之幢佛書有般若波羅蜜多心經按梵語般若此云智惠吳秬臣曰龍樹菩薩傳并付法藏傳建立法幢摧伏異道也天魔自款因果經菩薩將成道時魔王恐諸衆生皆歸空我境界令三女供給以亂定意菩薩不納三女忽然咸變陋形若此言者當即便冀棄芻蕘若不㑹高懷幸停湥怪耳與智顗書陵和南法苑珠林和南者出要律儀翻為㳟敬善見論翻為度我二義俱通昨預沈儀同法席餐奉甘露無畏之吼衆咸歸伏然正法炬朗諸未悟自慶餘年得逢妙説尋事諮展此不申心謹和南又陵和南仰注之心難可敷具拔公至䝉三月二十日㫖用慰積歲傾心麥冷體中何如願一日康勝山中春夏無餘障惱耳遲復存㫖弟子二三年來溘然老至眼耳聾闇心氣昏塞故非復在人兼去歲第六兒夭喪痛苦成疾由未除愈適今月中又有哀故頻歲如此窮慮轉湥自念餘生無復能幾無由禮接係仰何言敬重􅀈公今還白書不次弟子徐陵和南又陵和南放生星聞公家極相隨喜事是抜公口具謹不多諮惟遲拔公廷出數百里水全其命根如此功德算數無盡隨喜無量此不委諮弟子徐陵和南五願上智者禪師書陵和南弟子思出樊籠無由羽化既善根微弱冀願力莊嚴一願臨終正念成就二願不更地獄三途婆娑論罪人為獄卒阿傍之所拘刺不得自在故名地獄法句經身死神去輪轉三塗自生自死苦惱無量三願即還人中不高不下處託生勝天王經佛自説云八十種好者五十八章下不高不下隨衆生樂四願童真出家如法奉戒道宣律師感應記清淨梵行修童真業五願不墮流俗之僧憑此誓心以策西暮今書丹款仰乞證明陵和南補玉臺新詠童謡云洛中女子莫千妖前至三月抱胡腰論邊境事書京㫄易傳有父母兄弟妻子官鬼尊爻舊唐書呂才傳禄命書犯勾絞六害背驛馬三刑當此生者並無官爵荅諸求官人書徐孝穆集箋注巻三, SBCK: ''}
