  - {type: variant, offset: 0, length: 429, content: 欽定四庫全書徐孝穆集箋注巻六陳徐陵撰詔陳武帝即位詔五德更運帝王所以御天三正相因夏殷所以宰世雖色分辭翰時異文質揖讓征伐迄用參差而育徳振民義同一揆朕以寡昧時屬艱危國步屢屯天維三絶肆勤先后拯厥横流藉將帥之功兼猛士之力一匡天下再造黔黎梁氏以天祿永終厯數攸在遵與能之典集大命於朕躬顧惟菲薄辭不獲亮式從天睠俯協民心受終文祖升禋上帝繼迹百王君臨萬宇若涉川水罔知攸濟寶業初建皇祚維新思俾惠澤覃被億兆可大赦天下改梁太平二年為永定元年賜民爵二級文武二等鰥寡孤獨不能自存者人穀五斛逋租宿債皆勿復收其有犯鄉里清議贓汚淫盜者皆洗除先注與之更始長徒敕繫特皆原之亾官失爵禁錮奪勞一依舊典梁禪陳詔五運更始三正迭代司牧黎庶是屬聖賢用能經緯乾坤彌綸區宇大庇黔首闡揚鴻烈革晦以明積代同軌百王踵武咸由此則梁德湮微禍亂薦發太清云始見困長蛇承聖之季又罹封豕爰立天成重竊神器三光亟沈七廟乏祀含生已泯鼎命斯墜我武元之祚有如綴旒靜惟屯剥夕惕載懷相國陳王有命自天降神維嶽天地合徳晷曜齊明拯社稷之横流提億兆之塗炭, SBCK: ''}
