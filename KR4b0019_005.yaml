body:
  text: 徐孝穆集箋注卷五陳徐陵撰吳江吳兆宜注東陽雙林寺傅大士碑夫至人無已屈體申教聖人無名顯用藏迹故維摩詰降同長者之儀維摩經毗耶離城中有長老名維摩詰文殊師利現儒生之像宣律師住持感應傳佛告文殊師利及四天王等教初流行彼汝文殊師利分身變為國王金剛齊菩薩分身為大臣金剛幢菩薩分身為比邱汝等三大士共流通我教提河獻供之旅王城列衆之端見長千寺碑抑號居士師子月佛本生經比邱名蓮華藏多與國王長者居士而為親友時為善宿成實論八戒優婆塞者此言善宿男大經所説智度論有梵志名長爪言十八種大經盡欲讀之當轉法輪釋道安西域志波羅祭斯國佛轉法輪處大品之言皆紹尊位法苑珠林晉周閔家有大品一部以半幅八丈素反覆書之斯則神通應化不可思議者乎法苑珠林諸德釋云世界初成昔古遺迹相似而現並是佛之神力變化所為故五不可思議中一是佛神力也東陽郡烏傷縣雙林寺傅大士者即其縣人也翻釋名義集娑羅樹東西南北四方各雙故曰雙樹方而悉皆一榮一枯昔巖溪藴德渭浦呈祥天賜殷宗誕興元相書説命夢帝賚豫良弼俾以形旁求于天下説築傅巖之野惟肖爰立作相景侯佐命樊滕是埒漢書傅寬同景侯與樊噲夏侯為髙祖功臣介子揚名甘陳為伍漢書傅介子與甘延壽陳湯俱立功西域東京世載西晉重光惟是良家降神攸託若如本生本行或示緣起千佛因緣經梵王言我見辟支佛受持五戒以戒齋法當行十善觀諸緣起按佛有本生本行二經子長子雲自敘元系漢書司馬遷字子長揚雄字子雲俱有自敘則云補處菩薩仰嗣釋迦法王真子是號彌勒大悲經佛告阿難我為第四次復彌勒當補我處釋迦譜善慧菩薩功行滿足位登十地生兜率天一生補處名聖善白為諸天師瑜伽論若諸國王任持正法名為法王佛在金棺敬福經若受約敕是佛真子賢愚經婆羅門家生一男兒字曰彌勒法苑珠林西云釋迦此云能仁西云彌勒此云慈氏雖三會濟濟華林之道未孚賢愚經彌勒出家學道成最正覺三會説法得蒙度者悉我遺法種福衆生皆得在彼三會之中頌曰挺此四人姿映蔚華林園千尺巖巖穰佉之化猶逺彌勒下生經身長千尺圓光二十丈真諦師傳彌勒佛出由世時須達為蠰佉國大臣名須達多此園地還廣一旬純以七寶遍滿布地奉施如來起為住處梵語蠰佉此云貝但分身世界濟度羣生雜寶經佛法寬廣濟度無涯機有殊源應無恆質自序因緣大宗如此按停水經云觀世音菩薩有五百身在此閻浮提地長阿含經南方天王名毗琉璃此云增長主領鳩槃荼及薜荔神將護閻浮提人示同凡品教化衆生彌勒菩薩亦有五百身在閻浮提種種示現利益衆生故其本迹難得而詳言者也爾其蒸蒸大孝肅肅惟恭厥行以禮教為宗其言以忠信為本加以風神爽朗氣調清髙流化親朋善和紛諍維摩經善和諍訟言必饒益豈惟更盈毀壁未詳宜僚下丸而已哉莊子徐無鬼篇市南宜僚㺯丸而兩家之難釋至如王戎吏部晉書王戎襲父爵辟相國掾厯吏部黃門郎散騎常侍鄧禹司徒後漢鄧禹傳光武即位於鄗使使者持節拜禹為大司徒禹時年二十四同此時年有懷棲遁仍隱居松山雙林寺棄捨恩愛非梁鴻之並遊見答周處士書拜辭親老如蘇耽之永别神仙傳蘇耽郴縣人少孤養母至孝忽辭母云受性應仙當違供養母曰汝去使我如何存活曰明年天下疫疾庭中井水簷邊橘樹可以代養至時病者食橘葉飲井水愈自修禪逺壑婆娑論人趣中有修禪發智絶粒長齋奘法師傳馱那羯磔迦國屬南印度都城東西據山間各有大寺其寺有婆毗吠迦論師於觀自在菩薩絶粒而服水三年立志祈請待見彌勒菩薩非服流霞抱朴子項曼卿修道山中自言至天上遊紫府遇仙人與流霞一杯飲之輒不飢渴若餐朝沆司馬相如大人賦吸沆瀣餐朝霞列仙傳陵陽子春餐朝霞夏食沆瀣太守王烋言其詭詐乃使邦佐幽諸後曹迄至兼旬曾無假疑作假食增一阿含經有四種食諸入口之物可食噉者是謂假食於是州鄉愧伏漢法本內傳明帝置佛舍利及經放火燒經並成煨燼道士等大生愧伏佛之舍利放五色光上空如蓋覆日映衆逺邇歸依師子月佛本生經比邱即為彌猴説三歸依逃迹山林集一切福德三昧經昔過去久逺阿僧祗劫有一仙人住山林中名曰最勝具五神通常行慈心肆行蘭若華嚴經願一切衆生常安居止阿蘭若處寂靜不動又釋氏要覽梵言阿蘭若此言空靜又自序云七佛如來十方並現觀佛三昧經毗婆尸佛尸棄佛毗舍婆佛拘留孫佛拘那含牟尼佛迦葉佛釋迦牟尼佛七佛身並紫金色釋尊摩頂法苑珠林第三身心恭敬禮者聞唱佛名便念佛身如在目前手摩其頂除我罪業願受深法華嚴經有諸法師得勝妙法大乘深法每至楗槌應叩增一阿含經佛告阿難汝今連擊楗椎釋氏要覽梵云楗槌此云鐘磬法鼓裁鳴華嚴經普為衆生擊法鼓空界神仙共來行道菩薩處胎經上方七十二億空界菩薩亦來雲集入胎中其外人所見者拳握之內或吐異香婆娑論帝釋欲遊戲時伊鉢羅龍王背上自然有其香手現胸臆之間乍表金色宗門統要世尊於涅槃會上以手摩胸告衆云汝等善觀吾紫磨金色之身時有信安縣隋書東陽郡領信安縣比邱僧朔與其同類逺來觀化未及祗肅忽見大士身長丈餘朔等驚慙相趨禮拜虔恭既畢更覩常形又有比邱智協優婆夷錢滿願等伏膺纍載頻覩異儀或見腳長二尺指長五寸餘兩眼光明雙瞳照耀皆為金色並若金錢阿育王經阿育王夫人産生一女一手常卷掌中有一金錢隨取隨生譬李老而相侔老子志略老子一名李耳兩目日光方瞳緑筋同周文而等狀孟子文王十尺薑嫄所履詩疏薑嫄履大人迹天步可以為儔詩天步艱難河流大屐祖沖之述異記苻健皇始中津監寇登於河中流得大屐一隻長七尺三寸足迹稱屐指長尺餘文深七寸神足宜其相比興起行經辟支引空七反回旋飛還時城內人見此神足舉國歡喜支郎之彥既恥黃晴海録碎事魏髙僧支謙博覽經籍兩眼多白而睛黃時人謂曰支郎眼中黃形軀雖細是智囊瞿曇之師涅槃經迦毗羅城有釋種子字悉達多姓瞿曇氏有慙青目寶女經如來瞳子如紺青色既而四空妙定大寶積經菩薩至於空處修習四禪熏修已成江總集香贊曰熏修福田八解明心菩薩本行經今最後身值釋迦佛捨豪出家得阿羅漢三明六通具八解脫莊嚴斯滿法苑珠林三十二相徵妙莊嚴時還鄉黨化度鄉親俱識還源並知回向法苑珠林回向者回諸福德向無上道或立捨鬚髮如聞善來百緣經佛告善來鬚髮自落法服著身便成沙門大傾財寶同修淨福維摩經憶所修福念於淨命大士熏禪所憩婆娑論生彼天者要是進向那舍身得四禪發於無漏起熏禪業方是得生凡夫無此熏禪業故不得生也獨在髙巖爰挺嘉木是名檮樹擢本相對似雙槐於夾門晉潘嶽詩緑槐夾門植合幹成陰類雙桐於空井魏文帝詩雙桐生空井厥體貞徑無爽大年莊子小年不及大年置霜停雪寒暑蔥翠晉左思吳都賦緑葉翠莖冒霜停雪信可以方諸堅固梁元帝阿育王像碑云始逰羅衛便居堅固之林譬彼娑羅涅槃經我於此娑羅雙樹大師子吼者名大涅槃兆寬曰支僧載外國事阿育王起浮屠於佛泥洹處雙樹及塔今無復有也此樹名婆羅樹其樹華名娑羅法也此華色白如霜雪香無比也既見守於神龍括地圖龍也之山多五花樹羣龍食之將為疑於變鶴神境記榮陽郡南有石室室後有孤松千丈常有雙鶴晨必接翮夕輒偶影傳曰昔有夫婦二人俱隱此室年既數百化成雙鶴乃於山根嶺下創造伽藍過去因果經諸僧伽藍中竹園僧伽藍最為其始釋氏要覽梵語題云僧伽藍摩此云衆園因此髙柯故名雙林寺矣按傅大士傳云大士捨宅於松下建寺因以樹名雙林大士亦還其里舍貨貿妻兒營締支提地持論菩薩供養如來略説十種二支提供養若菩薩為如來故供養優婆若窟若舍若故若新是名支提供養塔鋭曰僧祇律云有舍利者名無舍利者名支提繕寫尊法墮願往生經歌贊三寶讀誦尊經常以聚沙畫地皆因圖果大威德陀羅尼經佛告阿難譬如有大沙聚將一滴水潤此沙聚可令徹過如一婦人以千數丈夫受欲果報不可令其知足也百緣經佛將比邱入城乞食逢一婆羅門以指畫地與我五百金錢爾乃聽過須達長者即與金錢五百乃聽佛過佛言過去善生太子路逢一人共輔相子樗蒱博戲時輔相子負彼戲人金錢五百太子語之我當代償彼太子者我是輔相子者須達是戲人者婆羅門是凡負債者不可不償乃至成佛不脫此難芥子菴羅無疑褊陋大悲經世尊告阿難我滅度後若有人乃至供養我之舍利如芥子等恭敬尊重謙下供養有孝曰小未曽有經佛般涅槃後以如芥子舍利起塔大如菴摩勒果其剎如針上施槃蓋如酸棗葉若佛形像如䵃麥大功德滿足百倍法顯記菴婆羅女家為佛起塔開樹一敏曰闡義云菴羅是果樹之名其果似桃此樹華生女國人歎異以園封之園既屬女故言菴羅樹園宿善冥熏見佛歡喜以園奉佛佛即受之而為所住乃起九層磚塔華手經若是塔廟毀壞當加修治若塊若泥乃至一磚形相巍然六時虔拜龍樹十住論菩薩晝夜各有三時於此六時禮拜十方諸佛懺悔勸請隨喜回向巡繞斯託又以大乘洛陽伽藍記神龜四年太后遣崇靈寺比邱慧生向西域取經凡得一百七十部皆是大乘妙典方等靈藥寶珠大志經大志至年十七為衆生故發意入海取明月寶珠以濟衆生眷言山谷希得傳寫龍鄉思其燒照後漢郡國志泰山郡有龍鄉城象駕乏其流通傳燈録水中龍力大陸中象力大故負荷大法者比之龍象復造五時經典千有餘卷與夫鬻子而葬同其至誠家語孔子聞婦人哭聲謂顔淵曰此非獨喪哀又有離别之苦問之果然父死賣子以葬嫁妻而隱無殊髙節晉書許邁遣婦孫氏還家後改名玄遍遊名山莫知所終若寄搏麨阿育王經佛在世時入王舍城乞食見二小兒一名德勝二名無勝以土為麨著於倉中見佛相好德勝歡喜掬倉中土名為麨者奉上世尊緣是善根佛般涅槃一百年後作轉輪王王閻浮提如因賣花過見因果經普光佛出興於世爾時善慧仙人欲訪花所忽遇瞿夷持花七莖畏王制令藏著瓶中善慧至誠感花踊上追呼就買此女答言當送內宫欲以上佛善慧告言五百銀錢雇五莖花欲以獻佛瞿夷即曰我今當以此花相與願我生生常為君妻善慧答言我修梵行求無為道不得相許生死之緣詳諫罷道書共詣菩提阿育王經如來大覺於菩提樹下覺諸法方成親眷大藏一覽佛告諸比邱言然燈如來出興世時善慧仙人豈異人乎即我是今此人之中迦葉兄弟及其眷屬千比邱是賣花女者今耶輸是至如有相無相之懷法苑珠林奘法師云依如西域釋迦一代説法總有三時第三時中為大行菩薩雙説有相無相法為破冇相無相法令悟中道究竟圓教虛已虛心之德化雞在臂方推理於自然莊子子輿曰浸假而化子之左臂以為雞子因以求時夜樹榖曰按佛本行經爾時太子具報使人令王深信因果不信自然毒蛇傷體終無擾於深定佛本行經畢鉢羅耶童子與跋陀羅女為夫婦同修梵行周厯年載終不同寢此女既睡一手垂地忽有一蛇而夫畏彼蛇螫其手即衣裹手擎於婦臂安放牀上後同投佛出家道宣律師住持感應記佛告文殊汝取我法角黃金為扣至彼比邱所吹我出世曲及起深定曲門徒肅肅學侣詵詵通彼慈悲觀佛三昧經如來功德慈悲無量義無偏黨書洪範無偏無黨大通元年縣中長宿雜寶藏經恭敬父母耆長宿老傅普通等一百人詣縣令范胥連名薦述又以中大通四年縣中豪傑傅德宣等道俗三百人詣縣令蕭詡具陳德業夫以連城之寶照廡之珍野老怪而相捐工人迷而不識魏文帝送玉玦書價越黃金貴重連城尹文子魏田父有耕於野者得玉以告鄰人鄰人詐之曰此怪石也田父置於廡下光照一室怖而棄之鄰人以獻魏王召玉工相之工曰五城之都僅可一觀胥等體有流俗才無鑒真亟欲騰問終成虧怠梁髙祖武皇帝紹隆三寶大寶積經菩薩修定後有十法十修定能興正法紹隆三寶𢎞濟四生法苑珠林廣興六度接引四生迹冠優填觀佛三昧經時優填王遙慕世尊鑄金為像是衆像之始也神髙仙豫毗曇説仙譽國王殺五百婆羅門生地獄中發生信心生甘露國夫以陳蕃靜室猶懷天下之心後漢陳蕃傳蕃常處一室而庭宇蕪穢曰大丈夫當掃除天下伊尹躬耕思𢎞聖王之道見與宗室書況我有慧日明炬文選王􅋄頭陀寺碑注慧日喻明也法華經世尊以智慧為燈炬如風寶車華嚴經如風無所礙濟是沉舟能升彼岸智度論若能不退成辧佛道名到彼岸涅槃經彼岸者喻如來也固宜光宣正法菩薩本行經釋迦佛如來滅後正法住世五百歲像法住世亦五百歲影響人王者乎新翻大般若經擁護天王及人王等令護正法久住世間於是以中大通六年正月二十八日遣弟子傳暀出都致書髙祖其辭曰雙林樹下當來解脫法苑珠林三乘名義解脫體同善慧大士白國主救世菩薩今條上中下善希能受持其上善以虛懷為本不著為宗法苑珠林由上界樂行寂滅不著不能發起粗貪恚瞋故名無苦無樂妄想為因涅槃為果其中善以治身為本治國為宗天上人間果報安樂雜寶藏經況其果報豈可量也其下善以護養衆生勝殘去殺普令百姓俱稟六齋涅槃經年常三長月恆六齋菜蔬節味夫以四海之君萬邦之主預居王土莫不祗肅爾時國師智者法師與名德諸衆僧等言辭謹敬多乖釋迦之書佛本行經太子復咨蜜多阿闍黎言此書凡有六十四種未審尊者欲教我何書文牒卑恭翻豫山公之啓晉書山濤在典選甄拔人物各有題目奏之時稱山公啓事大士年非長老禪門規式西域人凡稱人道老臘長呼為須菩提如中國凡具道眼冇可尊之德者號曰長老也位匪沙門後漢書佛慈心為主不殺生類専務清靜其精進者號為沙門漢言息心蓋息意去欲以歸無為也通疏乘輿過無虔恪京都道俗莫不嗟疑暀至都投太樂令何昌并有𢎞誓誓在御路燒其左手以此因緣希當聞達昌以此書呈同泰寺僧皓師師衆所知識名稱普聞見書隨喜勸以呈奏皇心歡恱遽遣招迎來謁宸闈亟論經典同泰寺前臨北闕漢書蕭何治未央宫立東闕北闕前殿密邇南宫有孝曰杜田正謬云漢建尚書百官府名曰南宫仍請安居備諸資給見長干寺碑後徙居鐘山之下定林寺遊巖倚樹見諫罷道書宴坐經行百緣經鸚鵡王見佛比邱寂然宴坐甚懷喜恱樹敏曰付法藏經迦葉語婦我若眠息汝當經行汝若眠息我當經行京洛名僧樂府有煌煌京洛行學徒雲集莫不提函負帙問慧咨禪居蔭髙松卧依磐石於是四徹之中恆泫甘露穆天子傳天子北征至於羣玉之山河平無險四徹中繩先王所謂䇿府普曜經太子滿十月已臨産之時先現瑞應三十有二十三諸天玉女持萬金瓶盛甘露住虛空中六旬之內常雨天酒正法念經彼夜摩天男共天女中入池遊戲同飲天酒豈非神仙影響示現禎祥者乎帝於華林園重雲殿自開講三慧般若經窮須真之所問佛性論要須真實利益衆生先自調伏御法勝之髙堂起世經三十三天集會坐時於中惟論細微善語深義稱量觀察皆是世間諸勝要法真實正理是以諸天稱為善法堂所兆宫曰長阿含經一時忍利諸天集善法堂有講論百千龍像阿育王經昔阿恕伽王以金鑄作龍像及以王像以稱稱之尚瑗曰道宣律師感應記又告婆竭龍王汝可化身為八萬四千黃金龍像頭用七寶成身以黃金作之圍繞餐聽增一阿含經千二百前後圍繞如來在中黑貂朱紱史記蘇秦傳黑貂之裘敝易朱紱方來王侯滿筵國華民秀國語季文子曰吾聞以德榮為國華王制命鄉論秀士升之司徒曰選士公卿連席乃令大士獨榻對揚天扆書説命敢對揚天子之休命並遣傳詔及宣傳左右四人接受言論爾時納揆之於臺內舜典納于百揆百揆時敘司隸之在殿中杜預還朝晉書平吳之後徵杜預為司隸校尉加位特進馬防親貴後漢馬防傳防貴寵最盛與九卿絶席舊儀縣席皆等庶僚以大士絶世通人故加其殊禮矣及玉輦升殿范蔚宗後漢輿服志天子五路以玉為飾雲蹕在階崔豹古今注秦制出警入蹕謂出軍者皆警戒入國者皆蹕止也謝朓詩十載朝雲陛文陶潛集聨句愔之曰雲駕庶可飭晏然箕坐漢書郭解出人皆避一人獨箕踞視曽不山立樂記總干而山立憲司譏問愈見凝跱但答云法地若動則一切法不安應對言語皆為爽異昔漢皇愛道欒大不臣漢郊祀志封欒大天道將軍令衣羽衣立白茅上受印以示不臣魏祖優賢楊叟如客魏志文帝引楊彪待以客禮河上之老輕舉臨於孝文神仙傳河上公不知其姓氏結草為菴於河湄讀老子漢文帝駕往詣之嚴子之髙間卧加於光武後漢逸民傳太史奏客星犯帝座帝笑曰朕故人嚴子陵共卧耳方其古烈信可為儔帝又於壽光殿獨延大士講論玄賾言無重頌彌陀疏鈔梵語祗夜多此云重頌句備伽陀祖珽事苑梵言伽陀此言諷誦音會宫商義兼華藻豈惟寶積獻蓋文成七言維摩經云寶積與五百長者子俱持七寶蓋來詣佛所佛之威力令諸寶蓋合成一蓋遍覆三千大千世界釋子彈琴歌為千偈而已長阿含經父王聞四子端正曰此真釋子也雜阿含經過去世時拘薩羅國有彈琴人名曰鹿牛有六廣大天宫天女來至拘薩羅國鹿牛彈琴人所語言為我彈琴我當歌舞天女於歌頌頌中自説所以生此因緑彼人即便彈琴彼六天女即便歌舞固非論經於白虎之殿後漢丁鴻傳鴻字孝公肅宗詔鴻論定五經同異於白虎觀時人語曰殿中無雙丁孝公應詔於金馬之門漢書東方朔待詔金馬門説義雲臺後漢逸民傳周黨伏而不謁博士范升奏曰臣願與坐雲臺之下考試圖國之道受釐宣室賈誼傳上方受釐坐宣室可同年而語哉自火運將終民無先覺雖復五胡內贔蒼鵝之兆未萌晉五行志懷帝永嘉元年二月洛陽東北步廣里地陷有蒼白二色鵝出蒼者飛翔沖天白者止焉董養曰步廣周之狄泉盟會地也白者金色國之行也蒼為胡象是後劉淵石勒相繼亂華四海橫流夷羊之牧匪現汲冢周書度邑解惟天不享於殷發之未生至於今六十年夷羊有牧飛鴻過野樹敏曰淮南子本經訓夷羊在牧許慎曰夷羊土神商之將亡見於商郊牧野之地大士天眼所照預覩未來雜寶藏經羅漢道人尋即入定以天眼觀摩掌之明夙鑒時禍法苑珠林竺佛圖澄西域人時石勒與劉曜相拒搆隙以問澄澄曰可禽耳麻油塗掌令視見之曜被執朱繩縛肘後果獲之如掌所見哀羣生之板蕩泣世道之崩淪救苦為懷大悲為病誓欲虛中閉氣法苑珠林晉長安有沙公者西域人虛靖服氣不食五穀日能行五百里識食為齋非服名香正法念經餓鬼大數有三十六種十四食香鬼法苑珠林宋釋慧益廣陵人憩竹林寺積勤苦行惟食香丸但資禪悅起世經閻浮提人等飯麨豆肉等名為粗段食按摩澡浴拭膏等名為微細食自外三州及六欲禪諸天等並以粗微細為食自此以上色界無色天並以恱法喜為食方乃燒其苦器涅槃經身為苦器憂畏無量製造華燈摩耶經龍樹善設法要滅邪見幢然正法燈願以此一光明遍照十方佛土因果經無量諸天作諸伎樂燒衆名香散天妙華隨菩薩滿虛空中放大光明普照十方勸請調御寶性論為六種人故説三寶一調御師二調御師法三調御師弟子常住世間救現在之兵災劫中世界經二十小劫中中間有小三災二曰兵刀災除當來之苦集長阿含經諸比邱欲求光明者當求苦集滅道光明於是學衆悲號山門踊叫弟子居士徐普拔潘普成等九人求輸已命願代宗師其中或馘首而刋鼻或焚臂而燒手善財童子重睹知識華嚴經彌勒領無量諸大菩薩從他方來彈指一聲閣門遂開善財即入入巳即閉善財見一樓閣中皆有彌勒一一彌勒前皆有善財一一善財悉皆合掌回顧詳答求官人書忍辱仙人是馮相輩新婆娑論過去此賢劫中有王名羯利時有仙人號為忍辱住一林中勤修苦行仙人便伸一臂王以利劒斬之王復命伸一臂即復斬之次斬兩足復截兩耳又割其鼻史記傅靳傳陽陵侯傅寬注引地理志云馮相陽陵縣大士乃延其教化更住閻浮見長干寺碑𢎞訓門人備行衆善於是弟子居士范難陀弟子比邱法曠弟子優婆夷嚴比邱各在山林燒身現滅次有比邱寶月等三人窮身繫索挂錠為燈説文錠謂之燈吕靜韻集無足曰燈有足為錠次有比邱慧海菩提等八人燒指供養法華經能然手指乃至足一指供養佛塔勝以國城妻子及三千大千國土珍寶而供養者次有比邱尼曇展慧光法纖等四十九人行不食齋法次有比邱僧拔慧品等六十二人割耳出血用和名香奉依師教並載在碑陰書其名品夫二儀大德所貴曰生繫辭易有太極是生兩儀又天地之大德曰生六趣含靈所重惟命婆娑論六趣之中能止息意故名為人雖復夢幻影響同歸摩滅諫王經世間榮位如幻如夢不可久保付法藏經縱使富貴如天終歸磨滅愛使情迷惟貪長久法苑珠林龍樹菩薩捨離欲愛出定為道老子天長地久自非善巧方便漚和含羅見長干寺碑照以慈燈梁陸倕志法師墓志銘曰慧雲晝歇慈燈夜昏霑其妙藥付法藏經法是妙藥能愈結病豈或捨不資之軀而能行希有之事大品經若我聲聞弟子之中欲行第一希有之事者當為世間廣宣如是大乘經典若令割身奉鬼聞半偈於涅槃涅槃經佛言我念過去作婆羅門在雪山中修菩薩行時天帝釋即下試之自變其身作羅剎像住菩薩前口説半偈云諸行無常是生滅法菩薩即語羅剎但能具足説是偈競我當以身奉施供養賣髓祠天能供養於般若雜譬喻經噉人王曰吾本捕人當持祠天已得四百九十九人今得卿一人其數已滿殺以祠天汝何不懼國王對曰旦出宫時路逢道人為我説偈即許施物今未得與以是為恨今王𢎞慈寬恕假日施訖還來不敢違要也理當刳心靡吝千佛因緣經雪山中有婆羅門名牢度跋提白夜叉言我今不惜心之與血即持利劒破胸出心與之擢骨無疑者乎彌勒所問本願經往過世有王太子號曰蓮華王見一人身體病癩曰得王身髓以塗我身其病乃愈太子即破身骨以得其髓持與病者大士小學之年不由黌舍曲禮人生十年曰幼學漢儒林傳序武帝時太學生徒動至數萬郡國黌舍悉皆充滿大成之德自通墳典學記九年知類通達強立而不反謂之大成左傳左史倚相趨過王曰是能讀三墳五典八索九邱安禪合掌惟無三昧經人求道安禪先當斷念善現論禮佛時應繞三匝三拜四方作禮合十指掌叉手於項郤行而行説偈論經三千威儀云出家人所作業務一者坐禪二者誦經法三者勸化衆事滴海未盡其書大悲經如來爾時知彼水滴在大海中見知住處不與衆水共相和雜不增不減平等如故又滴水者喻一發心微少善根大海者喻佛如來應正遍知懸河不窮其義晉書王衍曰郭象清言如懸河久而不竭前後講維摩思益經等比邱智瓚傳習受持所應度者化緣既畢新翻大阿羅漢難提蜜多羅所説法住記化緣既卑將歸涅槃以大建元年朱明始獻見為陳武帝書奄然右卧法苑珠林經云仰卧者是修羅卧伏地卧者是餓鬼卧左脅卧者是貪欲人卧若右脅卧者是出家人卧鶴齡曰中阿含經如來爾時將詣雙樹四襞鬱多羅僧以為施坐僧伽梨為枕右臂而卧足足相纍而般涅槃將歸大空觀佛三昧經冇王名曰雜寶華光子名快見和尚為説甚深般若波羅蜜經大空之義二旬初滿三心是滅見長干寺碑爾時隆暑晉潘嶽射雉賦時暑忽隆熾便已赫曦李顒悲四時賦悲炎節之赫曦屈伸如常溫暖無異洗浴究竟扶坐著衣色貌敷渝光彩鮮潔爰經信次詩疏一宿曰宿再宿曰信宛若平生烏傷縣令陳鍾耆即往臨赴猶復反手傳香道宣律師住持感應記十方諸佛各手捻香付彼爐中皆如疇昔若此神變無聞前古雖復青牛道士漢武內傳封君達號青牛道士有病死者以竹管中藥與服皆愈白馬先生未詳便遁形骸本慙希企若其滅定無想彈指而石壁已開奘法師傳婆毗吠伽論師執金剛神所誦金剛咒咒芥子擊於石壁豁然洞開時有百千萬衆觀睹驚歎論師跨門再三顧命衆人唯有六人從入論師入已當即石門還合如壁炯曰華嚴經又法界品爾時善財童子敬繞彌勒菩薩合掌白言惟願大聖開樓觀門令我等入彌勒菩薩即彈右指門自然開善財即入入巳還閉法王在殯申足而金棺猶啓傳燈録佛滅後有第一祖迦葉至雙林樹間號泣佛於金棺內現雙足非斯矣莫與為儔遺誡於雙林山頂如法燒身一分舍利法苑珠林舍利者西域梵語此云骨身舍利有三種一骨舍利色白二髮舍利色黑三肉舍利色赤若佛舍利椎打不破若弟子舍利椎擊便破起塔於冡一分舍利起塔在山又造彌勒像二軀置此雙塔莫移我眠牀當取法猛上人織成彌勒像永安牀上寄此尊儀見諫罷道書以標形相也賢愚經此袈裟乃是三世聖人標相於是門徒巨痛遂爽遺言用震旦之常儀華嚴經震旦國有一住處名那羅延窟從昔已來諸菩薩衆於中止住法苑珠林東夏九州名西域為天竺者或是總名也或云身毒如梵稱此方為脂那或云真丹作震旦此蓋承聲有楚夏耳乖闍維之舊法大悲經迦葉以已身火闍維其身闍維身已灰炭不現已挺曰法苑珠林髮爪兩塔衣影二臺皆是如來在世見成軌自收迹河邉闍維林外八王請分還國起塔及瓶炭二所於是十剎興焉四部皆集法苑珠林賓頭盧往西瞿耶尼教化四衆廣宣佛法閻浮提四部弟子思見賓頭盧佛聽還國悲同白車傳燈録法達念法華經三千部禮祖不投地六祖曰無念念即正有念念成邪有無俱不計長御白牛車七衆攀號圓覺經比邱比邱尼式叉摩那沙彌室羅末尼此出家五衆優婆塞優婆夷此在家二衆此七衆也哀踰青樹梁元帝集內典碑銘集林序曰白林將謝青樹已列弟子比邱法璿菩提智瓚等以為伯陽之德貞桓紀於賴鄉史記老子姓李名耳字伯陽楚國苦縣賴鄉人續漢書桓帝夢老子令中常侍左悺於賴鄉祀之詔陳相邊韶立祠兼刻石金石録苦縣老子銘舊傳蔡雍文并書仲尼之道髙碑書於魯縣祀應記孔子廟列七碑無像檜柏猶茂亦有揚雄弟子漢揚雄傳雄卒侯芭為起墳喪之三年鄭玄門人後漢鄭玄傳玄卒門生相與撰玄答諸弟子問五經依論語作鄭志八篇俱述清猷載刋玄石水經注杜預曰梁國蒙縣北有薄伐城城中有成湯冡今城內有故冡方墳疑即杜元凱所謂湯冡者也而世謂之王子喬冡其後有人著大冠綘單衣杖竹立冡前呼采薪孺子伊永昌曰吾王子喬也勿得取我墳上樹也忽然不見國相東萊王璋以為神聖所興必有銘表乃與長史邊乾遂樹之玄石紀頌遺烈於是祈聞兩觀何休曰天子外闕兩觀冒涉三江書禹貢三江既入爰降絲綸禮記王言如絲其出如綸克成豐琰陵雖不敏夙仰髙風輕課庸音乃為銘曰大矣權迹勞哉赴時或現商主佛本行經雞尸馬王即我身是五百人中商主者即舍利弗是五百商人即刪闍邪波離婆闍迦諸弟子等五百人是聊為國師卑同巧匠增一阿含經優填王敕國出巧匠會屈以牛頭栴檀作佛供養晨夕禮拜示良醫智度論菩薩不應逺離諸佛譬如病苦不離良醫猗與開士法苑珠林開士應真導揚末教類此難思當來解脫克紹迦維普曜經佛兜率天降神於西域迦維衛國淨梵王宫摩耶夫人剖右脅而生普兆騫曰因果經太子身黃金色三十二色放大光明照三千大千世界迦維羅衛國三十日月萬二千天地之中央也妙道猶袐法苑珠林邪惑問方外對曰捨搢紳之容亦何傷於妙道機緣未適智度論佛成道已不即説法於五十七日今檢括機緣然後説法弗降雞頭法苑珠林昔天竺雞頭摩寺五通菩薩往安樂界請阿彌陀佛娑婆衆生願生淨土無佛影像願力莫由請垂降許佛言汝且往去尋當現彼寧開狼迹摩耶經摩訶迦葉於狼迹山中入滅盡定北地爰徙東山攸宅族貴泥陽宗分蘭石魏志傅嘏傳嘏字蘭石北地泥陽人傅介子之後也莫測其本徒觀其迹邈有蒲塞心冥世雄明宣苦苦法句喻經佛言天下之苦莫過有身身者衆苦之本離世苦本當求寂滅妙鑒空空孔稚圭北山移文談空空於釋部汲引三界自誓三昧經三界一欲界二色界三無色界行藏六通華嚴經六通一天眼二天耳三地心四宿命五神足六漏盡爰初隱逸宴處林叢祖珽事苑梵語貧婆此言叢林譬如大樹叢叢故僧聚處得名叢林食等餐露齋疑服風求離牢獄經此等梵志服風食氣敬禮珍塔見宋司徒寺碑歸依靈像法苑珠林故釋伽云吾今此身即是法身由是法身所依持故如泥木靈像逺有所表敬誠殷禮獲福無量未若天尊躬臨方丈太玄真一本際經運道一切為極尊而常處三清出諸天上故稱天尊忠柱曰法苑珠林唐顯慶中王玄䇿使西域有維摩詰石室以手板縱橫量之得十笏故名方丈室讀此碑則唐之前巳有此名矣慧炬常照慈燈斯朗長阿含經燈燭之明不如炬火釋梵天仙大悲芬陀利經佛言我於此閻浮提為轉輪王名曰燈明即捨詣林求梵仙行晨昏來往濟濟行法洗洗談講德秀臧文莊子文王觀於臧見一丈人釣而其釣莫釣遂迎臧丈人而授之政以為太師風髙廣成莊子黃帝聞廣成子在於空同之上故往見之來儀上國益稷鳳皇來儀史記徐君好季札劒為使上國未獻抗禮承明漢汲黯傳大將軍青既益尊黯與亢禮嚴助傳帝賜助書曰君厭承明之廬勞侍從之事妙辨無相深言不生楞嚴經除住三昧是名無生撞鐘比説樂記善待問者如撞鐘擊鼓慙英樂論天口漢劉歆七略齊田駢好談論齊人語曰天口駢天口者言不可窮誰其與京左傳懿氏卜妻敬仲占之曰八世之後莫之與京乍現仙掌爰標神足色豔沈檀楞嚴經白栴檀塗身自能除一切熱惱香踰薝蔔經云如入薝蔔林中聞薝蔔花香不聞他香樹屏曰華嚴經有世界名薝蔔華色我有邊際付法藏經流轉生死無有邊際隨機延促誓毀身城法句經心意品説偈曰防意如城當開心獄唯識論善惡熏心令心異見實無地獄是故心外雖無地獄惡業成時強自妄見忽示泡影金剛經如夢幻泡影俄如風燭法苑珠林命如風燭難可駐留噭噭門人承師若親寧焚軟疊涅槃經菩薩為法因緣剜身為燈㲲纒皮肉酥油灌之燒以為炷檀尚瑗曰菩薩處胎經八大國王各持五百張白㲲栴木蜜盡內金棺裹以五百張㲲纒裹金棺復五百乘車載香酥油以灌白㲲爾時世尊欲入金剛三昧碎身舍利於婆娑世界弗燎香薪新婆娑論是上座觀肉是菩薩肉共取香薪焚燒其肉收其餘骨起窣堵波禮拜供養如事佛塔合窟為窆觀佛三昧經佛初留影石室在那乾呵羅國毒龍池側爾時世尊從石窟出時龍聞佛還國啼哭雨淚佛安慰龍我受汝請當坐汝窟中經千五百歲佛坐窟中作十八變踊身入石猶如明鏡在於石內映現於外諸天百千供養佛影影亦説法迄今猶現方墳以堙法苑珠林云所云塔者或云塔婆此云方墳須彌據海起世經於須彌山佉提羅迦山二山之間有須彌海濶四萬四千由旬周圍無量變灰揚塵曹毗志怪漢武帝鑿昆明池極深悉見灰墨無復土以問東方朔朔曰試問西域胡至明帝時外國道人入洛時有憶朔言問之胡人云經云天地大劫將盡則劫燒此劫燒之餘詳與楊僕射書淨土無壤法苑珠林云西方常清淨自然無一切雜穢故云淨土靈儀自真法苑珠林梁武帝捨道文曰鑠靈儀於象外何時涌塔復睹全身法苑珠林阿育王遣使浮海壞撤諸塔分取舍利還值風潮頗有遺落故今海族之中時或遇者智度論佛問阿難我在龍宫説法龍子得道留全身舍利髙一百三十丈汝知不天台山徐則法師碑北史徐則東海剡人也杖策入縉雲山不娶妻常服巾褐陳太建中應召來憩於至真觀期月又辭入天台山太傅徐陵為之刋山立頌晉王廣鎮揚州聞其名手書召之曰夫道得衆妙法體自然包涵二儀混成萬物人能𢎞道道不虛行先生履德養空玄宗齊物深曉義理頗味法門恱性沖玄恬神虛白餐松餌朮栖息煙霞望赤城而待風雲遊玉堂而駕龍鳳雖復藏名台嶽猶且騰實江淮籍甚嘉猷有勞寤寐欽承素道久積虛襟側夕幽人夢想巖穴霜風巳冷海氣將寒偃息茂林道體休愈昔商山四皓輕舉漢庭淮南八公來儀藩邸古今雖異山谷不殊市朝之隱前賢已説導凡述聖舍先生而誰故遣使人往彼延請想無勞束帛賁然來思不待蒲輪去彼空谷希能屈已佇望披雲遂詣揚州而死年八十二夫海水揚塵幾千年而可見見與楊僕射書天衣拂石幾萬世而應平觀佛三昧經諸佛化作八萬佛樹師子之座今釋迦樹最短若干天衣而布其上樹敏曰樓炭經有一大石方四十里百歲諸天來下取羅縠衣拂石盡劫猶未窮至人者譬彼晨昏方乎晷刻固非俗士之所能言寰中之所能量者也至如不死之草猶稱南裔博物志禹戮防風防風二臣恐以刃自貫其心而死禹哀之拔其刃療以不死之草長生之樹尚挺西崑淮南子昆侖山有層城九重髙萬一千里上有不死樹在其西百紀遊龜皆登蓮葉史記龜䇿傳神龜巢蓮上抱朴子千歲龜五色具焉解人言或浮於蓮葉之上或在叢蓍之下千齡壽鶴或舞松枝見傅大士碑假矣生民何其夭脆譬彼風電隨願往生經四大假合形如芭蕉中無有實又如電光不得久停同諸泡沫中阿含經譬如大雨滴泡一生一滅琢火之歎聞諸往賢劉協新論人之短死猶如石火􅀈然以過逝水之悲嗟乎前聖論語逝者如斯夫不舍晝夜樵人看博信未始乎淹留異苑昔有人乘馬山行遙岫裏有二老人相對樗蒱遂下馬以䇿拄地而觀之自謂俄頃視其馬鞭漼然已爛顧瞻其馬鞍骸枯朽既還至家無復親屬仙客彈琴固不移於俄頃琴書琴髙以琴養性初學於羅浮山後遊四海然而子孫皆其數世幽明録漢永平中劉晨阮肇采藥失故道行至溪滸二女迎歸食以胡麻飯求去指示之至家已七世矣鄉黨咸為草萊是以志士名賢飄然長騖臊羶榮利見答周處士書懕穢風塵服冕乘軒其猶桎梏朱庭紫閣事甚樊籠南史楊休之不樂煩職曰此官真是樊籠隱淪巖洞桓談新論天下神人五一曰神仙二曰隱淪餐餌芝髓忽矣身輕見玉臺新詠序俄然羽化訓解故事道士亡曰羽化金繩玉版受謁帝之符見丹陽碑龍駕霓裳處仙官之籙晉郭璞華山贊誰其遊之龍駕雲裳法師蕭然道氣卓矣仙才漢武內傳西王母云劉徹好道然形慢神穢雖語之以至道殆恐非仙才也千仞孤標萬頃無度見歐陽頠碑所以伊川控鶴列仙傳王喬周靈王太子晉也好吹笙作鳳鳴遊伊洛之間浮邱公接以上嵩髙山後於山上見桓良曰告我家七月七日待我於緱氏山頭至日果乘白鶴駐山巔葉縣乘鳧風俗通孝明帝時尚書郎河東王喬遷為葉縣令喬月朔常詣臺朝明帝怪其來朔而無車騎密令太史候望言其臨至時常有雙鳧從東南飛來因候伺見鳧舉羅得一雙舄使尚方識乃四年所賜尚書官履也靈化無方道還斯在銘曰來去三島神仙傳海上有三神山曰蓬萊曰方丈曰嬴洲謂之三島賓遊二童見玉臺新詠序然香雨上擊磬雲中玉粒雖軟見長干寺碑金膏未鎔穆天子傳河伯示汝黃金之膏方流道業濟彼昏蒙頌皇太子臨辟雍頌有序臣聞天大王大詳於道德之言見勸進表天文人文顯於爻象之説見易是以大君革命黔首所以庇焉聖人創物文籍所以生焉或由此道制為民極莫不對越上靈裁成庶類濟世育德昭彼昆蟲皇帝世膺下武體兹上德見勸進表握天鏡而授河圖見丹陽碑執玉衡而運乾象見舜典皇太子耀彼重離光兹七鬯儀天以文化成天下俱見易侍中國子祭酒新安王南史新安王伯固文帝第五子天嘉六年立為新安郡王十年為國子祭酒頗知玄理而墮業無所通至於摘句問難往往有竒意宗室羽儀易其羽可用為儀衣冠準的後漢馬援傳為天下表的惟善為樂後漢書明帝問東平王處家何等最樂王曰為善最樂造次必儒漢景十三王傳河間獻王德被服儒術造次必於儒者粵以十一年三月二十一日受詔𢎞宣發論語題攝齊升堂見論語摳衣即席曲禮將即席容母怍詳讓表對揚天人開闢大訓清言既吐精義入神見繫辭副德爰動音辭鋒起問難泉涌後漢馬援傳謀若涌泉辨紛綸之異見與宗室書定倫理之疑玉振鏘鏘孟子孔子之謂集大成集大成也者金聲而玉振之也秩臣曰後漢樊準傳詳覽羣言響如振玉雲浮雨布介王奉繫聖蹤馳辨秀出信令張禹慙其師法漢張禹傳禹字子文河南軹人也蕭望之奏禹經學精習有師法可試事久之試為博士詔令禹授太子論語何晏忸其訓詁通考引隋經籍志魯論語吏部尚書何晏為集解梁陳之時唯鄭玄何晏立於國學穆穆焉洋洋焉此實虞朝之盛德生民之壯觀者也臣抑又聞之魯史聿興史克宣其懿小序駉頌僖公也季孫行父請命於周而史克作是頌晉雍大啓王廙逞其辭晉王廙傳廙字世將為濮陽太守元帝作鎮江左廙棄郡過江及帝即位廙奏中興賦所以述休平之風揚君上之德輕以下才敢為頌曰皇運勃起膺圖受命紫蓋東臨黃旗南映吳志陳紀曰舊説黃旗紫蓋運在東南積仁纍德重明疊聖四海無浪見與王僧辨書三階已平黃帝泰階六符經泰階者天之三階也三階平則陰陽和天地時儲駕戾止和鸞有聲𢎞風講肄北堂書鈔孔臧與子琳書講肄書傳崇儒肅成丹書貴道竹書紀年西伯發受丹書於吕尚黃金賤籯漢韋賢傳遺子黃金滿籯不如教子一經洙泗興業闕里增榮孔子世家注伍緝之從征記闕里背洙面泗銘太極殿銘有序夫紫蓋黃旗揚都之王氣長久見辟雍頌虎踞龍蟠金陵之地體貞固見勸進表天居爽塏左傳景公欲更宴子之宅曰請更諸爽塏者大寢尊嚴張衡西京賦正殿路寢注周曰路寢漢曰正殿髙膺疑作應端門天官書太微三光之廷匡衛十二星藩臣中端門左右掖門門內六星諸侯其內五星五帝座仰模營室天官書紫宫後六星絶漢抵營室曰閣道注正義曰營室七星天子之宫歸於有德譬彼河圖見丹陽碑傳我休明義同商鼎左傳王孫滿對楚子曰昔夏之方有德也鑄鼎象物桀有昏德鼎遷於商商紂暴虐鼎遷於周德之休明雖小重也太極殿者法氐象亢王者之位以尊天官書云亢為疏廟注元命包曰亢四星為廟廷又氐為天根注星經云氐四星為路寢聽朝所居左平右墄天子之堂為貴初學記厯代殿名或沿或革惟魏之太極自晉以降正殿皆因之摰虞決疑要注云其制有陛右墄左平平以文磚相亞次墄者為階級也九錫之禮納陛以登謂受此陛以上殿往朝煨燼多厯年所世道隆平宜其休復監軍鄒子度啓稱即日忽有一大梓柱從流來泊在後渚岸陳武帝紀初侯景之平也太極殿被焚承聖中議欲營之獨尺闕一柱永定二年秋七月有樟木大十八圍長四丈五流泊陶家後渚監軍鄒子度以聞詔中書令沈衆兼起部尚書構太極殿嵯峨容與若漢水之仙槎荆楚歲時記漢武帝令張騫使大夏尋河源乘槎經月而至搖漾波濤似新亭之龍剎未詳孤拔靈山允昭天貺昔梁氏承聖將圖繕修東虜窺江西胡犯蹕定之方中亟興師旅揆之以日輒有災故詩定之方中作于楚宫揆之以日作于楚室是知秦人所止實漢祖而為宮見與王僧辨書吳都佳氣乃元皇而斯宅晉陽秋秦時望氣者曰東南有天子氣五百年有王者興始皇遂東遊以厭之改金陵為秣陵孫權又改為建業至晉元帝適逢其時千櫨赫奕萬栱崚層魏何晏景福殿賦櫼櫨各落以相承欒栱夭矯而交結注櫼櫨曲短梁也欒以承栱栱以承枓植緑菱而動微風舒丹蓮而制流火風俗通殿堂象東井形刻作荷菱荷菱水物也所以厭火甘泉逺望觀正殿之崢嶸揚雄甘泉賦似紫宫之崢嶸函谷遙看美皇居之壯麗漢書髙祖七年至長安蕭何修未央宫曰非令壯麗無以示威信乎齊三光而示宇宙尸子上下四方曰宇往古來今曰宙詳勸進表會萬國而朝諸侯史記夏本紀禹會諸侯於塗山執玉帛者萬國爰命微臣乃為銘曰雍畤相望封禪書雍旁故有吳陽武畤雍東有好畤皆廢無祠故秦文公立畤郊上帝諸神祠皆聚云參差未央偃師回顧崔嵬德陽見與楊僕射書髙捫太乙揚雄甘泉賦配帝居之懸圃兮象太乙之威神注太乙天神也正睹瑶光張衡西京賦上飛闥而仰眺正睹瑶光與玉繩峨峨靈柱赫赫流樟美哉宫室孟子為宮室之美嘉哉令疑作上一本作今日玉燭寶典正月一日為元日亦云上日御扆垂旒禮記天子玉藻十有二旒詳為貞陽侯書當朝靖蹕見傅大士碑樂備韶夏左傳韶簫舜樂大夏禹樂禮兼文質論語文質彬彬帝旅無喧王旗斯謐摰虞決疑要注晉制大會於太極殿其會則五時朝服庭設金石虎賁旄頭文衣繡尾肅肅卿士詩召南肅肅宵征雍雍承弼書冏命以旦夕承弼厥辟漢座雕屏謝承後漢書鄭𢎞為太尉時舉第五倫為司空班次在下每正朔朝見𢎞曲躬自卑上問知其故遂聽置雲母屏風分隔其間由此為故事周人檻櫺城隅有勒詩靜女其姝俟我於城隅殿省皆銘况復皇寢宜昭國經方流典訓永樹天庭揚雄甘泉賦開天庭兮延羣神報德寺剎下銘昔者明王大孝感動神祗助月致景星之祥見孝義寺碑非煙流慶雲之色史記若煙非煙若雲非雲郁郁紛紛蕭索輪囷是謂慶雲然而嚴敬之道惟事盡於配天明發之懷誠不過於饗帝禮記祭法注祀天以始祖配祭義莊敬則嚴威又惟聖人為能饗帝孝子為能饗親又祭之日明發不寐饗而致之又從而思之豈如以梵宫之樂資乎廟堂淨土之因見長干寺碑歸於園寢雖復青雲譙郡之境魏志文帝生於沛國譙郡時有雲氣青色而圓如車蓋當於其上終日望氣者以為至貴之證碧泉疑作白水舂陵之鄉東觀漢記光武出自長沙定王定王生舂陵節侯至孫孝侯改封白水鄉因故國名曰舂陵上幼懷凝重未曾遊陟年將志學即事登庸宣力淮潯屬有嘉夢其夢也畢陌𢎞敞後漢郡國志右扶風髙帝改安陵注皇覽曰縣西北畢陌秦武王冡橋山屈盤帝王世紀黃帝葬於上郡陽周之橋山氣象靈長風煙騰薄使疑作便隊雙表續搜神記有鶴集遼東城門華表柱也兆宫曰漢書音義便房藏中便坐其髙百尋左則青龍蟠蜿右則白虎蹲踞曲禮左青龍而右白虎軒轅之駕譬婉婉而多慙漢郊祀歌上曰吾聞黃帝不死有冢何也或對曰黃帝以仙上天羣臣葬其衣冠吳王之墳狀耽耽而非擬吳録孫堅墓上數有光如雲氣五色上屬天下蔓延數里有人指其地云此是國陵自爾迄永定初其間二十有餘年至歲紀頻移崇塋乃作觀其山川形勢王相徵圖後漢趙岐孟子天時注謂五行旺相孤虛之屬瞻拜髙巒宛如前夢大矣哉孝悌之至通於神明者與銘曰壯矣金表見傅大士碑傍依壖垣漢鼂錯傳內史府居太上廟堧中門東出不便錯乃穿門南出鑿廟堧垣髙連彩霓班固西都賦虹霓回帶乎棼楣極睇翔鵾疑作鯤莊子北溟有魚其名為鯤化而為鳥其名為鵬怒而飛其翼若垂天之雲鵬之徙於南溟也水擊三千里摶扶搖而上者九萬里梵偈宵唱異苑陳思王植常登魚山忽聞嵒岫裏有誦經聲清遒深亮逺谷流響不覺斂襟祗敬便效而則之今梵唱皆植依擬所造雲花晝翻未詳按崔豹古今注黃帝與蚩尤戰常有五色雲氣金枝玉葉止於帝上有花葩之象因而作華蓋三心斷縛六道除怨見與李那書趙夢天樂見讓表秦遊帝閽張衡西京賦昔者大帝恱秦穆公而覲之饗以鈞天廣樂王靈在上巨勝奚論未詳福彼羣品俱排大昏皇家七百於萬維孫左傳王孫滿對楚子曰成王定鼎於郟鄏卜世三十卜年七百天所命也詩於萬斯年塵尾銘秦原曰漢書地理志儋耳珠崖郡山多塵麖注師古曰麈似鹿而大麖似鹿而小麈音主麖音京爰有妙物繫辭神也者妙物而為言者也萬窮兹巧制員上天形繫辭乾為天為圜平下地勢易地勢坤靡靡絲垂綿綿縷細入貢宜吳出先陪楚未詳壁懸石拜晉陽秋石勒偽事王浚浚遺勒麈尾勒為不執置之於壁朝拜之曰見王公所賜如見公也帳中玉舉晉書王衍美貌每捉玉柄麈尾與手同色既落天花維摩詰經天女以天花散諸菩薩即皆墮落至大弟子便著不墮天女曰結習未盡故花著身結習盡者花不著身亦通神語未詳用動舍默出處隨時繫辭君子之道或出或處或默或語揚斯雅論釋此繁疑拂靜塵暑晉王導麈尾銘勿謂質卑御於君子拂穢清暑虛心以俟毛原曰秦嘉婦與嘉書曰今奉牛尾拂一枚可拂塵垢引飾妙辭漢李尤麈尾銘揮成德柄言為訓辭誰云質賤左右宜之詩左之右之無不宜之哀䇿文陳文帝哀䇿文後漢書禮儀志太常上啓奠太祝令跪讀諡䇿太尉再拜稽首治禮告事畢太尉奉諡䇿還詣殿端門太常上祖奠東園武王載大行司徒却行道立車前治禮引太尉入就位大行車西少南東面奉䇿太史令奉哀䇿立後太常跪曰進皇帝進太尉讀諡䇿藏金匱皇帝次科藏於廟太史奉哀䇿葦篋詣陵司徒跪曰大駕請舍太史令自車南北面讀哀䇿掌故在後司徒跪曰請就下位東園武士奉下車司徒跪曰請就下房都導東園武士奉車入房司徒太史令奉諡哀䇿東園武士執事下明器詳孝義寺碑維太康元年太歲丙戌四月丁未朔二十七日癸酉大行皇帝崩於有覺殿漢霍光傳行璽大行前注韋昭曰大行不反之辭也殯於太極之西階粵六月丙寅將遷於永寧陵禮也宫車晚出江淹恨賦宫車晚出注宫車晚出猶云晏駕也幄殿晨張後漢禮儀志司徒跪曰請就幄導登旌帷具列檀弓銘明旌也以死者為不可别已故以其旗識之又曽子曰尸未設飾故帷堂小斂而徹帷綍翿成行雜記升正柩諸侯執綍五百人匠人執羽葆御柩檀弓顔栁曰天子龍楯而椁幬哀子嗣皇帝諱雜記祭稱孝子孝孫喪稱哀子哀孫劈蜃輅於丹陛謝眺齊敬皇后哀䇿文懷蜃衛而延首注蜃車也四輪迫地而行有似蜃因名攀龍帷於紫庭檀弓天子之殯也菆塗龍楯以椁注菆木以周龍楯如椁而塗之天子殯以楯車畫轅為龍趨過窮於屏闈論語鯉趨而過庭拜慟感於明靈東京飛其瑞露後漢明帝紀永平十七年甘露降於甘陵按安帝紀注甘陵孝德皇后之陵因以為縣北陸霣其祥星乃詔雲臺之史見傅大士碑稽采咸池之曲樂汁圖經黃帝樂曰咸池叶大雅於鳴金見歐陽頠碑同藏書於羣玉穆天子傳穆天子西登昆侖見王母曰登已至於羣玉之上先王所謂䇿府也其辭曰若水傳帝帝王世紀少昊帝名摰字青陽姬姓降居若水有聖德邑於窮桑以登帝位熏風御民帝王世紀舜作五弦之琴以歌南風之詩曰南風之熏兮可以解吾民之愠兮重光所集崔豹古今注漢明帝為太子樂人作歌詩四章一曰日重光世載於陳班彪王命論奕世載德赫矣髙祖悠哉上旻蟬聨寶胄梁沈約曰爵位蟬聫暉煥郊禋見與楊僕射書我皇誕聖膺此家慶易積善之家必有餘慶道主衢樽淮南子聖人之道猶中衢而設尊神凝懸鏡莊子聖人之用心也若鏡不將不迎應而不藏故勝物以無傷洛書天表河紀靈命尚書中候堯沉璧於洛玄龜負書出背甲赤文成字止壇又沈璧於河黑龜出文題納揆馳芳賓門流詠舜典納于百揆百揆時序賓于四門四門穆穆稽陰克伐易髙宗伐鬼方三年克之稽陰會稽山陰也震野勤王禹貢震澤底定南史章昭達傳文帝為吳興太守武帝謀討王僧辨令文帝還長城招聚兵衆以備杜龕僧辨誅後昭達因從文帝進軍以討龕龕平又從討張彪於會稽克之杜龕傳龕為震州刺史亳道增構殷本紀湯始居亳從先王居注孔安國曰契父帝嚳都亳湯自商邱遷焉故曰從先王居豳風會昌詩有豳風思樹屏曰左蜀都賦天帝運期而會昌言瞻少昊實仗髙陽帝王世紀顓頊髙陽氏生十年而佐少昊二十年而登帝位駕彼軨葛見與王太尉書清宫未央見侯安都碑歡覃兆庶德洎遐荒穆齋髙寢漢宣帝紀神爵集髙寢上膳長樂漢髙祖紀五年後九月治長樂宫肅肅承顔哀哀薦酌悼園恭儉漢戾太子傳納史良悌産子男進號曰史皇孫史皇孫子是為孝宣帝有司奏親諡宜曰悼皇母曰悼后比諸侯王園置奉邑三百家章陵謙約後漢地理志章陵故舂陵世祖更名大寶崇名繫辭聖人之大寶曰位無間改作纂武升厯禮記孔悝鼎銘獻公乃命成叔纂乃祖服遺愛實繁左傳子産卒仲尼出涕曰古之遺愛也仲虺之誥實繁有徒三湘九派水經江至潯陽分為九道詳與王僧辨書沴氣雲昏後漢五行志氣之相傷謂之沴力折天柱才傾地門見侯安都碑甘泉夜照漢文帝紀烽火及甘泉宫細栁朝屯見為陳武帝書谷魅山鬼左傳王孫滿曰魑魅罔兩莫能逢之事鍔曰秦本紀始皇曰山鬼固不過知一歲也橫流塞源黃帝兵法云涓涓不塞將為江河詳丹陽碑赫赫英謨赳赳雄斷遍行天討無遺神算鬱掃江淮長驅巴漢九夷百越書旅獒惟克商遂通道于九夷八蠻從啓源曰漢髙帝紀詔曰故衡山王吳芮百越之兵以佐諸侯誅暴秦雷隨風渙北俘昆邪漢胸奴傳昆邪王殺休屠王并將其衆降漢西戡伊靬後漢西域傳明帝取伊吾廬通西域息秩臣曰漢西域傳武帝遣人使安息安王遣使以犂靬眩人獻於漢負荷皇極書洪範皇建其有極劬勞庶幾後漢章帝紀孝明皇帝聖德淳茂劬勞日昃注日昃日昳也詩庶幾夙夜勤民聽政旰食宵衣書無逸文王自朝至于日中昃不遑暇食用咸和萬民左傳伍奢曰楚君大夫其旰食乎漢鄒陽傳孝文皇帝據關入立寒心銷志不明求衣服貴綈皂漢書孝文皇帝身衣弋綈風移閫闈漢書孝文皇帝所幸慎夫人衣不曵地唐山罷奏漢禮樂志房中祠樂髙祖唐山夫人所作也濮水韜徽樂記注濮上紂臣師延靡靡之樂訪采狂狷孟子孔子曰不得中行而與之必也狂狷也搜揚側微堯典明明揚側陋世感中孚民維大畜見易外户無閉見歐陽頠碑髙垣奚築降情儒雅漢章帝紀詔曰朕咨訪儒雅凝懷庠孰王制有虞氏養國老於上庠養庶老於下庠學記古之教者家有孰御廡為歡臨雍彌肅後漢明帝紀永平二年帝幸辟雍初行養老禮十五年幸孔子宅祠仲尼及七十二弟子親御講堂命皇太子諸王説經禮兼三代樂備九成書益稷簫韶九成天資武德地照文明墨履斯在初學記賈子曰天子黑方履幪巾自清連珠合璧漢律厯志日月如合璧五星如連珠曜爽流精左傳子産曰是以有精爽獸舞時豫書益稷夔曰於豫擊石拊石百獸率舞易豫之時義大矣哉禽歌頌平漢王莽傳䇿羣司曰赤煒頌平考聲以律帝載維逺王靈維大占雨占風論衡太平瑞應風不鳴條雨不破塊五日一風十日一雨荒中海外憬彼鞮譯王制東方曰寄南方曰象西方曰狄鞮北方曰譯咸承冠帶魏世家唐雎曰魏所以稱東藩受冠帶祠春秋者以秦之強足以為與也是曰君臨斯為交泰見易白環已賮世本西王母慕舜之德乃獻白環及玦玄圭克禎見勸進表東河佇楫漢武帝紀元封四年幸河東祠后土詔賜三縣及楊氏皆無出今年租賦注師古曰楊氏河東聚邑名北狄思征仲虺之誥南征北狄怨鉞斧將戒王制諸侯賜弓矢然後征賜鈇鉞然後殺璁珩未鳴詩服其命服朱芾斯皇有瑲蔥珩星淫去楚日沴悲荆左傳魯梓慎曰今兹宋鄭其飢乎歲在星紀而淫於玄枵又楚有雲如衆赤烏夾日以飛三日億兆何釁穹旻遽傾爾雅穹蒼蒼天也又秋為旻天大禹胼胝帝王世紀禹治水勞身涉勒手足胼胝故世傳禹病偏枯足不相過今巫稱禹步是也重華腒臘説文北方謂鳥臘曰腒按舜名重華鋭曰韻書引傳曰堯如臘舜如腒仰惟勞務同斯違懌書顧命王不懌發夢無徵文王世子文王謂武王曰汝何夢矣武王對曰夢帝與我九齡文王曰古者謂年齡齒亦齡也我百爾九十我與爾三焉昭祈奚益見為貞陽侯書聽茂陵之鐘鼓漢武帝紀葬茂陵古今注云光武原陵垣四出司馬門寢殿鐘虡皆在周垣內抱橋陽之劒舄列仙傳軒轅自擇亡日與羣臣辭還葬橋山山崩棺空惟有劒舄在焉詎髣佛於宸儀潘嶽悼亡詩髣佛覩爾容終纏綿於號劈嗚呼哀哉三占以吉書洪範三人占則從二人之言四海同奔列賵天宇榖梁傳乘馬曰賵崩號帝閽喪大記復小臣復復者朝服君以衮升東榮中屋復危北面三號卷衣投於前司服受之降自西北榮注復招魂也屈原離騷吾令帝閽開關兮千門啓於閶闔後漢張衡西京賦注閶闔天門也詳玉臺新詠序萬乘警於靈輼秦本紀始皇崩於平臺棺載輼涼車中槐風悲於輦道松雨思於郊原爾雅守宫槐葉晝聶宵􅀈兆寬曰謝莊宋宣貴妃誄鏘楚挽於槐風喝邊簫於松霧鸞旗動而虛蹕漢霍光傳法駕駕皮軒鸞旗詳傳大士碑宿衛靜而空尊漢書霍光傳大將軍光宿衛忠正叔孫通傳髙帝曰吾乃今知皇帝之貴也虎兆騫曰後漢禮儀志云登遐皇后詔賁羽林中郎署皆嚴宿衛嗚呼哀哉卑陌平夷流山蟠固後漢光武紀帝初作壽陵令所制地不過二三頃無為山陵陂池裁令流水而巳紀無遷市帝王世紀舜葬於蒼梧九疑山之陽是為零陵謂之紀市唐有通樹帝王世紀堯葬於濟陰之成陽西北號為穀林經白社之修塗回青門之廣路史記劭平故秦東陵侯秦滅種瓜長安城東故世謂之東陵瓜又云青門瓜青門東陵也疑用夏侯嬰事見章昭達碑思沛邑以東臨漢髙祖紀謂沛父兄曰遊子悲故鄉君雖都關中萬歲之後吾魂魄猶思樂沛懷周京以西顧詩乃眷西顧此維與宅嗚呼哀哉機神不測性道難稱見論語充窮靡寄檀弓始死充充如有窮孺慕奚慿檀弓有子與子遊立見孺子慕者惟封云與禪肅遺玉牒之與金繩漢郊祀志管仲曰黃帝封泰山禪云亭武帝封泰山下東方其下則有玉牒書禮畢禪泰山下址東北肅然白虎通封禪金泥銀繩詳與陳司空書揚英聲而永久司馬相如封禪文蜚英聲共日月而俱升詩如月之恆如日之升嗚呼哀哉墓志司空章昭達墓志周原膴膴見詩佳氣蔥蔥後漢書王伯阿望舂陵城曰氣佳哉鬱鬱蔥蔥王業攸興帝圖斯盛昔光武佐命鄰縣者鄧侯後漢書光武南陽蔡陽人鄧禹南陽新野人髙祖元臣同郡者蕭相漢書蕭何沛人詳與楊僕射書台輔之量便著綺紈見為始興王表瑚璉之資見論語無待雕琢起家為東宫直前所奉之君則梁簡文皇帝既而黑山巨盜慿陵上國見與王僧辨書白水強胡虔劉中夏見移齊文公側其産業募是驍雄思報皇儲纍殲鯨寇本傳昭達字伯通吳興武康人也性倜儻輕財尚氣梁大同中昭達為東宮直侯景之亂昭達率鄉人援臺屬豳風有象見詩代邸方隆見勸進表搜荆楚之英才漢李陵傳陵曰臣所將屯邊者皆荆楚勇士奇才劒客也資班輸之妙略墨子公輸般為雲梯以攻宋墨子解帶為城以牒為械輸般九攻墨子九拒百樓忽起登雲霄而俯臨後漢公孫瓚傳兵法百樓不攻萬弩齊張隨雷霆而並振孫臏傳馬陵道狹而旁多阻隘可伏兵乃斫大樹白而書之曰龎涓死於此樹之下龎涓果夜至斫木下齊軍萬弩俱發涓乃自剄揚兵於九天之上玄女九宫戰法行兵之道天地之寶九天九地各有表裏九天之上六甲子也九地之下六癸酉也子能慎之萬全可保決勝於千里之中見與楊僕射書殪彼羣凶皆無旋踵漢霍光傳田延年曰今日之議不得旋踵本傳臺城陷昭達還鄉里與陳文帝遊因結君臣分侯景平文帝為吳興太守昭達杖䇿來謁文帝委以將帥陳武帝謀討王僧辨令文帝還長城招聚兵衆以備杜龕頻使昭達往京口稟承計畫僧辨誅後杜龕遣其將杜泰來攻長城昭達因從文帝進軍吳興以討龕龕平又從討張彪於會稽克之天嘉九年追論長城功封興樂縣侯二年改封邵武縣侯廢帝即位改封邵陵郡公陳寶應志懷反叛客引周迪資其食力更事窺窬見為陳貞侯書公奉詔崇朝詩曽不崇朝飲冰將力莊子朝受命而夕飲氷前茅後徑步驟奔馳左傳楚人遂疾進師車馳卒奔乘晉軍又隨武子曰前茅慮無中權後徑仍同甄閩漢書漢五年立無諸為閩粵王王閩中故地孝惠三年立搖為東海王都東甌殄其巢窟若夫鳴蛇之洞深谷隱於蒼天水經注漢水又東合洛谷其地有神蛇戍左右山溪多五色蛇性馴良不為毒秬臣曰山海經鱗山多鳴蛇四翼音如磬見則大旱飛猿之嶺喬木參於雲日一統志福建延平府府城南有聞猿洞所吳𣙜曰建安記飛猿嶺喬木造天猿猿之飛走故曰飛猿嶺宜越艇而登嶠淮南子越舲蜀艇不能無水而浮蒙燕犀而涉江晉庾翼與慕容皓鎧書鄧伯川昔送此犀皮兩當鎧一領復是異物故復致之威武紛紜見為貞陽侯書震山風海於是咸俘偽帥悉據髙墉易公用射隼于髙墉之上爰泊滄溟莫不懲艾本傳陳寶應納周迪共寇臨川又以昭達為都督討迪迪走昭達乃踰嶺討陳寶應與戰不利因據上流為筏施拍其上壞其水柵又出兵攻其步軍方大合戰文文帝遣余孝頃出自海道適至因併力乘之遂定閩中盡禽留異寶應以功授鎮軍將軍開府儀同三司既而齊人無信將謀郢藩鬭艦戈船漢書有戈船將軍窺江淹漢公才聞羽檄見歐陽頠碑遽稟師斯馳襲荆鄖應時燒蕩本傳尋隨侯安都拒王琳乘平虜大艦中流而進先鋒發拍中賊艦王琳平昭達䇿勳第一方欲宣威隴汧大討梁華屬上將之韜光遲中台之掩曜天官書斗魁帶匡六星一曰上將魁下六星兩兩相比者名曰三能注蘇林曰音三台大建三年薨於軍幕本傳大建二年征江陵時梁明帝與周軍大蓄舟艦於青泥中昭達分遣偏將錢道戢程文季乘輕舟焚之周又於峽口南岸築壘名安蜀城於江上橫引大索編葦為橋以渡軍糧昭達乃命軍士為長戟施樓船上仰割其索索斷糧絶因縱兵攻其城降之三年於軍中病薨贈大將軍配享文帝廟廷子大寶襲劭陵郡公爾乃青烏相墓藝文類聚相冢書有青烏子白鶴標墳幽明録孫鍾以種爪為業有三少年詣鍾乞瓜曰此山下善可作冢鍾隨下山三人悉化成白鶴飛入空中即孫堅所葬地林有逃車左傳趙旃棄車而走林樹同華蓋蜀志先主舍東南角籬上有桑樹生髙五丈餘遙望幢幢如小車蓋先主少時與宗中諸兒於樹下戲言吾必當乘此羽葆蓋車前旍熊軾後漢輿服志公列侯安車朱班輪倚鹿較伏熊軾皂繒蓋黑轓右騑後乘龍轜潘嶽寡婦賦龍轜儼其星駕兮注畫轅為龍轜喪車也介士發三河之民漢霍光傳光薨發三河卒穿復土起冢祠堂哀鐃同駟馬之曲博物志公卿送夏侯嬰葬至東都門外馬不行接地悲鳴得石椁銘之曰佳城鬱鬱三千年見白日吁嗟滕公居此室乃葬長安傳疑作專坐恩禮盛於西京初學記漢初並用士人為尚書令秩二千石又東漢與司隸校尉御史中丞皆專席坐京師號曰三獨坐也襄陽墮淚悲慟喧於南北見侯安都碑河東康簡王墓志南史河東康簡王叔獻字子恭宣帝第九子性恭謹聰敏好學大建五年立位南徐州刺史薨贈司空諡康簡隋書冀州河東郡河東縣注舊曰蒲坂縣置河東郡夫聖人至德天道福謙見易大哉堯舜貽慶長逺明兩之盛易明兩作中陽纂於豢龍見與楊僕射及宗室書百世之祀皇家兆於鳴鳳左傳楚公子棄疾帥師滅陳晉侯問於史趙曰陳其遂亡乎對曰未也臣聞盛德必百世祀又陳公子完奔齊懿氏卜妻完其妻卜之曰吉是謂鳳皇于飛和鳴鏘鏘有媯之後將育于薑違青邱於海北漢武內傳長州一名青邱仙草靈藥甘液玉英靡所不有應紫蓋於江南見太極殿銘帝系王基重光纍葉東都賦重熙而纍洽髙祖之建天柱列聖之補地維見侯安都碑蕩蕩乎民無得而名焉者也見論語王資神昴緯帝王世紀修已見流星貫昴感而生禹託曜房靈春秋元命苞姬昌蒼帝之精位在房心體斯孝德不由師保月生之對何用於擬議後漢黃琬傳漢建和初正月日食京師不見黃瓊為魏郡太守以狀聞詔問所食多少瓊不能對瓊孫琬時七歲在旁曰何不言日食之餘如月之初瓊大驚琬後纍官光祿大夫日近之言無階於等級楚語申叔時曰明等級以道之禮詳與李那書封河東王加侍中淑貌與金燧相宜莊子陽燧見日則然為火注陽燧鑑也摩拭令熱便置日中以艾就之火生清顏與玉壺同照鮑昭樂府清如玉壺冰授使持節南徐州刺史武羌旅拒見移文亭障遷移漢西域傳漢列亭障至玉門漠草非長廣之東隋書青州東萊郡膠水縣注舊曰長廣湖萊近荆門之北後漢郡國志夷陵有荆門王常譏庾翼使白面之非才南史沈慶之傳慶之曰陛下今欲伐國而與白面書生謀之事何由濟深慕曹彰歎黃鬚之為可見為始興王表火精不退奚應善言吕氏春秋宋景公時熒惑守心子韋曰君有至德之言三天必三賞君是夜熒惑退三舍水蛭難消徒持陰德賈誼書楚惠王食寒菹而得蛭因遽吞之腹有疾而不能食令尹入問疾王曰吾食菹而得蛭不行其罪是法廢而威不立也譴而誅之恐監食者皆死遂吞之令尹曰天道無親惟德是輔王有仁德疾不為傷王果疾愈薨於沙鎮時年一十有七追贈司空加鼓吹班劍諡曰康簡至洛北占墳河南除道葭悲煙殿之聲後漢律厯志候氣之法室中以木為案每律各一內庳外髙從其方位加律其上以葭莩灰抑其內端按律而候之氣至者灰去其為氣所動者其灰散人及風所動者其灰聚殿中候用玉律十二惟二至乃候劒動豐城之氣見與李那書豈惟晉王寵悼重琅邪之贈官晉書琅邪悼王煥字耀祖初繼帝弟長樂亭侯渾後封顯義亭侯及煥疾篤帝為之徹膳及下詔封為琅邪王嗣恭王後俄而薨年二歲帝悼念無已將葬以煥既封列國加以成人之禮詔立凶門柏厯備吉凶儀服營起陵園魏后髙文制蒼舒之哀誄魏志鄧哀王沖字蒼舒年十三疾病太祖親為請命及亡哀甚贈騎都尉印綬黃初二年追贈諡沖曰鄧哀侯又追加號為公注魏書載䇿曰朕承天序享有四海並建親親以藩王室惟爾不逮斯榮且葬禮未備追悼之懷愴然攸傷太和五年加沖號曰鄧哀王裴使君墓志南史裴之橫字如嶽少好賓遊重氣俠不事産業歎曰大丈夫富貴必作百幅被梁簡文在東宫遷直閣將軍臺城陷之橫與兄之髙歸元帝位廷尉卿河東內史隨王僧辨拒侯景景退遷東徐州刺史封豫寧侯又隨僧辨破景景東奔僧辨命之橫與杜崱入守臺城魏克江陵齊遣上黨王髙渙挾貞陽侯明攻東關晉安王承制以之橫為徐州刺史都督衆軍出守蘄城之橫營壘末周而齊軍大至兵盡矢窮遂於陳殁贈司空諡曰壯君五音之候兼其方牧疑作技抱朴子黃帝審攻戰則納五音之䇿八陳之圖窮其巧變晉桓溫傳諸葛亮造八陳圖於魚復平沙上溫見之曰此常山蛇勢也用能戰必勝攻必取督稱無難兵號解煩吳志宗室傳孫皎弟儀為無難督樹屏曰胡綜傳權使綜料諸縣得六千人立解煩兩部朝飛火箭夜聳雲梯史記公輸班作陵雲之梯以攻宋城燧象從奔左傳針尹固與王同舟王使執燧象以奔吳師聨狼已合未詳按戰國䇿秦惠王謂寒泉子曰諸侯之不可一猶連雞之不能俱上於棲也於是嚴顏不撓極咍諸戎蜀志張飛生獲巴郡大守嚴顔顔曰我州但冇斷頭將軍無降將軍也龎德髙聲肆言羣逆魏志龎德為關羽所得立而不跪罵曰我寧為國家鬼不為賊將也遂為羽所殺胡夷總至猶持子路之纓左傳蒯瞶攻出公劫孔悝以登臺子路曰太子無勇若燔臺半必舍孔叔太子聞之懼下石乞盂黶敵子路以戈擊之斷纓子路曰君子死冠不免結纓而死鋒刃相交終荷溫生之節後漢書溫序遷護羌校尉行部至襄武為隗囂别將茍宇所拘劫序素有氣力大怒叱宇等曰虜何敢迫脅漢將因以節撾殺數人宇曰此義士死節可賜以劒序受劒銜鬚於口顧左右曰既為賊所迫殺無令鬚汙血遂伏劒而死每以財輕篻籜義重嵩衡割宅字貧友之孤孔叢子郈成子自魯聘晉過於衛右宰榖臣止而觴之行三十里而聞衛亂穀臣死之成子迎其妻子隔宅而居之開門延故人之殯見論語篤好朋遊居常滿席每至鮮雲靄靄披王安之衣未詳明月團團似班姬之扇班婕妤怨歌行新製齊紈素鮮潔如霜雪裁為合歡扇團團似明月日帶花以如笑樹敏曰劉協新論春葩含日似笑風鳴條而若歌傍列絲桐對揚文酒一石之後逾能斷獄漢書于定國飲酒至數石不亂治獄益精明五斗之量猶未解酲世説劉伶跪而祝曰天生劉伶以酒為名一飲一石五斗解酲嗟乎潘嶽之詩致哀周密文選注晉惠帝元康六年氐賊齊萬年與楊茂陷關中既定帝命諸臣作關中詩潘嶽詩曰周徇師令身膏氐斧人之云亡貞節克舉按周處别傳氐賊齊萬年為亂處仰天歎曰我為大臣以身徇國不亦可乎遂戰死莊公之誄用愍相遺檀弓魯莊公及宋人戰于乘邱縣賁父御卜國為右馬驚敗績公隊佐車授綏公曰未之卜也縣賁父曰他日不敗績而今敗績是無勇也遂死之圉人浴馬有流矢在白內公曰非其罪也遂誄之補南史顔延之傳釋慧琳上每引見常升獨榻傅大士碑髙僧傳慧受夢青龍從南方來化為剎柱受至新亭江見一長木隨流來因立為剎太極殿銘徐孝穆集箋注卷五
