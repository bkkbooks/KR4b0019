body:
  text: 徐孝穆集箋注卷六陳徐陵撰詔陳武帝即位詔五德更運帝王所以御天三正相因夏殷所以宰世雖色分辭翰時異文質揖讓征伐迄用參差而育德振民義同一揆朕以寡昧時屬艱危國步屢屯天維三絶肆勤先后拯厥橫流藉將帥之功兼猛士之力一匡天下再造黔黎梁氏以天祿永終厯數攸在遵與能之典集大命於朕躬顧惟菲薄辭不獲亮式從天眷俯協民心受終文祖升禋上帝繼迹百王君臨萬宇若涉川水罔知攸濟寶業初建皇祚維新思俾惠澤覃被億兆可大赦天下改梁太平二年為永定元年賜民爵二級文武二等鰥寡孤獨不能自存者人穀五斛逋租宿債皆勿復收其有犯鄉里清議贓汚淫盜者皆洗除先注與之更始長徒敕繫特皆原之亡官失爵禁錮奪勞一依舊典梁禪陳詔五運更始三正迭代司牧黎庶是屬聖賢用能經緯乾坤彌綸區宇大庇黔首闡揚鴻烈革晦以明積代同軌百王踵武咸由此則梁德湮微禍亂薦發太清云始見困長蛇承聖之季又罹封豕爰立天成重竊神器三光亟沈七廟乏祀含生已泯鼎命斯墜我武元之祚有如綴旒靜惟屯剝夕惕載懷相國陳王有命自天降神維嶽天地合德晷曜齊明拯社稷之橫流提億兆之塗炭東誅逆叛北殲獯醜威加四海仁漸萬國復張崩樂重興絶禮儒館聿修戎亭虛候大功在舜盛績惟禹巍巍蕩蕩無得而稱來獻白環豈直黃虞之世入貢素雉非止隆周之日固以效珍川陸表瑞煙雲甘露醴泉旦夕凝涌嘉禾芝草孳植郊甸道昭於悠代勳格於皇穹明明上天光華日月革故著於𤣥象代德彰於圖讖獄訟有歸謳歌爰適天之厯數實有攸在朕惟庸藐暗於古昔永稽崇替為日已久敢忘列代之遺典人祗之至願乎今便遜位别宫敬禪於陳一依唐虞宋齊故事陳公九錫詔肇昔元胎剖判太素氤氲崇建人皇必慿洪宰故賢哲之后牧伯征於四方神武之君大監治乎萬國又有一匡九合渠門之賜以隆戮帶圍溫行宫之寵斯茂時危所以貞固運泰所以光熙斯乃千載同風百王不刋之道也太傅義興公允文允武乃聖乃神固天生德康濟黔首昔在休期早隆朝寄逺踰滄海大拯交越皇運不造書契未聞中國其亡兵凶總至哀哀噍類譬彼窮牢悠悠上天莫云斯極否終則泰元輔應期救此將崩援兹已溺乘舟履輦架險浮深經略中塗畢殲羣醜洎乎石頭姑熟流髓履腸一朝指撝六合清晏是用光昭下武翼亮中都雪三后之勍讎夷三靈之巨慝堯治禹佐未始能階殷相周師固非云擬重之以屯剝餘象荆楚大崩天地無心乘輿委御五湖薦食競謀諸夏八方棊跱莫有匡救强臣致命黜我沖人顧影於荼孺之魂甘心於寧卿之辱却案下髻求哀之路莫從竊鈇逃責容身之地無所公神兵奄至不日清澄惟是孱蒙再膺天祿斯又巍巍蕩蕩無得而稱焉加以仗兹忠義屠彼妖逆震部夷氛稽山罷祲番禺蠡澤北鄙西郊殲厥凶徒罄無遺種斯則兆民之命修短所縣率土之基興亡是賴於是刑禮兼訓沿革有章中外咸平遐邇寧一用能使陽光合魄曜象呈暉棲閣遊庭抱仁含信宏勳該於厚地大道格於𤣥天羲農炎昊以來卷領垂衣之世聖人濟物未有如斯者也夫備物典䇿桓文是膺助理陰陽蕭曹不讓未有功髙於㝢縣而賞薄於伊周凡厥人祗固懷延佇實由公謙撝自牧降損為懷嘉數遲回永言增歎豈可申兹雅尚久廢朝猷宜戒司勳敬申鴻典且重華大聖媯汭惟賢盛德之祀無忘公侯之門必復是以殷嘉亶父繼后稷之官堯命羲和纂重黎之位況其本支攸建宜誓山河者乎其進公位相國總百揆封十郡為陳公備九錫之禮加璽紱逺遊冠緑綟綬位在諸侯王上其鎮衛大將軍揚州牧如故進武帝為長城公詔德懋懋官功懋懋賞皇王盛則所謂元龜司空公南徐州刺史長城縣開國侯諱志懷寅亮風度𢎞逺體文經武明允篤誠曩者率五嶺之强兵誅四海之讎敵固以勒功彞鼎書勳太常克定京師勤勞自重自鎮撫枌榆永寧豐沛東涼既息北蔡無歸代馬燕犀氣雄天下裹糧坐甲固敵是求方欲大討於秦崤敦修於輿睦協謀上相爰納朕躬思所以敬答忠勳用申朝典可進爵為長城縣公陳文帝登祚尊皇太后詔朕以虛薄才非𢎞濟竊守藩維常懷盈滿豈圖蒼昊不弔國步艱難皇嗣元良藐在崤渭二臣奉迎川塗靡從六傳還朝淹留永日今國圖無主家業事隆上奉父母之嚴規下逼羣公之廷諍遂以庸質升纂帝基對揚大化彌增號懼今宜式遵舊則奉上皇后尊號為皇太后御慈訓宫一依前典若中流靜晏皇嗣歸來輒當解紱於箕山之陽歸老於琅邪之國復子明辟還承寶圖若問與夷無愧園寢封始興王詔漢祖天倫伯叔逮封晉元世系琅邪傳國仰惟二后重光率由前典朕昔因藩次蒙繼本宗分在要荒久離寒燠天嘉紹祚别命皇枝歸自崤函禮隔登獻每至霜庭可履屬垣寢而懷悲風樹鳴條望章陵而增感今嗣王乖德獲罪慈訓永言主奠宜自朕躬但國步時艱皇基務切復奉家業升纂帝圖重違情禮言深哽慟可以第二皇子升陵為始興王文為陳武帝即位告天文皇帝臣諱敢用𤣥牡昭告於皇皇后帝梁氏以圯剝薦臻厯運有極欽若天應以命於諱夫肇有蒸民乃樹司牧選賢與能未常厥姓放勳重華之世咸無意於受終當塗典午之君雖有心於揖讓皆以英才處萬乘髙勛御四海故能大庇黔首光宅區縣有梁末運仍葉遘屯獯醜慿陵久移神器承聖在外非能祀夏天未悔禍復罹寇逆嫡嗣廢黜宗支僭詐天地蕩覆紀綱泯絶諱爰初投袂大拯橫流重舉義兵實戡多難廢王立帝實有厥功安國定社用盡其力是謂小康方期大道既而煙雲表色日月呈瑞緯聚東井龍見譙邦除舊布新既彰𤣥象遷虞事夏且協謳訟九域八荒同布衷欵百神羣祀皆有誠願梁帝髙謝萬邦授以大寶諱自惟菲薄讓德不嗣至於再三辭勿獲許僉以百姓須主萬幾難曠皇靈眷命非可謙拒畏天之威用膺嘉祚永言夙志能無慙德敬簡元辰升壇告禪告類上帝用答民心永保於我有陳惟明靈是饗梁禪陳䇿文咨爾陳王惟昔上古厥初生民驪連栗陸之前容成大庭之代並結繩寫烏杳𡨕慌忽故靡得而詳焉自羲皇軒昊之君陶唐有虞之主或垂衣而御四海或無為而子萬姓居之如馭朽索去之如脫敝屣裁遇許由便能捨帝暫逢善卷即以讓王故知𤣥扈璇璣非關尊貴金根玉輅示表君臨及南觀河渚東沉刻璧精華既竭耄勤已倦則抗首而笑惟賢是與䜎然作歌簡能斯授遺風餘烈昭晰圖書漢魏因循是為故實宋齊授受又𢎞斯義我髙祖應期撫運握區御宇三后重光祖宗齊聖及時屬陽九封豕薦食西都失馭夷狄交侵乃臮天成輕弄龜鼎惵惵黔首若崩厥角微微皇極將甚綴旒惟王乃聖乃神欽明文思二儀並運四時合序天錫智勇人挺雄傑珠庭日角龍行虎步爰初投袂日乃勤王電掃番禺雲撒彭蠡揃其元惡定我京畿及王賀帝𢎞貿兹冠履既行伊霍用保沖人震澤稽陰並懷叛逆獯厥醜虜三亂皇都裁命偏師二邦自殄薄伐玁狁六戎盡殪嶺南叛換湘郢結連賊帥既擒凶渠傳首用能百揆時序四門允穆無思不服無逺不屆上達穹昊下漏深泉蛟魚並見謳歌攸屬況乎長彗橫天已徵布新之兆璧日斯既實表更姓之符是以始創義師紫雲曜彩肇惟尊主黃龍負舟楛矢素翬梯山以至白環玉玦慕德而臻若夫安國字氓本因萬物之志時乘御宇良會樂推之心七百無常期皇王非一族昔木德既季而傳祚於我有梁天之厯數允集明哲式遵前典廣詢羣議王公卿尹莫不攸屬敬從人祗之願授帝位於爾躬四海困窮天祿永終王其允執厥中軌儀前式以副溥天之望禋祀上帝時膺大禮永固洪業豈不盛歟陳公九錫文大哉乾元資日月以貞觀至哉坤元慿山川以載物故惟天為大陟配者欽明惟王建國翼輔者齊聖是以文武之佐磻溪藴其玉璜堯舜之臣濙河鏤其金版況乎體得一之鴻姿寧陽九之危厄拯橫流於碣石撲燎火於崑岑驅馭於韋彭跨蹍於秦晉神功行而靡用聖道運而無名者乎今將授公典策其敬聽朕命日者昊天不弔鍾亂於我國家網漏吞舟强胡內贔茫茫宇宙惵惵黎元方足圓顱萬不遺一太清否亢橋山之痛已深太寶屯如平陽之禍相繼上宰膺運康救兆民鞠旅於滇池之南揚旌於桂嶺之北懸三光於已墜謐四海於羣飛屠猰㺄於中原斫鯨鯢於濛汜蕩寧上國光唘中興此則公之大造於皇家者也既而天未悔禍夷醜薦臻南夏崩騰西京蕩覆羣胡孔熾藉亂乘間推納藩枝盜假神器冡司昏撓㫄引寇讎既見貶於桐宫方謀危於漢閣皇運已殆何殊贅旒中國搖然非徒如線公赫然投袂匡救本朝復莒齊都平戎王室朕所以還膺寶厯重履宸居挹建武之風猷歌宣王之雅頌此又公之再造於皇家者也公應務之初登庸惟始三川五嶺莫不窺臨銀洞珠宫所在寧謐孫盧肇釁越貊為災番部阽危勢將淪殄公赤旗所指妖壘洞開白羽才撝凶徒紛潰非其神武久喪南藩此又公之功也大同之末邊政不修李賁狂迷竊我交愛敢稱大號驕恣甚於尉他據有連州雄豪熾於梁碩公英謨雄算電掃風行馳御樓船直跨滄海新昌典徹備厯艱難蘇厯嘉寧盡為京觀三山獠洞八角蠻陬逖矣水㝢之鄉悠哉火山之國馬援之所不屆陶璜之所未開莫不懼我王靈爭朝邊候歸琛天府獻狀鴻臚此又公之功也自寇虜臨江宫闈幽辱公枕戈嘗膽提劍撫心氣涌青霄神飛紫闥而番禺連率本自諸夷言得其朋是懷同惡公仗此忠誠乘機勦定執沛令而釁鼓平新野而據鞍此又公之功也世道初艱方隅多難勳門桀黠作亂衡疑兵切池隍衆兼夷獠公以國盜邊警知無不為恤是同盟誅其醜類莫不魚驚鳥散面縳頭懸南土黔黎重保蘇息此又公之功也長驅嶺嶠夢想京畿緣道酋豪遞為榛梗路養渠率全據大都蓄聚逋逃方謀阻亂百樓不戰雲梯之所未窺萬弩齊張髙輣之所非敵公龍驤虎步嘯吒風雲山靡堅城野無强陳清妖氛於贛石滅沴氣於雩都此又公之功也遷仕凶慝屯據大臯乞活類馬騰之軍流民多杜韜之衆推鋒轉鬬自北徂南頻歲稽誅實惟勍虜公坐揮三略遙制六奇義勇同心貔貅騁力雷奔電掣谷靜山空列郡無犬吠之驚叢祠罷狐鳴之盜此又公之功也王師討虜次屆淪波兵乏兼儲士有飢色公回麾蠡澤積穀巴丘億庾之詠斯豐壺漿之迎是衆軍民轉漕曾無砥柱之難舳艫相望如運敖倉之府犀渠貝胄顧蔑雷霆髙艦層樓仰捫霄漢故使三軍勇鋭百戰無前承此兵糧遂殄凶逆此又公之功也若夫英圖邁俗義旅如雲湓壘猜攜用掩戎略公志唯同奬師克在和鵠塞非虞鴻門是會若晉侯之誓白水如蕭王之推赤心屈體交盟人祗感咽故使舟師並路逺邇同心此又公之功也姑熟襟要崤函阻慿寇虜據其關梁大盜負其扄鐍公一校裁撝三雄並奮左賢右角沙潰土崩木甲殪於中原氊裘赴於江水他他藉藉萬計千羣鄂坂之隘斯開夷庚之道無塞此又公之功也義軍大衆俱集帝京逆豎凶徒猶屯皇邑若夫表裏山河金湯險固疏龍首以抗殿揃華嶽以為城雜虜慿焉强兵自若公回兹地軸抗此天羅曽不崇朝俾無遺噍軍容甚穆國政方修物重覩於衣冠民還瞻於禮樂楚人滿道爭覩於葉公漢老銜悲俱觀於司隸此又公之功也內難初靖諸侯出關外郡傳烽鮮卑犯塞莫非且渠當户中貴名王冀馬列於淮南胡笳動於徐北公舟師步甲亘野橫江殲厥羣羝遂殫封豨莫不絓木而止戎車靡遺遇濘而還歸驂盡殪此又公之功也公克黜禍難劬勞王室而孫寧之黨翻啓狄心伊洛之間咸為虜戍雖金陵佳氣石壘天嚴朝暗戎塵夜喧胡鼓公三籌既畫八陳斯張裁舉靈鈈亦抽金僕咸俘醜類悉反髙墉異李廣之皆誅同龎元之盡赦此又公之功也任約叛換梟聲不悛戎羯貪婪狼心無改穹廬氊幕抵北闕而為營烏孫天馬指東都而成陳公左甄右落箕張翼舒掃是欃槍驅其獫狁長狄之種埋於國門椎髻之囚烹於軍市投秦坑而盡沸咽濉水而不流此又公之功也一相居中自折彝鼎五湖小守妄懷同惡公夙駕兼道秉羽杖戈玉斧將揮金鉦且戒妖酋震懾遽請灰釘爇櫬以表其含𢎞焚書以安其反側此又公之功也賊龕凶橫陵虐具區阻兵安忍慿災怙亂自古蟲言鳥迹混沌洪荒凡或虔劉未此殘酷公雖宗居汝潁世寓東南育聖誕賢之鄉含章挺生之地眷言桑梓公私憤切卓爾英狀承規奉算戮此大憝如烹小鮮此又公之功也亂離永久羣盜孔多浙左凶渠連兵搆逆豈止千兵五校白雀黃龍而已哉公以中軍無率選是親賢奸寇途窮漼然氷泮刑溏之所文命動其大威雷門之間句踐行其嚴戮英規聖迹異代同風此又公之功也同姓有扈頑凶不賓慿藉宗盟圖危社稷觀兵滙澤勢震京師驅率南蠻已為東帝公論兵於廟堂之上決勝於尊俎之間寇賈樊滕浮江下瀨一朝揃撲無待甸師萬里澄清非勞新息此又公之功也豫章妖寇依慿山澤繕甲完聚各厯歲時結縱連橫爰洎交廣吕嘉既獲吳濞已鏦命我還師征其不恪連營盡拔僞黨斯擒曜聖武於匡山回神旌於蠡浱此又公之功也自八紘九野瓜剖豆分竊帝偷王連州比縣公武靈已暢文德又宣折簡馳書風猷斯逺至於蒼蒼浴日杳杳無雷北洎丈夫之鄉南踰女子之國莫不屈膝膜拜求吏欵關此又公之功也京師禍亂亟積寒暄雙闕低昂九門寥豁寧秦宫之可顧豈魯殿之猶存五都簪辨百僚卿士胡服縵纓咸為戎俗髙冠厚履希復華風宋微子麥穗之歌周大夫黍離之歎方之於斯未足為悲矣公求衣昧旦昃食髙舂興構宫闈具瞻遐邇膠庠宗稷之典六符十等之章還聞泰始之風流重睹永平之遺事此又公之功也公有濟天下之勳重之以明德凝神體道合德符天用百姓以為心隨萬幾而成務恥一物非唐虞之民歸含靈於仁壽之域上德不德無為以為夏長春生顯仁藏用忠信為寶風雨弗愆仁惠為基牛羊勿踐功成治定樂奏咸雲安上治民禮兼文質物色丘園衣裾里巷朝多君子野無遺賢菽粟同水火之饒工商富猗頓之旅是以天無藴寶地有呈祥潏露卿雲朝團曉映山車澤馬服御登間既景煥於圖書方葳蕤於史牒髙勳踰於象緯積德冠於嵩華固無得而稱者矣朕又聞之前王宰世茂賞尊賢式樹蕃長總征羣伯二南崇絶四履遐曠泱泱表海胙土惟齊巖巖泰山俾侯於魯抑又勤王反鄭夾輔遷周召伯之命斯隆河陽之禮咸備況復經營宇宙豈惟斷鼇足之功𢎞濟蒼生非直鑿龍門之險而酬庸報德寂爾無聞朕所以垂拱當寧載懷慙悸者也今授公相國以南豫州之陳留南丹陽宣城揚州之吳興東陽新安新寧南徐州之義興江州之鄱陽臨川十郡封公為陳公錫兹青土苴以白茅爰定爾邦用建冢社昔旦奭分陜俱為師保晉鄭諸侯咸作卿士兼其內外禮實攸宜今命使持節兼太尉王通授相國印綬陳公璽紱使持節兼司空王瑒授陳公茅土金獸符第一至第五左竹使符第一至第十相國秩踰三鉉任總百司位絶朝班禮由事革其以相國總百揆除録尚書之號上所假節侍中貂蟬中書監印章中外都督太傅印綬義興公印䇿其鎮衛大將軍揚州牧如故又加公九錫其敬聽後命以公禮為楨幹律等銜䇿四維皆舉八柄有章是用錫公大輅戎輅各一𤣥牡二駟以公賤寶崇穀疏爵待農室富京坻民知榮辱是用錫公衮冕之服赤舄副焉以公調理陰陽燮諧風雅三靈允降萬國同和是用錫公軒縣之樂六佾之舞以公宣導王猷𢎞闡風教光景所照鞮象必通是用錫公朱戶以居以公抑揚清濁褒德進賢髦士盈朝幽人虛谷是用錫公納陛以登以公嶷然廊廟為世鎔範折衝四表臨御八荒是用錫公武賁之士三百人以公執兹明罰期在刑措象恭無赦干紀必誅是用錫公斧鉞各一以公英猷逺量跨厲嵩溟混一車書括囊寰宇是用錫公彤弓一彤矢百玈弓十玈矢千以公天經地義貫徹幽明春露秋霜允恭粢盛是用錫公秬鬯一卣圭瓚副焉陳國置丞相以下一遵舊式往欽哉其恭循朕命克相皇天𢎞建邦家允興洪業以光我髙祖之休命璽書陳武帝下州郡璽書夫三正革代商周所以應天五勝相推軒羲所以當運梁德不造喪亂積年東夏奔騰西都蕩覆蕭勃干紀非惟趙倫侯景滔天逾於劉載貞陽反篡賊約連兵江左纍屬於鮮卑金陵久非於梁國自有氤氲混沌之世龍圖鳳紀之前東漢興平之初西朝永嘉之亂天下分崩未有若於梁朝者也朕以虛薄屬當興運自昔登庸首清諸越徐聞浪泊靡不征行浮海乘山所在戡定冒遡風塵騁馳師旅六延梁祀十翦强寇豈曰人謀皆由天啓梁氏以天祿斯改期運永終欽若唐虞推其鼎玉朕東西退讓拜手陳辭避舜子於箕山之陽求支伯於滄洲之野而公卿敦逼率土翹惶天命難稽遂享嘉祚今月乙亥升禮大壇言念遷桐但有慙德自梁氏將末頻月亢陽火運斯終秋霖奄降翌日成禮圓丘宿設埃雲晚霽星象夜張朝景重輪泫三危之膏露晨光合璧帶五色之卿雲顧惟寡薄彌慙休祉昧旦丕顯方思致治卿等擁旄方嶽相任股肱剖符名宇方寄恤隱王厯維新念有欣慶想深求民瘼務在廉平愛惠以撫孤貧威刑以禦强猾若有萑蒲之盜或犯戎商山谷之酋擅强幽險皆從肆赦咸使聞知如或迷途俾在無貸今遣使人具宣往旨念思善政副此虛懷梁禪陳璽書君子者自昭明德達人者先天弗違故能進退咸亨動靜元吉朕雖蒙寡庶乎景行何則三才剖判九有區分情性相乖亂離云起是以建彼司牧推乎聖賢授受者任其時來皇王者本非一族人謀是與屈已從萬物之心天意斯歸鞠躬奉百靈之命謳歌所往則攘袂以膺之菁華已竭乃褰裳而去之昔在唐虞鑒於天道舉其黎獻授彼明哲雖復質文殊軌沿革不同厯代因循斯世靡替我大梁所以考庸太室接禮二宫月正元日受終文祖但運不常夷道無恆泰山嶽傾偃河海沸騰電目雷聲之禽鉤爪鋸牙之獸咀齧含生不知紀極二后英聖相承在天六夷貪狡爭侵中國縣王都帝人懷干紀一民尺土皆非梁地朕以不造幼罹閔凶仰慿衡佐亟移年序周成漢惠邈矣無階惟是童蒙必貽顚蹶若使時無聖哲世靡艱難猶當髙蹈於滄洲自求於支伯者矣惟王應期誕秀開籙握圖性道故其難聞嘉庸已其被物乾行同其燾覆日御比其貞明登承聖於復禹之功樹鞠子於興周之業滅陸渾於伊洛殲驪戎於鎬京大小二震之驍徒東南兩越之勍寇遽行天討無遺神䇿於是祖述堯舜憲章文武大樂與天地同和大禮與天地同節鼓之以雷霆潤之以風雨仁霑葭葦信及豚魚殷牖斯空夏臺虛設民惟大畜野有同人升平頌平無偏無黨固以雲飛紫蓋水躍黃龍東伐西征暗映川陸榮光曖曖已冒郊㕓甘露瀼瀼亟流庭苑車轍馬迹誰不率從蟠木流沙誰不懷德祥圖逺至非惟赤伏之符靈命昭然何止黃星之氣海口河目聖賢之表既彰握旄執鉞君人之狀斯偉且自攝提無紀孟陬殄滅枉矢宵飛天弧曉映久矣夷羊之在牧時哉蛟龍之出泉革運之兆咸徵惟新之符並集朕以欽若勛華屢迥星琯昔者木運斯盡豫髙祖受焉今厯去炎精神歸樞紐敬以火德傳於爾陳逺鑒前王近謀羣辟明靈有恱率土同心今遣使持節兼太保侍中尚書左僕射平樂亭侯王通兼太尉司徒左長使王瑒奉皇帝璽綬受終之禮一依唐虞故事王其時陟元后寧育兆民光闡洪猷以承昊天之休命徐孝穆集箋注卷六欽定四庫全書徐孝穆集箋注卷六備考吳江徐文炳注陳武帝即位詔漢律厯志土生金故為金德金生水故為水德水生木故為木德木生火故為火德火生土故為土德漢劉向傳三統注張晏曰一曰天統謂周建子為正二曰地統謂殷建丑為正三曰人統謂夏建寅為正晉王尼傳尼常歎曰滄海橫流處處不安也下任昉表千載一逢再造難答禮記大道之行也天為公選賢與能子書大誥若涉淵水惟往求朕攸濟梁禪陳詔班固典引經緯乾坤出入三光注三光日月星也首史岑出師頌渾一區宇秦始皇本紀更名民曰黔應劭曰黔亦黎黑也紀左傳申包胥曰吳為封豕長蛇洊食上國陳武帝貞陽侯明即位改元天成老子天下神器不可以有為為者敗之觀德左傳師曠對曰匱神乏祀書七世之廟可以易鼎君子以正位疑命民公羊傳君若贅旒然傳詩維嶽降神生甫及申書墜塗炭後漢曹褒詔曰漢遭秦餘禮壞樂崩周世本西王母慕舜之德乃獻白環及玦氏韓詩外傳公居攝二年制禮作樂天下和平越裳以三象重譯而獻白雉慶史記若煙非煙若雲非雲郁郁紛紛蕭索輪囷是謂雲陳文帝紀注甘露醴泉衆瑞並出陳書武帝紀梁紹泰二年三月自去冬至是甘露頻降於鍾山梅岡南澗及京口江寧縣境或至三數升大如奕棊子秋漢公孫𢎞䇿嘉禾興朱草生此和之至也吕氏春虞舜卿雲歌曰卿雲爛兮糾縵縵兮日月光華旦復旦兮王左傳晉文公請隧弗許曰王章也未有代德而有二亦叔父之所惡也後漢竇融傳臣融有子年十五不得令觀天文見讖記陳公九錫詔漢王莽傳張純等曰謹以六藝通義經文所見周官禮記宜於今者為九命之錫臣請錫命奏可後漢張衡靈憲賦元氣剖判剛柔始分清濁異位天成於外地定於內又太素之前寂莫冥默不可為象班固典引太極之原兩儀始分煙煙氲氲諸侯一匡天下天子賞以渠門赤旗管子桓公九合左傳云天王出居於鄭僖公二十五年晉侯辭秦師而下三月甲辰次於陽樊右師圍溫左師逆王夏四月丁已王入于王城取大叔于溫殺之於隰城戊午晉侯朝王王饗醴命之宥與之陽樊溫原攢茅之田晉於是始啓南陽陳武帝紀太平元年九月帝進封義興郡公二年八月帝進位太傅隋書揚州毗陵郡義興縣注舊曰陽羡置義興郡生書乃聖乃神乃武乃文攻論語固天縱之將聖又天德於豫漢書項羽嘗襄城襄城無噍類窮牢未詳按董卓傳縱放兵士剽虜資物謂之搜牢注言牢固者皆搜索取之魏略侍中陳羣尚書桓階奏曰諸明圖緯者皆言漢行氣盡黃家當興殿下應期十分天下而有其九以服事虞木華海賦戲廣浮深劉向新序扶傷舉死履腸涉血陳武帝紀江寧今陳嗣等據姑孰不從帝命侯安都等討平之聚其首為京觀漢陳平傳天下指揮即定天家語冠頌六合是式叔詩下武維周文選注三靈地人也左傳衛太文子曰今寧子視君不如奕棊張協賦棊布星羅書梁敬帝紀僧辨納貞陽侯明即僞位以帝為皇太子金縢惟子沖人弗及知而左傳齊陳乞弒其君荼鮑子曰女忘君之為孺子牛折其齒乎而背之也左傳衛子鮮以公命與寧喜言公曰茍反政由寧氏祭則寡人之班主固諸侯王表有逃責之臺被竊鈇之言然天下謂共强人弗之敢傾陳陸機辨亡論神兵東驅奮寡犯衆梁敬帝紀司空霸先襲殺王僧辨黜蕭明而奉帝南史杜龕傳貞陽侯明以龕為震州刺史吳興太守龕僧辨壻也僧辨敗龕乃據吳興以拒之部將杜泰降陳文帝龕尚醉不覺文帝斬之引南史張彪少亡命為盜頗有部曲王僧辨遇之甚厚為爪牙與杜龕相似世謂張杜為東揚州刺史會僧辨見害時陳文帝巳據震澤將及會稽彪將沈泰吳寶真等叛迎文帝彪遂敗走文帝遣劫殺之江隋書揚州南海郡南海縣注舊分置番禺縣荆州九郡湓城縣注冇彭蠡湖左傳邾子曰命在養民死之長短時也周尚書中候黃帝時鳳皇巢阿閣麒麟在囿蔡雍琴操成王琴歌曰鳯皇翔兮紫庭抱朴子鳳頭上青戴仁足下黃蹈信以吕氏春秋北方曰𤣥天淮南子古有鍪頭而卷領王天下繫辭黃帝堯舜垂衣裳而天下治胙齊世家會諸侯於葵丘周襄王使宰孔賜桓公文武彤弓矢大輅命無拜左傳天王狩于河陽晉侯獻楚俘于王王䇿命晉侯為侯伯賜之大輅之服戎輅之服彤弓一彤矢百玈弓矢千秬鬯一卣虎賁三百人蕭漢王陵傳平謝曰宰相者上佐天子理陰陽順四時曹傳贊二人同心遂安海內以謝朓詩霸功興㝢縣古周禮司勳掌六卿賞地之法等其功舜典若稽帝舜曰重華堯典釐降二女于媯汭嬪于虞必左傳史趙曰盛德必百世祀又卜偃曰公侯之子孫復其始周本紀古公亶父復修后稷公劉之業積德行義國人皆戴之堯典乃命羲和欽若昊天太史公自序重黎氏世序天地魏志天子使魏公位在諸侯王上改授金璽赤紱逺遊冠後漢輿服志逺遊冠制如通天有展筒橫之於前無山述諸王所服也漢書諸侯王髙帝初置金璽盩綬如淳曰盩緑也晉灼曰盩草名也似艾可染緑因以為綬名盩音戾宋州郡志順帝升明元年改揚州刺史曰牧進武帝為長城公詔陳武帝紀元帝承制授帝征北大將軍開府儀同三司南徐州刺史進封長城縣公承聖三年正月進帝位司空隋書揚州吳郡領長城縣詳九錫文有左傳髙陽氏有才子八人明允篤誠漢張耳傳南五嶺之戍注大庾始安臨賀桂陽揭陽也明陳武帝紀太清二年冬侯景寇逼帝將赴援遣杜僧胡款將二千人頓於嶺上并厚結始興豪傑同謀義舉命祭統衛孔悝之鼎銘悝拜稽首曰對揚以辟之勤大施於蒸彞鼎周禮司勳凡有功者銘書於王之大常臣漢書髙祖初起禱豐枌榆社樊噲傳噲曰始陛下與等起豐沛定天下何其壯也坐後漢班超傳疏曰代馬依風俟左傳趙穿怒曰裹糧甲固敵是求敵至不擊將何焉晉漢春秋氐池縣大栁谷口有蒼石立水中其文曰大討曹陳文帝登祚尊皇太后詔陳后妃傳武帝章皇后諱要兒吳興烏程人本姓鈕父景明為章氏所養因改姓武帝先娶同郡錢仲方女早卒後乃聘后永定元年立為皇后武帝崩后與中書舍人蔡景厯定計召文帝及即位尊后為皇太后宫曰慈訓大建二年崩諡曰宣後漢明帝紀制曰朕以虛薄何以享斯城南史衡陽獻王昌字敬業武帝第六子也景平拜長國世子吳興太守魏克荆州與宣帝俱遷長安武帝即位頻遣使請宣帝及昌周人許而未遣及武帝崩乃遣之時王琳作梗中流昌不得還居於安陸天嘉元年封衡陽郡王入境濟江於中流殞之使以溺告諡曰獻漢書代王令張武等六人乘六乘傳詣長安而魏𨽻髙士傳許由字仲武堯舜致天下而讓焉乃退遁耕於中嶽潁水之陽箕山之下諸晉書百僚稱上尊號中宗慨然流涕曰吾本琅邪王賢見逼不已乃呼私奴命駕將返國書洛誥周公拜手稽首曰朕復子明辟夷左傳宋穆公疾召大司馬而屬殤公焉曰先君舍與而立寡人寡人弗敢忘若以大夫之靈得保首領以沒先君若問與夷其將何辭以對封始興王詔南史始興王伯茂字鬱之文帝第二子也文帝即位封伯茂為始興王穀梁傳兄弟天倫也漢髙帝紀六年以碭郡薛郡郯郡三十六縣立弟文信君交為楚王交髙祖同父少弟也以雲中雁門代郡五十三縣立兄宜信侯喜為代王喜即仲也周禮疏天子謂之帝系諸侯謂之世本詳登祚詔之國語蠻夷要服戎狄荒服成祭義霜露既降君子履必有悽愴之心商頌寢孔安說苑吾丘子擁鐮戴索而哭對孔子曰樹欲靜而風不定子欲養而親不在往而不來者年也不可得再見者親也後漢地理志章陵故舂陵世祖更名明帝紀車駕從皇太后幸章陵觀舊廬陳宣帝紀光大二年十一月慈訓太后黜廢帝為臨海王以帝入纘皇統隋書南海郡曲江縣注舊置始興郡為陳武帝即位告天文湯誥敢用𤣥牡敢昭告于上天神后詩皇皇后帝杜左傳云天生民而立之君使司牧之蜀志譙周問瓊曰昔周徴君羣以為當塗髙者魏也其義何也瓊曰魏闕名也當塗言髙聖人取類言爾又周嘗書版示文王曰典午忽兮月酉沒兮典午者謂司馬也月酉者謂八月也至八月而司馬文王崩詳䇿文左傳伍員諫吳子曰少康使女艾諜澆使季杼誘豷遂滅過戈復禹之績祀夏配天不失舊物左傳楚子投袂而起易坤靈圖至德之萌日月若連璧也命漢天文志漢元年十月五星聚於東井此髙皇帝受之符也纂要云五星謂之五緯其魏文帝紀初漢熹平五年黃龍見譙太史令單揚曰國後當有王者興不及五十年亦當復見陳武帝紀太平元年九月丁未中散大夫王彭箋稱今月五日平旦於御路見龍迹自大社至象闕亘三四里荒張衡靈憲賦地有九域山川賈誼過秦論有并吞八之心左傳襄公十一年同盟於亳載書曰羣神羣祀陳繫辭聖人之大寶曰位帝臯陶謨一日二日萬幾武帝紀梁帝遜於别宫謙讓再三羣臣固請乃許之巢書成湯放桀於南惟有慙德梁禪陳䇿文三皇本紀自人皇巳後有五龍氏燧人氏大庭氏柏皇氏中央氏卷須氏栗陸氏驪連氏赫胥氏尊盧氏混沌氏昊英氏有巢氏朱襄氏葛天氏陰康氏無懷氏蓋三皇巳來有天下者之號莊子容成氏大庭氏結繩而用之晉衛恆書勢黃帝之史沮誦蒼頡眺彼鳥迹始作書契古逸詩伯牙水仙操序山林窅冥書五子之歌凛乎若朽索之馭六馬由孟子舜視棄天下猶棄敝屣也逸士傳堯之讓許也由以告巢父巢父曰汝何不隱汝形藏汝光非吾友也乃擊其膺而下之許由悵然不自得乃遇清泠之水洗其耳拭其目曰向者聞言負吾友遂去終身不相見黃髙士傳善卷者舜以天下讓之卷遂入深山黃録帝坐𤣥扈洛上與大司馬容光左右輔周昌等百二十人臨觀鳯皇銜圖置帝前圖以黃金為柙書在璇璣玉衡以齊七政徐廣輿服志天子輅金根車至竹書紀年舜設壇于河依堯故事至於下昃榮光休黃龍負圖出於壇畔帝王世紀後年二月堯率羣臣刻璧為書東沈洛水褰竹書紀年帝載歌曰鼚乎鼓之軒乎舞之菁華已竭裳去之倦書大禹謨帝曰格汝禹朕宅帝位三十有三載耄期于勤汝惟不怠總朕師尚書大傳十有四祀鍾石笙管變聲樂未罷疾風發屋天大雷雨帝沈首而笑曰明哉一人天下也乃見於鍾石尚書大傳䜎然作大唐之歌按南史本作􅀈非十司馬相如封禪文暗昧昭晰後漢獻帝紀建安二五年三月改元延康冬十月皇帝遜位魏王丕稱天子奉帝為山陽公魏志陳留王延熙二年二月使使者奉皇帝璽綬冊禪位於晉嗣王如漢魏故事宋武帝紀晉琅邪王元熙二年六月禪位於宋改元永初封晉帝為零陵王齊髙帝紀宋順帝升平三年四月帝禪位於齊改元建元封宋帝為汝陰王梁武帝紀齊和帝中興二年四月下詔禪位改元天建封齊帝為巴陵王胸吳志賀齊傳齊曰殿下以神武應期廓開王業漢奴傳王室遂衰戎狄交侵臮古暨字天後漢宦者傳論魏武因之遂遷龜鼎怖老子聖人在下惵惵為天下渾其心注惵惵常恐也後漢寒朗傳贊惵惵楚黎詳梁禪陳詔觀書百姓凛凛若崩厥角書次五曰建用皇極東漢記日角偃月相之極貴晉書載記慕容德額有日角偃月重文洛書黑帝子湯長八尺一寸珠庭宋武帝紀桓𤣥妻劉氏謂𤣥曰劉裕龍行虎步恐必不為人下邑漢書宣帝紀昭帝崩母嗣大將軍霍光請皇后徴昌王賀王受皇帝璽綬光奏王賀淫亂請廢髙后紀立恆山王𢎞為皇帝大臣相與陰謀以為少帝及三弟為王者皆非孝惠子復共誅之尊立文帝賈誼疏冠雖敝不以苴履弗漢書項氏畔換師古曰畔換猶言跋扈也書無逺屆左尚書大傳舜時蛟魚躍踊于其淵遷虞而事夏也以傳申須曰彗所以除舊布新也漢五行志董仲舒為比食又既象陽將絶夷狄主上國之象也氣陳武帝紀侯景登石頭城密謂左右曰此軍中有紫不易可當又帝進軍頓西昌有黃龍見水濱老家語武王克商肅愼氏貢楛矢石砮詳梁禪陳詔子聖人處上而民不重處前而民不害是以天下樂推而不厭者左傳王孫滿曰周卜世三十卜年七百漢劉向疏王必通三統明天命所授者博非獨一姓也南史阮孝緒傳齊為木行陳公九錫文尚書中候王至磻溪之水吕尚釣於崖王下拜尚答曰得玉璜刻曰姬受命吕佐檢德來昌來提撰爾雒鈐報在齊及佐周克殷封於齊曰吳越春秋禹案黃帝中經曰在九疑山東南天柱號委宛其書金簡青玉為字禹乃求之夢赤繡文衣男子自稱𤣥夷蒼水使者候禹令齊三日禹乃得書言治水之要老子侯王得一而天下正于漢書陽九厄曰初入百六陽九岡禹貢至于碣石入海孟子洪水橫流書火炎昆玉石俱焚東漢書注師古曰豕韋國彭姓姬左傳秦伯西戎晉主夏齊王融曲水詩序跨蹍昌漢酷吏傳序網漏於吞舟之魚宙詩內奰于中國覃及鬼方趾晉陸機功臣頌茫茫宇上墋下黷莊子圓臚方南史梁武帝太清三年崩列仙傳軒轅自擇亡日與羣臣辭還葬橋山山崩棺空惟有劒舄在棺焉南史簡文帝大寶二年崩晉書漢主劉聰陷洛陽遷懷帝於平陽太子業即位於長安是為愍帝劉曜陷長安送帝於平陽皆遇害俗華陽國志滇池縣有大澤周回二百里似如倒流故曰滇池山海經桂林有八樹在番禺東隋書熙平郡桂嶺縣注舊曰興安開皇十八年改名恐非使揚雄劇秦美新海水羣飛注喻大亂也淮南子堯羿殺窫窳斷修蛇擒封豨萬民大恱是左傳楚子曰古者明王伐不敬取其鯨鯢而封之於乎有京觀淮南子日曙於蒙谷之浦注蒙谷蒙泛之水也刺南史湘東王繹承制授霸先交州刺史尋改南江州史與王僧辨擊斬侯景褎殷本紀伊尹放太甲於桐宫行漢金日磾傳莽何羅白刃從東廂上見日磾色變觸寶瑟僵日磾捽胡投何羅殿下得擒縛之曰公羊傳中國不絶若綖也戰國策王孫賈入市呼淖齒亂齊國殺湣王欲與我誅之者袒右乃攻淖齒殺之求湣王子法章共立以為齊王保莒城以拒燕軍左傳齊侯使管夷吾平戎於王王以上卿之禮饗管仲元南史西魏遣于謹入江陵執元帝霸先與王僧辨迎帝子方智至建業承制齊遣髙渙送淵明來主梁嗣僧辨納之以方智為太子霸先殺僧辨廢淵明復立方智是為敬帝南史孫冏盧子雄討李賁衆潰而歸武林侯咨誣奏冏等逗留賜死子雄弟子略及杜僧佑周文育等率衆攻廣州參軍陳霸先帥精甲三千擊破之釋僧佑文育為主帥國語吳晉會于黃池吳王赤旗赤羽之矰望之如火白陸機漢髙祖功臣頌胡馬洞開其家語子路曰願得羽若月赤羽若日左傳民逃上曰潰魏王粲從軍詩所從神且武焉得久勞師為南史武帝大同十年李賁自稱越帝置百官以霸先交州司馬與交州刺史楊㬓討賁賁敗奔嘉寧城復率衆出屯典徹湖霸先乘流先進賁衆大潰竄入屈獠洞屈獠斬賁賁兄天寶收餘兵圍愛州霸先討平之陳書武帝紀十一年六月兵至交州賁衆數萬於蘇厯江口立城柵以拒官軍㬓推髙祖為前鋒所向摧陷賁走典徹湖於屈獠界立寨隋書揚州交址郡注舊曰交州九真郡注梁置愛州事漢書南海尉任囂病且死召龍川令趙他行南海尉髙祖定天下遣陸賈立他為南粵王其後他乃自尊號南武帝按陳琳檄吳文跨州連郡有威有名十有餘輩未詳通鑑黃門郎史淑自長安奔涼州稱愍帝出降前一日使淑齎詔賜張實拜涼州牧承制行事先是長安謡曰秦川中血沒腕惟有涼州倚柱觀及漢兵覆關中氐羌掠隴右雍秦之民死者什八九獨涼州安全𣙜曰晉王諒傳初新昌太守梁碩自領交址利晉地理志新昌郡吳置縣宋州郡志越巂太守夷蘇長隋書交址郡領嘉寧左思魏都賦蠻陬落注陬聚也後漢南胸奴傳其大臣貴者左賢王次左谷蠡王次右賢王次右谷蠡王謂之四角次左右日逐王次左右溫禺鞮王次左右斬將王是為六角皆單于子弟次第當為單于者也陸機詩余固水鄉士東方朔神異經南荒之外有火山晝夜火然界廣州記馬援討平交址於嶠南立銅柱以表漢之極晉書交州牧陶璜上言交廣東西數千里不賓屬者六萬餘戶服官役才五千餘家二州脣齒惟兵是鎮後漢竇融傳贊王靈以宣邊王􅋄頭陀寺碑炎區九譯沙場一候注一候者言少患周禮天府掌祖宗之守藏與其禁令劉後漢百官志大鴻臚掌諸侯及四方歸義蠻夷晉琨傳琨枕戈待旦吳越春秋句踐反國飲食必嘗膽軍漢髙帝紀吾以布衣提三尺劒取天下酷吏傳大將光因舉手自撫心曰使我至今病悸淮南子鴻鵠背負青天膺摩赤霄帝陸機辨亡論反帝座於紫闥陳武帝紀侯景寇逼將赴援廣州刺史元景仲陰將圖帝帝與成州刺史王懷明等馳檄以討景仲景仲縊於閣下帝迎蕭勃鎮廣州易西南得朋左傳韓宣子曰同惡相求如市賈焉蚩漢書父老帥子弟殺沛令立髙祖為沛公祠黃帝祭尤於沛庭而釁鼓後漢光武紀光武初騎牛殺新野尉乃得馬置漢書貨殖傳桀黠奴人之所患隋書永安郡注後齊衡州澧陽郡崇義縣注後周置衡州零陵郡營道縣注有九疑山南史臨賀內史歐陽頠監衡州蘭裕蘭京禮扇誘始興等十郡共攻頠霸先救之悉擒裕等仍監始興郡事并厚結豪傑共謀義舉丘遲書魚遊於沸鼎之中漢李陵傳陵曰各鳥獸散猶有得脫歸報天子者左傳晉州綽射殖綽中肩弛弓而自後縛之其右具丙亦舍兵而縛郭最皆襟甲而縛坐於中軍之鼓下養後漢鄭𢎞傳政有仁惠民稱蘇息陳武帝紀蔡路起兵據南康時蕭勃鎮廣州遣心腹談世逺為曲江令與路養相結同遏義軍大寶元年帝發始興次大庾嶺大破路養軍進頓南康帝發南康贛石舊有二十四灘灘多巨石行旅以為難帝之發水暴起數丈三百里間巨石皆沒隋書揚州南康郡雩都縣注舊廢平陳置南康縣注舊曰贑書武成為天下逋逃主萃淵藪後漢公孫瓚傳兵法百樓不攻吾樓櫓千重食此谷足知天下事矣墨子公輸般為雲梯以攻宋墨子解帶為城以牒為械輸般九攻墨子九拒而孫臏傳馬陵道狹而旁多阻隘可伏兵乃斫大樹白書之曰龎涓死於此樹之下龎涓果夜至斫木下齊軍萬弩俱發涓乃自剄曰遂成孺子之名漢書淮南王安使陳喜枚赫作輣車後漢何進傳主簿陳琳曰今將軍龍驤虎步髙下在心此猶鼓洪爐燎毛髮耳陳書武帝紀髙州刺史李遷仕據大臯遣主帥杜平虜帥千人入贛石魚梁又南史李遷仕遣主帥杜平虜將兵逼南康陳霸先遣周文育擊走之據其城遷仕復擊南康霸先遣杜僧明等擒斬之梁蜀志馬騰子超率諸戎以擊隴上郡縣據冀城吏民寬等閉城門乃奔漢中依張魯聞先主圍成都密書請降晉書流民四五萬家一時俱反以醴陵令杜韜為湘州刺史中李康運命論張良受黃石之符誦三略之說注上下三計漢書陳平六出奇計後漢假熲傳張奐又言羌一氣所生不可誅盡山谷廣大不可空靜漢王溫舒傳溫舒為河內太守捕郡中豪猾相連坐千餘家盡十二月郡中無犬吠之盜陳漢書陳勝吳廣聚叢祠中夜搆火狐鳴呼曰大楚興勝王爾雅大波為瀾小波為淪辨左思吳都賦器械兼儲注兼儲蓄積也南史王僧乘勝下湓城霸先引兵三萬人發南康進頓西昌會僧辨於湓城霸先有糧五十萬石分三十萬以資僧辨于慶等皆棄城走詩我庾維億丞孟子簞食壺漿以迎王師北漢書宣帝紀大司農中耿壽昌奏設常平倉以給邊省轉漕溝洫志漕從山東西歲百餘萬石更砥柱之艱敗亡甚多食漢武帝紀舳艫千里注其船多前後相銜不絶又酈其傳夫敖倉天下轉輸久矣臣聞其下藏粟甚多虎吳都賦户有犀渠注盾名詩貝胄朱綅左傳王子盟諸侯於王庭要言曰皆奬王室又師克在和不在衆騎梁元帝𤣥覽賦㳂鵠塞於潯陽漢書沛公從百餘至鴻門謝羽書左傳公子曰所不與舅氏同心者有如白水置後漢銅馬降蕭王輕騎入其營渠帥曰王推赤心人腹中安得不投服乎率南史湘東王命僧辨等東擊侯景舳艫數百里霸先甲士三萬舟艦二千自南江出湓口會僧辨築壇歃血共讀盟文流涕慷慨王漢外戚傳注師古曰扄短關也漢書胸奴有左賢右賢王左傳晉中行穆子敗無終及羣狄於太原為五陳以相離兩於前伍於後専為右角參為左角偏為前拒以誘之木漢鼂錯傳胸奴之革笥木薦弗能支孟康曰木薦以版作如盾漢胸奴傳自君王以下咸被旃裘永司馬相如上林賦他他藉藉填坑滿谷成晉惠帝紀寧元年趙王倫篡位齊王冏起兵討倫都王潁河間王顒常山王乂新野公歆皆舉兵應之倫遣其將孫輔出鄂坂以拒冏左傳西鉏吾曰今將崇諸侯之姦而披其地以塞夷庚注夷庚吳晉往來之道也帥南史侯子鑒據姑孰南洲以拒西師僧辨等至子鑒步騎挑戰又以鵃䑠千艘載戰士僧辨麾細船皆退留大艦夾泊兩岸子鑒之衆謂水軍欲退徑出趨之大艦斷其歸路鼓譟大呼合戰江中子鑒大敗僅以身免湯左傳子犯曰表裏山河必無害也漢蒯通傳金城池不可攻也為西京賦疏龍首以抗殿注龍首山名記過秦論斬華城博物志地有三千六百軸禮軍容不入國吏後漢光武紀司隸官屬衣冠制度皆如舊儀父老舊見之莫不垂涕悲喜左傳白公勝作亂葉公至北門或遇之曰君胡不胄盜賊之矢若傷君是絶是民望也乃胄而進又遇一人曰君胡胄國人若見君面得艾也乃免胄而進之南史景兵敗入柵其將盧暉略以石頭降僧辨入據景與霸先殊死戰衝陳不動景衆大潰餘南史齊將潘樂侵梁圍秦郡霸先與戰破之斬首萬級晉書鮮卑東胡種名齊神武帝紀神武既纍世北邊故習其俗遂同鮮卑人漢書注且渠當戶胸奴官名漢李廣傳上使中貴從廣服䖍曰內臣之貴幸者魏志梁習傳名王稽顙奏左傳司馬侯曰冀之北土馬之所生晉劉琨傳中夜胡笳賊皆流涕左傳逢丑父與公易位將及華泉驂絓於木而止衛左傳戰於韓原晉戎馬還濘而止左傳襄十四年孫林父寧殖出其君衎二十六年寧喜弒其君剽潜左傳疆場無主則啓戎心南史廣陵喬人朱盛等聚黨謀襲殺齊刺史溫仲雍遣使求援霸先因進軍圍廣陵齊主來告曰請釋廣陵之圍必歸廣陵厯陽兩城霸先引兵還京口江北之民從之濟江者萬餘口地孫盛晉陽秋秦始皇時望氣者言五百年後金陵之有天子氣於是改金陵曰秣陵王晉書諸葛亮造八陳圖尺左傳齊惠欒髙之難公使黑以靈姑銔率請斷三焉而用之廣左傳乘丘之役公以金僕姑射南宫長萬人漢書李曰吾為隴西守羌常反吾誘降者八百餘詐而同日殺之克南史譙秦刺史徐嗣徽南豫州刺史任約襲建康不入於石頭以叛十一月齊遣兵援之霸先及齊人戰敗之嗣徽約奔齊鄉說苑談叢篇梟逢鳩梟曰我將東徙鳩曰何故梟曰人皆惡我鳴以故東徙鳩曰子能更鳴可矣不能更鳴東徙猶惡子聲野左傳富辰曰狄固貪婪左傳楚子文曰諺曰狼子心蕭漢西域傳公主歌曰穹廬為室兮旃為牆得漢髙帝紀何治未央宫立東闕北闕前殿漢書帝烏孫馬好名曰天馬京晉書周訪討杜曽使李恆督左甄許朝督右甄東賦鸛鶴魚麗箕張翼舒爾雅彗星為欃槍門詩薄伐獫狁衛左傳獲長狄僑如埋其首於子駒之漢書李陵律皆胡服椎結白起傳趙括軍敗卒四十萬人降起乃挾詐盡坑殺之足漢髙帝紀羽敗漢兵濉水上水為之不流易鼎折左傳公尹路請曰君王命剝圭以為鏚柲敢請命止詩鉦人伐鼓說文云鉦鐃名似鈴柄中上下通所以鼓魏略王凌自知罪重試索棺釘以觀太傅意太傅給之遂自殺左傳許男面縳銜璧大夫衰絰士輿櫬楚子焚其櫬禮而命之者後漢光武紀誅王郎收文書得吏人與郎交關謗毀數千章光武燒之曰令反側子自安南史前青州刺史程靈洗率兵救僧辨力戰軍敗久之乃降霸先義之左傳隱公四年衆仲曰州吁阻兵而安忍揚左傳子桑曰史佚有言曰無始禍無怙亂無重怒子洪荒之世詳梁禪陳文左傳吕相絶秦曰䖍劉我邊陲後南史霸先吳興長城下若里人自云漢太丘長實之左思蜀都賦揚雄含章而挺生詩維桑與梓必恭敬止龕尚書元惡大憝先老子治大國如烹小鮮南史杜據吳興以叛霸表自東討仍還都命周文育進討龕龕以城降誅之牛後漢光武紀五校賊帥髙扈袁紹傳紹擊賊劉石青角黃龍左校郭大賢李大目于氐根等山魏陳琳檄吳文七國之兵瓦解冰泮水經注會稽東有硎去禹廟七里深不見底謂之禹井以劉獻定軍禮吳王夫差啓蛇門以厭越人越為雷門禳之擊大鼓於雷門之下而蛇門聞焉霸南史東揚州刺史張彪圍臨海太守王懷振於剡巖先遣兄子蒨周文育襲㑹稽討彪若邪村人斬彪傳首建業應漢吳王濞傳以袁盎為泰常使吳王聞袁盎來笑而曰我已為東帝尚誰拜晏子春秋不出尊俎之間折衝千里之外漢寇恂賈復光武功臣樊噲滕公夏侯嬰髙帝功臣書武帝有下瀨將軍說文揃搣也書盤庚其猶可撲滅交周禮甸師王之同姓有罪則死刑焉後漢馬援傳址女子徵則徴二反拜援為伏波將軍大破之封新息侯為南史蕭勃起兵於廣州遣歐陽頠及其將傅秦蕭孜前軍南江州刺史余孝頃以兵會之霸先命周文育由間道兼行據頠及孜泰孝頃之間築城饗士頠等大駭文育遣周鐵虎等襲頠擒之文育盛陳兵甲與頠乘舟而宴巡跖口城下使其徒丁法洪攻泰擒之孜孝頃退走勃軍聞之恟懼遂殺勃叔隋書揚州豫章郡豫章縣注舊置豫章郡左傳太完聚繕甲兵隋書揚州南海郡注舊置廣州梁陳並置督府波漢書武帝時南粵相吕嘉反秋命衛尉路博德為伏將軍討之得嘉為臨蔡侯又吳王濞兵敗亡走東越東越鏦殺吳王盛其頭馳傳以聞魏文帝紀帝聞備兵東下與權交戰樹柵連營七百餘里謂羣臣曰豈有七百里營可以拒敵者乎孫權上事今至矣後七日破備書到南史周文育送頠等於建康霸先釋而厚待之孜孝頃猶據石頭多設船艦夾水而陳霸先遣侯安都助文育擊之安都潛師燒其船艦水陸攻之孜出降孝頃逃歸霸先以頠聲著南土復以為衡州刺史使討嶺南未至其子紇已克始興頠至諸郡皆降遂克廣州外淮南子九州之外有八埏八埏之外有八紘八紘之有八極鮑昭蕪城賦出入三代五百餘載竟瓜剖而豆分人魏志注令曰設使國家無有孤不知當幾人稱帝幾稱王魏略王凌面縛水次曰卿特折簡召我我何敢不至而乃引兵來乎司馬宣王曰以卿非折簡可呼故也晉陽秋劉𢎞為荆州刺史咸曰得劉公一紙書賢於十部從事也治淮南子日出於陽谷浴於咸池西域傳無雷國王盧城去長安九千九百五十里民淮南子凡海外三十六國自西北至西南方有女子丈夫民山海經丈夫國在維鳥北其為人衣冠帶劒南史齊永元元年扶桑國有沙門慧深來云扶桑東千餘里有女國二三月競入水則任娠六七月産子女人胸前無乳頂後生毛根白毛中有汁以乳子百日能行三四年則成人漢司馬相如傳胸奴單于悕駭屈膝受之交臂請和穆天子傳乃膜拜而受注今之胡人禮佛舉手加額稱南膜者即此也朝漢書宣帝甘露二年胸奴呼韓邪款五原塞願奉國珍南史敬帝太平二年領軍將軍徐度燒齊船舶三千艘夏四月齊遣使通和數漢張良傳沛公入秦宫殿帷帳狗馬重寶婦女以千欲留居之晉王延壽魯靈光殿賦序靈光巋然獨存悝趙世家武靈王召樓緩謀曰吾欲胡服莊子趙太子謂莊周曰吾主所見劒士皆縵胡之纓子漢王莽傳莽好厚履髙冠以氂裝衣尚書大傳微朝周過殷故墟見麥秀之蔪蔪兮禾黍之蠅蠅也曰此故父母之國乃為麥秀之歌橫詩彼黍離離南史侯景東奔王克開臺城門引裴之入宫是夜遺燼燒太極殿及東西堂延閣祕署皆盡羽儀輦輅莫有孑遺書太甲先王昧爽丕顯坐以待旦淮南子日經於泉隅是謂髙舂書無逸文王自朝至于日中昃不遑暇食用咸和萬民漢鄒陽傳孝文皇帝據關入立寒心銷志不明求衣太泰始晉武帝年號永平後漢明帝年號南史敬帝平元年起雲龍神武門二年繕廟堂供備祀典不漢王吉傳驅一世之民躋之仁壽之域老子上德德是以有德詩敦彼行葦牛羊勿踐履盬蔡雍獨斷黃帝樂曰雲門堯樂曰咸池漢書猗頓用鹽起與王者埒富揚雄太𤣥紫霓矞雲曰晉張華傳妙達象緯海左傳楚子使與師言管仲對賜我先君履東至於西至於河南至於穆陵北至於無棣又吳公子札來聘為之歌齊曰美哉泱泱乎大風也哉表東海者其太公乎又衆仲曰胙之土而命之氏又子犯曰求諸侯莫如勤王又展喜對曰昔周公太公股肱周室夾輔成王詩王命召虎式辟四方三皇本紀女媧鍊五色石以補天斷鼇足以立四極聚蘆灰以止滔水淮南子禹鑿龍門平水土民乃得而陸處傳後漢謝弼傳爵賞之設必酬庸勳淮後漢章帝八王仰恃明主垂拱受成隋書揚州南郡注舊曰豫州梁曰南豫州廬江郡注梁置南豫州宣城郡注舊置南豫州淮南郡安豐縣注梁置陳留安豐二郡丹陽郡江寧縣注梁置丹陽郡及南丹陽郡陳省南丹陽郡宣城郡宣城縣注舊曰宛陵置宣城郡丹陽郡注自東晉已後置宋曰揚州吳郡烏程縣注舊置吳興郡會稽郡注梁置東揚州陳初省遂安郡雉山縣注舊置新安郡信都郡新興縣注梁置新州新寧郡宋書州郡志晉安帝始分淮北為北徐淮南猶為徐州後又以幽冀合徐青并合兖武帝永初二年加徐州為南徐而淮北但曰徐文帝元嘉八年更以江北為南兖州江南為南徐州治京口割揚州之晉陵兖州之九郡僑在江南者屬焉故南徐州備有徐兖幽冀青并揚七州郡邑隋書荆州九江郡注舊置江州揚州鄱陽郡鄱陽縣注舊置鄱陽郡臨川郡臨川縣注舊置臨川郡漢齊懷王傳小子閎受兹青社張宴曰王者以五色土為大社封四方諸侯各以其方色土與之苴以白茅歸以立社燕世家成王時召公為三公自陜以西召公奭主之自陜以東周公旦主之左傳鄭武公莊公為平王卿士桓公曰我周之東遷晉鄭焉依入南史王瑒字子瑛梁元帝時位太子中庶子陳武帝輔以為司徒左長史漢文帝紀與郡守為銅虎符竹使符應邵曰銅虎符第一至第五國家當發兵遣使者至郡合符符合乃聽受之竹使符者以竹箭五枚長五寸鐫刻篆書第一至第十管子禮義廉耻國之四維周禮天官冢宰以八柄詔王馭羣臣之漢王莽傳鸞路乘馬戎路乘馬注師古曰鸞路路車施鸞者也四馬曰乘戎路戎車也漢王莽傳衮冕衣裳句履注孟康曰今齊祀履舄頭飾也出履二寸漢丙吉傳吉曰三公調和陰陽文選潘勗魏公九錫文注軒縣諸侯樂也象左傳隱公始用六佾周禮鞮鞻氏掌四夷之樂又胥氏掌蠻夷閩貉戎狄之國故漢王莽傳朱戶納陛注師古曰尊者不欲露而升陛納之於霤下也文選注朱户天子禮也史記蔡澤傳不出廊廟典書光被四表文選注虎賁言其猛也皆百夫長堯象恭滔天左傳無或如臧孫紇干國之紀屬漢王莽傳左建朱鉞右建金戚注師古曰鉞戚皆斧漢王莽傳彤弓矢盧弓矢注師古曰彤赤色盧黑色玈音盧君孝經夫孝天之經也地之義也祭義春雨露既濡子履之必有怵惕之心如將見之詳封始興王詔卣漢王莽傳秬鬯二卣圭瓚二注師古曰秬鬯香酒也中尊也以圭為勺末書說命格于皇天陳武帝下州郡璽書詩天降喪亂書晉佛圖澄傳劉載已死載從弟曜篡襲僞位後漢獻帝興平二年三月李傕脅帝幸其營焚宫室郭泛李傕矢及御前明年正月改元建安於晉書懷帝永嘉五年劉聰使呼延晏等陷洛陽遷帝平陽遇害祀周本紀命南宫括史佚展九鼎寶玉次周禮冬日至天於圓丘晉王濟傳設宿部分行有第陳武帝紀永定元年冬十月乙亥皇帝即位於南郊柴燎告天先是氛霧雨雪晝夜晦冥至是日景氣清晏管子盛魄重輪六合俱照非日月能乎吕氏春秋水之美者有三危之露漢書太初厯晦朔弦望皆最密日月如合璧詳梁禪陳詔盜取人於萑蒲之澤左傳鄭國多書戎商必克梁禪陳璽書書萬邦黎獻共惟帝臣牛未詳按帝王世紀黃帝於東海流波山得竒獸狀如蒼身無角能走出入水則風雨目光如日月其音如雷黃帝殺之以其皮為鼓聞五百里神異經窮奇鋸牙鉤爪遇忠信之人則噬而食之有魏略侍中陳羣尚書桓階奏曰尺土一民皆非漢佐助期漢以蒙孫亡說者以蒙孫漢二十四帝童蒙昏愚以弱亡東髙士傳舜以天下讓支伯支伯遂不知所之張衡京賦髙祖膺籙受圖左傳僖公二十五年秋秦晉遷陸渾之戎於伊川書三傳晉伐驪戎注杜預曰驪戎在京兆新豐縣漢中山王勝對曰文王拘於牖里煒張衡東京賦治致升平之德漢王莽傳䇿羣司曰赤頌平考聲以律詩零露瀼瀼論衡甘露味如蜜王者太平之應有左傳楚子革曰昔穆王欲肆其心周行天下皆將必車轍馬迹焉史記顓頊紀北至幽陵南至交址西至流沙東至蟠木動靜之物小大之神莫不砥屬後漢光武紀同舍生彊華奉赤伏符至日劉秀發兵捕不道魏志太祖武皇帝沛國譙人諱操字孟德初桓帝時有黃星見於楚宋之分遼東殷馗善天文言後五十年當有真人起於梁沛之間至是而公始起孝經援神契孔子海口含海劉峻辨命論河目龜文公侯之相十屈原離騷攝提貞於孟陬注攝提星名隨斗柄以指二辰者也正月為陬天官書項羽拔巨鹿枉矢西流天狼下有四星曰弧合誠圖曰弧主司兵兵弩象也淮南子本經訓夷羊在牧注許慎曰夷羊土神商之將亡見於商郊牧野之地詔孝經援神契德至淵泉則黃龍見袁宏漢紀獻帝曰炎精之數既終行運在乎曹氏魏通考自魏以後始有九品之制以辨官位之髙卑北以九品分正從梁分十八班諸亭侯十班詳九錫文徐孝穆集箋注卷六備考
