body:
  text: 徐孝穆集箋注卷二陳徐陵撰吳江吳兆宜注書為貞陽侯與太尉王僧辨書梁宗室傳蕭明字靖通長沙王懿之子也封貞陽侯王僧辨納之改承聖四年為天成元年及陳霸先殺僧辨復奉晉安王以明為太傅明年齊人徴明霸先遣使送明疽發背死後齊文宣遣兵納永嘉王莊主梁祀追諡明曰閔皇帝南史王僧辨字君才承聖三年二月詔以僧辨為太尉車騎大將軍昔自天狼炳曜非無戰陳之風參虎揚芒便有干戈之務天官書參為白虎三星直者是為衡石下有三星兌曰罰為斬艾事其東有大星曰狼狼角變色多盜賊至於夏鍾夷羿左傳魏莊子曰昔有夏之衰也后羿自鉏遷於窮石因夏人而代夏政周厄犬戎周本紀申侯與繪西夷犬戎攻幽王殺之驪山下索隱曰在新豐縣南故驪戎國也漢委珠囊初學記鄭玄注日月遺其珠囊云珠謂五星遺其珠囊者日月失度也秦亡寶鏡尚書考靈耀秦失金鏡鄭玄注金鏡喻明道也彰於史籍可得而聞未有國家殲危遂若當今者也我大梁膺龍圖而受命帝王世紀神農本起烈山故曰烈山氐一曰厲山氏黃帝代之於時河出龍圖御鳳邸以承天見勸進表軒頊比於諸侯五帝本紀黃帝居軒轅之丘而娶於西陵之女是為嫘祖嫘祖為黃帝正妃生二子其後皆有天下其一曰玄囂是為青陽降居江水其二曰昌意降居若水注索隱曰降下也言帝子為諸侯湯武方於兒戲漢書文帝曰向者霸上棘門如兒戲耳三光有乂見勸進表四海無波韓詩外傳成王時有越裳氏重三譯而朝曰天之不迅風雨海之不波溢也三年於兹矣意者中國有聖人乎盍往朝之靈貺咸臻後漢光武贊靈貺自甄表裏禔福顔延年詩序上膺萬壽下禔百福非日非月蒼生仰其照臨詩日居月諸照臨下土如雲如雨天下蒙其恩蔭易雲行雨施天下平也而屯亨有數易屯剛柔始交而難生剝極為災後漢董卓傳贊過剝成災梟獍豺狼晉崔懿之傳懿之謂靳準曰汝心如梟獍必為國患後漢書張綱遷侍御史埋車輪於洛陽都亭曰豺狼當道安問狐貍遂奏大將軍梁冀兄弟罪惡京師震悚肆逞凶逆後主誕資上聖光啓中興大翦仇讎左傳今令尹不尋諸仇讎方平宗社謂元帝滅侯景雖復瀟湘舉斧梁元帝集敕王僧辨曰黑泰違盟忽便舉斧部樹穀曰南史王琳為湘州自疑及禍使長史陸納率曲赴州身詣江陵王下琳吏納據湘州以叛王僧辨蕭循等討平之庸蜀彎弓漢胸奴傳士能彎弓炯曰南史武陵王紀武帝第八子也大寶二年僭號於蜀率衆東下王僧辨陸法和等討平之凡厥凶徒誰不殲撲豈圖天未悔禍喪亂薦臻羌虜無厭乘此多難虔劉我南國蕩覆我西京謂于謹陷江陵奉聞驚號肝膽崩潰雖復金行版蕩火政淪亡見勸進表緑林青犢之羣後漢書王莽末新市人王匡王鳳及馬武王常成丹等起兵藏於緑林山中又鄧禹説大司馬曰今山東未安赤眉青犢之屬動以萬數黑山白馬之卒魏志張燕慓悍捷速過人軍中號為飛燕衆至百萬號曰黑山英雄記公孫瓚每聞邊警輒厲色作氣常乘白馬又選數十白馬為騎射之士號曰白馬義從胡人甚畏之相告曰避白馬長史八王故事曾未混殽八王故事書名也紀載晉事按晉書司馬氏骨肉相殘政亂朝危如汝南王亮楚王瑋趙王倫齊王坰長沙王乂成都王穎河間王顒東海王越九州春秋誰云禍亂司馬彪作九州春秋紀漢末事昔隆周徙播皆憑晉鄭之功左傳周之東遷晉鄭焉依強漢阽危終假虛牟之力漢髙五王傳朱虛侯章東牟侯興居欲從中與大臣為內應誅諸吕今者武皇之子無復一人藐是孤孫北史于謹傳初梁元帝於江陵嗣位其兄子嶽陽王察時為雍州刺史以梁元帝殺其兄譽遂結隙據襄陽來附乃命謹出討還同三叛周本紀周公當國管叔蔡叔羣弟疑周公與武庚作亂畔周等子頽而為暴左傳衛師燕師伐周立子頽鄭伯遂以王歸處於櫟鄭伯將王自圉門入虢叔自北門入殺王子頽遂納王同劉芳而入關漢紀劉芳安定三川人本姓盧王莽末天下咸思漢芳由是詐自稱武帝後變姓名為劉文伯後與三川屬國羌胡起兵北邊乞命諸戎勢何支久孤宗室之長爰自布衣南史宣武王懿東昏賜藥與弟融俱殞又宣武之難業與二弟俱逃匿免皇運之初彌承天德何則據鞍輟哭雖紹霸圖吳書孫䇿為許貢客所害權悲號未見事張昭曰孝廉此寧哭時邪乃易權服扶上馬使出巡軍按䇿追諡長沙桓王獨居掩涕終討家怨後漢書光武長兄縯字伯升為更始所害光武自縯死每獨居輒不御酒肉枕席有涕泣處孤二三昆季按南史懿長子業字靜曠業弟藻字靖藝藻弟猷猷弟朗字靖徹朗弟明也方矢戴天禮記父之讎弗與共戴天被此恩慈如何酬答所以徐彭之役不吝輕軀梁蕭淵明傳武帝既納侯景大舉北侵詔督諸軍趣彭城淵明師次吕梁十八里作寒山堰以灌彭城水及於堞不沒者三版哀荷之誠久聞朝聽南史魏人求和親以貞陽侯換侯景況復邦家不造見勸進表至此橫流孟子當堯之時天下猶未平洪水橫流詳卷四宗社無依何所逃責班固諸侯王表有逃責之臺被竊鈇之言然天下謂之共主強大弗之敢傾因以提戈負劒晉中興書桓溫父被害溫枕戈泣血經年乃提刀直進手刃仇人刺客傳王負劒卧泣行號説文泣無聲出涕也左傳號而出之注號哭也言念荆巫張載詩西瞻岷山嶺嵯峨似荆巫志雪讎恥史記自序為弱燕報強齊之讐雪其先君之恥大齊觀書有洛輯瑞榮河尚書中候成王觀於洛河沈璧禮畢王退俟至於日昧榮光並出休氣塞河青雲浮洛青龍臨壇銜圓甲之圖吐之而出功格蒼旻德滿天地慈孝之道通於百靈抱朴子黃帝役使百靈仁信之風覃於萬國易萬國咸寧是以日月所照舟車所通見中庸候海水以來賓注見上瞻蒼雲以奉貢十洲記天漢三年月氐獻神香使者曰國有常占東風入律百旬不休青雲干吕連月不散意中國有好道君故搜竒異而獻神香自昔軒農炎昊曾無宣國之規虞夏商周非有伐戎之略豈知華夷仰德逺近同心穀價無堯湯之憂漢鼂錯論貴粟堯禹有九年之水湯有七年之旱糧儲同水火之賤孟子聖人治天下使有菽粟如水火精兵利器勢勇雷霆漢英布傳布兵精甚别樹敏曰後漢虞詡傳不遇盤根錯節無以利器詩如霆如雷天馬龍媒量比山谷漢禮樂志天馬徠龍之媒戎樹聲曰貨殖傳烏氏求竒繒物間獻王戎王豫畜畜至用谷量牛馬斯固開闢以來未之有也至於親鄰之道夙契逾深無改曩懷增感彌篤以為興亡繼絶見論語事炳前經推擇庸虛命守宗祀方欲仰憑神武清我寇讎旨喻難違諸懷更恧明公誕膺時運光贊本朝勒瑞薑璜尚書中候王至磻溪之水吕尚釣于崖王下拜尚答曰得玉璜刻曰姬受命吕佐檢德來昌來提撰爾雒鈐報在齊及佐周克殷封于齊書名何鼎梁虞荔鼎銘蕭何為丞相鑄一鼎自表其功其文曰紀功鼎故以通期管樂蜀志諸葛亮琅邪人躬耕南陽自比管仲樂毅好為梁父吟先主凡三顧乃見先主曰孤之有孔明猶魚之有水冥契風雲世説支道林喪法虔之後謂人曰冥契既逝兆宫曰魏吳質箋臣幸得值風雲之會戮不世之渠凶殲滔天之巨冦堯典共工象恭滔天重以三湘放命寰宇記湘潭湘鄉湘源是為三湘書鯀方命圯族七國連從見勸進表征旅東西必翦妖逆雖復棧道木閣田單之奉舊齊戰國策貂勃謂齊王曰棧道木閣而迎王與后於城陽今國已定民已安矣王乃曰單單且嬰兒之計不為此綰璽將兵周勃之扶隆漢漢書薄太后謂文帝曰絳侯始誅諸吕綰皇帝璽將北軍中宗佐命俱畫丹青漢書宣帝以戎狄賓服思股肱之美乃圖畫其人於麒麟閣霍光至蘇武凡十一人光武功臣皆懸星象後漢書明帝思中興功臣乃圖二十八將於南宫雲臺范曄論前世以為上應二十八宿非貔非虎之封書尚桓桓如虎如貔如熊如羆于商郊同心同德之勞書豫有臣三千同心同德校彼功庸曾何髣佛但與存與亡期於體國書仲虺之誥推亡固存邦乃其昌喪君有君寧庸無主左傳吕甥曰征繕以輔孺子諸侯聞之喪君有君夙承所立猶則孱蒙天步方難詩天步艱難寧可𢎞濟自淹留大國志荷恩私朝夕宫闈預奉顏色黃河白日亟亶誠言左傳晉公子曰所不與舅氏同心者有如白水投其璧於河又殖綽顧曰為私誓州綽曰有如日分災恤患事非虛旨左傳凡諸侯救患分災討罪禮也但善相小國終資大賢左傳君子謂合左師善守先代子産善相小國定我邦家繄公是賴淮流不竭豈獨琅邪晉書淮發源屈曲不類人工王導使郭璞筮之曰淮水絶王氏滅望能喻此衷懷思之無忽近陸居士有啓陳其禍亂北史陸法和傳法和不稱臣其啓文朱印名上自稱居士初仕梁元帝江陵陷入齊朝旨即命河東疑作清河按齊書清河王嶽字洪略髙祖從父弟也太昌初封清河郡公天保初進封清河郡王王嶽等勒率熊羆便相抵赴道阻且長見詩雖無之及所聞西浮夏首楚辭哀郢過夏首而西浮便當險隘之衝南扞巴陵方拒窺窬之寇魏書公孫淵上書曰方今二敵窺窬上黨王皇齊寵弟是號宗英漢書序傳禮樂是修為漢宗英親御戎軒逺於將送詩逺于將之北史齊文宣帝紀天寶六年春清河王嶽度江克夏首梁司徒郢州刺史陸法和請降詔以貞陽侯蕭明為梁主遣尚書右僕射上黨王渙送之江南尚玠曰齊神武諸子傳上黨剛肅王渙字敬夀神武第七子也力能扛鼎材武絶倫讀書頗知梗槩而不甚耽習隋書冀州上黨郡上黨縣注舊置上黨郡裴侍中英起淮南貴族兼事戎行躍冀馬者千羣後漢劉表傳冀馬雲屯披燕犀者萬隊來自河陽曾不旬日持節徐武潼三州諸軍事散騎常侍明逺將軍東徐州刺史始興郡開國侯湛海珍等梁書武帝紀太清三年東徐州刺史湛海珍舉州附於魏隋書徐州彭城郡注舊置徐州下邳郡夏丘縣注後齊置并置夏丘郡尋立潼州下邳郡下邳縣注舊曰歸政置武州下邳郡梁改縣為下邳置郡不改改州曰東徐並前朝舊將夙著勳庸推轂海邊漢馮唐傳上古王者遣將也跪而推轂屬是喪亂詩天降喪亂雖復投身有道志雪朝怨咸預戎行共指鄉國江淮舊𨽻悉已招攜左傳管仲曰招攜以禮方稟英謨共翦讐難去月將晦便屆壽春隋書揚州淮南郡領壽春縣巳具舟師將臨江浦使人入境行陳所懷撥日覘光未詳遲在還牘當使宗祊有主余同小白之勳左傳宋司馬子魚曰齊桓公存三亡國以屬諸侯家國無虞公保阿衡之貴詩商頌實維阿衡實左右商王何其美也豈不休哉言念此私但以號咽為貞陽侯答王太尉書薑常侍皓至復枉去月三十日告具公所懷良以慨息孤雖庸薄不及通賢猶曰生民寧無心識自皇家禍亂亟積寒暄九州萬國之人蟠木流沙之地史記顓頊紀西至於流沙東至於蟠木動靜之物大小之神日月所照莫不砥厲莫不行號卧泣想望休平何況乎孤預在宗室家荷報雪之恩身蒙鞠養之愛者先皇之慈也南史武帝兄長沙宣武王懿為東昏所殺信至武帝便舉義兵史臣曰梁武帝時逢昏虐家遭冤禍既地居勢勝乘機而作蒸嘗不絶於私廟詩顧豫蒸嘗子弟得嗣於南藩者後主之惠也南史蕭韶傳韶字德茂懿之孫也初封上甲某都鄉侯湘東王改韶繼宣武王封長沙王遂至郢州刺史朱方之地漢地理志會稽郡丹徒縣注師古曰即春秋云朱方也建業之都宋州郡志晉武帝太康二年丹陽移治建業誰家丘陵誰家宫廟豈有為人臣子荷此恩靈親執干戈自殉家國檀弓戰于郎公孫禺人與其鄰重汪踦往皆死焉魯人欲勿殤重汪踦仲尼曰能執干戈以衛社稷雖欲勿殤也不亦可乎公之忠孝信感人神公之盟誓事同懸象繫辭懸象著明莫大乎日月雖復宗盟不造左傳周之宗盟異姓為後骨肉為讎安可相期盡如蕭察邪梁元帝紀雍州刺史嶽陽王察自稱梁王藩於魏二年九月魏使柱國萬紐于謹來攻十月魏軍至襄陽梁王察陷帝被執如察營甚見詰辱十二月辛衆會之城魏人戕帝古者天子六軍是為萬乘今日凶荒致闕斯禮偏裨將校尚握精兵州郡官曹各有交吏未有居稱扆座明堂位天子負斧依南向而立行曰乘輿後漢輿服志殷瑞山車金根之色漢乘秦制御為乘輿所謂孔子乘殷之輅者也遂無五尺之童孟子雖使五尺之童適市髙謝千夫之長書千夫長於公明允舜典惟明克允意復云何國家凋荒既乏屯衛皇齊與睦幸惠優矜何乃自起趦趄易其行次且茍違鄰德克戡禍亂欲立功名咸自軍師豈在芻𨽻湛海珍等前朝舊將差匪齊人分給羸兵即是梁甲非云背信左傳慶鄭曰棄信背鄰患孰恤之豈曰渝盟左傳公及鄭伯盟曰渝盟無享國朝野羣雄何所攜二且公天資命世再造皇家梁代之桓文蕭宗之伊管誰其逺近不稟英謨如有姦回正速齊斧見移文尚何憂于共工疑作歡兜何畏于有苗哉見皋陶謨所覽來書既為疑難上黨王恭承朝旨不敢相同方篤鄰和不容全異如須減損更遲行人張廷尉種等所具見讓表此無多及為貞陽侯重與王太尉書席威卿等還枉此月十四日告披覽未周良深慨息昔長平建䇿猶聞蝕昴之徵漢鄒陽傳注蘇林曰白起為秦伐趙破長平軍欲遂滅趙遣衛先生説昭王益兵糧為應侯所害事用不成其精誠上達於天故太白為之蝕昴疏勒效忠時致飛泉之感後漢耿恭傳恭以疏勒城傍有澗水可固五月乃引兵據之於城中穿井十五丈不得泉乃整衣冠再拜為吏士禱有頃水泉奔出豈在余涼德左傳史嚚曰虢多涼德書不盡言見繫辭遂使吾賢猶迷所執斯故銜哀掩淚仍復披陳者也孤以庸薄寧有霸圖侯服于周見詩常懼盈滿易人道惡盈而好謙書滿招損謙受益豈望身居黃屋班固典引子嬰度次得嗣冠玉冠佩華紱車黃屋蔡雍曰黃屋者天子車翠羽蓋以黃繒為裹是為黃屋手御青綸後漢輿服志百石青紺綸一采宛轉繆織長丈二尺揖讓而對三靈見勸進表端委而朝百辟左傳子貢曰泰伯端委以治詢知圉牧莫不皆知左傳芋尹無宇辭曰王臣公公臣大夫大夫臣士士臣皂皂臣輿輿臣隸𨽻臣僚僚臣僕僕臣臺馬有圉牛有牧以待百事爰誓神明固自無爽左傳公孫舍之曰昭大神要言焉若可改也大國亦可叛也但大齊仁信之道關於至誠睦鄰之懷由於孝德遂蒙殊奬歸嗣本朝拜首陳辭敦誘彌廣既而仇讐未殄見前書方憑大國之威宗祏阽危左傳原繁對曰命我先人典司宗祏尤仰親仁之德左傳五父諌曰親仁善鄰國之寶也僶俯恩寄號靦惟深而敕諭分明信誓殊重詩信誓旦旦乃云邦家有乂社稷無虞凡廣陵歷陽隋書揚州江都郡江陽縣注舊曰廣陵後齊置廣陵江陽二郡歷陽郡歷陽縣注舊置歷陽郡皆許見還白水黃河屢奉然諾漢書廷尉以貫髙辭聞泄公曰此固趙國立名義不侵為然諾者也詳與王僧辨書至於夏藩衝要控遏上流且命強兵為我臨據若其自有精甲能扞醜徒並用還梁皆如前旨以孤頻經忝竊屢守淮淝門生故吏遍於江右後漢袁紹傳袁氏樹恩四世門生故吏遍於天下凡諸部曲並使招攜漢書音義大將行有五部部有曲也投赴戎行陸機辨亡論拔吕蒙於戎行前後雲集霜戈雪戟左思吳都賦霜刃染無非武庫之兵洛陽記建始殿東有太倉倉東有武庫藏兵之所龍甲犀渠古詩解佩襲犀渠皆是雲臺之仗晉書武帝太元八年翟斌克雲臺戍收萬餘人甲仗文物以紀之聲名以發之見左傳斯實不世之隆恩寧曰循常之恆禮則公固天所授𢎞濟本朝曲阜同功營丘等烈史記成王封師尚父於齊營丘封周公旦於魯曲阜若夫伊尹庖厨賤宰殷本紀伊尹負鼎爼以滋味説湯致於王道霍光階闥小臣漢霍光傳贊霍光起結􅀢內侍起於階闥之間諸葛亮無應變之才蜀諸葛亮傳陳壽評曰應變將略非其所長管夷吾非王者之佐論語管仲之器小哉論其世業較彼勤勞書契以來罕有明德且程嬰之義自古為難史記晉程嬰抱趙氏孤匿山中十五年韓厥言於晉景復立趙氏後是為趙武武既冠嬰曰下宫之難我非不能死欲存趙後也今宜下報宣孟杵臼遂自殺荀息之忠良以喜慰左傳晉獻公使荀息傅奚齊公疾召之稽首而對曰臣竭其股肱之力加之以忠貞其濟君之靈也不濟則以死繼之但先朝乘玉鏡之符尚書帝命期桀失玉鏡用其噬獸注玉鏡喻清明之道御金輪之寶法華經優曇華鉢名瑞應三千年一現現則金輪王出菩薩之化行於十方樓炭經有十品菩薩仁壽之功霑於萬國漢王吉傳驅一世之民躋之仁夀之域凶人侯景遂亂邦家何況於今亦有吳會江東如掌差匪虛言後漢岑彭傳辛臣諌田戎曰洛陽地如掌耳不如按甲以觀其變淮陽在面方此非局漢賈誼傳淮陽之比大諸侯厪如黑子之著面不稼不穡見詩多歷嵗時大東小東全無機杼詩小東大東杼軸其空關中醜虜寧非冒頓之鋒漢書胸奴單于有太子名冒頓作鳴鏑習勒其射騎而令之曰鳴鏑所射而不悉射者斬齊國強兵便是軒轅之陳史記五帝本紀軒轅氏教熊羆貔貅貙虎以與炎帝戰於阪泉之野三戰然後得志西南當扼喉之勢東北承撫背之機漢書婁敬傳敬説曰夫秦地披山帶河所謂扼天下之亢而撫其背也首尾交侵華夷俱騁而中人數歲復子方賒書洛誥周公拜手稽首曰朕復子明辟德未感於黎蒸威不加於將帥斯等鞅鞅非少主臣漢書景帝目送周亞夫曰此鞅鞅非少主臣也安有碌碌因人成事見表後啓公之才具晉書髙嵩時謝萬方卧在室嵩為敘刑政之要萬起呼嵩小字曰阿酃有才具雖復明允勢何如於天監時何若於大同俱梁武帝年號乘與國之隆恩孟子我能為君約與國當滔天之猛冦見前書匡救之德翻有未從忠許之謀誰其相曉卧薪待火方此弗危賈誼傳譬猶厝火置之積薪而寢其上繫草從風儔之非切書君陳爾惟風下民惟草若能思其上策審此英圖見引軨獵之車漢霍光傳太僕以軨獵車迎曽孫就齋宗正府入未央宫見皇太后封為陽武侯已而光奉上皇帝璽綬謁於髙廟是為孝宣皇帝還向長安之邸見勸進表一則二則惟在大賢吳張昭傳䇿笑曰昔管子相齊一則仲父二則仲父而桓公為霸者宗外相內相未詳終當相屈正當攜諸舊𨽻率我賓遊朝服簪纓直拜園寢梁人望國俱登赤馬之舟漢劉熙釋名輕疾者曰赤馬舟其體正直赤如馬也齊帥臨江仍轉蒼龍之斾考工記龍旗九斿以象大火鳥旟七斿以象鶉火大火蒼龍宿之心鶉火朱鳥宿之柳分袂南浦江淹别賦送君南浦傷如之何揚鞭北風民不疲勞軍無怨讟見左傳如其執事尚秉前言將恐戎旄便濟江表何則西浮夏首水經夏水在江夏西冬竭夏流故名夏水詳與王僧辨書已據咽喉東進彭波禹貢東匯澤為彭蠡次指心腹廣陵京口𤇺煙相望魯柝聞邾方之尚逺左傳魯伐邾及范門猶聞鐘聲大夫諌不聽茅成子請告於吳不許曰魯擊柝聞於邾吳二千里不三月不至何及於我胡桑對薊匹此為遙曹植艷歌出自薊北門遙望胡地桑枝枝自相值葉葉自相當水陸爭前龍虎交至則揚都蕩定晉文苑傳庾闡作揚都賦功自齊師江左臣民非關梁國豈不追慙後主崇寄之恩還負齊朝親鄰之意東門黃犬固以長悲史記李斯顧謂中子曰我欲與若復牽黃犬出上蔡東門逐狡兔豈可得乎南陽白衣何可復得諸葛亮出師表臣本布衣躬耕南陽茍全性命於亂世不求聞達於諸侯立兹幼弱非曰大勳滅我宗枋何所逃釁今復遣前吉州刺史馬嵩仁至彼更具往懷想不逺而復無貽祗悔也見易若英謨有在方興祀夏之功左傳伍員諌吳子曰少康復禹之績祀夏配天不失舊物明監如違便等過殷之歎尚書大傳微子朝周過殷故墟見麥秀之蔪薪兮禾黍之蠅蠅也曰此故父母之國乃為麥秀之歌存亡社稷一在於公臨紙崩號不復多及為貞陽侯答王太尉書薑嵩至枉示具公忠義之懷家國喪亂於今積年三后蒙塵左傳臧文仲對曰天子蒙塵於外敢不奔問官守四海騰沸詩百川沸騰天命元輔匡救本朝𢎞濟艱難建我宗祏至於丘園版築易賁于丘園孟子傅説舉於版築之間尚想來儀公室皇枝豈不虛遲聞孤還國理會髙懷但近再命行人或不宣具公既詢謀卿士訪逮藩維沿泝往來理淹旬月使乎屆止殊副所期便是再立我蕭宗重興我梁國億兆黎庶咸蒙此恩社稷宗祧曾不相愧近軍次東關頻遣信裴之橫處示其可否答對驕凶殊駭聞矚上黨王陳兵見衛欲敘安危無識之徒忽然逆戰前旌未舉即自披猖驚悼之情彌以傷惻上黨王深自矜嗟不傳首級更蒙封樹飾棺厚殯務從優禮見裴使君墓志齊朝大德信感神明方仰藉皇威敬憑元宰討逆賊於咸陽謂北周誅叛子於雲夢謂後梁同心協力克定邦家覽所示權景宣書北史周權景宣傳孝閔帝踐阼除基鄀硤平四州五防諸軍事江陵防主上流諸將本有忠略棄親向讐庶當不爾防姦定亂終在於公今且頓東關更待來信未知水陸何處見迎夫建國立君布在方䇿入盟出質左傳宣公十二年楚子圍鄭潘尫入盟子良出質有自來矣若公之忠節上感蒼旻羣帥同謀必匪攜二則齊師返斾義不陵江如致爽言誓以無克韜旗側席漢陳湯傳谷永疏曰臣聞楚有子玉得臣文公為之仄席而坐遲復行人曹沖奉表齊都即押送也渭橋之下惟遲敘言漢文帝紀使宋昌先之長安觀變昌至渭橋丞相以下皆迎昌還報代王乃進至渭橋羣臣拜謁稱臣汜水之陽預有號懼漢髙帝紀二月甲午上尊號漢王即皇帝位於汜水之陽為貞陽侯重答王太尉書王尚書通至南史王通字公達仕梁為黃門侍郎敬帝承制以為尚書右僕射復枉示知欲遣賢弟子世珍以表誠質南史王僧辨傳遣第七子顯顯所生劉并弟子珍往充質具悉憂國之懷復以庭中玉樹晉書謝玄與從兄朗為叔父安所器玄曰如芝蘭玉樹欲使生於階庭爾掌內明珠江淹傷愛子賦痛掌珠之愛子無纍胸懷志在匡救豈非劬勞我社稷𢎞濟我邦家慙歎之懷用忘興寢晉安王南史晉安王諱方智字慧相小字法真元帝第九子也承聖元年封晉安郡王隋書揚州建安郡閩縣注舊曰東侯官置晉安郡東京貽厥之重詩詒厥孫謀西都繼體之賢史記外戚世家序自古繼體守成之君嗣守皇家寧非民望左傳崔子曰民之望也舍之得民但世道喪亂宜立長君以其蒙孽難可成業漢賈誼疏雖有愚幼不肖之嗣猶得蒙業而安至明也成昭之德自古希儔周本紀成王少周公當國成王長周公反政成王漢昭帝紀上官桀安父子與大將軍光爭權欲害之詐使人為燕王旦書言光罪上年十四覺其詐沖質之危何代無此後漢書孝沖皇帝諱炳順帝之子也即皇帝位年二嵗崩年三嵗孝質皇帝諱纘肅宗玄孫沖帝崩即皇帝位年八嵗大將軍梁冀鴆弒崩年九嵗孤身當否運志不圖生忽荷不世之恩仍致非常之舉自惟虛薄後漢明帝紀制曰朕以虛薄何以享斯兢懼已深若建承華初學記太子之門曰承華本歸皇胄心口相誓惟擬晉安南史王僧辨傳遣吏部尚書送啓因求以敬帝為皇太子明報書許之如或虛言神明所殛左傳襄公十一年載書曰明神殛之俾失其民隊命亡氏踣其國家覽今所示深遂本懷戢慰之情無寄言象但公憂勞之重既稟齊恩忠義之懷復及梁二華夷兆庶豈不懷風宗廟明靈豈不相感正爾回斾仍向歷陽所期質纍便望來彼衆軍不渡巳著盟書斯則大齊聖主之恩規上黨英王之然諾漢張敖傳上賢貫髙能自立然諾得原失信終不為也左傳僖公二十五年冬晉侯圍原命三日之糧原不降命去之諜出曰原將降矣軍吏曰請待之公曰信國之寶也民之所庇也得原失信何以庇之所亡滋多退一舍而原降惟遲相見使在不賒鄉國非遙觸目號咽又為貞陽侯答王太尉書周尚書𢎞正張廷尉種薑常侍嵩等至南史王僧辨傳遣左戶尚書周𢎞正至歷陽迎明詳讓表枉此月二十六日告并遣賢弟子世珍賢子顯等見前書具忠欵之至公養孤之恩愛甚鄧攸晉書石勒過泗水鄧攸曰吾弟早亡理不可絶止應自棄我兒繫之於樹而去時人語曰天道無知使鄧伯道無兒攸死弟子綏服喪三年少子之懷情深張禹漢書張禹數視其小子上即禹牀下拜為黃門郎給事中豈非憂勞社稷用忍肌膚班彪王命論髙祖髙四皓之節割肌膚之愛天下含靈誰無悲愧余遭家不造敬纍吾賢言念忠誠益以號咽但皇齊大德過見優矜微借輕兵以垂將送意謂江東凋弊纍積寒暄供膳資儲理當多闕輒白上黨王止請三千人二百匹而已南史王僧辨傳貞陽求度衛士三千凱衆人殊尚有疑難將恐諸士未喻雅懷今復命周尚書及薑常侍還彼具陳一二夫以受為冦非有晉邦左傳趙宣子曰我若受秦秦則賔也不受冦也不送為譏終無楚國左傳晉公子及楚楚子饗之乃送諸秦五千步卒既謝李陵漢書陵對願以步兵五千涉單于庭三千羸兵亦等無忌平原君傳李同遂與三千人赴秦軍秦軍為之却三十里公之明義理不為嫌行人失辭左傳彘子以為諂使趙括從而更之曰行人失辭尚停然諾見前書臨江總轡企望音郵惟遲來書此不多具為貞陽侯與陳司空書陳武帝紀諱霸先字興國小字法生吳興長城下若里人承聖三年三月進帝位司空軒轅既作遇蚩尤之兵見勸進表顓頊為君阻共工之亂列子共工氏與顓頊爭為帝怒而觸不周之山折天柱絶地維雖復搖山蕩谷驅電乘雷殘厥凶渠曾靡遺孽未有時當至治世在欽明元惡滔天遂陷邦家者也我大梁開金繩之寶牒初學記封禪注儀曰特凡三十人上發壇上石䃭蓋尚書令北向跪藏玉牒畢持禮覆石䃭尚書令封上十石檢亦纒以金繩泥以金泥四方各依其色紐玉鏡之珍符見與王太尉書功烈與造化相侔德施與風雲俱逺戴日之族何向不賓太平之基無逺弗屆爾雅岠齊州以南戴日為丹穴東至日所出為太平西至日所入為太蒙注岠去也齊中也太蒙即蒙汜逆賊侯景殲亂本朝釁重聰彌見移齊文及與王僧辨書凶逾羿浞帝王世紀寒浞殺羿於桃梧而烹之以食其子後主天經地緯左傳晉成鱄曰經緯天地曰文義冠人靈驅馭熊羆詩如熊如羆遂翦勍盜少康祀夏何可對揚見與王太尉書大戊興殷彌無等級殷本紀亳有祥桑谷共生於朝一暮大拱大戊修德三日祥桑枯死商道復興號稱中宗不圖天未悔禍喪亂薦臻羌賊憑陵侵蕩荆漢乘輿幽辱既陷凶徒梁元帝紀帝被執察使尚書傅準監行刑進土囊而殞之詳前書黎獻崩騰莫不淪沒書益稷萬邦黎獻共惟帝臣兆寬曰梁元帝紀于謹盡俘僕射王褒以下故以哀窮兆庶痛極蒼旻者也夫諸侯釋位寧非禍亂之朝左傳諸侯釋位以間王室服虔曰言諸侯釋其私政以佐王室宗子維城本濟殷憂之日詩宗子維城王室維寧武皇遺胄皆陷虜庭乞命偷生何能支久梁元帝紀于謹盡俘汝南王大封以下孤宗室之長爰自布衣見與王僧辨書辛癸之朝容身靡託史記夏帝履癸為桀殷帝辛謂紂指東昏追惟先業大庇生民既雪伯升之怨仍紹桓王之霸見與王僧辨書孤二三昆季情禮獲申等預藩枝偏承皇德近嵗彭都之役得備戎昭左傳戎昭果毅以聽之謂禮詳與王僧辨書鞍甲之勞庶訓天寵易在師中吉承天寵也況復邦家不造至此橫流凶狡猶存何所逃責固以提戈負劔卧泣行號言念荆巫志雪讐恥見與王僧辨書大齊德並天地明符日月隆禮詔俗張樂被民義感華夷仁侔造化玉羊銀甕嘉瑞必彰瑞應圖師曠鼓琴玉羊白鵲翾翔投墜滿孝經援神契神靈滋液有銀甕不汲自澤馬山車禎符總集拾遺記軒轅泛河沉璧有澤馬羣鳴山車滿野若夫中原猛士本自無窮見樂府沙塞精兵斯何有量見與王僧辨書是以家國之富文景所未儔漢景帝紀贊周云成康漢言文景美矣兵馬之強秦漢所未敵但親鄰之道既篤夙私明發之懷詩明發不寐有懷二人彌敦先好以為興亡繼絶見論語聖典通規爰命無庸嗣守社稷既方憑大國庶討仇讐恩喻難違諸懷慙哽公體兹懋德毗奉中興歸自番禺隋書揚州南海郡南海縣注舊分置番禺縣志在討亂至於雲行電邁班固西都賦雷奔電激谷靜山空後漢段熲傳張奐又言羌一氣所生不可誅盡山谷廣大不可空靜扼鵲尾而定王畿登牛頭而掃天闕漸臺偽帥將傳首於帝京郿塢元凶皆橫尸於軍市見勸進表髙庸茂烈振古希儔承此欣然深所嘉歎今者殷憂未巳陸機歎逝賦在殷憂而弗違禍難相尋宗社無依奧主宜立左傳叔向曰國有奧主夙承所眷尚在沖年書金縢惟豫沖人弗及知王室猶難何以康濟書蔡仲之命康濟小民董侯幼弱終覆漢朝魏紀春秋佐助期曰漢以蒙孫亡説者以蒙孫漢二十四帝童蒙愚昏以弱亡或以雜文為蒙其孫當失天下以為漢帝非正嗣少時為董侯名不正蒙亂之荒惑其子孫以弱亡獻帝諱協協母王美人為何后所鴆殺董太后自養協號曰董侯馬業童蒙仍傾晉室晉書太子德宗幼而不慧口不能言至於寒暑飢飽亦不能辨武帝遇弒即位是為安帝所謂前事之不忘後事之龜兆也孤過荷恩靈預奉帷幄見讓表黃河白日亟降誠言分災恤患事非虛旨見與王僧辨書但當小國之禮無失敬恭左傳子駟曰敬共幣帛以待來者小國之道也闔境人民俱勞寤寐方窮人爵之重孟子公卿大夫此人爵也以報非常之功漢武帝紀詔曰蓋有非常之功必待非常之人惠覽今書希能留意也上黨王文髙劉德漢書德字路叔武帝謂之千里駒武冠曹彰見為始興王表爰降宗英逺於將送見與王僧辨書裴侍中英起贊奉師德俱事戎間月壘連營吳孫綝傳朱異遣將軍任度等築偃月壘景樹屏曰宋臧質傳云質舉兵反孝武遣柳元等屯梁山洲兩岸築偃月壘水陸待之雲旗蔽野司馬相如上林賦靡雲旗同集江淮翼我歸斾湛海珍等南史貞陽侯明傳魏平江陵齊文宣使送明至梁并前所獲梁將湛海珍等皆聼從明歸令上黨王渙率衆送之詳與王僧辨書並前朝舊將夙著勳庸江左氛妖投身齊國今者皆蒙恩奬並在戎行歸附明公共翦讐難去月將晦便留壽春已具舟艫將臨漅浦後漢獻帝紀注壽春縣屬九江郡隋書荆州九江郡湓城縣注有巢湖若公為內主方同國子之勳左傳叔向曰齊桓有國髙以為內主余以定家得免臧孫之歎左傳臧昭伯見平子平子曰茍使意如得改事君所謂生死而肉骨也昭子從公於齊與公言平子有異志冬十月辛酉昭子齊於其寢使祝宗祈死戊辰卒豈不功名富貴共保無強前望鄉關惟增號哭為貞陽侯重與裴之橫書南史魏克江陵齊遣上黨王髙渙挾貞陽侯明攻東關晉安王承制以之橫為徐州刺史都督衆軍出守靳城本傳之橫邃之兄子也張佛奴昨還得去月二十六日書覽以增慨昔桓公始反管仲親射其車齊世家魯使管仲别將軍遮莒道射中小白帶鉤重耳初還吕卻終焚其室左傳秦伯納公子重耳於晉吕卻畏逼將焚公宫而弒晉侯頃家國多患頻遘閔凶前事不忘便為龜兆所以皇齊大德禮秩兼常威武紛紜洪恩汪濊司馬相如文威武紛云湛恩汪濊況復旌旗照日鼓吹從風文物俱華羽衛相鬱書契以來斯未有也卿天監之始門宦有成南史裴邃河東聞喜人祖壽孫寓居夀陽會刺史張叔業以壽陽降魏邃遂隨北徙梁天監初自拔南還以功封夷陵縣子歷官豫州刺史督鎮合肥大敗魏軍卒贈侍中左衛將軍進爵為侯子之禮嗣為西豫州刺史之禮卒於少府卿之髙邃兄中散大夫髦之子也除梁郡太守封都成縣男之髙第五弟之平以軍功封費縣侯之橫之髙第十二弟也承聖之初身名俱泰見墓志正應勤王效命酬二后之恩憂國如家報三靈之寵見勸進表何有方規異志茍樹童蒙見與陳司空書阻地險於長川易地險山川丘陵也忘天討之應及書天討有罪五刑五用哉孤昔忝藩維非無遊士平原之館乃乏如錐史記趙平原君謂毛遂曰賢士之處世也譬如錐處囊中其末立見田文之家差有彈鋏史記馮歡在孟嘗君門下為客每給疏飯歡乃倚柱彈鋏而歌雖李廣麾下莫不封侯漢李廣傳廣與望氣王朔語曰自漢擊胸奴廣未嘗不在其中而諸妄校尉以下材能不及中以軍功取侯者數十人廣不為後人然終無尺寸功以得封邑者何也衛青故人多懷彼此漢霍去病傳青日衰而去病日益貴青故人門下多去事去病輒得官爵惟獨任安不肯去豈可文辭簡略禮等平交披封伸紙益多歎異相鼠無儀表詩人之作詩相鼠有皮人而無儀人而無儀不死何為茅鴟刺傲彰魯史之文左傳叔孫穆子食慶封慶封汜祭穆子不悅使工為之誦茅鴟亦不知宿昔相期不應如此衆軍即便頓江關相見在近不復多及為貞陽侯與北齊北齊二字疑羡文荀昻兄弟書南史荀朗字深明潁川潁隂人也侯景之亂據巢湖無所屬臺城陷沒後梁簡文帝密詔授朗豫州刺史令與外蕃討景魏克荆州陳武帝入輔齊遣蕭軌東方老等來冦據石頭郎自宣城來赴與侯安都等大破之武帝受禪賜爵興寧縣侯以朗兄昻為左衛將軍弟晷為太子右衛率張佛奴至未枉還告但以勞悒夫興亡繼絶往帝之通規分災恤患聖王之恆典見與王僧辨書自敦龎既散國語虢文公曰敦厖純固於是乎成詐偽萌生時託親鄰信有澆慝大齊道冠三皇風髙九代仁信之本關於至誠言與之恩由於孝德孤謬蒙殊奬還嗣本朝敕諭分明言誓殊重若使邦家克定境內無虞凡廣陵歷陽皆許見還白水黃河見與王僧辨書屢奉然諾見答王太尉書彝章禮數莫不優華斯乃不世之殊恩寧是悠長之恆事王太尉勳踰吕望德冠伊衡凡厥英謀算靡遺䇿豈容當滔天之巨冦違大國之隆恩計彼賢明必當不爾卿維兄及弟莫非雄才江左風塵不染凶冦賈氏三虎豈獨貴於前修後漢賈彪傳彪字偉節時號賈氏三虎偉節最怒荀家八龍信服在於今日後漢荀淑傳淑有子八人儉緄靖燾汪爽肅瞻並有名稱時人謂之八龍近者州司不道或致流言朝聼矜明巳如前及想謀元宰善保良圖南道主人以相付也後漢書耿弇聞光武在盧奴乃馳北上謁光武留署門下吏弇因求歸上谷發兵以定邯鄲光武指弇曰是我北道主人也見所答東海徐湛書粗具來意昔桓憑莒衆文用秦攻是假鄰國之威以備非常之變左傳莊公九年桓公自莒先入僖公二十四年秦伯送衛於晉實紀網之僕若使江東宰匠具領齊恩時命封疆逺相迎接故當攜諸舊隸率我賓遊朝服簪纓直拜園寢梁人望國自合水而浮舟齊帥言歸指滄江而回斾如其彼相論語則將焉用彼相矣未悟良機將恐戎麾遂踐京邑若其求成取敗豈謂和風龍馬雲旗見為貞陽侯書差不相涉一二復令張佛奴口具相見在近此不多及在北齊與楊僕射書北史楊愔字遵彥𢎞農華隂人楊津子也小名秦王兒童時口若不能言而風度深敏天保初詔監太史遷尚書右僕射陵叩頭叩頭夫一言所感凝暉照於魯陽淮南子魯陽公與韓酣戰日暮援戈揮之日反三舍一志冥通飛泉涌於疏勒見與王太尉書況復元首康哉股肱良哉見書鄰國相聞風教相期者也天道窮剝鍾亂本朝情計馳惶公私哽懼而骸骨之請漢疏廣傳即日乞骸骨徒淹嵗寒顛沛之祈論語顛沛必於是空盈卷軸是所不圖也非所仰望也執事不聞之乎昔分鼇命鳸之世三皇本紀女媧氏錬五色石以補天斷鼇足以立四極聚蘆灰以止滔水左傳九扈為九農政注扈有九種也春扈如鶞夏扈竊玄秋扈竊藍冬扈竊黃棘扈竊丹行扈唶唶宵扈嘖嘖桑扈竊脂老扈鷃鷃以九扈為九農政之號扈樹敏曰爾雅字作鳸觀河拜洛之年帝王世紀後年二月堯率羣臣刻璧為書東沈洛水竹書紀年舜設壇於河依堯故事至於下昃榮光休至黃龍負圖出於壇畔則有日烏流災風禽騁暴淮南子堯時十日並出又有大風為民害堯使羿繳風射日萬民大悅天傾西北地缺東南列子地不滿東南百川歸焉盛旱坼三川説苑湯之時大旱雒坼以竭長波含五嶽書湯湯洪水方割蕩蕩懷山襄陵我大梁應金圖而有亢帝王世紀少昊即圖讖所謂白帝朱宣者也故稱少昊號金天氏纂玉鏡而猶屯見與王太尉書何則聖人不能為時斯固窮通之恆理也至如荆州刺史湘東王幾神之本無寄名言陶鑄之餘猶為堯舜見莊子雖復六代之舞陳於總章周禮天子祭祀用六代之樂周書明堂西方曰總章九州之歌登於司樂未詳按周禮大司樂大合樂以致鬼神示以和邦國以諧萬民以安賓客以説逺人以作動物虞夔拊石舜典夔曰於豫擊石拊石百獸率舞晉曠調鐘淮南子師曠之欲調鐘以為後有知音也未足頌此英聲封禪文蜚英聲無以宣其盛德者也詩序頌者美盛德之形容若使郊禋楚翼寧非祀夏之君郊特牲注郊者祭天之名國語精意以享曰禋天官書注星經云翼軫楚之分野也詳與王太尉書戡定艱難便是匡周之霸豈徒豳王徙雍期月為都吳越春秋古公去邠處岐周居三月成城郭一年成邑二年成都而民五倍其初姚帝遷河周年成邑史記五帝本紀虞舜一年而所居成聚二年成邑三年成都方今越裳藐藐馴雉北飛韓詩外傳周公居攝二年制禮作樂天下和平越裳氏以三象重譯而獻白雉肅慎茫茫風牛南偃家語武王滅紂肅慎來獻石砮楛矢左傳齊侯伐楚楚子使與師言曰君處北海寡人處南海唯是風馬牛不相及也吾君之子見孟子含識知歸而答旨云何所投身斯其未喻一也又晉熙等郡隋書地理志揚州同安郡懷寧縣注舊置晉熙郡皆入貴朝去我潯陽經途何幾任昉哭范僕射詩與子别幾辰經途不盈旬至於鐺鐺曉漏司馬彪續漢書云孔壺為漏浮箭為刻下漏數刻以考中星昏明生焉的的宵烽漢書音義多積薪冦至即燔之望其煙曰燧晝則燔燧夜則舉烽隔溆浦而相聞楚辭出溆浦而邅回臨髙臺而可望渚宫故事宋臨川王義慶鎮江陵於羅公洲立觀甚大而唯一柱泉流寶盎遙憶湓城藝林伐山寶盎泉在江州吳秩臣曰潯陽記盆水出清盆山因以為名滯山雙流而右灌潯陽東北流入江峰號香爐依然廬嶽釋慧逺廬山記東南有香爐山其上氤氲若香煙日者鄱陽嗣王南史梁鄱陽王世子範傳太清元年大舉北侵初謀元帥貞陽侯明請行而以範為征北大將軍總督漢北征討諸軍事侯景敗於渦陽退保夀春乃改範為合州刺史鎮合肥治兵匯派屯戍淪波爾雅大波為瀾小波為淪朝夕箋書春秋方物周書旅獒無有逺邇畢獻方物吾無從以躡屩戰國䇿蘇秦去秦而歸贏縢履蹻賜樹本曰史記虞卿傳虞卿躡屩擔簦説趙孝成王黃金百鎰白璧一雙再見為趙上卿故號虞卿彼何路而齊鑣魏應璩集遣句云駑驥不齊鑣豈其然乎斯不然矣又近者邵陵王通和此國周楊忠傳梁元帝逼其兄邵陵王綸北度與其前西陵郡守羊思達要隨陸土豪段珍寶夏侯珍洽合謀送質於齊欲來寇掠汝南城主李素綸故吏也開門納焉郢中上客楚世家文王始都郢雲聚魏都鄴卜名卿見勸進表風馳江浦豈盧龍之徑於彼新開魏志曹公北征烏桓軍次無終濱海汙下虜亦遮守溪要軍不得進問田疇疇曰此道秋夏有水淺不通車馬深不載舟船可回軍從盧龍口越白檀之險出空虛之地路近而便軍還論功行封疇以為豈可賣盧龍之塞以易爵賞遂不受銅駝之街於我長閉見樂府何彼途甚易非勞於五丁史記天為蜀王生五丁力士能徙山秦王獻美女與蜀王遣五丁迎女見一大蛇入山穴中五丁共引蛇山崩厭殺五丁秦女皆上山化為石我路為難如登於九折漢書王陽為益州刺史行部至邛郲九折阪歎曰奉先人遺體奈何數乘此險及王尊為刺史至其阪問吏曰此非王陽所畏道邪吏對曰是尊叱其馭曰速驅之王陽為孝子王尊為忠臣地不私載何其爽歟而答旨云還路無從斯所未喻二也晉熙廬江義陽安陸隋書地理志揚州廬江郡廬江縣注舊置廬江郡荆州澧陽郡安鄉縣注舊置義陽郡安陸郡安陸縣注舊置安陸郡皆云款附非復危邦計彼中途便當靜晏自斯以北桴鼓不鳴漢酷吏傳長安剽劫行者死傷橫道桴鼓不絶自此以南封疆未一如其境外脫殞輕軀幸非邊吏之羞何在匹夫之命又此段賓遊通無貨殖論語賜不受命而貨殖焉忝非韓起聘鄭私買玉環左傳宣子有環其一在鄭商宣子謁諸鄭伯子産弗與曰非官府之守器也寡君不知韓子買諸商人既成價矣商人曰必告君大夫韓子請諸子産對曰僑若獻玉不知所成敢私布之韓子辭玉吳札過徐躬要寶劒史記延陵季子將聘晉帶劒以過徐君徐君欲之季子為有上國之事未獻也然心許之矣反則徐君已死於是以劒挂其墓樹而去由來宴錫凡厥囊裝行役淹留皆已虛罄散有限之微財供無期之久客斯可知矣且據圖刎首愚者不為後漢馬融傳融常飢困謂友人曰古人有言左手據天下之圖右手刎其喉愚夫不為所以然者生貴於天下也運斧全身庸流所鑒莊子郢人堊漫其鼻端若蠅翼使匠石斫之匠石運斤成風聼而斫之盡堊而鼻不傷郢人立不失容何則生輕一髮自重千鈞不以賈盜明矣骨肉不任充鼎俎漢項籍傳今人方為刀俎吾為魚肉皮毛不足入貨財盜有道焉莊子盜亦有道吾無憂矣又公家遣使脫有資須本朝非隆平之時遊客豈皇華之勢詩序皇皇者華君遣使臣也輕裝獨宿非勞聚柝之儀周禮挈壺氏凡軍事縣壺以序聚柝注軍中遇夜則擊柝以備守有更漏則擊􅝵者可更迭矣微騎間行寧望輶軒之禮漢陳平傳平身間行杖劒亡降漢文選注輶車朱軒使者之車也歸人將從私具驢騾緣道亭郵唯希蔬粟若曰留之無煩於執事遣之有費於官司左傳臧僖伯曰官司之守非君所及也或以顛沛為言或云資裝可懼固非通論皆是外篇漢淮南王安傳招致賓客方術之士數千人作為內書二十一篇外書甚衆又有中篇八卷言神仙黃白之術亦二十餘萬言斯所未喻三也又若以吾徒應還侯景侯景凶逆殲我國家天下含靈人懷憤厲既不能投身社稷衛難乘輿三冢磔蚩尤千刀剸王莽見勸進表安所謂俯首頓膝歸奉冦讐佩弭腰鞬為其皂隸左傳晉公子對楚子曰其左執鞭弭右屬櫜鞬以與君周旋又叔向曰欒卻胥原狐續慶伯降在皂𨽻日者通和方敦曩睦凶人駔詐漢諸侯王表秦騁駔詐之兵遂駭狼心左傳叔向妻生伯石姑曰狼子野心非是莫喪羊舌氏矣頗疑宋萬之誅左傳宋人請猛獲於衛亦請南宫萬於陳以賂陳人使婦人飲之酒而以犀革裹之比及宋手足皆見皆醢之彌懼荀罃之請左傳晉人歸楚公子穀臣與連尹襄老之尸於楚以求知罃於是荀首佐中軍矣故楚人許之詳為貞陽侯書所以奔蹄徑角漢書武帝詔曰馬或奔踶而致千里専恣憑陵凡我行人偏膺讐憾政復葅筋醢骨史記淖齒擢湣王筋懸之廟屋宿昔而死抽舌探肝張璠漢記董卓於衆坐生斬人手足又鑿目截舌沈忠柱曰韓詩外傳狄人殺衛懿公盡食其肉獨舍其肝𢎞演使還哭畢呼天因自出其肝納懿公之肝於彼凶情猶當未雪海內之所知也君侯之所具焉又聞本朝王公陳書作公主都人士女風行雨散王粲詩風流雲散一别如雨東播西流京邑丘墟葌蓬蕭瑟偃師南望漢官典職德陽殿周遊容萬人自偃師去宫三十五里望朱雀闕其上鬱與天運咸為草萊霸陵回首王粲七哀詩南登霸陵岸回望望長安俱霑霜露漢書伍被曰臣亦將見宫中生荆棘露霑衣也此又君之所知也彼以何義爭免冦讐我以何親爭歸委質左傳狐突對曰䇿名委質昔巨平貴將懸重於陸公晉羊祜傳及五等建祜封巨平子邑六百户帝有滅吳之志以祜為都督荆州諸軍事祜與陸抗相對使命交通抗嘗病祜饋之藥抗服之無疑心人多諫抗抗曰羊祜豈鴆人者叔向名流深知於鬷蔑左傳晉叔向適鄭鬷蔑惡欲觀叔向從使之收器者而往立於堂下一言而善叔向將飲酒聞之曰必鬷明也下執其手以上吾雖不敏常慕前修不圖明庶有懷翻期陳書作其以此量物昔魏氏將亡羣凶挺爭諸賢戮力想得其朋為葛榮之黨邪為邢杲之徒邪北史魏葛榮引兵圍鄴爾朱榮以侯景為前驅擒葛榮斬之五州皆平北周宇文貴傳貴從爾朱榮擒葛榮於滏口加别將又從元天穆平邢杲轉都督如曰不然斯所未喻四也假使吾徒還為凶黨侯景生於趙代家自幽恆居則台司行為連率後漢馬援傳注莽法典郡者公為牧侯稱卒正伯稱連率其無封爵者為尹也山川形勝軍國彝章不勞請箸為籌漢書酈食其謀撓楚權勸漢王立六國後張良曰陛下事去矣臣請借前箸以籌之便當屈指能算漢陳湯傳知烏孫瓦合不能久攻故事不過數日因對曰已解矣屈指計其日曰不出五日當有吉語聞居四日軍書到言已解侯景傳景字萬景魏之懷朔鎮人也歡使擁兵十萬専制河南重陳書作景以逋逃小醜書紂為天下逋逃主羊豕同羣身寓江臯家留河朔侯景傳髙澄遣其將慕容紹宗追景乃與腹心數騎自硤石濟淮舂舂井井如鬼如神其不然乎抑又君之所知也且夫宫闈祕事並若雲霄英俊訏謨寧非帷幄見讓表或陽驚以定策漢張安世傳每定大政已決輒移病出聞有詔令乃驚使吏之丞相府問焉自朝廷大臣莫知其與議也或焚稿而奏書漢書孔光典樞機十餘年時有所言輒削草稿晉書羊祜歷事二世職典樞要凡謀議皆焚其草世莫得聞朝廷之士猶難參預羇旅之人左傳陳敬仲曰羇旅之臣何階耳目至於禮樂沿革刑政寬猛左傳子産謂子太叔曰惟有德者能以寬服民其次莫如猛則謳歌已逺萬舞成風不知手之舞之足之蹈之也安在搖其牙齒為間諜者哉莊子搖脣鼓舌樂毅傳田單縱反間於燕左傳晉人獲秦諜若謂復命西朝終奔東虜雖齊梁有隔尉候奚殊揚雄解嘲大漢東南一尉西北一候豈以河曲之難浮而曰江關之可濟河橋馬渡寧非宋典之姦晉書琅邪王睿從帝在鄴恐及禍將逃歸成都王穎先敕關津無得出貴人睿出河陽為津吏所止從者宋典自後來以鞭拂睿而笑曰舍長官禁貴人汝亦被拘邪吏乃聼過關路雞鳴皆曰田文之客見表後啓何其通蔽乃爾相妨斯所未喻五也又兵交使在雖著前經左傳欒書伐鄭鄭人使伯蠲行成晉人殺之非禮也兵交使在其間可也儻同徇僕之尤司馬穰苴傳穰苴曰君之使不可殺之乃斬其僕之左駙馬之左驂以徇三軍追肆寒山之怒北史齊慕容紹宗字紹宗侯景反命紹宗為東南道行臺加開府改封燕郡公與大都督髙嶽禽梁貞陽侯蕭明於寒山回軍討侯景於渦陽大捷詳與王僧辨書則凡諸元帥並釋縲囚爰及褊禆同無翦馘乃至鍾儀見赦朋笑遵途左傳晉侯觀於軍府見鍾儀問曰南冠而縶者誰也曰鄭人所獻楚囚也使稅之重為之禮使歸求成襄老蒙歸虞歌引路左傳公會吳子伐齊將戰公孫夏命其徒歌虞殯吾等張旜拭玉儀禮使者及境張旜誓乃謁關人又賓朝服立東西面賈人北面坐拭圭鄭玄曰拭清也修好尋盟涉泗之與浮河禹貢浮于淮泗達于河郊勞至於贈賄左傳齊國莊子來聘自郊勞至於贈賄禮成而加之以敏至樹本曰左傳薳啓疆曰入有郊勞出有贈賄禮之也公恩既被賓敬無違今者何愆翻蒙貶責若以此為言斯所未喻六也若曰妖氛永久喪亂悠然哀我奔波鮑昭詩客行惜日月奔波不可留存其形魄固已銘兹厚德戴此洪恩譬渤海而俱深博物志東海稱渤海又謂之滄海方嵩華而猶重但山梁飲啄非有意於樊籠莊子澤雉十步一啄百步一飲不蘄畜乎樊中論語山梁雌雉江海飛浮本無情於鐘鼓莊子昔者海鳥止於魯郊魯侯御而觴之於廟奏九韶以為樂具太牢以為膳鳥乃眩視憂悲三日而死江淹詩咸池享爰居鐘鼓或愁辛況吾等營魂巳謝屈原九章魂識路之營營餘息空留悲默為生何能支久是則雖蒙養護更夭天年漢兩龔傳父老哭曰薰以香自燒膏以明自銷龔生竟夭天年若以此為言斯所未喻七也若云逆豎殲夷當聽反命髙軒繼路飛蓋相隨曹植詩飛蓋相追隨未解其言何能善謔詩善戲謔兮夫屯亨治亂見為貞陽侯書豈有意於前期謝常侍今年五十有一齊書魏收傳魏帝敕兼主客郎接梁使謝珽徐陵吾今年四十有四介已知命魯論子曰五十而知天命賓久陳書作又杖鄉禮記六十杖於鄉計彼侯生肩隨而巳史記侯嬴年七十家貧為大梁夷門監者樹屏曰曲禮五年以長則肩隨之豈銀臺之要彼未從師郭璞遊仙詩神山排雲出但見金銀臺金竈之方吾知其訣漢武帝紀李少君曰祀竈則致物而丹砂可化為黃金政恐南陽菊水竟不延齡荆州記縣北八里有菊水其源旁悉芳菊水極甘馨又中有三十家不復穿井即飲此水上壽百二十中壽百餘七十者猶以為夭東海桑田無由佇陳書作可望神仙傳麻姑謂王方平曰接待以來見東海三變為桑田向到蓬萊水淺於往時略半也豈將復還為陸陵乎方平笑曰聖人皆言海中行復揚塵也若以此為言斯所未喻八也足下清襟勝託袁粲答王儉詩老夫亦何寄之子照清襟書囿文林范煜應詔詩文囿降照臨凡自洪荒終乎幽厲如吾今日寧有其人爰至春秋微宜商略夫宗姬殄墜霸道昏凶或執政之多門左傳晉政多門或陪臣之涼德論語陪臣執國命左傳虢多涼德故臧孫有禮翻囚與國之賓列女傳臧文仲為魯使齊齊拘之而興兵欲襲魯文仲隂使人遺公書為隱語人不能解其母解之曰吾子拘有木治矣於是軍於境上齊還文仲而不伐魯周伯無愆空怒天王之使左傳隱公七年冬王使凡伯來聘還戎伐之於楚丘以歸遷箕卿於兩館左傳晉人為邾人之訴故執我行人叔孫婼館諸箕舍子服昭伯於他邑縶驥子於三年左傳唐成公如楚有兩肅爽馬子常欲之弗與亦三年止之斯非貪亂之風邪寧當今之髙例也至於雙崤且帝四海爭雄魯仲連傳新垣衍曰秦前與齊湣王爭強為帝巳而復歸帝今齊湣王已益弱方今惟秦雄天下其實欲復求為帝或搆趙而侵燕或連韓而謀魏史記犀首者魏之隂晉人也名衍姓公孫氏與張儀不善張儀為秦之魏魏王相張儀犀首弗利故令人謂韓公叔曰子何不少委焉以衍為功則秦魏之交可錯矣然則魏必圖秦而棄儀收韓而相衍身求盟於楚殿躬奪璧於秦庭見表後啓輸寶鼎以託齊王戰國策秦求九鼎顔率謂齊王救周齊求九鼎率又東解之馳安車而誘梁客范睢傳睢更名姓曰張祿時秦昭王使謁者王稽於魏鄭安平夜與張祿見王稽稽載范雎入秦薦之王封應侯其外膏脣拭陳書作販舌後漢宦者傳羣邪項領膏脣拭舌分路揚鑣無罪無辜如兄如弟見詩逮乎中陽受命漢髙祖紀髙祖沛豐邑中陽里人天下同規中庸今天下車同軌巡省諸華無聞幽辱及三方之霸也孫甘言以嫵媚樹屏曰三國志鍾繇與魏文帝書吾見孫權了更嫵媚曹屈詐以羈縻旍軫嵗到於句吳曲禮僕展軨效駕荆兆宫曰吳太伯世家太伯之奔蠻自號句吳冠蓋年馳於庸蜀魏世家魏使人求救於秦冠蓋相望也書牧誓及庸蜀羌髳微盧彭濮人則客嘲殊險賓戲巳深漢書揚雄作解嘲班固答賓戲共盡遊談誰云猜忤若使搜求故事陳書作實脫有前蹤恐是叔世之姦謀左傳叔向詒子産書曰三辟之興皆叔世也而非為邦之勝略也抑又聞之雲師火帝澆淳乃異其風見勸進表龍躍麟驚王霸雖殊其道易或躍在淵晉書王濬表曰猛獸當途麒麟恐懼莫不崇君親以詔陳書作銘物敦敬養以治民預有邦司曾無隆替吾奉違溫凊曲禮凡為人子之禮冬溫而夏凊仍屬亂離冦虜猖狂公私播越蕭軒靡御漢蕭育傳南郡江中多盜賊拜育為太守上以育耆舊名臣乃以三公使車載育入殿中受策注使車三公奉使之車王舫誰持張雲章曰南史王筠為臨海太守在郡侵刻還資有芒屩兩舫他物稱是為有司奏不調纍年瞻望鄉關何心天地自非生憑廩竹後漢南蠻傳夜郎者初有女子浣於遁水有三節大竹流入足間聞其中有號聲剖竹視之得一男兒歸而養之及長有才武自立為夜郎侯以竹為姓漢武帝封其三子為侯死配食其父今夜郎縣有竹王三郎神是也源出空桑吕氏春秋有侁氏采桑得嬰兒於空桑之中獻之其君察其所以然曰其母伊水之上嘗夢神告之曰臼出水而東走母明日視臼果出水告其鄰母乃走十里而故邑盡為水身因化為空桑故命之曰伊尹行路含情猶其相愍常謂擇官而仕非曰孝家擇事而趨非云忠國況乎欽承有道驂駕前王郎吏明經鴟鳶知禮封禪書鴟梟數至而欲封禪毋乃不可巡方省化咸問髙年漢萬石君傳上曰巡方州禮嵩嶽通八神以合宣房濟江淮歷山濱海問百年民所疾苦西序東膠皆尊耆耋王制夏后氏養庶老於西序周人養國老於東膠吾以圭璋玉帛通聘來朝屬世道之屯期鍾生民之否運兼年纍載無申元直之祈諸葛亮傳徐庶字元直庶母為操所獲庶辭備指其心曰本欲與將軍共圖王霸之業者以此方寸地也今已失老母方寸亂矣無益於事請從此辭庶遂詣操銜泣吞聲長對公閭之怒未詳情禮之訴將同逆鱗韓子夫龍之為蟲可狎而騎也然喉下有逆鱗徑尺若嬰之則殺人人主亦有之説能無嬰人主之逆鱗則幾矣忠孝之言皆應齚舌英雄記曹操自咋其舌流血以失言戒後世是所不圖也非所仰望也且天倫之愛何得忘懷榖梁傳兄弟天倫也妻子之情誰能無纍夫以清河公主之貴晉賈后傳臨海公主先封清河洛陽之亂為人所略傳賣吳興張溫溫以送女女遇主甚酷元帝鎮建康主詣縣自言帝誅溫及女改封臨海餘姚書佐之家後漢酷吏傳蜀郡太守黃昌會稽餘姚人妻遇賊被獲流入蜀為人妻其子犯事詣昌自訟昌疑母不類蜀人因問所由對曰妾本會稽餘姚戴次公女州書佐黃昌妻也妾嘗歸家為賊所略遂至於此因相持悲泣還為夫婦莫限髙卑皆被驅略自東南醜虜抄販飢民臺署郎官俱餒牆壁後漢獻帝紀帝還洛陽州郡委輸不至尚書郎以下自出采稆或飢死於牆壁間況吾生離死别屈原九歌悲莫悲兮生别離多歷寒暄孀室嬰兒淮南子寡婦不孀詳為貞陽侯書何可言念如得身還鄉土躬自推求猶冀提攜曲禮長者與之提攜俱免凶虐夫四聰不達舜典明四目達四聰華陽君所謂亂臣范雎傳雎因間説秦昭王曰穰侯出使不報華陽涇陽等擊斷無諱髙陵進退不請四貴備而國不危者未之有也百姓無冤孫叔敖稱為良相史記循吏傳孫叔敖為楚相民皆樂其生足下髙才重譽參贊經綸非虎非貔見勸進表聞詩聞禮見論語而中朝大議曽未矝論清禁嘉謀安能相及諤諤非周舍韓詩外傳趙簡子有臣曰周舍立於門下三日三夜簡子問其故答曰臣為君諤諤之臣容容類胡廣後漢胡廣傳京師諺曰萬事不理問伯始天下中庸有胡公范曄贊曰胡公庸庸飾情恭貌左雄傳公卿相戒曰白璧不可為容容多厚福何其無諍臣哉孝經天子有諍臣七人雖亡道不失天下嵗月如流平生何幾晨看旅雁心赴江淮山海經雁門山雁出其間在髙柳北月令季秋之月鴻雁來賓昏望牽牛情馳揚越天官書注星經云南斗牽牛吳越之分野楊州也朝千悲而掩泣夜萬緒而回腸不自知其為生不自知其為死也足下素挺詞峰兼長理窟北堂書鈔郭子云張憑詣劉真長同謁撫軍撫軍咨嗟稱善曰憑彀稱為理窟匡丞相解頤之説漢書匡衡少字鼎長乃易字稚圭諸儒語曰無説詩匡鼎來匡説詩解人頤建昭三年代韋玄成為丞相封樂安侯樂令君清耳之談晉書樂廣清夷沖曠善談名理衛瓘竒之曰自何平叔諸人沒常謂清言盡矣今復聞之樂令向所咨疑誰能曉諭若鄙言為戮來旨必通分請灰釘魏略王凌自知罪重試索棺釘以觀太傅意太傅給之遂自殺甘從斧鑊何但規規默默齰舌低頭而已哉漢灌夫傳韓安國曰魏其必愧杜門齰舌自殺若一理存焉猶希矜眷何必期令吾等必死齊都足趙魏之黃塵加幽并之片骨遂使東平拱樹常懷向闕陳書作漢之悲皇覽後漢東平思王宇歸思京師後葬東平其冡上松柏皆西靡西洛孤墳恆表思鄉之夢後漢書溫序遇賊死節光武憐之賜葬洛陽城傍序長子壽為鄒平侯相夢序告之曰客久思鄉里壽上書乞骸骨歸葬乃反舊塋干祈以屢哽慟增深徐陵叩頭再拜在北齊與宗室書陵白臨淮負海是謂徐州禹貢海岱及淮惟徐州顓頊髙陽世有明德帝王世紀帝顓頊髙陽氏世有才子八人謂之八凱按顓頊之裔嬴姓伯益之後封於徐為楚所滅子孫因氏自興王啓霸無勞委劒之鋒括地志徐君廟在泗州徐城縣西南一里即延陵季子挂劒之徐君也詳與楊僕射書開國承家見易實饗彤弓之賜博物志徐偃王得朱弓矢以已得天瑞因名為弓自稱徐偃王其後金柯玉葉崔豹古今注黃帝與蚩尤戰於涿鹿之野常有五色雲氣金枝玉葉止於帝上有花葩之象因作華蓋也霞振雲從耆舊通人茂才多士或以天下之貴負石自沈漢鄒陽傳徐衍負石入海注服虔曰衍周之末世人也王命之尊拂衣髙蹈後漢徐稚傳稚字孺子豫章南昌人也舉有道家拜太原太守皆不就桓帝以安車玄纁備禮徵之並不至郭林宗謂之南州髙士或熊衣雉製青組朱旗未詳後漢徐璆傳璆字孟玉廣陵海西人獻帝遷許得袁術所盜國璽上之并送前所假汝南東海二郡印綬司徒趙溫謂璆曰君遭大難猶存此邪璆曰昔蘇武不墜七尺之節況此方寸印乎石炯曰董巴志二千青綬儒盛江東文髙河北後漢徐防傳防沛國銍人祖父宣為講學大夫以易教授王莽父憲亦傳宣業防少習祖父學永元十六年拜司徒遷太尉録尚書事安帝即位以定策封龍鄉侯魏文帝與吳質書偉長可謂彬彬君子者矣著中論二十篇成一家之言辭義典雅足傳於後本傳徐幹字偉長北海人為司空軍謀祭酒掾屬五官將文學或復分齊處魯移魏居燕漢書徐樂燕無終人也上土崩瓦解書瓜瓞雖遙詩綿綿瓜瓞芳枝無逺昔有王敦王如一本作莽晉書雍州流民多在南陽詔書遣還鄉里京兆王如衆至四五萬自號大將軍稱藩於漢劉聰詳後歐陽頠碑無關控鶴之宗孫綽天台山賦王喬控鶴以沖天劉曜劉淵晉書劉淵胸奴左賢王豹之子也晉仕為左部督後因晉亂稱帝國號漢子聰嗣立聰死國亂劉曜自立為帝彌非偃龍之族夏本紀陶唐既衰其後有劉纍學擾龍於豢龍以事孔甲孔甲賜之姓曰御龍氏又有朱家别録邾子之苖凌以棟曰周封曹挾於邾後為楚滅子孫避難去邑為朱何氏殊源韓侯之胤朱子考異何氏出周成王母弟唐叔虞後十一代孫食邑於韓韓為秦所滅子孫散居江淮間以韓為何遂為何氏三烏五鹿時事無恆東郭西門遷訛非一潛夫論東門西門南宫北郭所謂居也三烏五鹿青牛白馬所謂志也吾宗雖廣未有駢枝莊子駢拇枝指出乎性哉而侈於德咸自駒王檀弓邾婁考公之喪徐君使容居來弔含曰昔者先君駒王西討濟於河無所不用斯言也同分才子正以金衡委御玉斗宵亡後漢王逸集九思云將喪兮玉斗胡賊憑陵中原傾覆我則供犧牲於東國書今殷民乃攘竊神祇之犧牷牲載主祏於南都左傳鄭火作子産使祝史徙主祏於周廟三百年來家於揚越晉徐邈傳邈東莞姑募人祖澄之為州治中屬永嘉之亂遂與鄉人臧琨率子弟并閭里士庶千餘家南渡江家於京口邈轉祠部郎上南北郊宗廟迭毁禮皆有證據此則盧諶不去晉盧諶傳諶范陽涿人州舉秀才辟太尉掾隨父志北依劉琨與志俱為劉粲所虜粲據晉陽留諶為參軍琨攻粲粲敗走諶得赴琨段匹殫害琨時段末波在遼西諶往投之石季龍破遼西復為季龍所得屬冉閔誅石氏遇害裴寧仍留未詳髙宦燕秦遲回鄉壤山河有隔敘覯無緣望驥馬而增勞瞻賓鴻而永歎見與楊僕射書昔竇公纍世光武稱其外家後漢竇融傳融封安豐侯帝賜以外屬圖及太史公五宗外戚世家魏其侯列傳詔曰孝景皇帝出自竇氏定王景帝之子朕之所祖許都遙逺靈王思其舊宅左傳楚靈王曰昔我皇祖伯父昆吾舊許是宅其言雖大可以喻小況在宗親寧無停眷比月應雩龍論衡二月之時龍星始出故傳曰龍見而雩龍星見時嵗已啓蟄而雩星移殷鳥堯典日中星鳥以殷仲春天明和煦體中何如願百年之老王制天子巡守問百年者就見之興居多福萬石之君漢石奮傳景帝曰石君及四子皆二千石人臣尊寵乃舉集其門凡號奮曰萬石君寒暑清豫其外族忠孝比屋連甍信義勇於干戈詩書甘於酒醴或有漁獵三史易略綱序漁獵墳典紛綸五經後漢逸民傳井丹字大春京師語曰紛綸五經井大春都講開黌後漢丁鴻傳鴻從桓榮受歐陽尚書三年而明章句善論難為都講詩生負帙未詳邦君佇德寧無挂榻之思後漢徐稚傳稚字孺子陳蕃為豫章太守在郡不接賓客惟稚來特設一榻去則懸之州將欽風應有題車之命後漢書張奐傳小人不明得過州將又周景為豫章刺史辟陳蕃為别駕蕃不就景題别駕輿曰陳仲舉座南陽坐嘯寄以共治後漢書汝南太守宗資以范滂為功曹南陽太守成瑨以岑晊為功曹皆委心聽任二郡為之謠曰汝南太守范孟博南陽宗資主畫諾南陽太守岑公孝𢎞農成瑨但坐嘯東海行歌資其主弼古逸詩寧戚飯牛車下擊牛角而疾商歌桓公授之以政梁竦不好徒為大言後漢梁竦傳竦字叔敬嘗登髙望逺歎息言曰大丈夫處世生當封侯死當廟食如其不然間居可以養志詩書足以自娛州郡之職徒勞人耳鄧禹生平惟望如此後漢鄧禹傳禹字仲華南陽新野人也光武謂曰我得専封拜生逺來寧欲仕乎禹曰不願也光武曰即如是欲何為禹曰但願明公威德加於四海禹得效其尺寸垂功名於竹帛耳若棲遲偃仰見詩因事丘中詩丘中有麻桃果三名西京雜記漢武初修上林苑羣臣各獻果有湘核桃紫文桃金城桃栗園千樹史記燕秦千樹栗此其人與千戶侯等持竿而釣徵聘不來酈元曰磻溪中有泉謂之兹泉積水為陳即太公釣處水次磐石釣處即太公垂釣之所負耒而耕公侯靡屈孟子伊尹耕於有莘之野而樂堯舜之道焉何其髙也蓋復休哉如脫推延或遲並問吾階緣人乏叨簉皇華見與楊僕射書王事無淹公禮將畢既而揚都蕩覆方離獫狁之災詩獫狁孔熾詳與王太尉書越界風塵復蹈輶軒之禮見與楊僕射書屏居空館見與王僧辨書多歷嵗時釁犯靈祗揚雄河東賦靈祗既饗招延禍罰號慕無窮肝膽屠殞煩冤胸臆屈原九章蹇蹇之煩冤兮在樹屏曰莊子引聲歌天地之道近胸臆不自堪居無心奈何無狀奈何自裴回河朔亟積寒暄風患彌留書顧命病日臻既彌留半體枯廢折臂為公雖非羊祜晉羊祜傳祜泰山南城人也封南城侯有善相墓者言祜祖墓所有帝王氣若鑿之則無後祜遂鑿之相者見曰猶出折臂三公而祜竟墮馬折臂位至公而無子跛足而使無慙郤克左傳晉侯使郤克徵會於齊齊頃公帷婦人使觀之郤子登婦人笑於房注跛而登階故笑之固以形如稿木心若死灰莊子形固可使如稿木心固可使如死灰匍匐苫廬才有魂氣詩凡民有喪匍匐救之喪大記父母之喪居倚廬不塗寢苫枕凷南史簡文被閉摛不獲朝謁因感氣疾而卒年七十八贈侍中太子詹事諡貞子夫迷山之客遲遙響於巖崖窮海之賓望孤煙於島嶼魏管寧傳注傅子曰寧在遼東積三十七年乃歸寧之歸也海中遇大風船皆沒惟寧乘船自若時夜風晦冥船人盡惑莫知所泊望見有火光輒趨之得島島無居人又無火燼行人咸異焉以為神光之佑也況乃宗均魯衛地匪燕吳車騎相望舟艫朝夕三條不逺班固西都賦披三條之廣路五達非難爾雅五達謂之康信乃闊然遂不蒙問昔桃花之峽長避嬴秦晉陶潛桃花源記晉太元中武陵人捕魚從溪而行忽遇桃花林夾兩岸數百步無雜木芳華芬曖落英繽紛漁人異之前行窮林林盡見山山有小口髣佛有光便舍船步入初極狹行四五十步豁然開朗邑室連接雞犬相聞男女被髮怡然並足見漁人大驚問所從來要還為設酒食云先世避秦難率妻子來此遂與外隔絶不知有漢無論晉魏也既出白太守太守遣人隨而尋之迷不復得路芝草之山遙然滄海未詳猶復漁船可入此下疑脫一句何況平途不兼旬月勞懷既積輒命行人弦望之問見檄周文遲枉歸翰儻二三兄弟能敦昭穆之詩求我漳濱幸問劉楨之疾魏劉楨詩余嬰沈痼疾竄身清漳濱陽春改節並念將宜扶力為書多不詮次陵白徐孝穆集箋注卷二
