body:
  text: 徐孝穆集箋注後跋余讀史至魏晉而下未嘗不廢書三歎也南北朝凡九君皆假唐虞之名行篡竊之舉沿習成風遂成故事故有生生世世不願生帝王家者遂至禪詔出諸袖中朝比肩而暮北面其端肇於新莽而成於曹魏可鄙可痛莫斯為甚善乎石勒之言曰大丈夫當光明磊落無效曹孟德欺人孤寡以狐媚取天下也顯令箋注徐庾兩家獨不及禪代諸製意在斯乎吾門徐子大文沈深嗜古見徐庾箋注心焉慕之欲補其闕略蓋以春秋之文美惡同辭陳詩之義勸戒並設且一書之中而箋注家偏有未備俾覽者終茫昧焉有難恝置也於是旁搜博采以附卷末名曰備考而質之余余謂顯令維世之志也足以立廉隅大文論世之志也足以鏡得失各自有當耳昔梁簡文答湘東王書云文章未墜必有英絶領袖之者今以徐子之趣向而又能信好將來縱橫藝苑馳騁志林豈曰孝穆才情僅㛠宫體而已哉刻既成因書數言以報之笠水陳鋭頴長氏識
